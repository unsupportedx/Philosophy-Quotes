name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install -g cordova
      - run: cordova create MyApp com.unsupportedx.philosophyquotes "Philosophy Quotes"
      - run: cp index.html MyApp/www/
      - run: mkdir -p MyApp/res && cp icon.png MyApp/res/icon.png
      - run: |
          sed -i 's|</widget>|    <icon src="res/icon.png" />\n</widget>|' MyApp/config.xml
      - run: cd MyApp && cordova platform add android
      - run: cd MyApp && cordova build android
      - uses: actions/upload-artifact@v4
        with:
          name: Philosophy-Quotes
          path: MyApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
