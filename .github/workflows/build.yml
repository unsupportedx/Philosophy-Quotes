name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install -g cordova
      - run: cordova create MyApp com.myapp.app MyApp
      - run: cp index.html MyApp/www/
      - run: cd MyApp && cordova platform add android
      - run: cd MyApp && cordova build android
      - uses: actions/upload-artifact@v3
        with:
          name: app-debug
          path: MyApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
