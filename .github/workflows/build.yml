name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install -g cordova
      - run: cordova create MyApp com.unsupportedx.philosophyquotes "Philosophy Quotes"
      - run: cp index.html MyApp/www/
      - run: cd MyApp && cordova platform add android
      - run: pip install Pillow
      - run: |
          python3 << 'EOF'
          from PIL import Image
          import shutil, os
          sizes = [36,48,72,96,144,192]
          names = ['ldpi','mdpi','hdpi','xhdpi','xxhdpi','xxxhdpi']
          img = Image.open('icon.png').convert('RGBA')
          for size, name in zip(sizes, names):
            out = f'MyApp/platforms/android/app/src/main/res/mipmap-{name}'
            os.makedirs(out, exist_ok=True)
            resized = img.resize((size,size), Image.LANCZOS)
            resized.save(f'{out}/ic_launcher.png')
            resized.save(f'{out}/ic_launcher_round.png')
          EOF
      - run: cd MyApp && cordova build android
      - uses: actions/upload-artifact@v4
        with:
          name: Philosophy-Quotes
          path: MyApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
