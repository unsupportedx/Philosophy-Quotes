name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install -g cordova
      - run: cordova create MyApp com.unsupportedx.philosophyquotes "Philosophy Quotes"
      - run: cp index.html MyApp/www/
      - run: cd MyApp && cordova platform add android
      - run: pip install Pillow
      - run: |
          python3 << 'EOF'
          from PIL import Image
          import os, glob, shutil
          img = Image.open('icon.png').convert('RGBA')
          base = 'MyApp/platforms/android/app/src/main/res/'
          for folder in glob.glob(base + 'mipmap-*'):
              shutil.rmtree(folder)
          sizes = {'mipmap-ldpi':36,'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
          for folder, size in sizes.items():
              path = base + folder
              os.makedirs(path, exist_ok=True)
              r = img.resize((size,size), Image.LANCZOS)
              r.save(f'{path}/ic_launcher.png')
              r.save(f'{path}/ic_launcher_round.png')
          print("Done!")
          EOF
      - run: cd MyApp && cordova build android
      - run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git tag v${{ github.run_number }}
          git push origin v${{ github.run_number }}
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          files: MyApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
