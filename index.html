    { text: "Bütün sanat, doğanın tamamlayıcısıdır.", author: "Aristoteles", tag: "VAROLUŞ" },
    { text: "Yaşlılık, doğanın son eseri değil; ilk tasarımıdır.", author: "Platon", tag: "TRAJEDY" },
    { text: "Sevgi, ölümsüzlüğe duyulan özlemdir.", author: "Platon", tag: "VAROLUŞ" },
    { text: "Bilgeliğin başlangıcı şeyleri gerçek adlarıyla tanımaktır.", author: "Konfüçyüs", tag: "BİLGELİK" },
    { text: "Güzel söz, söylenmemiş kötü bir sözden daha güçlüdür.", author: "Konfüçyüs", tag: "BİLGELİK" },
    { text: "İnsan, içinde bulunduğu toplumun bir yansımasıdır.", author: "Konfüçyüs", tag: "VAROLUŞ" },
    { text: "Doğruluk, ruhun temelidir.", author: "Konfüçyüs", tag: "BİLGELİK" },
    { text: "Kendini sevmeyenin başkasını sevmesi imkânsızdır.", author: "Erich Fromm", tag: "VAROLUŞ" },
    { text: "Sevgi bir eylemdir; bir his değil.", author: "Erich Fromm", tag: "VAROLUŞ" },
    { text: "Sahip olmak, olmaktan daha az değerlidir.", author: "Erich Fromm", tag: "BİLGELİK" },
    { text: "Modern insan, sahip olduğu şeylerin kölesidir.", author: "Erich Fromm", tag: "TRAJEDY" },
    { text: "Acı çekmek, büyümenin kaçınılmaz bedelidir.", author: "Erich Fromm", tag: "ACI" },
    { text: "Özgür olmak, seçeneklerinin farkında olmaktır.", author: "Erich Fromm", tag: "ÖZGÜRLÜK" },
    { text: "En büyük suç, yaşayabilecekken yaşamamaktır.", author: "Henry David Thoreau", tag: "VAROLUŞ" },
    { text: "Doğa, cevapları olan tek kitaptır.", author: "Henry David Thoreau", tag: "BİLGELİK" },
    { text: "Bir insan yalnız kaldığında kendini bulur.", author: "Henry David Thoreau", tag: "YALNIZLIK" },
    { text: "Yavaş git; çünkü nereye gittiğini bilmiyorsun.", author: "Anonim", tag: "BİLGELİK" },
    { text: "Güç, hiç düşmemekte değil; her düşüşte kalkmaktadır.", author: "Nelson Mandela", tag: "ACI" },
    { text: "Eğitim, dünyanın en güçlü silahıdır.", author: "Nelson Mandela", tag: "BİLGELİK" },
    { text: "Özgürlük bölünmez; biri kölelik içindeyken hiç kimse tam anlamıyla özgür değildir.", author: "Nelson Mandela", tag: "ÖZGÜRLÜK" },
    { text: "İnsanın ruhu, zincirlerden daha güçlüdür.", author: "Nelson Mandela", tag: "VAROLUŞ" },
    { text: "Her şey olanaksız görünür; ta ki gerçekleşene kadar.", author: "Nelson Mandela", tag: "UMUT" },
    { text: "Nefret öğrenilir; sevgi ise doğuştandır.", author: "Nelson Mandela", tag: "VAROLUŞ" },
    { text: "İnsan, anlam aradıkça kendini bulur.", author: "Viktor Frankl", tag: "VAROLUŞ" },
    { text: "Seçim yapmak, özgürlüğün ta kendisidir.", author: "Viktor Frankl", tag: "ÖZGÜRLÜK" },
    { text: "Umut, hayatın en büyük armağanıdır.", author: "Viktor Frankl", tag: "UMUT" },
    { text: "Gülmek, yaşamın en büyük savunmasıdır.", author: "Viktor Frankl", tag: "VAROLUŞ" },
    { text: "İnsanın içindeki ışık, dışarıdaki karanlığı yener.", author: "Rumi", tag: "UMUT" },
    { text: "Aşk, ruhun gördüğü şeydir; gözün değil.", author: "Rumi", tag: "VAROLUŞ" },
    { text: "Ne aradığını bilmeden bulamazsın.", author: "Rumi", tag: "BİLGELİK" },
    { text: "Sevgi, iki insanı bir yapar; ama ikisini de kaybolmaktan kurtarır.", author: "Rumi", tag: "VAROLUŞ" },
    { text: "Bir çiçek açmak için önce toprağın altında beklemek gerekir.", author: "Rumi", tag: "ACI" },
    { text: "Sabır, en yüce güçtür.", author: "Rumi", tag: "BİLGELİK" },
    { text: "Hayat bir yolculuktur; son durak değil.", author: "Rumi", tag: "VAROLUŞ" },
    { text: "Kalbini temizle; ayna olmak için.", author: "Rumi", tag: "BİLGELİK" },
    { text: "Gerçek dostluk, mesafeyi aşar.", author: "Rumi", tag: "VAROLUŞ" },
    { text: "Hiç kimse sana izin vermeden mutsuz edemez.", author: "Eleanor Roosevelt", tag: "BİLGELİK" },
    { text: "Büyük zihinler fikirleri tartışır; küçük zihinler insanları.", author: "Eleanor Roosevelt", tag: "BİLGELİK" },
    { text: "Bugünün güzelliği, geçmişin acısını siler.", author: "Ralph Waldo Emerson", tag: "UMUT" },
    { text: "Seni memnun etmek için olmana gerek yok; kendin ol.", author: "Ralph Waldo Emerson", tag: "VAROLUŞ" },
    { text: "Zihin, kendi yerinin ta kendisidir; içinde cenneti cehenneme, cehennemi cennete çevirebilir.", author: "John Milton", tag: "BİLGELİK" },
    { text: "Bilgi güçtür.", author: "Francis Bacon", tag: "BİLGELİK" },
    { text: "İnsanın en büyük zaferi, kendini yenmesidir.", author: "Platon", tag: "BİLGELİK" },
    { text: "Ölüm, sadece bir kapıdır; ötesi bilinmezdir.", author: "Sokrates", tag: "TRAJEDY" },
    { text: "Hayat kısadır; ama güzeldir.", author: "Hippokrates", tag: "VAROLUŞ" },
    { text: "Sağlık, her şeyin temelidir.", author: "Hippokrates", tag: "BİLGELİK" },
    { text: "Her hastalığın içinde bir şifa tohumu vardır.", author: "Hippokrates", tag: "UMUT" },
    { text: "Şiddet hiçbir sorunu çözmez; yalnızca yenilerini üretir.", author: "Martin Luther King Jr.", tag: "BİLGELİK" },
    { text: "Güzellik, gördüğünde tanırsın; ama sözcüklerle anlatmak zordur.", author: "Immanuel Kant", tag: "BİLGELİK" },
    { text: "Ahlak, başkasının ahlakına uymak değil; kendi ahlakını bulmaktır.", author: "Immanuel Kant", tag: "BİLGELİK" },
    { text: "İnsanı araç olarak değil; amaç olarak gör.", author: "Immanuel Kant", tag: "BİLGELİK" },
    { text: "Evrensel bir yasa olmayı isteyebileceğin şeyi yap.", author: "Immanuel Kant", tag: "BİLGELİK" },
    { text: "Cesaret, korku olmadan değil; korkuya rağmen hareket etmektir.", author: "Aristoteles", tag: "BİLGELİK" },
    { text: "Zekâ, değişebilme kapasitesidir.", author: "Albert Einstein", tag: "BİLGELİK" },
    { text: "Şüphe etmek, düşüncenin başlangıcıdır.", author: "René Descartes", tag: "BİLGELİK" },
    { text: "Ben düşünüyorum, öyleyse varım.", author: "René Descartes", tag: "VAROLUŞ" },
    { text: "Her şeyin doğrulunu bulmaya çalışmak, insanın en yüce görevidir.", author: "René Descartes", tag: "BİLGELİK" },
    { text: "Gerçek, çoğunlukla çoğunluğun yanında değildir.", author: "Galileo Galilei", tag: "BİLGELİK" },
    { text: "Evren, matematik dilinde yazılmıştır.", author: "Galileo Galilei", tag: "BİLGELİK" },
    { text: "Doğa yasaları, tanrının dilidir.", author: "Galileo Galilei", tag: "VAROLUŞ" },
    { text: "Yaşam; hız değil, derinliktir.", author: "Anonim", tag: "VAROLUŞ" },
    { text: "Geçmişi değiştiremezsin; ama geleceği şekillendirebilirsin.", author: "Anonim", tag: "UMUT" },
    { text: "Her gün yeni bir başlangıçtır.", author: "Anonim", tag: "UMUT" },
    { text: "Korkularının büyüklüğü, hayallerinin büyüklüğünü ölçer.", author: "Anonim", tag: "VAROLUŞ" },
    { text: "En güçlü savaşçı, kendini fethedendir.", author: "Lao Tzu", tag: "BİLGELİK" },
    { text: "Doğanın ritmine uyan insan, hiçbir zaman kaybolmaz.", author: "Lao Tzu", tag: "BİLGELİK" },
    { text: "Sükûnet içinde hareket etmek, hareketin en yüce halidir.", author: "Lao Tzu", tag: "BİLGELİK" },
    { text: "Bilge insan, sonucu değil; yolu sever.", author: "Lao Tzu", tag: "BİLGELİK" },
    { text: "Doğru yolda yavaş gitmek, yanlış yolda hızlı gitmekten iyidir.", author: "Lao Tzu", tag: "BİLGELİK" },
    { text: "İhtiyacın olanı bul; istediğini değil.", author: "Lao Tzu", tag: "BİLGELİK" },
    { text: "İnsanı tanımak zordur; ama kendini tanımak daha da zordur.", author: "Lao Tzu", tag: "BİLGELİK" },
    { text: "Doğa, hiçbir şeyi aceleyle yapmaz; ama her şeyi tamamlar.", author: "Lao Tzu", tag: "BİLGELİK" },
    { text: "Savaşı kazanmak için önce kendini yenmelisin.", author: "Sun Tzu", tag: "BİLGELİK" },
    { text: "Düşmanını tanı; kendini tanı; yüz savaşta yüz zafer kazanırsın.", author: "Sun Tzu", tag: "BİLGELİK" },
    { text: "Güç, görünmezdir; ama hissettirdiğinde anlarsın.", author: "Sun Tzu", tag: "BİLGELİK" },
    { text: "En büyük zafer, savaşmadan kazanılandır.", author: "Sun Tzu", tag: "BİLGELİK" },
    { text: "Fırsatı tanıyan, onu yaratan kadar değerlidir.", author: "Sun Tzu", tag: "BİLGELİK" },
    { text: "Bir ulusun gücü, bireylerinin erdeminden gelir.", author: "Cicero", tag: "BİLGELİK" },
    { text: "Okumak, dünyanın en güzel yolculuğudur.", author: "Cicero", tag: "BİLGELİK" },
    { text: "Tarih, zamanın tanığıdır.", author: "Cicero", tag: "BİLGELİK" },
    { text: "İnsanın en büyük serveti, sağlıklı bir zihindir.", author: "Cicero", tag: "BİLGELİK" },
    { text: "Yaşlılık, bilgeliğin ödülüdür.", author: "Cicero", tag: "BİLGELİK" },
    { text: "Gerçek arkadaşlık, zor günlerde görünür.", author: "Cicero", tag: "VAROLUŞ" },
    { text: "Adalet olmadan barış olmaz.", author: "Cicero", tag: "BİLGELİK" },
    { text: "İnsanı insan yapan şey, dili değil; aklıdır.", author: "Cicero", tag: "VAROLUŞ" },
    { text: "Her son, yeni bir başlangıcın habercisidir.", author: "T.S. Eliot", tag: "UMUT" },
    { text: "Gerçek keşif; yeni topraklar bulmak değil, yeni gözlerle görmektir.", author: "Marcel Proust", tag: "BİLGELİK" },
    { text: "Kayıp anları, hafızanın en güçlü kalesidir.", author: "Marcel Proust", tag: "ACI" },
    { text: "Hatırlanan şey, yaşanmaya devam eder.", author: "Marcel Proust", tag: "VAROLUŞ" },
    { text: "Sevgi, gözleri kör eder; ama kalbi açar.", author: "William Shakespeare", tag: "VAROLUŞ" },
    { text: "Sözler ucuzdur; eylemler paha biçilmezdir.", author: "William Shakespeare", tag: "BİLGELİK" },
    { text: "Zaman herkese eşittir; onu nasıl kullandığın seni farklılaştırır.", author: "William Shakespeare", tag: "BİLGELİK" },
    { text: "İnsanın içindeki şeytan, tanıdıklardan daha tehlikelidir.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Sıkıntı, insanı ya kırar ya da olgunlaştırır.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Herkes kendi cehennemi içinde taşır.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Sevgi olmadan ne adalet ne de gerçeklik olur.", author: "Fyodor Dostoyevski", tag: "VAROLUŞ" },
    { text: "Dünya, anlamını acı çekenden alır.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Bir insan yalnızca sevdiği zaman tam olarak yaşar.", author: "Leo Tolstoy", tag: "VAROLUŞ" },
    { text: "En büyük güç, kendine hâkim olmaktır.", author: "Leo Tolstoy", tag: "BİLGELİK" },
    { text: "Gerçek mutluluk; küçük şeylerdedir.", author: "Leo Tolstoy", tag: "BİLGELİK" },
    { text: "İnsanın içindeki iyi, kötüyü daima yener.", author: "Leo Tolstoy", tag: "UMUT" },
    { text: "Ölümle yüzleşmeden hayatı tam anlayamazsın.", author: "Leo Tolstoy", tag: "TRAJEDY" },
    { text: "Sanat, insanı insana bağlayan köprüdür.", author: "Leo Tolstoy", tag: "VAROLUŞ" },
    { text: "Gerçek huzur; dışarıda değil, içeride aranır.", author: "Leo Tolstoy", tag: "BİLGELİK" },
    { text: "Düşüncesiz bir iyilik, düşünceli bir kötülükten daha tehlikeli olabilir.", author: "Leo Tolstoy", tag: "BİLGELİK" },
    { text: "İnsanlık, birbirinin acısını paylaşmakla büyür.", author: "Albert Schweitzer", tag: "VAROLUŞ" },
    { text: "Yaşam sevgisi, var olmanın en derin ifadesidir.", author: "Albert Schweitzer", tag: "VAROLUŞ" },
    { text: "Doğaya saygı, insanlığa saygının başlangıcıdır.", author: "Albert Schweitzer", tag: "BİLGELİK" },
    { text: "En yüce erdem, hayata saygıdır.", author: "Albert Schweitzer", tag: "BİLGELİK" },
    { text: "Bir toplumun ahlakı, hayvanlara nasıl davrandığında ölçülür.", author: "Mahatma Gandhi", tag: "BİLGELİK" },
    { text: "Küçük adımlar, büyük değişimlerin başlangıcıdır.", author: "Lao Tzu", tag: "BİLGELİK" },
    { text: "Gece ne kadar karanlık olursa olsun, şafak mutlaka söker.", author: "Victor Hugo", tag: "UMUT" },
    { text: "Kötülüğe karşı en iyi silah, iyiliktir.", author: "Victor Hugo", tag: "BİLGELİK" },
    { text: "Sevgi, kalbin en büyük devrimidir.", author: "Victor Hugo", tag: "VAROLUŞ" },
    { text: "İnsanlık tarihi, acı ve umudun dansıdır.", author: "Victor Hugo", tag: "TRAJEDY" },
    { text: "Her ruh, kendi cennetini yaratır.", author: "Victor Hugo", tag: "VAROLUŞ" },
    { text: "Hayatta en büyük tehlike, hiç risk almamaktır.", author: "Oprah Winfrey", tag: "VAROLUŞ" },
    { text: "Başarısızlık, başarının ilk adımıdır.", author: "Oprah Winfrey", tag: "ACI" },
    { text: "Kendi sesini bulmak, en büyük özgürlüktür.", author: "Oprah Winfrey", tag: "ÖZGÜRLÜK" },
    { text: "İçindeki ışığı söndürme; dünya ona muhtaçtır.", author: "Oprah Winfrey", tag: "UMUT" },
    { text: "Gerçek başarı, başkalarına hizmet etmektir.", author: "Oprah Winfrey", tag: "VAROLUŞ" },
    { text: "Her insan kendi içindeki cevabı taşır.", author: "Oprah Winfrey", tag: "BİLGELİK" },
    { text: "Seçimler, karakteri ortaya çıkarır.", author: "J.K. Rowling", tag: "VAROLUŞ" },
    { text: "Hayal gücü gerçeklikten daha güçlüdür.", author: "Albert Einstein", tag: "BİLGELİK" },
    { text: "Sorular, cevaplardan daha değerlidir.", author: "Albert Einstein", tag: "BİLGELİK" },
    { text: "Basitlik, karmaşıklığın en yüce halidir.", author: "Leonardo da Vinci", tag: "BİLGELİK" },
    { text: "Öğrenme hiç bitmez; zihin her zaman aç kalır.", author: "Leonardo da Vinci", tag: "BİLGELİK" },
    { text: "Sanat, bilimin kardeşidir.", author: "Leonardo da Vinci", tag: "VAROLUŞ" },
    { text: "Her detayda evren gizlidir.", author: "Leonardo da Vinci", tag: "BİLGELİK" },
    { text: "Merak, bilgeliğin anasıdır.", author: "Leonardo da Vinci", tag: "BİLGELİK" },
    { text: "Hiçbir duvar, özgür bir ruhu hapsedemez.", author: "Anonim", tag: "ÖZGÜRLÜK" },
    { text: "Zincirler görünmez olduğunda daha da tehlikelidir.", author: "Anonim", tag: "ÖZGÜRLÜK" },
    { text: "En büyük yolculuk, içe doğru olandır.", author: "Anonim", tag: "VAROLUŞ" },
    { text: "Kendine dürüst olan, herkese dürüsttür.", author: "Anonim", tag: "BİLGELİK" },
    { text: "Bir gülüş, binlerce sözcüğün diyemeyeceğini söyler.", author: "Anonim", tag: "VAROLUŞ" },
    { text: "Gerçek güç, sessizlikte saklıdır.", author: "Anonim", tag: "BİLGELİK" },
    { text: "İnsanın en büyük mirası, yetiştirdiği insanlardır.", author: "Anonim", tag: "VAROLUŞ" },
    { text: "Sabah uyandığında bir şeye şükret; bu bile bir başlangıçtır.", author: "Anonim", tag: "UMUT" },
    { text: "Yaşamın en büyük dersi, öğrenmeyi asla bırakmamaktır.", author: "Anonim", tag: "BİLGELİK" },
    { text: "Karanlık, ışığın olmadığı yer değil; ışığın henüz ulaşmadığı yerdir.", author: "Anonim", tag: "UMUT" },
    { text: "İnsanı büyüten şey, yaşadıkları değil; yaşadıklarından çıkardıklarıdır.", author: "Anonim", tag: "BİLGELİK" },
    { text: "Huzur, koşulların değil; kararların sonucudur.", author: "Anonim", tag: "BİLGELİK" },
    { text: "Bir tohum kadar küçük bir umut, dağları yerinden oynatır.", author: "Anonim", tag: "UMUT" },
    { text: "Yıldızlar sadece karanlıkta görünür.", author: "Anonim", tag: "ACI" },
    { text: "Her veda, yeni bir merhaba için zemin hazırlar.", author: "Anonim", tag: "UMUT" },
    { text: "İnsanın en büyük gücü, kırıldığı yerde yeniden bütünleşmesidir.", author: "Anonim", tag: "ACI" },
    { text: "Güzellik, mükemmellikte değil; özgünlüktedir.", author: "Anonim", tag: "BİLGELİK" },
    { text: "Gerçek cesaret, korkmamak değil; korkuya rağmen adım atmaktır.", author: "Anonim", tag: "VAROLUŞ" },
    { text: "Zaman, en iyi öğretmendir; ne var ki öğrencilerini öldürür.", author: "Hector Berlioz", tag: "TRAJEDY" },
    { text: "Müzik, duyguların matematiğidir.", author: "Gottfried Wilhelm Leibniz", tag: "VAROLUŞ" },
    { text: "Matematik, Tanrı'nın diliyle yazılmış şiirdir.", author: "Galileo Galilei", tag: "VAROLUŞ" },
    { text: "Sonsuzluk, insanın hayal gücünün sınırıdır.", author: "Blaise Pascal", tag: "VAROLUŞ" },
    { text: "İnsanın büyüklüğü, madde değil; düşüncedir.", author: "Blaise Pascal", tag: "VAROLUŞ" },
    { text: "Kalbin kendi mantığı vardır, akıl onu anlayamaz.", author: "Blaise Pascal", tag: "VAROLUŞ" },
    { text: "Tüm insanlık trajedisi, bir odada sessizce oturamamaktan kaynaklanır.", author: "Blaise Pascal", tag: "TRAJEDY" },
    { text: "Doğru yaşamak, cesaretle yaşamaktır.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Zayıflık, merhamet değil; güçsüzlüğün maskesidir.", author: "Friedrich Nietzsche", tag: "BİLGELİK" },
    { text: "Yaratmak, yıkmakla başlar.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "İnsan, aşılması gereken bir şeydir.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Gerçek, hoş olmak zorunda değildir.", author: "Friedrich Nietzsche", tag: "BİLGELİK" },
    { text: "Yıldızlara ulaşmak isteyenler, önce uçurmayı öğrenmelidir.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Kendi değerini sen belirlersin; başkaları değil.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Ruhun derinliklerine inmeden zirvesine ulaşamazsın.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Kahraman, korkusuz olan değil; korkusuna rağmen ilerleyendir.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Bir şeyi yeterince seversek, onu korumak için savaşırız.", author: "Albert Camus", tag: "VAROLUŞ" },
    { text: "Anlamsızlıkla yüzleşmek, en derin cesaret eylemidir.", author: "Albert Camus", tag: "VAROLUŞ" },
    { text: "Özgürlük, seçimlerinizin toplamıdır.", author: "Albert Camus", tag: "ÖZGÜRLÜK" },
    { text: "İnsan yalnızca gerçeği aradığında özgürdür.", author: "Albert Camus", tag: "ÖZGÜRLÜK" },
    { text: "Saçmalık karşısında isyan etmek, insanın en büyük eylemidir.", author: "Albert Camus", tag: "VAROLUŞ" },
    { text: "Yaşamak, bir tercih yapmaktır.", author: "Albert Camus", tag: "VAROLUŞ" },
    { text: "Gerçek hürriyet, korkusuzluktur.", author: "Albert Camus", tag: "ÖZGÜRLÜK" },
    { text: "Sonsuz bir ışık için geçici bir karanlığa katlan.", author: "C.S. Lewis", tag: "ACI" },
    { text: "Acı, insanı dönüştürür; yok etmez.", author: "C.S. Lewis", tag: "ACI" },
    { text: "Sevgi, tutmanın değil; bırakmanın sanatıdır.", author: "C.S. Lewis", tag: "VAROLUŞ" },
    { text: "İnsan, hayallerinin büyüklüğü kadar büyüktür.", author: "Miguel de Cervantes", tag: "VAROLUŞ" },
    { text: "Rüyalar, gerçekliğin tohumlarıdır.", author: "Miguel de Cervantes", tag: "UMUT" },
    { text: "Delilik, bazen bilgeliğin en saf halidir.", author: "Miguel de Cervantes", tag: "BİLGELİK" },
    { text: "Hayat, şaşırtmacalarla dolu bir yolculuktur.", author: "Miguel de Cervantes", tag: "VAROLUŞ" },
    { text: "Gerçek kahraman, kendi içindeki ejderhayı yenendir.", author: "Joseph Campbell", tag: "VAROLUŞ" },
    { text: "Her yolculuk, bir iç dönüşümdür.", author: "Joseph Campbell", tag: "VAROLUŞ" },
    { text: "Mitler, insanlığın ortak rüyasıdır.", author: "Joseph Campbell", tag: "VAROLUŞ" },
    { text: "Korktuğun yere git; orada hazinen vardır.", author: "Joseph Campbell", tag: "VAROLUŞ" },
    { text: "Anlamlı bir yaşam, içinden gelen sese uymaktır.", author: "Joseph Campbell", tag: "VAROLUŞ" },
    { text: "İnsan, ancak anlattığı hikâyedir.", author: "Joseph Campbell", tag: "VAROLUŞ" },
    { text: "Tanrılar, insanlığın yansımasıdır.", author: "Joseph Campbell", tag: "VAROLUŞ" },
    { text: "Her kahraman yolculuğu, bir ölüm ve yeniden doğuştur.", author: "Joseph Campbell", tag: "VAROLUŞ" },
    { text: "Seninle olmayan şeylerin sana verilmesi, seninle olanları kaybetmenden iyidir.", author: "Epiktetos", tag: "STOİZM" },
    { text: "Başkalarının ne düşündüğü değil; sen ne düşündüğün önemlidir.", author: "Epiktetos", tag: "STOİZM" },
    { text: "Değiştiremeyeceğin şeyler için acı çekme; değiştirebileceklerin için çalış.", author: "Epiktetos", tag: "STOİZM" },
    { text: "Özgürlük, dışarıda değil; içeride kazanılır.", author: "Epiktetos", tag: "STOİZM" },
    { text: "İnsanları rahatsız eden şeyler, olayların kendisi değil; onlara verilen anlamlardır.", author: "Epiktetos", tag: "STOİZM" },
    { text: "Küçük şeylerde mükemmelliği ara; büyük şeyler oradan çıkar.", author: "Epiktetos", tag: "BİLGELİK" },
    { text: "Doğa seni bir şey olmadan yarattı; o şeye geri dön.", author: "Marcus Aurelius", tag: "STOİZM" },
    { text: "Her sabah şunu düşün: Bu gün ne iyi yapabilirim?", author: "Marcus Aurelius", tag: "STOİZM" },
    { text: "Seni rahatsız eden şey değil; ona verdiğin tepki sorunudur.", author: "Marcus Aurelius", tag: "STOİZM" },
    { text: "Gece uyuyamıyorsan, gündüz yeterince yaşamamışsındır.", author: "Marcus Aurelius", tag: "STOİZM" },
    { text: "İnsan, düşüncelerinin mimarıdır.", author: "Marcus Aurelius", tag: "STOİZM" },
    { text: "Zaman nehri akar; geçmiş gider, gelecek belirsizdir, şimdi ise sende.", author: "Marcus Aurelius", tag: "STOİZM" },
    { text: "Kötülüğe kötülükle karşılık vermek, seni de kötü yapar.", author: "Marcus Aurelius", tag: "STOİZM" },
    { text: "Hayatının her anını bir son gibi yaşa.", author: "Marcus Aurelius", tag: "VAROLUŞ" },
    { text: "Sabır, en sessiz güçtür.", author: "Seneca", tag: "STOİZM" },
    { text: "Ölümü düşünmek, yaşamı derinleştirir.", author: "Seneca", tag: "TRAJEDY" },
    { text: "Her anı tam yaşa; zira geri dönmez.", author: "Seneca", tag: "VAROLUŞ" },
    { text: "Zenginlik, isteklerin azlığında gizlidir.", author: "Seneca", tag: "BİLGELİK" },
    { text: "Kendi içindeki fırtınayı bastırmadan dışarıdaki fırtınaya karşı koyamazsın.", author: "Seneca", tag: "STOİZM" },
    { text: "Gençlik bir nimettir; ama bilgelik bir kazanımdır.", author: "Seneca", tag: "BİLGELİK" },
    { text: "Kendini seven, başkasını da sever.", author: "Seneca", tag: "VAROLUŞ" },
    { text: "Hızlı yaşamak, yüzeysel yaşamaktır.", author: "Seneca", tag: "BİLGELİK" },
    { text: "Kitaplar, insan ruhunun aynasıdır.", author: "Seneca", tag: "BİLGELİK" },
    { text: "Güçlü olmak değil; doğru olmak önemlidir.", author: "Seneca", tag: "BİLGELİK" },
    { text: "Bedenin sağlığı, ruhun temizliğini yansıtır.", author: "Seneca", tag: "BİLGELİK" },
    { text: "Gerçek acı, korkudan beslenir.", author: "Seneca", tag: "ACI" },
  ],
  es: [
    { text: "El obstáculo es el camino.", author: "Marco Aurelio", tag: "ESTOICISMO" },
    { text: "Quien tiene un porqué para vivir puede soportar casi cualquier cómo.", author: "Friedrich Nietzsche", tag: "EXISTENCIA" },
    { text: "Sufrimos más en la imaginación que en la realidad.", author: "Séneca", tag: "TRAGEDIA" },
    { text: "Vivir es sufrir; sobrevivir es encontrar sentido en el sufrimiento.", author: "Friedrich Nietzsche", tag: "DOLOR" },
    { text: "La muerte no es nada para nosotros; cuando existimos, la muerte no está presente.", author: "Epicuro", tag: "EXISTENCIA" },
    { text: "La única forma de lidiar con un mundo no libre es volverse tan absolutamente libre que tu mera existencia sea un acto de rebelión.", author: "Albert Camus", tag: "LIBERTAD" },
    { text: "En lo más profundo del invierno, aprendí finalmente que había en mí un verano invencible.", author: "Albert Camus", tag: "DOLOR" },
    { text: "El hombre está condenado a ser libre.", author: "Jean-Paul Sartre", tag: "EXISTENCIA" },
    { text: "Sin música, la vida sería un error.", author: "Friedrich Nietzsche", tag: "VIDA" },
    { text: "Todos estamos solos, nacemos solos, morimos solos.", author: "Hunter S. Thompson", tag: "SOLEDAD" },
    { text: "Cuídate de no perder la sustancia al aferrarte a la sombra.", author: "Esopo", tag: "SABIDURÍA" },
    { text: "Pienso, luego existo.", author: "René Descartes", tag: "EXISTENCIA" },
    { text: "El infierno son los otros.", author: "Jean-Paul Sartre", tag: "TRAGEDIA" },
    { text: "Dios ha muerto. Dios sigue muerto. Y nosotros lo hemos matado.", author: "Friedrich Nietzsche", tag: "EXISTENCIA" },
    { text: "Una vida sin examen no vale la pena vivirse.", author: "Sócrates", tag: "EXISTENCIA" },
    { text: "Hay que imaginarse a Sísifo feliz.", author: "Albert Camus", tag: "TRAGEDIA" },
    { text: "Todo se pierde en el momento en que se gana.", author: "Arthur Schopenhauer", tag: "TRAGEDIA" },
    { text: "La vida es una larga preparación para algo que nunca sucede.", author: "W.B. Yeats", tag: "TRAGEDIA" },
    { text: "La herida es el lugar por donde entra la luz.", author: "Rumi", tag: "DOLOR" },
    { text: "El dolor es inevitable. El sufrimiento es opcional.", author: "Haruki Murakami", tag: "DOLOR" },
    { text: "Ninguna gran mente ha existido sin un toque de locura.", author: "Aristóteles", tag: "EXISTENCIA" },
    { text: "Conócete a ti mismo.", author: "Sócrates", tag: "SABIDURÍA" },
    { text: "Lo que no me destruye me hace más fuerte.", author: "Friedrich Nietzsche", tag: "DOLOR" },
    { text: "El miedo a la muerte viene del miedo a la vida.", author: "Mark Twain", tag: "TRAGEDIA" },
    { text: "Amar es ser vulnerable.", author: "C.S. Lewis", tag: "DOLOR" },
    { text: "La vida es sufrimiento.", author: "Gautama Buda", tag: "DOLOR" },
    { text: "Amor fati — ama tu destino.", author: "Friedrich Nietzsche", tag: "EXISTENCIA" },
    { text: "Estar completamente vivo es estar en dolor.", author: "Fyodor Dostoevsky", tag: "DOLOR" },
    { text: "El hombre es el único animal que debe ser alentado a vivir.", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "No es la muerte lo que un hombre debe temer, sino nunca comenzar a vivir.", author: "Marco Aurelio", tag: "EXISTENCIA" },
    { text: "La tragedia de la vida no es que termine tan pronto, sino que esperamos tanto para comenzarla.", author: "W.M. Lewis", tag: "TRAGEDIA" },
    { text: "El que da luz debe soportar el ardor.", author: "Viktor Frankl", tag: "DOLOR" },
    { text: "Hasta la noche más oscura terminará y el sol saldrá.", author: "Victor Hugo", tag: "ESPERANZA" },
    { text: "Solo hay un problema filosófico verdaderamente serio, y ese es el suicidio.", author: "Albert Camus", tag: "TRAGEDIA" },
    { text: "Lo absurdo nace del enfrentamiento entre la necesidad humana y el silencio irracional del mundo.", author: "Albert Camus", tag: "EXISTENCIA" },
    { text: "La vida debe ser comprendida hacia atrás; pero debe vivirse hacia adelante.", author: "Søren Kierkegaard", tag: "EXISTENCIA" },
    { text: "La angustia es el vértigo de la libertad.", author: "Søren Kierkegaard", tag: "EXISTENCIA" },
    { text: "La forma más común de desesperación es no ser quien eres.", author: "Søren Kierkegaard", tag: "EXISTENCIA" },
    { text: "La pobreza más terrible es la soledad.", author: "Madre Teresa", tag: "SOLEDAD" },
    { text: "Donde hay vida, hay dolor.", author: "Arthur Schopenhauer", tag: "DOLOR" },
    { text: "Todo es vanidad y aflicción de espíritu.", author: "Rey Salomón", tag: "TRAGEDIA" },
    { text: "Eres responsable de lo que no haces.", author: "Jean-Paul Sartre", tag: "EXISTENCIA" },
    { text: "La realidad es simplemente una ilusión, aunque muy persistente.", author: "Albert Einstein", tag: "EXISTENCIA" },
    { text: "Morimos dos veces: cuando dejamos de respirar y cuando alguien dice nuestro nombre por última vez.", author: "Banksy", tag: "TRAGEDIA" },
    { text: "La vida es una tragedia vista de cerca, pero una comedia vista desde lejos.", author: "Charlie Chaplin", tag: "TRAGEDIA" },
    { text: "Las estrellas no pueden brillar sin oscuridad.", author: "D.H. Sidebottom", tag: "DOLOR" },
    { text: "Memento mori — recuerda que morirás.", author: "Tradición Estoica", tag: "EXISTENCIA" },
    { text: "No somos seres humanos teniendo una experiencia espiritual, sino seres espirituales teniendo una experiencia humana.", author: "Pierre Teilhard de Chardin", tag: "EXISTENCIA" },
    { text: "La lucha en sí misma hacia las alturas basta para llenar el corazón de un hombre.", author: "Albert Camus", tag: "EXISTENCIA" },
    { text: "La existencia precede a la esencia.", author: "Jean-Paul Sartre", tag: "EXISTENCIA" },
    { text: "La carga más pesada es una vida no vivida.", author: "C.G. Jung", tag: "TRAGEDIA" },
    { text: "No todos los que vagan están perdidos.", author: "J.R.R. Tolkien", tag: "EXISTENCIA" },
    { text: "No hay sol sin sombra, y es imprescindible conocer la noche.", author: "Albert Camus", tag: "TRAGEDIA" },
    { text: "Nunca sabes lo fuerte que eres hasta que ser fuerte es tu única opción.", author: "Bob Marley", tag: "DOLOR" },
    { text: "En medio de la dificultad yace la oportunidad.", author: "Albert Einstein", tag: "DOLOR" },
    { text: "Vivir es lo más raro del mundo. La mayoría de la gente simplemente existe.", author: "Oscar Wilde", tag: "EXISTENCIA" },
    { text: "Todos estamos rotos. Así es como entra la luz.", author: "Ernest Hemingway", tag: "DOLOR" },
    { text: "No soy lo que me ha pasado. Soy lo que elijo convertirme.", author: "C.G. Jung", tag: "EXISTENCIA" },
    { text: "De las almas más fuertes emergieron del sufrimiento; los caracteres más grandes están marcados por cicatrices.", author: "Khalil Gibran", tag: "DOLOR" },
    { text: "No son los años en tu vida lo que cuenta. Es la vida en tus años.", author: "Abraham Lincoln", tag: "EXISTENCIA" },
    { text: "Somos el universo experimentándose a sí mismo.", author: "Alan Watts", tag: "EXISTENCIA" },
    { text: "El sufrimiento no es un castigo, es una purificación.", author: "Paramahansa Yogananda", tag: "DOLOR" },
    { text: "Hasta que no hagas consciente lo inconsciente, dirigirá tu vida y lo llamarás destino.", author: "C.G. Jung", tag: "SABIDURÍA" },
    { text: "En el centro de tu ser tienes la respuesta.", author: "Lao Tzu", tag: "SABIDURÍA" },
    { text: "La sabiduría comienza en el asombro.", author: "Sócrates", tag: "SABIDURÍA" },
    { text: "La verdad raramente es pura y nunca simple.", author: "Oscar Wilde", tag: "SABIDURÍA" },
    { text: "Solo los muertos han visto el fin de la guerra.", author: "Platón", tag: "TRAGEDIA" },
    { text: "El hombre sufre más por el sufrimiento que teme pero que nunca llega.", author: "Fyodor Dostoevsky", tag: "DOLOR" },
    { text: "Sé amable, porque cada persona que conoces está librando una dura batalla.", author: "Platón", tag: "DOLOR" },
    { text: "La conciencia es una enfermedad.", author: "Miguel de Unamuno", tag: "TRAGEDIA" },
    { text: "Soy grande, contengo multitudes.", author: "Walt Whitman", tag: "EXISTENCIA" },
    { text: "La realidad es aquello que, cuando dejas de creer en ello, no desaparece.", author: "Philip K. Dick", tag: "EXISTENCIA" },
    { text: "Quien lucha contra monstruos debe cuidar de no convertirse en monstruo.", author: "Friedrich Nietzsche", tag: "SABIDURÍA" },
    { text: "El lenguaje de Dios es el silencio; todo lo demás es una mala traducción.", author: "Rumi", tag: "EXISTENCIA" },
    { text: "El precio de cualquier cosa es la cantidad de vida que intercambias por ella.", author: "Henry David Thoreau", tag: "EXISTENCIA" },
    { text: "La mayoría de los hombres llevan vidas de tranquila desesperación.", author: "Henry David Thoreau", tag: "TRAGEDIA" },
    { text: "Fui al bosque porque quería vivir deliberadamente.", author: "Henry David Thoreau", tag: "EXISTENCIA" },
    { text: "El lenguaje del amistad no son palabras sino significados.", author: "Henry David Thoreau", tag: "EXISTENCIA" },
    { text: "Respiré hondo y escuché el viejo bravuconería de mi corazón: estoy, estoy, estoy.", author: "Sylvia Plath", tag: "EXISTENCIA" },
    { text: "Morir es un arte. Como todo lo demás, lo hago excepcionalmente bien.", author: "Sylvia Plath", tag: "TRAGEDIA" },
    { text: "No tengo miedo de las tormentas, porque estoy aprendiendo a navegar mi barco.", author: "Louisa May Alcott", tag: "DOLOR" },
    { text: "Solo hay un camino a la felicidad y es dejar de preocuparnos por las cosas fuera de nuestro control.", author: "Epicteto", tag: "SABIDURÍA" },
    { text: "No expliques tu filosofía. Encárnala.", author: "Epicteto", tag: "SABIDURÍA" },
    { text: "La riqueza no consiste en tener grandes posesiones, sino en tener pocas necesidades.", author: "Epicteto", tag: "SABIDURÍA" },
    { text: "Haz el mejor uso de lo que está en tu poder y toma el resto como sucede.", author: "Epicteto", tag: "SABIDURÍA" },
    { text: "Primero dite a ti mismo lo que serías; luego haz lo que tienes que hacer.", author: "Epicteto", tag: "SABIDURÍA" },
    { text: "El hombre sabio no se aflige por lo que no tiene, sino que se regocija por lo que tiene.", author: "Epicteto", tag: "SABIDURÍA" },
    { text: "No hay nada bueno ni malo; el pensamiento lo hace así.", author: "William Shakespeare", tag: "SABIDURÍA" },
    { text: "Sé fiel a ti mismo.", author: "William Shakespeare", tag: "SABIDURÍA" },
    { text: "Sabemos lo que somos, pero no lo que podemos ser.", author: "William Shakespeare", tag: "EXISTENCIA" },
    { text: "Los cobardes mueren muchas veces antes de su muerte; los valientes nunca prueban la muerte sino una vez.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "Todo el mundo es un escenario, y todos los hombres y mujeres meramente actores.", author: "William Shakespeare", tag: "EXISTENCIA" },
    { text: "La culpa, querido Bruto, no está en nuestras estrellas, sino en nosotros mismos.", author: "William Shakespeare", tag: "EXISTENCIA" },
    { text: "La vida no es más que una sombra ambulante, un pobre actor que se pavonea durante su hora en el escenario.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "El infierno está vacío y todos los demonios están aquí.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "Ser o no ser, esa es la cuestión.", author: "William Shakespeare", tag: "EXISTENCIA" },
    { text: "Hay más cosas en el cielo y en la tierra, Horacio, que las soñadas en tu filosofía.", author: "William Shakespeare", tag: "EXISTENCIA" },
    { text: "Mañana, y mañana, y mañana, se arrastra a este paso mezquino de día en día.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "Apaga, apaga, breve vela. La vida no es más que una sombra ambulante.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "Ama a todos, confía en pocos, no hagas daño a nadie.", author: "William Shakespeare", tag: "SABIDURÍA" },
    { text: "No hay nada permanente excepto el cambio.", author: "Heráclito", tag: "EXISTENCIA" },
    { text: "No puedes entrar dos veces en el mismo río.", author: "Heráclito", tag: "EXISTENCIA" },
    { text: "El carácter es el destino.", author: "Heráclito", tag: "EXISTENCIA" },
    { text: "La guerra es el padre de todas las cosas.", author: "Heráclito", tag: "TRAGEDIA" },
    { text: "El camino hacia arriba y el camino hacia abajo son el mismo.", author: "Heráclito", tag: "EXISTENCIA" },
    { text: "La armonía oculta es mejor que la armonía obvia.", author: "Heráclito", tag: "SABIDURÍA" },
    { text: "La educación es encender una llama, no llenar un recipiente.", author: "Sócrates", tag: "SABIDURÍA" },
    { text: "Solo sé que no sé nada.", author: "Sócrates", tag: "SABIDURÍA" },
    { text: "El secreto del cambio es enfocar toda tu energía no en luchar contra lo viejo, sino en construir lo nuevo.", author: "Sócrates", tag: "SABIDURÍA" },
    { text: "Para encontrarte a ti mismo, piensa por ti mismo.", author: "Sócrates", tag: "SABIDURÍA" },
    { text: "Las mentes fuertes discuten ideas, las mentes mediocres discuten eventos, las mentes débiles discuten personas.", author: "Sócrates", tag: "SABIDURÍA" },
    { text: "El que conquista a sí mismo es mayor que el que conquista a mil hombres.", author: "Gautama Buda", tag: "SABIDURÍA" },
    { text: "Mereces tu amor y afecto tanto como cualquier persona en el universo.", author: "Gautama Buda", tag: "EXISTENCIA" },
    { text: "Aferrarse a la ira es como agarrar un carbón ardiente con la intención de arrojárselo a alguien; tú eres el que se quema.", author: "Gautama Buda", tag: "SABIDURÍA" },
    { text: "No vivas en el pasado, no sueñes con el futuro, concentra la mente en el momento presente.", author: "Gautama Buda", tag: "SABIDURÍA" },
    { text: "Somos lo que pensamos. Todo lo que somos surge de nuestros pensamientos.", author: "Gautama Buda", tag: "EXISTENCIA" },
    { text: "Una idea que no es peligrosa no es digna de llamarse idea en absoluto.", author: "Oscar Wilde", tag: "SABIDURÍA" },
    { text: "Puedo resistir todo excepto la tentación.", author: "Oscar Wilde", tag: "SABIDURÍA" },
    { text: "Perdonad siempre a vuestros enemigos; nada les molesta tanto.", author: "Oscar Wilde", tag: "SABIDURÍA" },
    { text: "La experiencia es simplemente el nombre que le damos a nuestros errores.", author: "Oscar Wilde", tag: "SABIDURÍA" },
    { text: "No quiero ir al cielo. Ninguno de mis amigos está allí.", author: "Oscar Wilde", tag: "TRAGEDIA" },
    { text: "Todo santo tiene un pasado y todo pecador tiene un futuro.", author: "Oscar Wilde", tag: "EXISTENCIA" },
    { text: "El sufrimiento es un momento muy largo. No podemos dividirlo por estaciones.", author: "Oscar Wilde", tag: "DOLOR" },
    { text: "Los corazones están hechos para romperse.", author: "Oscar Wilde", tag: "DOLOR" },
    { text: "Si quieres decirle la verdad a la gente, hazlos reír; de lo contrario te matarán.", author: "Oscar Wilde", tag: "SABIDURÍA" },
    { text: "Un cínico es un hombre que conoce el precio de todo y el valor de nada.", author: "Oscar Wilde", tag: "TRAGEDIA" },
    { text: "Hay solo dos tragedias en la vida: una es no conseguir lo que uno quiere, y la otra es conseguirlo.", author: "Oscar Wilde", tag: "TRAGEDIA" },
    { text: "La oscuridad no puede alejar a la oscuridad; solo la luz puede hacerlo.", author: "Martin Luther King Jr.", tag: "DOLOR" },
    { text: "Nuestras vidas comienzan a terminar el día que nos volvemos silenciosos sobre las cosas que importan.", author: "Martin Luther King Jr.", tag: "TRAGEDIA" },
    { text: "La fe es dar el primer paso incluso cuando no ves toda la escalera.", author: "Martin Luther King Jr.", tag: "EXISTENCIA" },
    { text: "Si no puedes volar, corre; si no puedes correr, camina; si no puedes caminar, repta, pero sigue avanzando.", author: "Martin Luther King Jr.", tag: "DOLOR" },
    { text: "Debemos aceptar la decepción finita, pero nunca perder la esperanza infinita.", author: "Martin Luther King Jr.", tag: "ESPERANZA" },
    { text: "Al final recordaremos no las palabras de nuestros enemigos, sino el silencio de nuestros amigos.", author: "Martin Luther King Jr.", tag: "TRAGEDIA" },
    { text: "El arco del universo moral es largo, pero se dobla hacia la justicia.", author: "Martin Luther King Jr.", tag: "ESPERANZA" },
    { text: "Un ojo por un ojo solo termina haciendo al mundo entero ciego.", author: "Mahatma Gandhi", tag: "SABIDURÍA" },
    { text: "Sé el cambio que deseas ver en el mundo.", author: "Mahatma Gandhi", tag: "EXISTENCIA" },
    { text: "Primero te ignoran, luego se ríen de ti, luego luchan contra ti, luego ganas.", author: "Mahatma Gandhi", tag: "EXISTENCIA" },
    { text: "Los débiles nunca pueden perdonar. El perdón es atributo del fuerte.", author: "Mahatma Gandhi", tag: "SABIDURÍA" },
    { text: "Vive como si fueras a morir mañana. Aprende como si fueras a vivir para siempre.", author: "Mahatma Gandhi", tag: "EXISTENCIA" },
    { text: "Un hombre es el producto de sus pensamientos. Lo que piensa, se convierte.", author: "Mahatma Gandhi", tag: "EXISTENCIA" },
    { text: "La mejor forma de encontrarte a ti mismo es perderte en el servicio de los demás.", author: "Mahatma Gandhi", tag: "SABIDURÍA" },
    { text: "Si no tuviera sentido del humor, hace tiempo que me habría suicidado.", author: "Mahatma Gandhi", tag: "TRAGEDIA" },
    { text: "El futuro pertenece a quienes creen en la belleza de sus sueños.", author: "Eleanor Roosevelt", tag: "EXISTENCIA" },
    { text: "Nadie puede hacerte sentir inferior sin tu consentimiento.", author: "Eleanor Roosevelt", tag: "SABIDURÍA" },
    { text: "Haz una cosa cada día que te asuste.", author: "Eleanor Roosevelt", tag: "EXISTENCIA" },
    { text: "El propósito de la vida es vivirla, probar la experiencia al máximo.", author: "Eleanor Roosevelt", tag: "EXISTENCIA" },
    { text: "Todo tiene belleza, pero no todos la ven.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "El hombre que hace una pregunta es un tonto por un minuto; el que no la hace es un tonto para siempre.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "No importa qué tan lento vayas, siempre que no te detengas.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "Nuestra mayor gloria no es nunca caer, sino levantarnos cada vez que caemos.", author: "Confucio", tag: "DOLOR" },
    { text: "El conocimiento real es conocer el alcance de la propia ignorancia.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "El que aprende pero no piensa está perdido. El que piensa pero no aprende está en gran peligro.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "Antes de emprender un viaje de venganza, cava dos tumbas.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "La vida es realmente simple, pero insistimos en hacerla complicada.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "Elige un trabajo que ames y no tendrás que trabajar ni un día de tu vida.", author: "Confucio", tag: "EXISTENCIA" },
    { text: "Cuando la ira se eleva, piensa en las consecuencias.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "La lucha en sí misma hacia las alturas basta para llenar el corazón de un hombre.", author: "Albert Camus", tag: "EXISTENCIA" },
    { text: "No hay destino; solo existe el ser y la lucha por atravesarlo.", author: "Albert Camus", tag: "EXISTENCIA" },
    { text: "Toda la miseria del hombre proviene de no poder sentarse en silencio en una habitación.", author: "Blaise Pascal", tag: "TRAGEDIA" },
    { text: "El corazón tiene razones que la razón desconoce.", author: "Blaise Pascal", tag: "EXISTENCIA" },
    { text: "El silencio a veces es la mejor respuesta.", author: "Dalai Lama XIV", tag: "SABIDURÍA" },
    { text: "El propósito de nuestras vidas es ser felices.", author: "Dalai Lama XIV", tag: "EXISTENCIA" },
    { text: "Mi religión es muy simple. Mi religión es la amabilidad.", author: "Dalai Lama XIV", tag: "SABIDURÍA" },
    { text: "Sé amable siempre que sea posible. Siempre es posible.", author: "Dalai Lama XIV", tag: "SABIDURÍA" },
    { text: "La vida oscila como un péndulo entre el deseo y el aburrimiento.", author: "Arthur Schopenhauer", tag: "TRAGEDIA" },
    { text: "El mayor error del hombre es buscar la causa de su infelicidad fuera de sí mismo.", author: "Arthur Schopenhauer", tag: "SABIDURÍA" },
    { text: "El dolor es el portal a las regiones inexploradas del alma.", author: "Khalil Gibran", tag: "DOLOR" },
    { text: "La alegría y el dolor brotan de la misma fuente; uno no es posible sin el otro.", author: "Khalil Gibran", tag: "DOLOR" },
    { text: "Trabajar es hacer visible el amor.", author: "Khalil Gibran", tag: "EXISTENCIA" },
    { text: "Es fácil amar a la humanidad; lo difícil es amar a las personas.", author: "Fyodor Dostoevsky", tag: "TRAGEDIA" },
    { text: "La belleza salvará al mundo.", author: "Fyodor Dostoevsky", tag: "ESPERANZA" },
    { text: "Si Dios no existe, todo está permitido.", author: "Fyodor Dostoevsky", tag: "EXISTENCIA" },
    { text: "Amar el dolor y crecer a través de él; al final se es feliz.", author: "Fyodor Dostoevsky", tag: "DOLOR" },
    { text: "Si el universo no te responde, aún no has hecho la pregunta correcta.", author: "Alan Watts", tag: "SABIDURÍA" },
    { text: "Tú eres el universo mismo; un ser consciente de su propia existencia.", author: "Alan Watts", tag: "EXISTENCIA" },
    { text: "Buscar la verdad puede ser un propósito; encontrarla es peligroso.", author: "Friedrich Nietzsche", tag: "SABIDURÍA" },
    { text: "Encontrar sentido en un mundo sin Dios — esa es la verdadera hazaña heroica.", author: "Friedrich Nietzsche", tag: "EXISTENCIA" },
    { text: "Si puedes llevar el caos dentro de ti, puedes dar a luz a una estrella danzante.", author: "Friedrich Nietzsche", tag: "EXISTENCIA" },
    { text: "Lo que parece destrucción es en realidad renovación.", author: "Rumi", tag: "DOLOR" },
    { text: "Lo que buscas ya está dentro de ti. Cállate y escucha.", author: "Rumi", tag: "SABIDURÍA" },
    { text: "La raíz de un árbol cuanto más profunda, más resiste las tormentas.", author: "Rumi", tag: "DOLOR" },
    { text: "Conocer a los demás es sabiduría; conocerte a ti mismo es iluminación.", author: "Lao Tzu", tag: "SABIDURÍA" },
    { text: "Conquistar a los demás requiere fuerza; conquistarse a uno mismo requiere verdadero poder.", author: "Lao Tzu", tag: "SABIDURÍA" },
    { text: "Sé como el agua: suave pero capaz de atravesar piedra.", author: "Lao Tzu", tag: "SABIDURÍA" },
    { text: "El viaje más largo es el que va hacia adentro.", author: "Dag Hammarskjöld", tag: "EXISTENCIA" },
    { text: "No podemos elegir el marco de nuestro destino. Pero lo que ponemos en él es nuestro.", author: "Dag Hammarskjöld", tag: "EXISTENCIA" },
    { text: "La muerte no es apagar la luz; es simplemente apagar la lámpara porque ha llegado el amanecer.", author: "Rabindranath Tagore", tag: "TRAGEDIA" },
    { text: "No puedes cruzar el mar simplemente mirando el agua.", author: "Rabindranath Tagore", tag: "EXISTENCIA" },
    { text: "La mariposa no cuenta meses sino momentos, y tiene tiempo suficiente.", author: "Rabindranath Tagore", tag: "EXISTENCIA" },
    { text: "Dormí y soñé que la vida era alegría. Desperté y vi que la vida era servicio. Actué y el servicio resultó ser alegría.", author: "Rabindranath Tagore", tag: "EXISTENCIA" },
    { text: "Si lloras porque el sol ha desaparecido de tu vida, tus lágrimas te impedirán ver las estrellas.", author: "Rabindranath Tagore", tag: "DOLOR" },
    { text: "La fe es el pájaro que siente la luz cuando el amanecer todavía está oscuro.", author: "Rabindranath Tagore", tag: "ESPERANZA" },
    { text: "Nunca es tarde para ser lo que podrías haber sido.", author: "George Eliot", tag: "EXISTENCIA" },
    { text: "Los que no pueden recordar el pasado están condenados a repetirlo.", author: "George Santayana", tag: "SABIDURÍA" },
    { text: "Toda la gloria es efímera.", author: "Napoleón Bonaparte", tag: "TRAGEDIA" },
    { text: "La imaginación gobierna el mundo.", author: "Napoleón Bonaparte", tag: "EXISTENCIA" },
    { text: "La imposibilidad es solo la opinión de los mediocres.", author: "Napoleón Bonaparte", tag: "EXISTENCIA" },
    { text: "El que teme sufrir ya sufre lo que teme.", author: "Michel de Montaigne", tag: "DOLOR" },
    { text: "La mayor cosa del mundo es saber ser uno mismo.", author: "Michel de Montaigne", tag: "EXISTENCIA" },
    { text: "Cada hombre lleva en sí la forma entera de la condición humana.", author: "Michel de Montaigne", tag: "EXISTENCIA" },
    { text: "Mi vida ha estado llena de terribles desgracias, la mayoría de las cuales nunca sucedieron.", author: "Michel de Montaigne", tag: "TRAGEDIA" },
    { text: "Cuando me examino, me encuentro lleno de imperfección.", author: "Michel de Montaigne", tag: "EXISTENCIA" },
    { text: "El que siembra vientos recoge tempestades.", author: "Proverbio Bíblico", tag: "SABIDURÍA" },
    { text: "No hay mayor soledad que la del guerrero después de la batalla.", author: "Paulo Coelho", tag: "SOLEDAD" },
    { text: "Cuando quieres algo, todo el universo conspira para que puedas realizarlo.", author: "Paulo Coelho", tag: "EXISTENCIA" },
    { text: "El mundo está en manos de los que tienen el coraje de soñar.", author: "Paulo Coelho", tag: "EXISTENCIA" },
    { text: "Siempre hay un momento en que debemos decidir si somos vencedores o vencidos.", author: "Paulo Coelho", tag: "EXISTENCIA" },
    { text: "Las personas son capaces, en cualquier momento de su vida, de hacer lo que sueñan.", author: "Paulo Coelho", tag: "EXISTENCIA" },
    { text: "Si crees que la aventura es peligrosa, prueba la rutina. Es letal.", author: "Paulo Coelho", tag: "EXISTENCIA" },
    { text: "Todo lo que existe quiere existir más.", author: "Baruch Spinoza", tag: "EXISTENCIA" },
    { text: "No llorar, no reír, no detestar, sino comprender.", author: "Baruch Spinoza", tag: "SABIDURÍA" },
    { text: "El deseo es la esencia misma del hombre.", author: "Baruch Spinoza", tag: "EXISTENCIA" },
    { text: "La paz no es ausencia de guerra; es una virtud que nace de la fortaleza del alma.", author: "Baruch Spinoza", tag: "SABIDURÍA" },
    { text: "Cuanto más entendemos las cosas singulares, más entendemos a Dios.", author: "Baruch Spinoza", tag: "EXISTENCIA" },
    { text: "La libertad es la conciencia de la necesidad.", author: "Baruch Spinoza", tag: "LIBERTAD" },
    { text: "Los hombres se engañan cuando piensan ser libres.", author: "Baruch Spinoza", tag: "TRAGEDIA" },
    { text: "El bien supremo es el conocimiento de la unión con toda la naturaleza.", author: "Baruch Spinoza", tag: "EXISTENCIA" },
    { text: "La felicidad no es la recompensa de la virtud; es la virtud misma.", author: "Baruch Spinoza", tag: "SABIDURÍA" },
    { text: "Entre el estímulo y la respuesta hay un espacio. En ese espacio está nuestro poder para elegir.", author: "Viktor Frankl", tag: "EXISTENCIA" },
    { text: "Los que no se mueven no notan sus cadenas.", author: "Rosa Luxemburg", tag: "EXISTENCIA" },
    { text: "Cuanto más tranquilo te vuelves, más puedes escuchar.", author: "Rumi", tag: "SABIDURÍA" },
    { text: "Ayer era inteligente, quería cambiar el mundo. Hoy soy sabio, me cambio a mí mismo.", author: "Rumi", tag: "SABIDURÍA" },
    { text: "Más allá de las ideas del bien y del mal, hay un campo. Allí nos encontraremos.", author: "Rumi", tag: "EXISTENCIA" },
    { text: "El arte de saber es saber qué ignorar.", author: "Rumi", tag: "SABIDURÍA" },
    { text: "Todo en el universo está dentro de ti. Pídelo todo a ti mismo.", author: "Rumi", tag: "EXISTENCIA" },
    { text: "Donde hay ruina, hay esperanza de un tesoro.", author: "Rumi", tag: "DOLOR" },
    { text: "El alma que ve la belleza a veces camina sola.", author: "Johann Wolfgang von Goethe", tag: "SOLEDAD" },
    { text: "Saber no es suficiente; debemos aplicar. Querer no es suficiente; debemos hacer.", author: "Johann Wolfgang von Goethe", tag: "EXISTENCIA" },
    { text: "Nadie está más desesperadamente esclavizado que los que falsamente creen que son libres.", author: "Johann Wolfgang von Goethe", tag: "TRAGEDIA" },
    { text: "Lo más difícil de ver es lo que está ante tus ojos.", author: "Johann Wolfgang von Goethe", tag: "SABIDURÍA" },
    { text: "Si tratas a una persona como es, seguirá siendo lo que es. Si la tratas como debería ser, se convertirá en lo que debe ser.", author: "Johann Wolfgang von Goethe", tag: "EXISTENCIA" },
    { text: "Un hombre ve en el mundo lo que lleva en su corazón.", author: "Johann Wolfgang von Goethe", tag: "EXISTENCIA" },
    { text: "Somos moldeados por nuestros pensamientos; nos convertimos en lo que pensamos.", author: "Gautama Buda", tag: "EXISTENCIA" },
    { text: "Tres cosas no pueden ocultarse por mucho tiempo: el sol, la luna y la verdad.", author: "Gautama Buda", tag: "SABIDURÍA" },
    { text: "La mente lo es todo. En lo que piensas te conviertes.", author: "Gautama Buda", tag: "EXISTENCIA" },
    { text: "No habites en el pasado, no sueñes con el futuro; concentra la mente en el momento presente.", author: "Gautama Buda", tag: "EXISTENCIA" },
    { text: "Aferrarse a la ira es como beber veneno y esperar que el otro muera.", author: "Gautama Buda", tag: "SABIDURÍA" },
    { text: "No hay camino a la felicidad. La felicidad es el camino.", author: "Gautama Buda", tag: "EXISTENCIA" },
    { text: "Es mejor viajar bien que llegar.", author: "Gautama Buda", tag: "EXISTENCIA" },
    { text: "La paz viene de dentro. No la busques fuera.", author: "Gautama Buda", tag: "SABIDURÍA" },
    { text: "He decidido quedarme con el amor. El odio es demasiada carga para cargar.", author: "Martin Luther King Jr.", tag: "EXISTENCIA" },
    { text: "La oscuridad no puede expulsar a la oscuridad; solo la luz puede hacerlo.", author: "Martin Luther King Jr.", tag: "DOLOR" },
    { text: "La fe es dar el primer paso aunque no puedas ver toda la escalera.", author: "Martin Luther King Jr.", tag: "EXISTENCIA" },
    { text: "Nuestras vidas comienzan a terminar el día en que nos quedamos en silencio sobre las cosas que importan.", author: "Martin Luther King Jr.", tag: "TRAGEDIA" },
    { text: "Siempre es el momento correcto para hacer lo correcto.", author: "Martin Luther King Jr.", tag: "SABIDURÍA" },
    { text: "Si no puedes volar, corre; si no puedes correr, camina; si no puedes caminar, gatea; pero hagas lo que hagas, sigue avanzando.", author: "Martin Luther King Jr.", tag: "DOLOR" },
    { text: "Debemos aceptar la decepción finita, pero nunca perder la esperanza infinita.", author: "Martin Luther King Jr.", tag: "ESPERANZA" },
    { text: "La pregunta más persistente y urgente de la vida es: ¿Qué estás haciendo por los demás?", author: "Martin Luther King Jr.", tag: "EXISTENCIA" },
    { text: "Lo que importa es la calidad, no la longevidad de la propia vida.", author: "Martin Luther King Jr.", tag: "EXISTENCIA" },
    { text: "Debemos aprender a vivir juntos como hermanos o perecer juntos como necios.", author: "Martin Luther King Jr.", tag: "TRAGEDIA" },
    { text: "No hay nada más aterrador que la ignorancia en acción.", author: "Johann Wolfgang von Goethe", tag: "SABIDURÍA" },
    { text: "No es pobre quien tiene poco, sino quien desea más.", author: "Séneca", tag: "SABIDURÍA" },
    { text: "La suerte es lo que sucede cuando la preparación se encuentra con la oportunidad.", author: "Séneca", tag: "SABIDURÍA" },
    { text: "Comienza a vivir de inmediato y cuenta cada día separado como una vida separada.", author: "Séneca", tag: "EXISTENCIA" },
    { text: "Nadie se volvió sabio por casualidad.", author: "Séneca", tag: "SABIDURÍA" },
    { text: "No es que sea muy inteligente; simplemente me quedo con los problemas por más tiempo.", author: "Albert Einstein", tag: "SABIDURÍA" },
    { text: "La imaginación es más importante que el conocimiento.", author: "Albert Einstein", tag: "EXISTENCIA" },
    { text: "La lógica te llevará de A a B. La imaginación te llevará a todas partes.", author: "Albert Einstein", tag: "EXISTENCIA" },
    { text: "Una persona que nunca cometió un error nunca intentó nada nuevo.", author: "Albert Einstein", tag: "EXISTENCIA" },
    { text: "La medida de la inteligencia es la capacidad de cambiar.", author: "Albert Einstein", tag: "SABIDURÍA" },
    { text: "Trata de no convertirte en un hombre de éxito, sino en un hombre de valor.", author: "Albert Einstein", tag: "EXISTENCIA" },
    { text: "Dos cosas son infinitas: el universo y la estupidez humana; y no estoy seguro del universo.", author: "Albert Einstein", tag: "TRAGEDIA" },
    { text: "No podemos resolver problemas usando el mismo tipo de pensamiento que usamos cuando los creamos.", author: "Albert Einstein", tag: "SABIDURÍA" },
    { text: "Si quieres vivir una vida feliz, átala a una meta, no a personas ni cosas.", author: "Albert Einstein", tag: "EXISTENCIA" },
    { text: "El hombre es una cuerda tendida entre el animal y el Superhombre, una cuerda sobre el abismo.", author: "Friedrich Nietzsche", tag: "EXISTENCIA" },
    { text: "Cuanto más alto volamos, más pequeños parecemos a quienes no pueden volar.", author: "Friedrich Nietzsche", tag: "SOLEDAD" },
    { text: "En los individuos, la locura es rara; pero en grupos, partidos, naciones y épocas, es la norma.", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "No hay hechos, solo interpretaciones.", author: "Friedrich Nietzsche", tag: "EXISTENCIA" },
    { text: "Las convicciones son enemigas más peligrosas de la verdad que las mentiras.", author: "Friedrich Nietzsche", tag: "SABIDURÍA" },
    { text: "Olvidar el propio propósito es la forma más común de estupidez.", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "Vive peligrosamente; esa es la forma de extraer los mayores frutos de la existencia.", author: "Friedrich Nietzsche", tag: "EXISTENCIA" },
    { text: "Todo pensador profundo teme más ser comprendido que no serlo.", author: "Friedrich Nietzsche", tag: "SOLEDAD" },
    { text: "Todos los pensamientos verdaderamente grandes se conciben caminando.", author: "Friedrich Nietzsche", tag: "SABIDURÍA" },
    { text: "Debemos considerar perdido cada día en que no hayamos bailado al menos una vez.", author: "Friedrich Nietzsche", tag: "EXISTENCIA" },
    { text: "La esperanza es en realidad el peor de todos los males porque prolonga los tormentos del hombre.", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "Debes tener caos dentro de ti para dar a luz a una estrella danzante.", author: "Friedrich Nietzsche", tag: "EXISTENCIA" },
    { text: "La lucha del hombre contra el poder es la lucha de la memoria contra el olvido.", author: "Milan Kundera", tag: "TRAGEDIA" },
    { text: "El tiempo humano no gira en círculos; corre hacia adelante en línea recta.", author: "Milan Kundera", tag: "EXISTENCIA" },
    { text: "La felicidad es el anhelo de la repetición.", author: "Milan Kundera", tag: "EXISTENCIA" },
    { text: "El optimismo es el opio del pueblo.", author: "Milan Kundera", tag: "TRAGEDIA" },
    { text: "La tristeza es una forma de felicidad para quienes aman apasionadamente.", author: "Milan Kundera", tag: "DOLOR" },
    { text: "El grado de luz es inverso al grado de oscuridad.", author: "Hermann Hesse", tag: "DOLOR" },
    { text: "Algunos pensamos que aferrarnos nos hace fuertes, pero a veces es soltar.", author: "Hermann Hesse", tag: "DOLOR" },
    { text: "Dentro de ti hay una quietud y un santuario al que puedes retirarte en cualquier momento.", author: "Hermann Hesse", tag: "SOLEDAD" },
    { text: "No hay otra realidad que la que llevamos dentro. Por eso tantas personas viven una vida tan irreal.", author: "Hermann Hesse", tag: "EXISTENCIA" },
    { text: "Aprende lo que debe tomarse en serio y ríete del resto.", author: "Hermann Hesse", tag: "SABIDURÍA" },
    { text: "El pájaro lucha por salir del huevo. El huevo es el mundo. Quien quiere nacer debe destruir un mundo.", author: "Hermann Hesse", tag: "EXISTENCIA" },
    { text: "Solo quería vivir de acuerdo con los impulsos de mi verdadero yo. ¿Por qué era tan difícil?", author: "Hermann Hesse", tag: "TRAGEDIA" },
    { text: "La verdad tiene un millón de caras, pero solo hay una verdad.", author: "Hermann Hesse", tag: "SABIDURÍA" },
    { text: "Si odias a una persona, odias algo en ella que es parte de ti mismo.", author: "Hermann Hesse", tag: "SABIDURÍA" },
    { text: "El hombre no puede descubrir nuevos océanos a menos que tenga el coraje de perder de vista la orilla.", author: "André Gide", tag: "EXISTENCIA" },
    { text: "Solo se ve bien con el corazón; lo esencial es invisible para los ojos.", author: "Antoine de Saint-Exupéry", tag: "SABIDURÍA" },
    { text: "Te vuelves responsable, para siempre, de lo que has domesticado.", author: "Antoine de Saint-Exupéry", tag: "EXISTENCIA" },
    { text: "Me estudio a mí mismo más que a cualquier otro tema; es mi metafísica, es mi física.", author: "Michel de Montaigne", tag: "EXISTENCIA" },
    { text: "Préstate a los demás; pero date a ti mismo.", author: "Michel de Montaigne", tag: "SABIDURÍA" },
    { text: "No pudiendo gobernar los eventos, me gobierno a mí mismo.", author: "Michel de Montaigne", tag: "SABIDURÍA" },
    { text: "Nada fija tanto una cosa en la memoria como el deseo de olvidarla.", author: "Michel de Montaigne", tag: "DOLOR" },
    { text: "La mayor cosa del mundo es saber pertenecerse a uno mismo.", author: "Michel de Montaigne", tag: "EXISTENCIA" },
    { text: "Cuántas cosas que ayer teníamos como artículos de fe, hoy las contamos como fábulas.", author: "Michel de Montaigne", tag: "SABIDURÍA" },
    { text: "La señal más cierta de la sabiduría es la alegría.", author: "Michel de Montaigne", tag: "SABIDURÍA" },
    { text: "Incluso en un palacio, se puede vivir bien.", author: "Marco Aurelio", tag: "ESTOICISMO" },
    { text: "Acepta las cosas a las que el destino te ata y ama a las personas con quienes el destino te reúne.", author: "Marco Aurelio", tag: "EXISTENCIA" },
    { text: "El obstáculo para la acción hace avanzar la acción. Lo que se interpone en el camino se convierte en el camino.", author: "Marco Aurelio", tag: "ESTOICISMO" },
    { text: "La perfección del carácter es esta: vivir cada día como si fuera el último, sin frenesí, sin apatía, sin pretensión.", author: "Marco Aurelio", tag: "EXISTENCIA" },
    { text: "La mejor venganza es no ser como quien cometió la injusticia.", author: "Marco Aurelio", tag: "SABIDURÍA" },
    { text: "La pérdida no es más que el cambio, y el cambio es el deleite de la naturaleza.", author: "Marco Aurelio", tag: "TRAGEDIA" },
    { text: "Confínate al presente.", author: "Marco Aurelio", tag: "EXISTENCIA" },
    { text: "La primera regla es mantener un espíritu tranquilo. La segunda es mirar las cosas de frente y conocerlas por lo que son.", author: "Marco Aurelio", tag: "ESTOICISMO" },
    { text: "La conciencia es una enfermedad.", author: "Miguel de Unamuno", tag: "TRAGEDIA" },
    { text: "Soy grande, contengo multitudes.", author: "Walt Whitman", tag: "EXISTENCIA" },
    { text: "La realidad es aquello que, cuando dejas de creer en ello, no desaparece.", author: "Philip K. Dick", tag: "EXISTENCIA" },
    { text: "Quien lucha con monstruos debe cuidar de no convertirse él mismo en un monstruo.", author: "Friedrich Nietzsche", tag: "SABIDURÍA" },
    { text: "El lenguaje de Dios es el silencio; todo lo demás es mala traducción.", author: "Rumi", tag: "EXISTENCIA" },
    { text: "El hombre que no lee no tiene ventaja sobre el que no sabe leer.", author: "Mark Twain", tag: "SABIDURÍA" },
    { text: "La vida no es la que uno vivió, sino la que uno recuerda.", author: "Gabriel García Márquez", tag: "EXISTENCIA" },
    { text: "El amor no se mide por el tiempo, sino por la intensidad.", author: "Gabriel García Márquez", tag: "EXISTENCIA" },
    { text: "Nadie puede darte libertad; nadie puede darte igualdad o justicia. Si eres hombre, lo tomas tú mismo.", author: "Malcolm X", tag: "LIBERTAD" },
    { text: "El miedo a la muerte es el miedo a vivir plenamente.", author: "Mark Twain", tag: "TRAGEDIA" },
    { text: "No llores porque terminó; sonríe porque ocurrió.", author: "Gabriel García Márquez", tag: "DOLOR" },
    { text: "El amor es la condición en la que la felicidad de otra persona es esencial para la tuya propia.", author: "Robert Heinlein", tag: "EXISTENCIA" },
    { text: "La sabiduría es saber lo que ignoramos.", author: "Sócrates", tag: "SABIDURÍA" },
    { text: "Todo lo que somos es resultado de lo que hemos pensado.", author: "Gautama Buda", tag: "EXISTENCIA" },
    { text: "No existe el camino hacia la paz; la paz es el camino.", author: "Mahatma Gandhi", tag: "SABIDURÍA" },
    { text: "El verdadero heroísmo es notablemente sobrio, muy poco dramático.", author: "David Foster Wallace", tag: "EXISTENCIA" },
    { text: "Estamos aquí para reír al destino.", author: "Charles Bukowski", tag: "EXISTENCIA" },
    { text: "Encontrar el amor en el dolor es el arte supremo de vivir.", author: "Friedrich Nietzsche", tag: "DOLOR" },
    { text: "La libertad no es algo que se recibe como regalo; es algo que se conquista.", author: "Erich Fromm", tag: "LIBERTAD" },
    { text: "Amar significa no tener miedo de perder.", author: "Erich Fromm", tag: "EXISTENCIA" },
    { text: "El amor maduro dice: 'Te necesito porque te amo.' El amor inmaduro dice: 'Te amo porque te necesito.'", author: "Erich Fromm", tag: "EXISTENCIA" },
    { text: "La soledad moderna no viene de estar solo, sino de estar rodeados de extraños.", author: "Erich Fromm", tag: "SOLEDAD" },
    { text: "El hombre moderno cree que pierde algo —tiempo— cuando no hace las cosas de prisa.", author: "Erich Fromm", tag: "TRAGEDIA" },
    { text: "La fe más profunda es la de quien ha dudado todo y aun así sigue creyendo.", author: "Søren Kierkegaard", tag: "EXISTENCIA" },
    { text: "El verdadero yo solo se revela en la elección radical.", author: "Søren Kierkegaard", tag: "EXISTENCIA" },
    { text: "Dios existe; yo no puedo probarlo, pero tampoco puedo probar lo contrario.", author: "Søren Kierkegaard", tag: "EXISTENCIA" },
    { text: "La desesperación es la enfermedad mortal.", author: "Søren Kierkegaard", tag: "TRAGEDIA" },
    { text: "La ironía es el sello del espíritu libre.", author: "Søren Kierkegaard", tag: "SABIDURÍA" },
    { text: "La subjetividad es la verdad.", author: "Søren Kierkegaard", tag: "EXISTENCIA" },
    { text: "El silencio es la más perfecta expresión del desprecio.", author: "George Bernard Shaw", tag: "SABIDURÍA" },
    { text: "Los que no pueden cambiar de opinión no pueden cambiar nada.", author: "George Bernard Shaw", tag: "SABIDURÍA" },
    { text: "La vida no es un problema a resolver, sino una realidad a experimentar.", author: "Søren Kierkegaard", tag: "EXISTENCIA" },
    { text: "El que tiene fe mueve montañas; el que tiene duda las estudia.", author: "Anonim", tag: "SABIDURÍA" },
    { text: "Cuando sueñas solo es solo un sueño; cuando sueñas con otros es realidad.", author: "Anonim", tag: "ESPERANZA" },
    { text: "La paciencia es amarga, pero su fruto es dulce.", author: "Jean-Jacques Rousseau", tag: "SABIDURÍA" },
    { text: "El hombre nace libre, pero en todas partes está encadenado.", author: "Jean-Jacques Rousseau", tag: "LIBERTAD" },
    { text: "La conciencia es la voz del alma; las pasiones, la voz del cuerpo.", author: "Jean-Jacques Rousseau", tag: "EXISTENCIA" },
    { text: "La naturaleza no engaña nunca; somos nosotros quienes nos engañamos.", author: "Jean-Jacques Rousseau", tag: "SABIDURÍA" },
    { text: "La felicidad no es eterna ni la tristeza tampoco.", author: "Jean-Jacques Rousseau", tag: "EXISTENCIA" },
    { text: "Educa a los niños y no tendrás que castigar a los hombres.", author: "Pitágoras", tag: "SABIDURÍA" },
    { text: "No hay hombre libre que no sea dueño de sí mismo.", author: "Epicteto", tag: "LIBERTAD" },
    { text: "El universo es transformación; la vida es opinión.", author: "Marco Aurelio", tag: "EXISTENCIA" },
    { text: "Lo que el mundo necesita es más amor y menos papeleo.", author: "Pearl Bailey", tag: "EXISTENCIA" },
    { text: "El arte es la mentira que nos permite conocer la verdad.", author: "Pablo Picasso", tag: "EXISTENCIA" },
    { text: "La inspiración existe, pero tiene que encontrarte trabajando.", author: "Pablo Picasso", tag: "EXISTENCIA" },
    { text: "Cada acto de creación es primero un acto de destrucción.", author: "Pablo Picasso", tag: "EXISTENCIA" },
    { text: "La acción es la antídoto de la desesperación.", author: "Joan Baez", tag: "ESPERANZA" },
    { text: "No tengas miedo de la perfección; nunca la alcanzarás.", author: "Salvador Dalí", tag: "EXISTENCIA" },
    { text: "La única diferencia entre la locura y el genio es el éxito.", author: "Salvador Dalí", tag: "EXISTENCIA" },
    { text: "Amo todo lo que fluye.", author: "Henry Miller", tag: "EXISTENCIA" },
    { text: "Uno no descubre nuevas tierras sin consentir en perder de vista la orilla.", author: "André Gide", tag: "EXISTENCIA" },
    { text: "Es mejor saber algunas preguntas que todas las respuestas.", author: "James Thurber", tag: "SABIDURÍA" },
    { text: "La diferencia entre lo posible y lo imposible depende de la determinación.", author: "Tommy Lasorda", tag: "EXISTENCIA" },
    { text: "El hombre sabio no dice todo lo que piensa, pero siempre piensa todo lo que dice.", author: "Aristóteles", tag: "SABIDURÍA" },
    { text: "La educación es el arma más poderosa para cambiar el mundo.", author: "Nelson Mandela", tag: "SABIDURÍA" },
    { text: "Siempre parece imposible hasta que se hace.", author: "Nelson Mandela", tag: "ESPERANZA" },
    { text: "El amor es más fuerte que el odio y la esperanza más fuerte que el miedo.", author: "Nelson Mandela", tag: "ESPERANZA" },
    { text: "La grandeza no es un lugar al que se llega; es una forma de viajar.", author: "Nelson Mandela", tag: "EXISTENCIA" },
    { text: "Para liderar, uno debe servir.", author: "Nelson Mandela", tag: "SABIDURÍA" },
    { text: "Nada en la vida es para temerse; solo para entenderse.", author: "Marie Curie", tag: "SABIDURÍA" },
    { text: "El fracaso solo llega cuando dejamos de intentarlo.", author: "Albert Einstein", tag: "EXISTENCIA" },
    { text: "El conocimiento sin aplicación es como un libro que nunca se abre.", author: "Benjamin Franklin", tag: "SABIDURÍA" },
    { text: "La inversión en conocimiento paga el mejor interés.", author: "Benjamin Franklin", tag: "SABIDURÍA" },
    { text: "Un hombre que se atreve a desperdiciar una hora no ha descubierto el valor de la vida.", author: "Charles Darwin", tag: "EXISTENCIA" },
    { text: "La ciencia y la religión no son enemigas; son dos maneras de comprender lo mismo.", author: "Stephen Hawking", tag: "EXISTENCIA" },
    { text: "El universo no está obligado a tener sentido.", author: "Neil deGrasse Tyson", tag: "EXISTENCIA" },
    { text: "Estamos hechos de polvo de estrellas.", author: "Carl Sagan", tag: "EXISTENCIA" },
    { text: "La tierra es un pequeño escenario en una vasta arena cósmica.", author: "Carl Sagan", tag: "EXISTENCIA" },
    { text: "En algún lugar, algo increíble está esperando ser conocido.", author: "Carl Sagan", tag: "ESPERANZA" },
    { text: "Si quieres hacer una tarta de manzana desde cero, primero debes crear el universo.", author: "Carl Sagan", tag: "EXISTENCIA" },
    { text: "La ausencia de evidencia no es evidencia de ausencia.", author: "Carl Sagan", tag: "SABIDURÍA" },
    { text: "El cosmos es todo lo que es, lo que fue, y lo que alguna vez será.", author: "Carl Sagan", tag: "EXISTENCIA" },
    { text: "La duda es el comienzo del conocimiento.", author: "René Descartes", tag: "SABIDURÍA" },
    { text: "El alma que ve la belleza puede a veces caminar sola.", author: "Johann Wolfgang von Goethe", tag: "SOLEDAD" },
    { text: "La dificultad mayor no es persuadir a la gente de las ideas nuevas, sino hacerle olvidar las viejas.", author: "John Maynard Keynes", tag: "SABIDURÍA" },
    { text: "No es lo que te sucede lo que importa, sino cómo reaccionas.", author: "Epicteto", tag: "SABIDURÍA" },
    { text: "El conocimiento es el único bien que crece cuando se comparte.", author: "Anonim", tag: "SABIDURÍA" },
    { text: "La imaginación es más importante que el conocimiento, porque el conocimiento es limitado.", author: "Albert Einstein", tag: "SABIDURÍA" },
    { text: "Para obtener resultados diferentes hay que hacer cosas diferentes.", author: "Albert Einstein", tag: "SABIDURÍA" },
    { text: "La mente es su propio lugar y en sí mismo puede hacer un cielo del infierno, un infierno del cielo.", author: "John Milton", tag: "SABIDURÍA" },
    { text: "Las guerras son iniciadas por viejos y peleadas por jóvenes.", author: "Herbert Hoover", tag: "TRAGEDIA" },
    { text: "La guerra nunca decide quién tiene razón, solo quién queda.", author: "Bertrand Russell", tag: "TRAGEDIA" },
    { text: "La ética es saber la diferencia entre lo que tienes el derecho de hacer y lo correcto que debes hacer.", author: "Potter Stewart", tag: "SABIDURÍA" },
    { text: "El lenguaje es la casa del ser.", author: "Martin Heidegger", tag: "EXISTENCIA" },
    { text: "El ser mismo está en cuestión en su ser.", author: "Martin Heidegger", tag: "EXISTENCIA" },
    { text: "La muerte es la posibilidad más propia del Dasein.", author: "Martin Heidegger", tag: "TRAGEDIA" },
    { text: "Solo un Dios puede salvarnos.", author: "Martin Heidegger", tag: "EXISTENCIA" },
    { text: "La técnica moderna no es neutral.", author: "Martin Heidegger", tag: "EXISTENCIA" },
    { text: "El pensar comienza solo cuando hemos comprendido que la razón glorificada por siglos es el más duro adversario del pensamiento.", author: "Martin Heidegger", tag: "SABIDURÍA" },
    { text: "La filosofía es práctica cuando se aplica a la vida.", author: "Immanuel Kant", tag: "SABIDURÍA" },
    { text: "El cielo estrellado sobre mí y la ley moral en mí.", author: "Immanuel Kant", tag: "EXISTENCIA" },
    { text: "Actúa solo según aquella máxima que puedas querer que se convierta en ley universal.", author: "Immanuel Kant", tag: "SABIDURÍA" },
    { text: "Tener valor para usar la propia inteligencia.", author: "Immanuel Kant", tag: "SABIDURÍA" },
    { text: "La felicidad no es un ideal de la razón sino de la imaginación.", author: "Immanuel Kant", tag: "EXISTENCIA" },
    { text: "La persona que miente a otros se engaña a sí misma.", author: "Immanuel Kant", tag: "SABIDURÍA" },
    { text: "Tratar a las personas siempre como fines, nunca como medios.", author: "Immanuel Kant", tag: "SABIDURÍA" },
    { text: "El mundo tiene suficiente para satisfacer las necesidades de cada hombre, pero no la codicia de cada hombre.", author: "Mahatma Gandhi", tag: "SABIDURÍA" },
    { text: "Primero te ignoran, luego se ríen, luego luchan contigo, luego ganas.", author: "Mahatma Gandhi", tag: "ESPERANZA" },
    { text: "La fuerza no viene de la capacidad física, viene de la voluntad indomable.", author: "Mahatma Gandhi", tag: "EXISTENCIA" },
    { text: "Un error no se convierte en verdad por el hecho de que todo el mundo lo crea.", author: "Mahatma Gandhi", tag: "SABIDURÍA" },
    { text: "En la búsqueda de la verdad, el amor es el arma más efectiva.", author: "Mahatma Gandhi", tag: "EXISTENCIA" },
    { text: "La violencia es el miedo a los ideales de los demás.", author: "Mahatma Gandhi", tag: "SABIDURÍA" },
    { text: "El movimiento de la tierra está en nuestras mentes.", author: "Baruch Spinoza", tag: "EXISTENCIA" },
    { text: "Dios, o lo que es la Naturaleza.", author: "Baruch Spinoza", tag: "EXISTENCIA" },
    { text: "Nada es contingente; todo ocurre por necesidad.", author: "Baruch Spinoza", tag: "EXISTENCIA" },
    { text: "El deseo es la esencia del ser humano.", author: "Baruch Spinoza", tag: "EXISTENCIA" },
    { text: "El bien supremo es el conocimiento de Dios.", author: "Baruch Spinoza", tag: "EXISTENCIA" },
    { text: "La mente y el cuerpo son un solo y mismo individuo.", author: "Baruch Spinoza", tag: "EXISTENCIA" },
    { text: "No reír, no llorar, no detestar, sino comprender.", author: "Baruch Spinoza", tag: "SABIDURÍA" },
    { text: "La libertad es la conciencia de la necesidad.", author: "Baruch Spinoza", tag: "LIBERTAD" },
    { text: "Cada cosa se esfuerza por perseverar en su ser.", author: "Baruch Spinoza", tag: "EXISTENCIA" },
    { text: "La ignorancia no es un argumento.", author: "Baruch Spinoza", tag: "SABIDURÍA" },
    { text: "La razón y el amor raramente habitan el mismo corazón.", author: "William Shakespeare", tag: "EXISTENCIA" },
    { text: "Lo que hay en un nombre; la rosa olería igual con otro nombre.", author: "William Shakespeare", tag: "SABIDURÍA" },
    { text: "El destino tiene muchas puertas.", author: "William Shakespeare", tag: "EXISTENCIA" },
    { text: "La cobardía es el crimen de los crímenes.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "Habla poco y bien; quedarás bien.", author: "William Shakespeare", tag: "SABIDURÍA" },
    { text: "El amor verdadero nunca tuvo un camino suave.", author: "William Shakespeare", tag: "DOLOR" },
    { text: "Cómo se acaba una vida determina la grandeza del que la vivió.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "Somos la suma de nuestras elecciones.", author: "Jean-Paul Sartre", tag: "EXISTENCIA" },
    { text: "El hombre es condenado a ser libre; porque una vez arrojado al mundo, es responsable de todo lo que hace.", author: "Jean-Paul Sartre", tag: "LIBERTAD" },
    { text: "La existencia es anterior a la esencia.", author: "Jean-Paul Sartre", tag: "EXISTENCIA" },
    { text: "La náusea es la conciencia del absurdo.", author: "Jean-Paul Sartre", tag: "EXISTENCIA" },
    { text: "Cada uno es responsable de lo que es.", author: "Jean-Paul Sartre", tag: "EXISTENCIA" },
    { text: "El otro me hace ser lo que soy.", author: "Jean-Paul Sartre", tag: "EXISTENCIA" },
    { text: "Nunca vi un hombre débil hacerse fuerte negando la existencia de la fortaleza.", author: "C.S. Lewis", tag: "SABIDURÍA" },
    { text: "La amistad es el amor menos secreto.", author: "C.S. Lewis", tag: "EXISTENCIA" },
    { text: "El dolor no es un mal en sí mismo; es el medio por el que aprendemos a amar.", author: "C.S. Lewis", tag: "DOLOR" },
    { text: "Si leemos solo los libros que todos leen, solo podemos pensar como todos piensan.", author: "Haruki Murakami", tag: "SABIDURÍA" },
    { text: "Perder el tiempo es encontrarlo.", author: "Haruki Murakami", tag: "EXISTENCIA" },
    { text: "En la oscuridad más profunda es cuando mejor se ven las estrellas.", author: "Haruki Murakami", tag: "DOLOR" },
    { text: "Lo que me parece raro es que la gente decida morir en lugar de vivir.", author: "Haruki Murakami", tag: "EXISTENCIA" },
    { text: "La memoria es como el tiempo: fluye, cambia, se transforma.", author: "Haruki Murakami", tag: "EXISTENCIA" },
    { text: "El mundo puede cambiar, pero los sueños no.", author: "Haruki Murakami", tag: "ESPERANZA" },
    { text: "El destino no es azar, es una elección.", author: "William Jennings Bryan", tag: "EXISTENCIA" },
    { text: "Si piensas que puedes, tienes razón; y si piensas que no puedes, también tienes razón.", author: "Henry Ford", tag: "EXISTENCIA" },
    { text: "El fracaso es simplemente la oportunidad de comenzar de nuevo, esta vez más inteligentemente.", author: "Henry Ford", tag: "DOLOR" },
    { text: "Si hay un secreto del éxito es la capacidad de ponerse en el punto de vista del otro.", author: "Henry Ford", tag: "SABIDURÍA" },
    { text: "El hombre que mueve montañas comienza apartando piedrecitas.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "El aprendizaje sin reflexión es un desperdicio; la reflexión sin aprendizaje es peligrosa.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "La virtud nunca quedará sola; tendrá vecinos.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "La bondad es más fuerte que el mal.", author: "Desmond Tutu", tag: "ESPERANZA" },
    { text: "Sin perdón no hay futuro.", author: "Desmond Tutu", tag: "SABIDURÍA" },
