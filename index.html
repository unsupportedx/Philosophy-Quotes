    { text: "Zaman zaman ilk bakışta ilgimizi çekmeye başlayan insanlarla, hatta tam yabancılarla karşılaşırız.", author: "Fyodor Dostoyevski", tag: "VAROLUŞ" },
    { text: "En ağır yoksulluk yalnızlıktır.", author: "Teresa Ana", tag: "YALNIZLIK" },
    { text: "Her şey boştur ve ruhun bir sıkıntısıdır.", author: "Kral Süleyman", tag: "TRAJEDY" },
    { text: "Memento mori — öleceğini unutma.", author: "Stoacı Gelenek", tag: "VAROLUŞ" },
    { text: "Antrenmanın her dakikasından nefret ettim; ama kendime dedim: bırakma. Şimdi çek acını, hayatının geri kalanını şampiyon olarak yaşa.", author: "Muhammed Ali", tag: "ACI" },
    { text: "Zor zamanlar kararlılık ve iç güç inşa eder. Onlar aracılığıyla öfkenin işe yaramazlığını da kavrayabiliriz.", author: "Dalay Lama XIV", tag: "ACI" },
    { text: "En büyük iyiyi yapma potansiyeli, en büyük zorluk altında mevcuttur.", author: "Dalay Lama XIV", tag: "ACI" },
    { text: "Tibetçe bir söz vardır: trajedi güç kaynağı olarak kullanılmalıdır.", author: "Dalay Lama", tag: "ACI" },
    { text: "Savaşta gerçek, ilk kayıptır.", author: "Aiskhylos", tag: "TRAJEDY" },
    { text: "Dulce et decorum est pro patria mori — vatanı için ölmek tatlı ve onurludur.", author: "Horatius", tag: "TRAJEDY" },
    { text: "Barışta oğullar babalarını gömer; savaşta ise babalar oğullarını.", author: "Herodotos", tag: "TRAJEDY" },
    { text: "Bir gün bu ulusun ayağa kalkacağına dair bir hayalim var... ama bombaların yağdığını izleyerek o günün hiç gelip gelmeyeceğini merak ediyorum.", author: "Anonim Asker", tag: "TRAJEDY" },
{ text: "Eğer Tanrı var olmasaydı, onu icat etmek gerekli olurdu.", author: "Voltaire", tag: "VAROLUŞ" },
    { text: "Bildiklerimizi bildiğimizi ve bilmediklerimizi bilmediğimizi bilmek — gerçek bilgi budur.", author: "Nicolaus Copernicus", tag: "VAROLUŞ" },
    { text: "Deneyimleyebileceğimiz en güzel şey gizemlidir. O, tüm gerçek sanatın ve bilimin kaynağıdır.", author: "Albert Einstein", tag: "VAROLUŞ" },
    { text: "Zihni her defasında yeni bir hayranlık ve saygıyla dolduran iki şey vardır: üstümdeki yıldızlı gökyüzü ve içimdeki ahlak yasası.", author: "Immanuel Kant", tag: "VAROLUŞ" },
    { text: "Yalnızca aynı zamanda evrensel bir yasa olmasını isteyebileceğin ilkeye göre hareket et.", author: "Immanuel Kant", tag: "VAROLUŞ" },
    { text: "Ruhsal bir deneyim yaşayan insanlar değiliz. İnsani bir deneyim yaşayan ruhsal varlıklarız.", author: "Pierre Teilhard de Chardin", tag: "VAROLUŞ" },
    { text: "Tanrı öldü ve onu biz öldürdük. Tüm katillerin katillerini, biz kendimizi nasıl teselli edeceğiz?", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Belki Tanrı ölmedi; belki Tanrı'nın kendisi deli oldu.", author: "Elie Wiesel", tag: "VAROLUŞ" },
    { text: "İnsan, olmak istediğini reddeden tek yaratıktır.", author: "Albert Camus", tag: "VAROLUŞ" },
    { text: "Düşünüyorum öyleyse varım — ama ben neyim? Düşünen bir şey.", author: "René Descartes", tag: "VAROLUŞ" },
    { text: "Olmak ya da olmamak, işte bütün mesele bu.", author: "William Shakespeare", tag: "VAROLUŞ" },
    { text: "Evrenin sana anlam ifade etmek gibi bir yükümlülüğü yok.", author: "Neil deGrasse Tyson", tag: "VAROLUŞ" },
    { text: "İnsan özgür doğar ve her yerde zincirler içindedir.", author: "Jean-Jacques Rousseau", tag: "VAROLUŞ" },
    { text: "Bu sonsuz uzayların ebedi sessizliği beni korkutuyor.", author: "Blaise Pascal", tag: "VAROLUŞ" },
    { text: "İnsan doğada nedir? Sonsuza göre hiçbir şey, hiçliğe göre her şey; hiçlik ile her şey arasında bir orta nokta.", author: "Blaise Pascal", tag: "VAROLUŞ" },
    { text: "Yüreğin, aklın bilmediği nedenleri vardır.", author: "Blaise Pascal", tag: "VAROLUŞ" },
    { text: "İnsan doğanın en zayıf kamışıdır; ama düşünen bir kamıştır.", author: "Blaise Pascal", tag: "VAROLUŞ" },
    { text: "Gerçeği yalnızca akılla değil, yürekle de biliriz.", author: "Blaise Pascal", tag: "VAROLUŞ" },
    { text: "İnsanlığın tüm sorunları, insanın bir odada sessizce oturamamasından kaynaklanır.", author: "Blaise Pascal", tag: "TRAJEDY" },
    { text: "İnsan yaşamı yalnız, yoksul, pis, vahşi ve kısadır.", author: "Thomas Hobbes", tag: "TRAJEDY" },
    { text: "Ben, kendini her zaman aşmak zorunda olan şeyim.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Sevgiden yapılan her şey, iyi ve kötünün ötesinde gerçekleşir.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Varoluştan en büyük verimi ve en büyük zevki almak için sır şudur: tehlikeli yaşa.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Gerçeğe dayanamayalım diye sanata sahibiz.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "Canavarlarla savaşan, bu süreçte kendisinin de canavara dönüşmemesine dikkat etmelidir. Uçuruma uzun süre bakarsan, uçurum da sana bakar.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "Tanrı, düzgün olan her şeyi eğri yapan bir düşüncedir.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Dünyanın kendisi güç istencinin ta kendisidir — başka hiçbir şey değil.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Ya bir gece en yalnız yalnızlığında bir iblis sana sürünüp gelip dese: Şu an yaşadığın ve yaşamış olduğun bu hayatı, bir kez daha ve sayısız kez daha yaşamak zorunda kalacaksın.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "İman: doğru olanı bilmek istememek.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "Dünya irade ve tasarımdır; bunun ötesinde hiçbir şey.", author: "Arthur Schopenhauer", tag: "VAROLUŞ" },
    { text: "İnsan istediğini yapabilir; ama isteyeceğini isteyemez.", author: "Arthur Schopenhauer", tag: "VAROLUŞ" },
    { text: "Şefkat, ahlakın temelidir.", author: "Arthur Schopenhauer", tag: "VAROLUŞ" },
    { text: "İnsan mutluluğunun iki düşmanı vardır: acı ve sıkıntı.", author: "Arthur Schopenhauer", tag: "TRAJEDY" },
    { text: "Ölümünden sonra, doğumundan önceki halde olacaksın.", author: "Arthur Schopenhauer", tag: "VAROLUŞ" },
    { text: "Mutsuz olmamak için en güvenli yol, çok mutlu olmak istememektir.", author: "Arthur Schopenhauer", tag: "TRAJEDY" },
    { text: "Dost ruhların ölümünde duyulan derin acı, her bireyde ifade edilemez ve yalnızca ona özgü, dolayısıyla bütünüyle ve geri dönüşsüz biçimde yitirilmiş bir şey olduğu duygusundan kaynaklanır.", author: "Arthur Schopenhauer", tag: "ACI" },
    { text: "Yalnız yaşamak tüm büyük ruhların kaderidir.", author: "Arthur Schopenhauer", tag: "YALNIZLIK" },
    { text: "Güzel olanın varoluşu cehennemdir.", author: "Arthur Schopenhauer", tag: "TRAJEDY" },
    { text: "Tanrı evrenle zar atmaz.", author: "Albert Einstein", tag: "VAROLUŞ" },
    { text: "Evren hakkındaki en anlaşılmaz şey, onun anlaşılabilir olmasıdır.", author: "Albert Einstein", tag: "VAROLUŞ" },
    { text: "Gerçeklik yalnızca bir yanılsamadır; ama son derece kalıcı bir yanılsamadır.", author: "Albert Einstein", tag: "VAROLUŞ" },
    { text: "Zaman bir yanılsamadır.", author: "Albert Einstein", tag: "VAROLUŞ" },
    { text: "Geçmiş, şimdiki zaman ve gelecek arasındaki ayrım yalnızca inatla süregelen bir yanılsamadır.", author: "Albert Einstein", tag: "VAROLUŞ" },
    { text: "Varolan her şey, tesadüf ve zorunluluğun meyvasıdır.", author: "Demokritos", tag: "VAROLUŞ" },
    { text: "Atomlar boşlukta hareket eder.", author: "Demokritos", tag: "VAROLUŞ" },
    { text: "Atomlar ve boşluk dışında hiçbir şey yoktur; geri kalan her şey görüştür.", author: "Demokritos", tag: "VAROLUŞ" },
    { text: "Yıldız tozundan yapılmışız.", author: "Carl Sagan", tag: "VAROLUŞ" },
    { text: "Kozmos içimizdedir. Yıldız tozundan yapılmışız. Evrenin kendini tanıma yoluyuz.", author: "Carl Sagan", tag: "VAROLUŞ" },
    { text: "Güneşin altında yeni bir şey yoktur.", author: "Kral Süleyman", tag: "TRAJEDY" },
    { text: "Bir nesil geçer, bir nesil gelir; ama dünya sonsuza dek kalır.", author: "Kral Süleyman", tag: "TRAJEDY" },
    { text: "Güneşin altında yapılan tüm işleri gördüm; ve işte, hepsi boşluk ve ruhun sıkıntısıdır.", author: "Kral Süleyman", tag: "TRAJEDY" },
    { text: "Çok bilgelikte çok keder vardır; bilgiyi artıran acıyı artırır.", author: "Kral Süleyman", tag: "ACI" },
    { text: "Geçmişin hatırası kalmaz; gelecekte olacakların da hatırası olmayacak.", author: "Kral Süleyman", tag: "TRAJEDY" },
    { text: "Varlık, Dasein için bir soru olarak kendini sunar.", author: "Martin Heidegger", tag: "VAROLUŞ" },
    { text: "Düşündürücü çağımızın en düşündürücü yanı, hâlâ düşünmüyor olmamızdır.", author: "Martin Heidegger", tag: "TRAJEDY" },
    { text: "Kaygı, insan varoluşunun hiçliğini açığa çıkaran ruh halidir.", author: "Martin Heidegger", tag: "VAROLUŞ" },
    { text: "Ölüm, Dasein'ın mutlak imkânsızlığının imkânıdır.", author: "Martin Heidegger", tag: "VAROLUŞ" },
    { text: "Dil, Varlığın evidir.", author: "Martin Heidegger", tag: "VAROLUŞ" },
    { text: "Fırlatılmışlık: Seçmediğimiz bir dünyaya çoktan fırlatılmış olduğumuzu keşfederiz.", author: "Martin Heidegger", tag: "VAROLUŞ" },
    { text: "Neden hiçbir şey değil de bir şey var?", author: "Gottfried Wilhelm Leibniz", tag: "VAROLUŞ" },
    { text: "Tanrı bu dünyayı yaratmayı seçti; çünkü bu, mümkün olan en iyi dünyadır.", author: "Gottfried Wilhelm Leibniz", tag: "VAROLUŞ" },
    { text: "Doğa, matematiğin diliyle yazılmıştır.", author: "Galileo Galilei", tag: "VAROLUŞ" },
    { text: "Eppur si muove — yine de hareket ediyor.", author: "Galileo Galilei", tag: "VAROLUŞ" },
    { text: "Tanrı bir geometriciydi.", author: "Platon", tag: "VAROLUŞ" },
    { text: "Ruh ölümsüzdür ve en gerçek hayat henüz gelmemiştir.", author: "Platon", tag: "VAROLUŞ" },
    { text: "Tanrı Gerçektir ve ışık onun gölgesidir.", author: "Platon", tag: "VAROLUŞ" },
    { text: "Varlığın özü Tanrı'dır; ve kendini şöyle tanımlar: Ben olan Benim.", author: "Paul Tillich", tag: "VAROLUŞ" },
    { text: "Tanrı, varlığın zeminidir.", author: "Paul Tillich", tag: "VAROLUŞ" },
    { text: "Deus sive Natura — Tanrı ya da Doğa.", author: "Baruch Spinoza", tag: "VAROLUŞ" },
    { text: "Tanrı dünyanın yaratıcısı değildir; Tanrı dünyanın kendisidir.", author: "Baruch Spinoza", tag: "VAROLUŞ" },
    { text: "Zamanda varolan her sonlu şey, Tanrı ya da Doğa dediğimiz sonsuz tözün bir kipidir.", author: "Baruch Spinoza", tag: "VAROLUŞ" },
    { text: "Kendinizi ve duygularınızı ne kadar net anlarsanız, olanı o kadar çok seversiniz.", author: "Baruch Spinoza", tag: "VAROLUŞ" },
    { text: "Mutluluk erdemin ödülü değil, erdemin kendisidir.", author: "Baruch Spinoza", tag: "VAROLUŞ" },
    { text: "Özgürlük zorunluluğun tanınmasıdır.", author: "Baruch Spinoza", tag: "VAROLUŞ" },
    { text: "Cevaplandırılamayan sorular, sorgulanamayan cevaplardan daha çok tercih ederim.", author: "Richard Feynman", tag: "VAROLUŞ" },
    { text: "Doğa bilimlerinin ilk yudumu sizi ateist yapacaktır; ama bardağın dibinde Tanrı sizi bekliyor.", author: "Werner Heisenberg", tag: "VAROLUŞ" },
    { text: "Evreni anlamlandırmak onun yükümlülüğü değildir.", author: "Neil deGrasse Tyson", tag: "VAROLUŞ" },
    { text: "Evren yalnızca düşündüğümüzden tuhaf değil; düşünebileceğimizden de tuhaf.", author: "Werner Heisenberg", tag: "VAROLUŞ" },
    { text: "Gözlemci, gözlemlenendir.", author: "Jiddu Krishnamurti", tag: "VAROLUŞ" },
    { text: "Tanrı, imgeleyemeyeceğiniz ve anlayamayacağınız şeydir. Anlarsanız, başarısız oldunuz.", author: "Aziz Augustinus", tag: "VAROLUŞ" },
    { text: "Bizi kendin için yarattın ya Rabbi; ve kalbimiz sende huzur bulana dek huzursuz kalacak.", author: "Aziz Augustinus", tag: "VAROLUŞ" },
    { text: "Tanrı'ya âşık olmak en büyük romandır; onu aramak en büyük macera; onu bulmak ise insanın en büyük başarısıdır.", author: "Aziz Augustinus", tag: "VAROLUŞ" },
    { text: "Din, ezilen yaratığın inlemesidir, kalpsiz bir dünyanın kalbidir, ruhsuz koşulların ruhudur. Halkın afyonudur.", author: "Karl Marx", tag: "TRAJEDY" },
    { text: "Tanrı, insanı kendi suretinde yarattı.", author: "Ludwig Feuerbach", tag: "VAROLUŞ" },
  ],
  es: [
    { text: "Sufrimos más en la imaginación que en la realidad.", author: "Séneca", tag: "TRAGEDIA" },
    { text: "Vivir es sufrir; sobrevivir es encontrar sentido en el sufrimiento.", author: "Friedrich Nietzsche", tag: "DOLOR" },
    { text: "La muerte no es nada para nosotros; cuando existimos, la muerte no está presente.", author: "Epicuro", tag: "EXISTENCIA" },
    { text: "En lo más profundo del invierno, aprendí finalmente que había en mí un verano invencible.", author: "Albert Camus", tag: "DOLOR" },
    { text: "Todos estamos solos, nacemos solos, morimos solos.", author: "Hunter S. Thompson", tag: "SOLEDAD" },
    { text: "El infierno son los otros.", author: "Jean-Paul Sartre", tag: "TRAGEDIA" },
    { text: "Hay que imaginarse a Sísifo feliz.", author: "Albert Camus", tag: "TRAGEDIA" },
    { text: "Todo se pierde en el momento en que se gana.", author: "Arthur Schopenhauer", tag: "TRAGEDIA" },
    { text: "La vida es una larga preparación para algo que nunca sucede.", author: "W.B. Yeats", tag: "TRAGEDIA" },
    { text: "La herida es el lugar por donde entra la luz.", author: "Rumi", tag: "DOLOR" },
    { text: "El dolor es inevitable. El sufrimiento es opcional.", author: "Haruki Murakami", tag: "DOLOR" },
    { text: "Lo que no me destruye me hace más fuerte.", author: "Friedrich Nietzsche", tag: "DOLOR" },
    { text: "El miedo a la muerte viene del miedo a la vida.", author: "Mark Twain", tag: "TRAGEDIA" },
    { text: "Amar es ser vulnerable.", author: "C.S. Lewis", tag: "DOLOR" },
    { text: "La vida es sufrimiento.", author: "Gautama Buda", tag: "DOLOR" },
    { text: "Estar completamente vivo es estar en dolor.", author: "Fyodor Dostoevsky", tag: "DOLOR" },
    { text: "El hombre es el único animal que debe ser alentado a vivir.", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "No es la muerte lo que un hombre debe temer, sino nunca comenzar a vivir.", author: "Marco Aurelio", tag: "EXISTENCIA" },
    { text: "La tragedia de la vida no es que termine tan pronto, sino que esperamos tanto para comenzarla.", author: "W.M. Lewis", tag: "TRAGEDIA" },
    { text: "El que da luz debe soportar el ardor.", author: "Viktor Frankl", tag: "DOLOR" },
    { text: "Solo hay un problema filosófico verdaderamente serio, y ese es el suicidio.", author: "Albert Camus", tag: "TRAGEDIA" },
    { text: "Lo absurdo nace del enfrentamiento entre la necesidad humana y el silencio irracional del mundo.", author: "Albert Camus", tag: "EXISTENCIA" },
    { text: "La pobreza más terrible es la soledad.", author: "Madre Teresa", tag: "SOLEDAD" },
    { text: "Donde hay vida, hay dolor.", author: "Arthur Schopenhauer", tag: "DOLOR" },
    { text: "Todo es vanidad y aflicción de espíritu.", author: "Rey Salomón", tag: "TRAGEDIA" },
    { text: "Morimos dos veces: cuando dejamos de respirar y cuando alguien dice nuestro nombre por última vez.", author: "Banksy", tag: "TRAGEDIA" },
    { text: "La vida es una tragedia vista de cerca, pero una comedia vista desde lejos.", author: "Charlie Chaplin", tag: "TRAGEDIA" },
    { text: "Las estrellas no pueden brillar sin oscuridad.", author: "D.H. Sidebottom", tag: "DOLOR" },
    { text: "Memento mori — recuerda que morirás.", author: "Tradición Estoica", tag: "EXISTENCIA" },
    { text: "La carga más pesada es una vida no vivida.", author: "C.G. Jung", tag: "TRAGEDIA" },
    { text: "No hay sol sin sombra, y es imprescindible conocer la noche.", author: "Albert Camus", tag: "TRAGEDIA" },
    { text: "Nunca sabes lo fuerte que eres hasta que ser fuerte es tu única opción.", author: "Bob Marley", tag: "DOLOR" },
    { text: "En medio de la dificultad yace la oportunidad.", author: "Albert Einstein", tag: "DOLOR" },
    { text: "Todos estamos rotos. Así es como entra la luz.", author: "Ernest Hemingway", tag: "DOLOR" },
    { text: "De las almas más fuertes emergieron del sufrimiento; los caracteres más grandes están marcados por cicatrices.", author: "Khalil Gibran", tag: "DOLOR" },
    { text: "El sufrimiento no es un castigo, es una purificación.", author: "Paramahansa Yogananda", tag: "DOLOR" },
    { text: "Solo los muertos han visto el fin de la guerra.", author: "Platón", tag: "TRAGEDIA" },
    { text: "El hombre sufre más por el sufrimiento que teme pero que nunca llega.", author: "Fyodor Dostoevsky", tag: "DOLOR" },
    { text: "Sé amable, porque cada persona que conoces está librando una dura batalla.", author: "Platón", tag: "DOLOR" },
    { text: "La conciencia es una enfermedad.", author: "Miguel de Unamuno", tag: "TRAGEDIA" },
    { text: "La mayoría de los hombres llevan vidas de tranquila desesperación.", author: "Henry David Thoreau", tag: "TRAGEDIA" },
    { text: "Morir es un arte. Como todo lo demás, lo hago excepcionalmente bien.", author: "Sylvia Plath", tag: "TRAGEDIA" },
    { text: "No tengo miedo de las tormentas, porque estoy aprendiendo a navegar mi barco.", author: "Louisa May Alcott", tag: "DOLOR" },
    { text: "Los cobardes mueren muchas veces antes de su muerte; los valientes nunca prueban la muerte sino una vez.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "La vida no es más que una sombra ambulante, un pobre actor que se pavonea durante su hora en el escenario.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "El infierno está vacío y todos los demonios están aquí.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "Mañana, y mañana, y mañana, se arrastra a este paso mezquino de día en día.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "Apaga, apaga, breve vela. La vida no es más que una sombra ambulante.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "La guerra es el padre de todas las cosas.", author: "Heráclito", tag: "TRAGEDIA" },
    { text: "No quiero ir al cielo. Ninguno de mis amigos está allí.", author: "Oscar Wilde", tag: "TRAGEDIA" },
    { text: "El sufrimiento es un momento muy largo. No podemos dividirlo por estaciones.", author: "Oscar Wilde", tag: "DOLOR" },
    { text: "Los corazones están hechos para romperse.", author: "Oscar Wilde", tag: "DOLOR" },
    { text: "Un cínico es un hombre que conoce el precio de todo y el valor de nada.", author: "Oscar Wilde", tag: "TRAGEDIA" },
    { text: "Hay solo dos tragedias en la vida: una es no conseguir lo que uno quiere, y la otra es conseguirlo.", author: "Oscar Wilde", tag: "TRAGEDIA" },
    { text: "La oscuridad no puede alejar a la oscuridad; solo la luz puede hacerlo.", author: "Martin Luther King Jr.", tag: "DOLOR" },
    { text: "Nuestras vidas comienzan a terminar el día que nos volvemos silenciosos sobre las cosas que importan.", author: "Martin Luther King Jr.", tag: "TRAGEDIA" },
    { text: "Si no puedes volar, corre; si no puedes correr, camina; si no puedes caminar, repta, pero sigue avanzando.", author: "Martin Luther King Jr.", tag: "DOLOR" },
    { text: "Al final recordaremos no las palabras de nuestros enemigos, sino el silencio de nuestros amigos.", author: "Martin Luther King Jr.", tag: "TRAGEDIA" },
    { text: "Vive como si fueras a morir mañana. Aprende como si fueras a vivir para siempre.", author: "Mahatma Gandhi", tag: "EXISTENCIA" },
    { text: "Si no tuviera sentido del humor, hace tiempo que me habría suicidado.", author: "Mahatma Gandhi", tag: "TRAGEDIA" },
    { text: "Nuestra mayor gloria no es nunca caer, sino levantarnos cada vez que caemos.", author: "Confucio", tag: "DOLOR" },
    { text: "Toda la miseria del hombre proviene de no poder sentarse en silencio en una habitación.", author: "Blaise Pascal", tag: "TRAGEDIA" },
    { text: "La vida oscila como un péndulo entre el deseo y el aburrimiento.", author: "Arthur Schopenhauer", tag: "TRAGEDIA" },
    { text: "El dolor es el portal a las regiones inexploradas del alma.", author: "Khalil Gibran", tag: "DOLOR" },
    { text: "La alegría y el dolor brotan de la misma fuente; uno no es posible sin el otro.", author: "Khalil Gibran", tag: "DOLOR" },
    { text: "Es fácil amar a la humanidad; lo difícil es amar a las personas.", author: "Fyodor Dostoevsky", tag: "TRAGEDIA" },
    { text: "Amar el dolor y crecer a través de él; al final se es feliz.", author: "Fyodor Dostoevsky", tag: "DOLOR" },
    { text: "Lo que parece destrucción es en realidad renovación.", author: "Rumi", tag: "DOLOR" },
    { text: "La raíz de un árbol cuanto más profunda, más resiste las tormentas.", author: "Rumi", tag: "DOLOR" },
    { text: "La muerte no es apagar la luz; es simplemente apagar la lámpara porque ha llegado el amanecer.", author: "Rabindranath Tagore", tag: "TRAGEDIA" },
    { text: "Si lloras porque el sol ha desaparecido de tu vida, tus lágrimas te impedirán ver las estrellas.", author: "Rabindranath Tagore", tag: "DOLOR" },
    { text: "Toda la gloria es efímera.", author: "Napoleón Bonaparte", tag: "TRAGEDIA" },
    { text: "El que teme sufrir ya sufre lo que teme.", author: "Michel de Montaigne", tag: "DOLOR" },
    { text: "Mi vida ha estado llena de terribles desgracias, la mayoría de las cuales nunca sucedieron.", author: "Michel de Montaigne", tag: "TRAGEDIA" },
    { text: "No hay mayor soledad que la del guerrero después de la batalla.", author: "Paulo Coelho", tag: "SOLEDAD" },
    { text: "Los hombres se engañan cuando piensan ser libres.", author: "Baruch Spinoza", tag: "TRAGEDIA" },
    { text: "Donde hay ruina, hay esperanza de un tesoro.", author: "Rumi", tag: "DOLOR" },
    { text: "El alma que ve la belleza a veces camina sola.", author: "Johann Wolfgang von Goethe", tag: "SOLEDAD" },
    { text: "Nadie está más desesperadamente esclavizado que los que falsamente creen que son libres.", author: "Johann Wolfgang von Goethe", tag: "TRAGEDIA" },
    { text: "Somos moldeados por nuestros pensamientos; nos convertimos en lo que pensamos.", author: "Gautama Buda", tag: "EXISTENCIA" },
    { text: "La oscuridad no puede expulsar a la oscuridad; solo la luz puede hacerlo.", author: "Martin Luther King Jr.", tag: "DOLOR" },
    { text: "Nuestras vidas comienzan a terminar el día en que nos quedamos en silencio sobre las cosas que importan.", author: "Martin Luther King Jr.", tag: "TRAGEDIA" },
    { text: "Si no puedes volar, corre; si no puedes correr, camina; si no puedes caminar, gatea; pero hagas lo que hagas, sigue avanzando.", author: "Martin Luther King Jr.", tag: "DOLOR" },
    { text: "Debemos aprender a vivir juntos como hermanos o perecer juntos como necios.", author: "Martin Luther King Jr.", tag: "TRAGEDIA" },
    { text: "Dos cosas son infinitas: el universo y la estupidez humana; y no estoy seguro del universo.", author: "Albert Einstein", tag: "TRAGEDIA" },
    { text: "El hombre es una cuerda tendida entre el animal y el Superhombre, una cuerda sobre el abismo.", author: "Friedrich Nietzsche", tag: "EXISTENCIA" },
    { text: "Cuanto más alto volamos, más pequeños parecemos a quienes no pueden volar.", author: "Friedrich Nietzsche", tag: "SOLEDAD" },
    { text: "En los individuos, la locura es rara; pero en grupos, partidos, naciones y épocas, es la norma.", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "Olvidar el propio propósito es la forma más común de estupidez.", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "Todo pensador profundo teme más ser comprendido que no serlo.", author: "Friedrich Nietzsche", tag: "SOLEDAD" },
    { text: "La esperanza es en realidad el peor de todos los males porque prolonga los tormentos del hombre.", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "La lucha del hombre contra el poder es la lucha de la memoria contra el olvido.", author: "Milan Kundera", tag: "TRAGEDIA" },
    { text: "El optimismo es el opio del pueblo.", author: "Milan Kundera", tag: "TRAGEDIA" },
    { text: "La tristeza es una forma de felicidad para quienes aman apasionadamente.", author: "Milan Kundera", tag: "DOLOR" },
    { text: "El grado de luz es inverso al grado de oscuridad.", author: "Hermann Hesse", tag: "DOLOR" },
    { text: "Algunos pensamos que aferrarnos nos hace fuertes, pero a veces es soltar.", author: "Hermann Hesse", tag: "DOLOR" },
    { text: "Dentro de ti hay una quietud y un santuario al que puedes retirarte en cualquier momento.", author: "Hermann Hesse", tag: "SOLEDAD" },
    { text: "Solo quería vivir de acuerdo con los impulsos de mi verdadero yo. ¿Por qué era tan difícil?", author: "Hermann Hesse", tag: "TRAGEDIA" },
    { text: "Nada fija tanto una cosa en la memoria como el deseo de olvidarla.", author: "Michel de Montaigne", tag: "DOLOR" },
    { text: "La pérdida no es más que el cambio, y el cambio es el deleite de la naturaleza.", author: "Marco Aurelio", tag: "TRAGEDIA" },
    { text: "La conciencia es una enfermedad.", author: "Miguel de Unamuno", tag: "TRAGEDIA" },
    { text: "La vida no es la que uno vivió, sino la que uno recuerda.", author: "Gabriel García Márquez", tag: "EXISTENCIA" },
    { text: "El miedo a la muerte es el miedo a vivir plenamente.", author: "Mark Twain", tag: "TRAGEDIA" },
    { text: "No llores porque terminó; sonríe porque ocurrió.", author: "Gabriel García Márquez", tag: "DOLOR" },
    { text: "Encontrar el amor en el dolor es el arte supremo de vivir.", author: "Friedrich Nietzsche", tag: "DOLOR" },
    { text: "La soledad moderna no viene de estar solo, sino de estar rodeados de extraños.", author: "Erich Fromm", tag: "SOLEDAD" },
    { text: "El hombre moderno cree que pierde algo —tiempo— cuando no hace las cosas de prisa.", author: "Erich Fromm", tag: "TRAGEDIA" },
    { text: "La desesperación es la enfermedad mortal.", author: "Søren Kierkegaard", tag: "TRAGEDIA" },
    { text: "El alma que ve la belleza puede a veces caminar sola.", author: "Johann Wolfgang von Goethe", tag: "SOLEDAD" },
    { text: "Las guerras son iniciadas por viejos y peleadas por jóvenes.", author: "Herbert Hoover", tag: "TRAGEDIA" },
    { text: "La guerra nunca decide quién tiene razón, solo quién queda.", author: "Bertrand Russell", tag: "TRAGEDIA" },
    { text: "La muerte es la posibilidad más propia del Dasein.", author: "Martin Heidegger", tag: "TRAGEDIA" },
    { text: "La cobardía es el crimen de los crímenes.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "El amor verdadero nunca tuvo un camino suave.", author: "William Shakespeare", tag: "DOLOR" },
    { text: "Cómo se acaba una vida determina la grandeza del que la vivió.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "La náusea es la conciencia del absurdo.", author: "Jean-Paul Sartre", tag: "EXISTENCIA" },
    { text: "El dolor no es un mal en sí mismo; es el medio por el que aprendemos a amar.", author: "C.S. Lewis", tag: "DOLOR" },
    { text: "En la oscuridad más profunda es cuando mejor se ven las estrellas.", author: "Haruki Murakami", tag: "DOLOR" },
    { text: "Lo que me parece raro es que la gente decida morir en lugar de vivir.", author: "Haruki Murakami", tag: "EXISTENCIA" },
    { text: "El fracaso es simplemente la oportunidad de comenzar de nuevo, esta vez más inteligentemente.", author: "Henry Ford", tag: "DOLOR" },
    { text: "Lo que tiene sentido puede ser soportado.", author: "Viktor Frankl", tag: "DOLOR" },
    { text: "El sufrimiento deja de ser sufrimiento cuando encuentra un significado.", author: "Viktor Frankl", tag: "DOLOR" },
    { text: "Toda la historia humana es la historia de cómo la humanidad ha fallado en vivir en el presente.", author: "Eckhart Tolle", tag: "TRAGEDIA" },
    { text: "Las tinieblas no pueden expulsar a las tinieblas; solo la luz puede hacer eso.", author: "Martin Luther King Jr.", tag: "DOLOR" },
    { text: "El campeón no es alguien que ganó siempre; es alguien que nunca se rindió.", author: "Muhammad Ali", tag: "DOLOR" },
    { text: "El tiempo cura todo, excepto la falta de tiempo.", author: "Anonim", tag: "TRAGEDIA" },
    { text: "El amor no conoce su propia profundidad hasta la hora de la separación.", author: "Khalil Gibran", tag: "DOLOR" },
    { text: "Cuanto más profunda cava el dolor en tu ser, más alegría podrás contener.", author: "Khalil Gibran", tag: "DOLOR" },
    { text: "No es fácil amar a la humanidad; lo difícil es amar a las personas.", author: "Fyodor Dostoevsky", tag: "TRAGEDIA" },
    { text: "El sufrimiento purifica al hombre.", author: "Fyodor Dostoevsky", tag: "DOLOR" },
    { text: "Prefiero morir por mis convicciones que vivir sin ellas.", author: "Sócrates", tag: "EXISTENCIA" },
    { text: "La fuerza se prueba en la adversidad.", author: "Séneca", tag: "DOLOR" },
    { text: "Las calamidades son los maestros de la virtud.", author: "Séneca", tag: "DOLOR" },
    { text: "Hazle frente a la muerte con valentía y estarás libre.", author: "Séneca", tag: "TRAGEDIA" },
    { text: "La vida no nos fue dada; nos fue prestada.", author: "Séneca", tag: "TRAGEDIA" },
    { text: "Todas las desgracias del hombre derivan del hecho de que no puede estar quieto en una habitación.", author: "Blaise Pascal", tag: "TRAGEDIA" },
{ text: "Solo los muertos han visto el fin de la guerra.", author: "Platón", tag: "TRAGEDIA" },
    { text: "La guerra es el padre de todas las cosas.", author: "Heráclito", tag: "TRAGEDIA" },
    { text: "En la guerra, la verdad es la primera baja.", author: "Esquilo", tag: "TRAGEDIA" },
    { text: "La guerra es la continuación de la política por otros medios.", author: "Carl von Clausewitz", tag: "TRAGEDIA" },
    { text: "No puedes ganar una guerra más de lo que puedes ganar un terremoto.", author: "Jeannette Rankin", tag: "TRAGEDIA" },
    { text: "En la guerra no hay soldados sin heridas.", author: "José Narosky", tag: "DOLOR" },
    { text: "La guerra no decide quién tiene razón, solo quién queda.", author: "Bertrand Russell", tag: "TRAGEDIA" },
    { text: "Los viejos declaran la guerra. Pero son los jóvenes los que deben luchar y morir.", author: "Herbert Hoover", tag: "TRAGEDIA" },
    { text: "Nunca pienses que la guerra, por necesaria o justificada que sea, no es un crimen.", author: "Ernest Hemingway", tag: "TRAGEDIA" },
    { text: "La guerra es lo que pasa cuando el lenguaje fracasa.", author: "Margaret Atwood", tag: "TRAGEDIA" },
    { text: "La muerte de un hombre es una tragedia. La muerte de millones es una estadística.", author: "Joseph Stalin", tag: "TRAGEDIA" },
    { text: "En la paz, los hijos entierran a sus padres. En la guerra, los padres entierran a sus hijos.", author: "Heródoto", tag: "TRAGEDIA" },
    { text: "Ahora me he convertido en la Muerte, el destructor de mundos.", author: "J. Robert Oppenheimer", tag: "TRAGEDIA" },
    { text: "Todo el arte de la guerra se basa en el engaño.", author: "Sun Tzu", tag: "TRAGEDIA" },
    { text: "La guerra es un asesinato organizado y nada más.", author: "Harry Patch", tag: "TRAGEDIA" },
    { text: "La guerra no es una aventura. Es una enfermedad.", author: "Antoine de Saint-Exupéry", tag: "TRAGEDIA" },
    { text: "La humanidad debe poner fin a la guerra antes de que la guerra ponga fin a la humanidad.", author: "John F. Kennedy", tag: "TRAGEDIA" },
{ text: "Somos tan ricos en esperanza, y tan pobres en realidad.", author: "Franz Kafka", tag: "TRAGEDIA" },
    { text: "Hay esperanza infinita, pero no para nosotros.", author: "Franz Kafka", tag: "TRAGEDIA" },
    { text: "Soy una jaula en busca de un pájaro.", author: "Franz Kafka", tag: "SOLEDAD" },
    { text: "Eres libre y por eso estás perdido.", author: "Franz Kafka", tag: "TRAGEDIA" },
    { text: "El significado de la vida es que se detiene.", author: "Franz Kafka", tag: "TRAGEDIA" },
    { text: "La escritura es la soledad absoluta, el descenso al interior frío de uno mismo.", author: "Franz Kafka", tag: "SOLEDAD" },
    { text: "Un libro debe ser el hacha que rompa el mar helado dentro de nosotros.", author: "Franz Kafka", tag: "EXISTENCIA" },
    { text: "No puedo hacerte entender lo que pasa dentro de mí. No puedo hacer que nadie lo entienda.", author: "Franz Kafka", tag: "SOLEDAD" },
    { text: "El sufrimiento es el dolor de la inteligencia profunda y el corazón profundo.", author: "Fyodor Dostoevsky", tag: "DOLOR" },
    { text: "Amar es sufrir y no puede haber amor de otra manera.", author: "Fyodor Dostoevsky", tag: "DOLOR" },
    { text: "La noche más oscura alberga las estrellas más brillantes.", author: "Fyodor Dostoevsky", tag: "DOLOR" },
    { text: "Si Dios no existe, todo está permitido.", author: "Fyodor Dostoevsky", tag: "TRAGEDIA" },
    { text: "El hombre solo cuenta sus problemas; nunca calcula su felicidad.", author: "Fyodor Dostoevsky", tag: "TRAGEDIA" },
    { text: "Soy un hombre enfermo... Soy un hombre malicioso.", author: "Fyodor Dostoevsky", tag: "TRAGEDIA" },
    { text: "Cada persona tiene cosas que solo le contaría a sí misma.", author: "Fyodor Dostoevsky", tag: "SOLEDAD" },
    { text: "El misterio de la existencia humana no está en solo mantenerse vivo sino en encontrar algo por qué vivir.", author: "Fyodor Dostoevsky", tag: "EXISTENCIA" },
    { text: "Tengo dieciocho años y he comenzado a amar la vida y el mundo; y tuve que disparar para hacerlos pedazos.", author: "Erich Maria Remarque", tag: "TRAGEDIA" },
    { text: "La guerra no es una aventura. Es una enfermedad. Es como el tifus.", author: "Antoine de Saint-Exupéry", tag: "TRAGEDIA" },
    { text: "Este libro no es ni una acusación ni una confesión, y menos aún una aventura, porque la muerte no es una aventura para quienes la miran de frente.", author: "Erich Maria Remarque", tag: "TRAGEDIA" },
    { text: "Somos jóvenes — tenemos veinte años. Pero somos viejos.", author: "Erich Maria Remarque", tag: "TRAGEDIA" },
    { text: "Todas las familias felices se parecen unas a otras; pero cada familia infeliz tiene un motivo especial para sentirse desgraciada.", author: "León Tolstói", tag: "TRAGEDIA" },
    { text: "La guerra es tan injusta y horrible que todos los que la hacen deben tratar de callar la voz de la conciencia.", author: "León Tolstói", tag: "TRAGEDIA" },
    { text: "La melancolía es la felicidad de estar triste.", author: "Victor Hugo", tag: "DOLOR" },
    { text: "Siempre hay más miseria entre las clases bajas que humanidad entre las más altas.", author: "Victor Hugo", tag: "TRAGEDIA" },
    { text: "Este es el fin del mundo. No con un estallido sino con un gemido.", author: "T.S. Eliot", tag: "TRAGEDIA" },
    { text: "Abril es el mes más cruel.", author: "T.S. Eliot", tag: "TRAGEDIA" },
    { text: "El ser humano no puede soportar demasiada realidad.", author: "T.S. Eliot", tag: "TRAGEDIA" },
    { text: "Entre la idea y la realidad, entre el movimiento y el acto, cae la Sombra.", author: "T.S. Eliot", tag: "TRAGEDIA" },
    { text: "He medido mi vida con cucharillas de café.", author: "T.S. Eliot", tag: "TRAGEDIA" },
    { text: "Todos los intentos anteriores. Todos los fracasos anteriores. No importa. Intenta de nuevo. Fracasa de nuevo. Fracasa mejor.", author: "Samuel Beckett", tag: "TRAGEDIA" },
    { text: "Todos nacemos locos. Algunos permanecen así.", author: "Samuel Beckett", tag: "TRAGEDIA" },
    { text: "No puedo seguir. Seguiré.", author: "Samuel Beckett", tag: "TRAGEDIA" },
    { text: "Las lágrimas del mundo son una cantidad constante. Por cada uno que empieza a llorar, en algún otro lugar otro deja de hacerlo.", author: "Samuel Beckett", tag: "TRAGEDIA" },
    { text: "El nacimiento fue su muerte.", author: "Samuel Beckett", tag: "TRAGEDIA" },
{ text: "Estamos dormidos hasta que nos enamoramos.", author: "León Tolstói — Guerra y Paz", tag: "EXISTENCIA" },
    { text: "Los dos guerreros más poderosos son la paciencia y el tiempo.", author: "León Tolstói — Guerra y Paz", tag: "TRAGEDIA" },
    { text: "Si cada uno luchara por sus propias convicciones no habría guerra.", author: "León Tolstói — Guerra y Paz", tag: "TRAGEDIA" },
    { text: "No hay grandeza donde no hay simplicidad, bondad y verdad.", author: "León Tolstói — Guerra y Paz", tag: "TRAGEDIA" },
    { text: "¿Cómo puede uno estar bien cuando sufre moralmente?", author: "León Tolstói — Guerra y Paz", tag: "DOLOR" },
    { text: "La guerra no es una recreación cortés sino la cosa más vil de la vida.", author: "León Tolstói — Guerra y Paz", tag: "TRAGEDIA" },
    { text: "No existe condición de vida en que el hombre pueda ser feliz y completamente libre del sufrimiento.", author: "León Tolstói — Guerra y Paz", tag: "DOLOR" },
    { text: "El soldado en el campo de batalla no piensa en la gloria ni en el bienestar del país. Piensa en cómo no ser asesinado.", author: "León Tolstói — Guerra y Paz", tag: "TRAGEDIA" },
    { text: "El cielo. No aquí, no ahora, sino allá, en la eternidad.", author: "León Tolstói — Guerra y Paz", tag: "EXISTENCIA" },
    { text: "El hombre no puede poseer nada mientras teme a la muerte. Pero a quien no la teme, todo le pertenece.", author: "León Tolstói — Guerra y Paz", tag: "EXISTENCIA" },
    { text: "Todo lo que sé, lo sé porque amo.", author: "León Tolstói — Guerra y Paz", tag: "EXISTENCIA" },
    { text: "Lo único que podemos saber es que no sabemos nada. Y esa es la cima de la sabiduría humana.", author: "León Tolstói — Guerra y Paz", tag: "TRAGEDIA" },
    { text: "La muerte es algo terrible. Es el fin de todo. No hay nada después de la muerte.", author: "León Tolstói — Guerra y Paz", tag: "TRAGEDIA" },
    { text: "El lobo no puede ser acusado de sed de sangre: solo sigue su naturaleza. Pero el hombre que destruye a otros hombres — ese es culpable.", author: "León Tolstói — Guerra y Paz", tag: "TRAGEDIA" },
    { text: "La bala de cañón voló, como siempre, con un silbido, y cayó en un pequeño grupo de hombres y mató a dos e hirió gravemente a uno.", author: "León Tolstói — Guerra y Paz", tag: "TRAGEDIA" },
    { text: "El miedo a la muerte es como el miedo a la vida. Un hombre que vive plenamente está preparado para morir en cualquier momento.", author: "León Tolstói — Guerra y Paz", tag: "TRAGEDIA" },
    { text: "La muerte no es nada para nosotros; cuando existimos, la muerte no está presente; cuando la muerte está presente, nosotros ya no existimos.", author: "Epicurus", tag: "EXISTENCIA" },
    { text: "En lo más profundo del invierno, finalmente aprendí que había en mí un verano invencible.", author: "Albert Camus", tag: "DOLOR" },
    { text: "El hombre está condenado a ser libre.", author: "Jean-Paul Sartre", tag: "EXISTENCIA" },
    { text: "El infierno son los demás.", author: "Jean-Paul Sartre", tag: "TRAGEDIA" },
    { text: "Dios ha muerto. Dios permanece muerto. Y nosotros lo hemos matado.", author: "Friedrich Nietzsche", tag: "EXISTENCIA" },
    { text: "Amar en absoluto es ser vulnerable.", author: "C.S. Lewis", tag: "DOLOR" },
    { text: "Estar plenamente vivo es estar en dolor.", author: "Fiódor Dostoievski", tag: "DOLOR" },
    { text: "No es la muerte lo que un hombre debe temer, sino no haber comenzado a vivir.", author: "Marcus Aurelius", tag: "EXISTENCIA" },
    { text: "La tragedia de la vida no es que termine tan pronto, sino que esperamos tanto para empezarla.", author: "W.M. Lewis", tag: "TRAGEDIA" },
    { text: "Lo que ha de dar luz debe soportar el ardor.", author: "Viktor Frankl", tag: "DOLOR" },
    { text: "La cuna se mece sobre un abismo, y el sentido común nos dice que nuestra existencia no es más que una breve grieta de luz entre dos eternidades de oscuridad.", author: "Vladímir Nabokov", tag: "EXISTENCIA" },
    { text: "Morimos dos veces: una cuando dejamos de respirar, y de nuevo cuando alguien pronuncia nuestro nombre por última vez.", author: "Banksy", tag: "TRAGEDIA" },
    { text: "No entres dócilmente en esa buena noche.", author: "Dylan Thomas", tag: "TRAGEDIA" },
    { text: "Prefiero morir de pie que vivir de rodillas.", author: "Emiliano Zapata", tag: "EXISTENCIA" },
    { text: "A veces, incluso vivir es un acto de valentía.", author: "Seneca", tag: "TRAGEDIA" },
    { text: "La existencia precede a la esencia.", author: "Jean-Paul Sartre", tag: "EXISTENCIA" },
    { text: "No hay sol sin sombra, y es esencial conocer la noche.", author: "Albert Camus", tag: "TRAGEDIA" },
    { text: "De los sufrimientos han surgido las almas más fuertes; los caracteres más grandiosos están marcados por cicatrices.", author: "Khalil Gibran", tag: "DOLOR" },
    { text: "La forma más común de desesperación es no ser quien eres.", author: "Søren Kierkegaard", tag: "EXISTENCIA" },
    { text: "Sin oscuridad, nada nace; sin luz, nada florece.", author: "May Sarton", tag: "DOLOR" },
    { text: "El hombre sufre más por el sufrimiento que teme, pero que nunca llega.", author: "Fiódor Dostoievski", tag: "DOLOR" },
    { text: "Sé amable, pues cada persona que encuentras está librando una dura batalla.", author: "Platón", tag: "DOLOR" },
    { text: "Tomé un respiro profundo y escuché el viejo jactancioso de mi corazón: Soy, soy, soy.", author: "Sylvia Plath", tag: "EXISTENCIA" },
    { text: "Morir será una aventura terriblemente grande.", author: "J.M. Barrie", tag: "TRAGEDIA" },
    { text: "Dame libertad o dame la muerte.", author: "Patrick Henry", tag: "EXISTENCIA" },
    { text: "La masa de los hombres lleva vidas de tranquila desesperación.", author: "Henry David Thoreau", tag: "TRAGEDIA" },
    { text: "La mayoría de los hombres llevan vidas de tranquila desesperación y van a la tumba con la canción todavía en ellos.", author: "Henry David Thoreau", tag: "TRAGEDIA" },
    { text: "¿Qué es la vida? Es el destello de una luciérnaga en la noche.", author: "Crowfoot", tag: "TRAGEDIA" },
    { text: "El aburrimiento es la raíz de todos los males — la desesperada negativa a ser uno mismo.", author: "Søren Kierkegaard", tag: "TRAGEDIA" },
    { text: "Cualquier tonto puede ser feliz. Se necesita un hombre con verdadero corazón para hacer belleza de lo que nos hace llorar.", author: "Clive Barker", tag: "DOLOR" },
    { text: "La base del optimismo es el terror puro.", author: "Oscar Wilde", tag: "TRAGEDIA" },
    { text: "El misterio del amor es mayor que el misterio de la muerte.", author: "Oscar Wilde", tag: "EXISTENCIA" },
    { text: "Ganas fuerza, valor y confianza con cada experiencia en la que realmente te detienes a mirar al miedo a la cara.", author: "Eleanor Roosevelt", tag: "DOLOR" },
    { text: "Por corta que sea la vida, la hacemos aún más corta con el descuidado desperdicio del tiempo.", author: "Victor Hugo", tag: "TRAGEDIA" },
    { text: "No hay camino a la conciencia sin dolor.", author: "C.G. Jung", tag: "DOLOR" },
    { text: "La soledad no proviene de no tener personas alrededor, sino de ser incapaz de comunicar las cosas que parecen importantes para uno mismo.", author: "C.G. Jung", tag: "SOLEDAD" },
    { text: "Si un hombre sabe más que los demás, se vuelve solitario.", author: "C.G. Jung", tag: "SOLEDAD" },
    { text: "Entre estímulo y respuesta hay un espacio. En ese espacio está nuestro poder para elegir nuestra respuesta.", author: "Viktor Frankl", tag: "EXISTENCIA" },
    { text: "Nadie está más desesperadamente esclavizado que quienes creen falsamente que son libres.", author: "Johann Wolfgang von Goethe", tag: "TRAGEDIA" },
    { text: "¿Qué es la vida? Una ilusión, una sombra, una historia.", author: "Pedro Calderón de la Barca", tag: "TRAGEDIA" },
    { text: "En los individuos, la locura es rara; pero en los grupos, partidos, naciones y épocas, es la norma.", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "La esperanza es en realidad el peor de todos los males, porque prolonga los tormentos del hombre.", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "Un lector vive mil vidas antes de morir. El hombre que nunca lee solo vive una.", author: "George R.R. Martin", tag: "EXISTENCIA" },
    { text: "La amistad es un alma que habita en dos cuerpos.", author: "Aristóteles", tag: "EXISTENCIA" },
    { text: "En la guerra, la verdad es la primera víctima.", author: "Esquilo", tag: "TRAGEDIA" },
    { text: "El verdadero soldado no lucha porque odie lo que tiene enfrente, sino porque ama lo que tiene detrás.", author: "G.K. Chesterton", tag: "TRAGEDIA" },
    { text: "No puedes ganar una guerra como tampoco puedes ganar un terremoto.", author: "Jeannette Rankin", tag: "TRAGEDIA" },
    { text: "En la guerra, no hay soldados sin heridas.", author: "José Narosky", tag: "DOLOR" },
    { text: "La guerra no determina quién tiene razón, solo quién queda.", author: "Bertrand Russell", tag: "TRAGEDIA" },
    { text: "Cada arma fabricada, cada barco de guerra botado, cada cohete disparado significa en el sentido final un robo a los que tienen hambre y no son alimentados.", author: "Dwight D. Eisenhower", tag: "TRAGEDIA" },
    { text: "La primera víctima cuando llega la guerra es la verdad.", author: "Hiram Johnson", tag: "TRAGEDIA" },
    { text: "Los hombres mayores declaran la guerra. Pero son los jóvenes quienes deben luchar y morir.", author: "Herbert Hoover", tag: "TRAGEDIA" },
    { text: "La guerra es lo que sucede cuando el lenguaje fracasa.", author: "Margaret Atwood", tag: "TRAGEDIA" },
    { text: "Cualquiera que haya mirado los ojos vidriosos de un soldado muriendo en el campo de batalla pensará bien antes de iniciar una guerra.", author: "Otto von Bismarck", tag: "TRAGEDIA" },
    { text: "El mundo es un lugar hermoso y vale la pena luchar por él, y odio mucho tener que dejarlo.", author: "Ernest Hemingway", tag: "TRAGEDIA" },
    { text: "Las guerras son malos instrumentos para esculpir mañanas pacíficos.", author: "Martin Luther King Jr.", tag: "TRAGEDIA" },
    { text: "Lucharemos en las playas, lucharemos en los terrenos de desembarco, lucharemos en los campos — nunca nos rendiremos.", author: "Winston Churchill", tag: "TRAGEDIA" },
    { text: "Hablar siempre es mejor que luchar.", author: "Winston Churchill", tag: "TRAGEDIA" },
    { text: "El objeto de la guerra no es morir por tu país, sino hacer que el otro bastardo muera por el suyo.", author: "George S. Patton", tag: "TRAGEDIA" },
    { text: "El arte supremo de la guerra es someter al enemigo sin luchar.", author: "Sun Tzu", tag: "TRAGEDIA" },
    { text: "En medio del caos también hay oportunidad — pero el caos siempre llega primero.", author: "Sun Tzu", tag: "TRAGEDIA" },
    { text: "La guerra es asesinato organizado y nada más.", author: "Harry Patch", tag: "TRAGEDIA" },
    { text: "Ellos no envejecerán como nosotros, los que quedamos.", author: "Laurence Binyon", tag: "TRAGEDIA" },
    { text: "¿Qué campanas de paso para los que mueren como ganado?", author: "Wilfred Owen", tag: "TRAGEDIA" },
    { text: "Ningún hombre es una isla, completo en sí mismo; cada hombre es un trozo del continente. La muerte de cualquier hombre me disminuye.", author: "John Donne", tag: "TRAGEDIA" },
    { text: "Todos los animales son iguales, pero algunos animales son más iguales que otros.", author: "George Orwell", tag: "TRAGEDIA" },
    { text: "La guerra es paz. La libertad es esclavitud. La ignorancia es fuerza.", author: "George Orwell", tag: "TRAGEDIA" },
    { text: "Si quieres una imagen del futuro, imagina una bota aplastando un rostro humano para siempre.", author: "George Orwell", tag: "TRAGEDIA" },
    { text: "Todos cumplimos una cadena perpetua en el calabozo del yo.", author: "Cyril Connolly", tag: "SOLEDAD" },
    { text: "Lo más doloroso es perderte a ti mismo en el proceso de amar demasiado a alguien.", author: "Ernest Hemingway", tag: "DOLOR" },
    { text: "La felicidad en las personas inteligentes es lo más raro que conozco.", author: "Ernest Hemingway", tag: "TRAGEDIA" },
    { text: "Morir es un arte, como todo lo demás. Lo hago excepcionalmente bien.", author: "Sylvia Plath", tag: "TRAGEDIA" },
    { text: "¿No hay salida de la mente?", author: "Sylvia Plath", tag: "TRAGEDIA" },
    { text: "De lo que estén hechas nuestras almas, la suya y la mía son lo mismo.", author: "Emily Brontë", tag: "DOLOR" },
    { text: "No he roto tu corazón — tú lo has roto; y al romperlo, has roto el mío.", author: "Emily Brontë", tag: "DOLOR" },
    { text: "Existo como soy, eso es suficiente.", author: "Walt Whitman", tag: "EXISTENCIA" },
    { text: "¿Me atrevo a perturbar el universo?", author: "T.S. Eliot", tag: "EXISTENCIA" },
    { text: "Así es como termina el mundo. No con un estallido sino con un gemido.", author: "T.S. Eliot", tag: "TRAGEDIA" },
    { text: "Dale palabras al dolor; el pesar que no habla susurra al corazón sobrecargado y lo invita a romperse.", author: "William Shakespeare", tag: "DOLOR" },
    { text: "Cuando miras largo tiempo al abismo, el abismo también te mira a ti.", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "Amar es sufrir, y no puede haber amor de otra manera.", author: "Fiódor Dostoievski", tag: "DOLOR" },
    { text: "El dolor y el sufrimiento son siempre inevitables para una gran inteligencia y un corazón profundo.", author: "Fiódor Dostoievski", tag: "DOLOR" },
    { text: "Cuanto más oscura es la noche, más brillan las estrellas. Cuanto más profundo el dolor, más cerca está Dios.", author: "Fiódor Dostoievski", tag: "DOLOR" },
    { text: "Que el mundo se vaya al infierno, pero yo siempre debo tener mi té.", author: "Fiódor Dostoievski", tag: "TRAGEDIA" },
    { text: "Nada en este mundo es más difícil que decir la verdad, nada más fácil que la adulación.", author: "Fiódor Dostoievski", tag: "TRAGEDIA" },
    { text: "Dar un nuevo paso, pronunciar una nueva palabra, es lo que más teme la gente.", author: "Fiódor Dostoievski", tag: "TRAGEDIA" },
    { text: "Vivir sin esperanza es dejar de vivir.", author: "Fiódor Dostoievski", tag: "TRAGEDIA" },
    { text: "Hay que amar la vida más que su significado.", author: "Fiódor Dostoievski", tag: "EXISTENCIA" },
    { text: "El grado de civilización en una sociedad puede juzgarse entrando en sus prisiones.", author: "Fiódor Dostoievski", tag: "TRAGEDIA" },
    { text: "La compasión es la ley fundamental de la existencia humana.", author: "Fiódor Dostoievski", tag: "EXISTENCIA" },
    { text: "Todo está permitido si Dios no existe.", author: "Fiódor Dostoievski", tag: "TRAGEDIA" },
    { text: "El misterio de la existencia humana no radica en mantenerse vivo, sino en encontrar algo por qué vivir.", author: "Fiódor Dostoievski", tag: "EXISTENCIA" },
    { text: "Al hombre solo le gusta contar sus problemas; no calcula su felicidad.", author: "Fiódor Dostoievski", tag: "TRAGEDIA" },
    { text: "Soy una jaula, en busca de un pájaro.", author: "Franz Kafka", tag: "SOLEDAD" },
    { text: "En la lucha entre tú y el mundo, apoya al mundo.", author: "Franz Kafka", tag: "TRAGEDIA" },
    { text: "Hay un punto sin retorno, desapercibido en el momento, en la mayoría de las vidas.", author: "Graham Greene", tag: "TRAGEDIA" },
    { text: "Solo me siento verdaderamente yo mismo cuando soy insoportablemente infeliz.", author: "Franz Kafka", tag: "DOLOR" },
    { text: "No te dobles; no lo diluyas; no intentes hacerlo lógico; no edites tu propia alma según la moda.", author: "Franz Kafka", tag: "EXISTENCIA" },
    { text: "Un escritor que no escribe es un monstruo que corteja a la locura.", author: "Franz Kafka", tag: "TRAGEDIA" },
    { text: "Toda revolución se evapora y deja tras de sí solo el lodo de una nueva burocracia.", author: "Franz Kafka", tag: "TRAGEDIA" },
    { text: "Estamos tan desamparados como niños perdidos en el bosque.", author: "Franz Kafka", tag: "SOLEDAD" },
    { text: "Estoy encadenado. No toques mis cadenas.", author: "Franz Kafka", tag: "TRAGEDIA" },
    { text: "Escribir es soledad total, el descenso al frío abismo de uno mismo.", author: "Franz Kafka", tag: "SOLEDAD" },
    { text: "Incluso la noche más oscura terminará y el sol saldrá.", author: "Victor Hugo", tag: "TRAGEDIA" },
    { text: "Ten valor para las grandes penas de la vida y paciencia para las pequeñas.", author: "Victor Hugo", tag: "DOLOR" },
    { text: "El pensamiento del suicidio es un gran consuelo: gracias a él se superan muchas noches oscuras.", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "En la soledad, el solitario se devora a sí mismo; en la multitud, la multitud lo devora a él.", author: "Friedrich Nietzsche", tag: "SOLEDAD" },
    { text: "Sin música, la vida sería un error.", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "Es necesario tener caos dentro de uno mismo para dar a luz una estrella danzante.", author: "Friedrich Nietzsche", tag: "EXISTENCIA" },
    { text: "No hay hechos, solo interpretaciones.", author: "Friedrich Nietzsche", tag: "EXISTENCIA" },
    { text: "Debes estar dispuesto a quemarte en tu propia llama; ¿cómo podrías renacer si primero no te has convertido en cenizas?", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "¿Es el hombre simplemente un error de Dios? ¿O es Dios simplemente un error del hombre?", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "Las convicciones son enemigos más peligrosos de la verdad que las mentiras.", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "Deberíamos considerar perdido todo día en que no hayamos bailado al menos una vez.", author: "Friedrich Nietzsche", tag: "EXISTENCIA" },
    { text: "Ten cuidado de que al expulsar a tu demonio no exorcices también lo mejor de ti.", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "El hombre yerra mientras aspira.", author: "Johann Wolfgang von Goethe", tag: "TRAGEDIA" },
    { text: "Ningún hombre sabe hasta que ha sufrido en la noche cuán dulce y querida puede ser la mañana para su corazón y sus ojos.", author: "Bram Stoker", tag: "DOLOR" },
    { text: "Quiero estar sola.", author: "Greta Garbo", tag: "SOLEDAD" },
    { text: "La vida es una gran sorpresa. No veo por qué la muerte no debería serlo aún más.", author: "Vladímir Nabokov", tag: "TRAGEDIA" },

let currentLang = 'en';
let quotes = [];
let currentIndex = 0;
let autoTimer = null;
let controlsTimer = null;
let controlsVisible = true;
let frozen = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startApp(lang) {
  currentLang = lang;
  quotes = shuffle(quotesData[lang]);
  currentIndex = 0;

  const langScreen = document.getElementById('lang-screen');
  const app = document.getElementById('app');

  langScreen.style.transition = 'opacity 0.8s';
  langScreen.style.opacity = '0';
  setTimeout(() => {
    langScreen.style.display = 'none';
    app.style.display = 'flex';
    showQuote(true);
    applyPrefs();
    startControlsTimer();
  }, 800);
}

function calcDuration(text) {
  const words = text.split(' ').length;
  const base = Math.max(5000, words * 600);
  return Math.min(base, 15000);
}

function showQuote(initial = false) {
  const q = quotes[currentIndex];
  const container = document.getElementById('quote-container');
  const curtain = document.getElementById('curtain');

  curtain.style.transition = 'none';
  curtain.style.opacity = initial ? '1' : '1';

  setTimeout(() => {
    document.getElementById('quote-line').style.opacity = '0';
    document.getElementById('quote-text').innerHTML = `"${q.text}"`;
    document.getElementById('quote-text').style.opacity = '0';
    document.getElementById('quote-author').textContent = `— ${q.author}`;
    document.getElementById('quote-author').style.opacity = '0';
    document.getElementById('quote-tag').textContent = `[ ${q.tag} ]`;
    document.getElementById('quote-tag').style.opacity = '0';

    container.classList.remove('quote-animate');
    void container.offsetWidth;
    container.classList.add('quote-animate');

    curtain.style.transition = 'opacity 1.4s ease';
    curtain.style.opacity = '0';

    document.getElementById('counter').textContent =
      `${String(currentIndex + 1).padStart(2,'0')} / ${String(quotes.length).padStart(2,'0')}`;

    const duration = calcDuration(q.text);
    const bar = document.getElementById('progress-bar');
    bar.style.transition = 'none';
    bar.style.width = '0%';
    void bar.offsetWidth;
    bar.style.transition = `width ${duration}ms linear`;
    bar.style.width = '100%';

    if (autoTimer) clearTimeout(autoTimer);
    autoTimer = setTimeout(() => nextQuote(), duration);

  }, initial ? 700 : 200);
}

function toggleFreeze() {
  frozen = !frozen;
  const btn = document.getElementById('freeze-btn');
  const bar = document.getElementById('progress-bar');
  if (frozen) {
    if (autoTimer) clearTimeout(autoTimer);
    bar.style.transition = 'none';
    btn.classList.add('active');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>RESUME`;
    showToast('❄ Donduruldu');
  } else {
    btn.classList.remove('active');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/><line x1="19.07" y1="4.93" x2="4.93" y2="19.07"/></svg>FREEZE`;
    // Restart auto-advance
    const q = quotes[currentIndex];
    const duration = calcDuration(q.text);
    bar.style.transition = 'none';
    bar.style.width = '0%';
    void bar.offsetWidth;
    bar.style.transition = `width ${duration}ms linear`;
    bar.style.width = '100%';
    autoTimer = setTimeout(() => nextQuote(), duration);
    showToast('▶ Devam ediyor');
  }
}

function nextQuote() {
  if (frozen) return;
  currentIndex = (currentIndex + 1) % quotes.length;
  if (currentIndex === 0) quotes = shuffle(quotes);
  triggerTransition();
}

function prevQuote() {
  if (frozen) return;
  currentIndex = (currentIndex - 1 + quotes.length) % quotes.length;
  triggerTransition();
}

function triggerTransition() {
  const curtain = document.getElementById('curtain');
  curtain.style.transition = 'opacity 0.8s ease';
  curtain.style.opacity = '1';
  if (autoTimer) clearTimeout(autoTimer);
  setTimeout(() => showQuote(), 850);
}

// Click anywhere to freeze/unfreeze
document.getElementById('app').addEventListener('click', function(e) {
  const ctrl = document.getElementById('controls');
  if (ctrl.contains(e.target)) return;
  toggleFreeze();
  resetControlsTimer();
});

document.getElementById('app').addEventListener('dblclick', function(e) {
  const ctrl = document.getElementById('controls');
  if (ctrl.contains(e.target)) return;
  const q = quotes[currentIndex];
  const txt = `"${q.text}" — ${q.author}`;
  navigator.clipboard.writeText(txt).then(() => {
    showToast('📋 Panoya kopyalandı');
  }).catch(() => {
    showToast('⚠ Kopyalanamadı');
  });
});

function startControlsTimer() {
  if (controlsTimer) clearTimeout(controlsTimer);
  controlsTimer = setTimeout(() => {
    document.getElementById('controls').style.opacity = '0';
    document.getElementById('counter').style.opacity = '0';
    document.getElementById('font-corner-btn').style.opacity = '0';
    document.getElementById('fs-corner-btn').style.opacity = '0';
    controlsVisible = false;
  }, 10000);
}

function resetControlsTimer() {
  document.getElementById('controls').style.opacity = '1';

  document.getElementById('fs-corner-btn').style.opacity = '1';
  controlsVisible = true;

}

// Screenshot - Manuel Canvas
function takeScreenshot() {
  const q = quotes[currentIndex];
  const canvas = document.createElement('canvas');
  const scale = 2;
  canvas.width  = window.innerWidth  * scale;
  canvas.height = window.innerHeight * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);
  const W = window.innerWidth;
  const H = window.innerHeight;

  // Siyah arka plan
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  // Vignette
  const vignette = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.85);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.8)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  // Altın yatay çizgi
  const lineY = H/2 - 80;
  const lineGrad = ctx.createLinearGradient(W/2-60, 0, W/2+60, 0);
  lineGrad.addColorStop(0, 'rgba(200,169,110,0)');
  lineGrad.addColorStop(0.5, 'rgba(200,169,110,0.8)');
  lineGrad.addColorStop(1, 'rgba(200,169,110,0)');
  ctx.strokeStyle = lineGrad;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W/2 - 60, lineY);
  ctx.lineTo(W/2 + 60, lineY);
  ctx.stroke();

  // Font boyutunu mevcut element'ten al
  const quotEl = document.getElementById('quote-text');
  const currentFontSize = parseInt(window.getComputedStyle(quotEl).fontSize) || 28;

  // Söz metni - word wrap
  const maxW = W * 0.75;
  const quoteStr = `"${q.text}"`;
  ctx.font = `300 italic ${currentFontSize}px "Crimson Pro", Georgia, serif`;
  ctx.fillStyle = '#e8e0d0';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const words = quoteStr.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);

  const lineHeight = currentFontSize * 1.7;
  const totalH = lines.length * lineHeight;
  let startY = H/2 - totalH/2 + lineHeight/2 - 10;

  for (const l of lines) {
    ctx.fillText(l, W/2, startY);
    startY += lineHeight;
  }

  // Yazar
  ctx.font = `400 13px "Share Tech Mono", monospace`;
  ctx.fillStyle = '#c8a96e';
  ctx.letterSpacing = '0.3em';
  ctx.fillText(`— ${q.author}`.toUpperCase(), W/2, startY + 20);

  // Tag
  ctx.font = `400 10px "Share Tech Mono", monospace`;
  ctx.fillStyle = '#8b1a1a';
  ctx.fillText(`[ ${q.tag} ]`, W/2, startY + 44);

  // İndir
  const a = document.createElement('a');
  a.download = 'philosophy-quote.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
  showToast('📸 Kaydedildi');
}

function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = `
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      background:rgba(0,0,0,0.92); border:1px solid rgba(200,169,110,0.4);
      color:#c8a96e; font-family:'Share Tech Mono',monospace;
      font-size:14px; letter-spacing:0.2em; padding:18px 32px;
      z-index:9999; pointer-events:none; text-align:center;
      transition:opacity 0.4s ease; white-space:nowrap;
    `;
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { toast.style.opacity = '0'; }, 2800);
}

  { name: 'Raleway',           label: 'Raleway Light',      weight: '300', style: 'italic' },
  { name: 'Raleway',           label: 'Raleway Bold',       weight: '700', style: 'normal' },
  { name: 'Libre Baskerville', label: 'Libre Baskerville',  weight: '400', style: 'italic' },
];
let currentFont = fonts.find(f => f.label === savedPrefs.fontLabel) || fonts[0];
let fontPickerOpen = false;

function savePrefs() {
  try {
    localStorage.setItem('phil_prefs', JSON.stringify({
      fontSize,
      fontLabel: currentFont.label
    }));
  } catch {}
}

function buildFontPicker() {
  const panel = document.getElementById('font-picker');
  panel.innerHTML = '';
  fonts.forEach(f => {
    const isActive = f.name === currentFont.name && f.label === currentFont.label;
    const btn = document.createElement('button');
    btn.style.cssText = `
      background: ${isActive ? 'rgba(200,169,110,0.15)' : 'transparent'};
      border: 1px solid ${isActive ? 'rgba(200,169,110,0.5)' : 'rgba(255,255,255,0.07)'};
      color: #e8e0d0; border-radius:8px; padding:10px 16px; cursor:pointer;
      font-family:'${f.name}', serif; font-style:${f.style}; font-weight:${f.weight}; font-size:17px;
      text-align:left; width:100%; transition:background 0.2s;
    `;
    btn.textContent = f.label;
    btn.onmouseover = () => btn.style.background = 'rgba(200,169,110,0.1)';
    btn.onmouseout  = () => btn.style.background = isActive ? 'rgba(200,169,110,0.15)' : 'transparent';
    btn.onclick = () => {
      currentFont = f;
      applyFont();
      savePrefs();
      buildFontPicker();
      toggleFontPicker();
    };
    panel.appendChild(btn);
  });
}

function applyFont() {
  const el = document.getElementById('quote-text');
  el.style.fontFamily  = `'${currentFont.name}', serif`;
  el.style.fontStyle   = currentFont.style;
  el.style.fontWeight  = currentFont.weight;
  showToast(currentFont.label);
}

function applyPrefs() {
  const el = document.getElementById('quote-text');
  el.style.fontSize    = fontSize + 'px';
  el.style.fontFamily  = `'${currentFont.name}', serif`;
  el.style.fontStyle   = currentFont.style;
  el.style.fontWeight  = currentFont.weight;
}

function toggleFontPicker() {
  const panel = document.getElementById('font-picker');
  fontPickerOpen = !fontPickerOpen;
  if (fontPickerOpen) {
    buildFontPicker();
    panel.style.display = 'flex';
  } else {
    panel.style.display = 'none';
  }
}

// Fullscreen
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); if (!frozen) { nextQuote(); resetControlsTimer(); } }
  if (e.key === 'ArrowLeft') { e.preventDefault(); if (!frozen) { prevQuote(); resetControlsTimer(); } }
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === ' ' && frozen) { e.preventDefault(); toggleFreeze(); }
  if (e.key === 'p' || e.key === 'P') toggleFreeze();
  if (e.key === 's' || e.key === 'S') takeScreenshot();
});
</script>
</body>
