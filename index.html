    { text: "Excellence is never an accident; it is always the result of high intention, sincere effort, and intelligent execution.", author: "Aristotle", tag: "WISDOM" },
    { text: "Knowing yourself is the beginning of all wisdom.", author: "Aristotle", tag: "WISDOM" },
    { text: "The educated differ from the uneducated as much as the living from the dead.", author: "Aristotle", tag: "WISDOM" },
    { text: "To avoid criticism say nothing, do nothing, be nothing.", author: "Aristotle", tag: "WISDOM" },
    { text: "Hope is a waking dream.", author: "Aristotle", tag: "HOPE" },
    { text: "Happiness depends upon ourselves.", author: "Aristotle", tag: "WISDOM" },
    { text: "Pleasure in the job puts perfection in the work.", author: "Aristotle", tag: "WISDOM" },
    { text: "It is during our darkest moments that we must focus to see the light.", author: "Aristotle", tag: "PAIN" },
    { text: "The secret to humor is surprise.", author: "Aristotle", tag: "WISDOM" },
    { text: "Quality is not an act, it is a habit.", author: "Aristotle", tag: "WISDOM" },
    { text: "Those who know, do. Those that understand, teach.", author: "Aristotle", tag: "WISDOM" },
    { text: "The more you know, the more you realize you don't know.", author: "Aristotle", tag: "WISDOM" },
    { text: "In all things of nature there is something of the marvelous.", author: "Aristotle", tag: "EXISTENCE" },
    { text: "Patience is bitter, but its fruit is sweet.", author: "Aristotle", tag: "WISDOM" },
    { text: "The roots of education are bitter, but the fruit is sweet.", author: "Aristotle", tag: "WISDOM" },
    { text: "Man is by nature a political animal.", author: "Aristotle", tag: "EXISTENCE" },
    { text: "To perceive is to suffer.", author: "Aristotle", tag: "PAIN" },
    { text: "The one exclusive sign of thorough knowledge is the power of teaching.", author: "Aristotle", tag: "WISDOM" },
    { text: "Poverty is the parent of revolution and crime.", author: "Aristotle", tag: "TRAGEDY" },
    { text: "Education is the best provision for old age.", author: "Aristotle", tag: "WISDOM" },
    { text: "The aim of the wise is not to secure pleasure, but to avoid pain.", author: "Aristotle", tag: "WISDOM" },
    { text: "The worst form of inequality is to try to make unequal things equal.", author: "Aristotle", tag: "WISDOM" },
    { text: "The energy of the mind is the essence of life.", author: "Aristotle", tag: "EXISTENCE" },
    { text: "The ideal man bears the accidents of life with dignity and grace.", author: "Aristotle", tag: "WISDOM" },
    { text: "Nature does nothing uselessly.", author: "Aristotle", tag: "WISDOM" },
    { text: "We cannot learn without pain.", author: "Aristotle", tag: "PAIN" },
    { text: "Love is composed of a single soul inhabiting two bodies.", author: "Aristotle", tag: "EXISTENCE" },
    { text: "What is a friend? A single soul dwelling in two bodies.", author: "Aristotle", tag: "EXISTENCE" },
    { text: "We live in deeds, not years; in thoughts, not breaths.", author: "Philip James Bailey", tag: "EXISTENCE" },
    { text: "He most lives who thinks most, feels the noblest, acts the best.", author: "Philip James Bailey", tag: "EXISTENCE" },
    { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius", tag: "WISDOM" },
    { text: "Everything has beauty but not everyone sees it.", author: "Confucius", tag: "WISDOM" },
    { text: "The journey of a thousand miles begins with one step.", author: "Lao Tzu", tag: "WISDOM" },
    { text: "Knowing others is wisdom; knowing yourself is enlightenment.", author: "Lao Tzu", tag: "WISDOM" },
    { text: "Nature does not hurry, yet everything is accomplished.", author: "Lao Tzu", tag: "WISDOM" },
    { text: "To the mind that is still, the whole universe surrenders.", author: "Lao Tzu", tag: "WISDOM" },
    { text: "When you realize there is nothing lacking, the whole world belongs to you.", author: "Lao Tzu", tag: "WISDOM" },
    { text: "Care about what other people think and you will always be their prisoner.", author: "Lao Tzu", tag: "WISDOM" },
    { text: "A good traveler has no fixed plans and is not intent on arriving.", author: "Lao Tzu", tag: "WISDOM" },
    { text: "The key to growth is the introduction of higher dimensions of consciousness into our awareness.", author: "Lao Tzu", tag: "WISDOM" },
    { text: "Loss is not as bad as wanting more.", author: "Lao Tzu", tag: "WISDOM" },
    { text: "When I let go of what I am, I become what I might be.", author: "Lao Tzu", tag: "EXISTENCE" },
    { text: "He who conquers himself is the mightiest warrior.", author: "Confucius", tag: "WISDOM" },
    { text: "If you think in terms of a year, plant a seed; if in terms of ten years, plant trees; if in terms of 100 years, teach the people.", author: "Confucius", tag: "WISDOM" },
    { text: "To know what you know and what you do not know, that is true knowledge.", author: "Confucius", tag: "WISDOM" },
    { text: "You cannot open a book without learning something.", author: "Confucius", tag: "WISDOM" },
    { text: "In a country well governed, poverty is something to be ashamed of. In a country badly governed, wealth is something to be ashamed of.", author: "Confucius", tag: "WISDOM" },
    { text: "When you see a good man, try to emulate his example.", author: "Confucius", tag: "WISDOM" },
    { text: "Silence is a true friend who never betrays.", author: "Confucius", tag: "WISDOM" },
    { text: "The man who asks a question is a fool for a minute, the man who does not ask is a fool for life.", author: "Confucius", tag: "WISDOM" },
    { text: "Wherever you go, go with all your heart.", author: "Confucius", tag: "EXISTENCE" },
    { text: "Life is really simple, but we insist on making it complicated.", author: "Confucius", tag: "WISDOM" },
    { text: "He who learns but does not think, is lost. He who thinks but does not learn is in great danger.", author: "Confucius", tag: "WISDOM" },
    { text: "The man who moves a mountain begins by carrying away small stones.", author: "Confucius", tag: "WISDOM" },
    { text: "When it is obvious that the goals cannot be reached, don't adjust the goals, adjust the action steps.", author: "Confucius", tag: "WISDOM" },
    { text: "To see what is right and not to do it is cowardice.", author: "Confucius", tag: "WISDOM" },
    { text: "Give a man a fish and you feed him for a day. Teach a man to fish and you feed him for a lifetime.", author: "Confucius", tag: "WISDOM" },
    { text: "Choose a job you love, and you will never have to work a day in your life.", author: "Confucius", tag: "EXISTENCE" },
    { text: "Our greatest glory is not in never falling, but in rising every time we fall.", author: "Confucius", tag: "PAIN" },
    { text: "The gem cannot be polished without friction, nor man perfected without trials.", author: "Confucius", tag: "PAIN" },
    { text: "Act justly, love mercy, and walk humbly.", author: "Micah", tag: "WISDOM" },
    { text: "The only true wisdom is in knowing you know nothing.", author: "Socrates", tag: "WISDOM" },
    { text: "An unexamined life is not worth living.", author: "Socrates", tag: "EXISTENCE" },
    { text: "Wonder is the beginning of wisdom.", author: "Socrates", tag: "WISDOM" },
    { text: "I cannot teach anybody anything. I can only make them think.", author: "Socrates", tag: "WISDOM" },
    { text: "Be slow to fall into friendship, but when thou art in, continue firm and constant.", author: "Socrates", tag: "WISDOM" },
    { text: "Beware the barrenness of a busy life.", author: "Socrates", tag: "WISDOM" },
    { text: "Death may be the greatest of all human blessings.", author: "Socrates", tag: "TRAGEDY" },
    { text: "From the deepest desires often come the deadliest hate.", author: "Socrates", tag: "TRAGEDY" },
    { text: "Not life, but good life, is to be chiefly valued.", author: "Socrates", tag: "EXISTENCE" },
    { text: "True wisdom comes to each of us when we realize how little we understand about life, ourselves, and the world around us.", author: "Socrates", tag: "WISDOM" },
    { text: "The mind is not a vessel to be filled, but a fire to be kindled.", author: "Plutarch", tag: "WISDOM" },
    { text: "Do not speak of your happiness to one less fortunate than yourself.", author: "Plutarch", tag: "WISDOM" },
    { text: "To make no mistakes is not in the power of man; but from their errors and mistakes the wise and good learn wisdom.", author: "Plutarch", tag: "WISDOM" },
    { text: "I don't need a friend who changes when I change and who nods when I nod.", author: "Plutarch", tag: "WISDOM" },
    { text: "What we achieve inwardly will change outer reality.", author: "Plutarch", tag: "WISDOM" },
    { text: "The measure of a man is what he does with power.", author: "Plato", tag: "WISDOM" },
    { text: "Ignorance, the root and stem of every evil.", author: "Plato", tag: "WISDOM" },
    { text: "Courage is knowing what not to fear.", author: "Plato", tag: "WISDOM" },
    { text: "We can easily forgive a child who is afraid of the dark; the real tragedy is when men are afraid of the light.", author: "Plato", tag: "WISDOM" },
    { text: "There is no harm in repeating a good thing.", author: "Plato", tag: "WISDOM" },
    { text: "Human behavior flows from three main sources: desire, emotion, and knowledge.", author: "Plato", tag: "WISDOM" },
    { text: "Wise men speak because they have something to say; fools because they have to say something.", author: "Plato", tag: "WISDOM" },
    { text: "The price good men pay for indifference to public affairs is to be ruled by evil men.", author: "Plato", tag: "WISDOM" },
    { text: "Music is a moral law. It gives soul to the universe, wings to the mind, flight to the imagination.", author: "Plato", tag: "EXISTENCE" },
    { text: "Knowledge without justice ought to be called cunning rather than wisdom.", author: "Plato", tag: "WISDOM" },
    { text: "No one is more hated than he who speaks the truth.", author: "Plato", tag: "WISDOM" },
    { text: "Opinion is the medium between knowledge and ignorance.", author: "Plato", tag: "WISDOM" },
    { text: "At the touch of love, everyone becomes a poet.", author: "Plato", tag: "EXISTENCE" },
    { text: "The greatest wealth is to live content with little.", author: "Plato", tag: "WISDOM" },
    { text: "Good people do not need laws to tell them to act responsibly.", author: "Plato", tag: "WISDOM" },
    { text: "The first and greatest victory is to conquer yourself.", author: "Plato", tag: "WISDOM" },
    { text: "Love is a serious mental disease.", author: "Plato", tag: "EXISTENCE" },
    { text: "He who is of a calm and happy nature will hardly feel the pressure of age.", author: "Plato", tag: "WISDOM" },
    { text: "Time is the moving image of eternity.", author: "Plato", tag: "EXISTENCE" },
    { text: "Self-conquest is the greatest of victories.", author: "Plato", tag: "WISDOM" },
    { text: "There are three classes of men; lovers of wisdom, lovers of honor, and lovers of gain.", author: "Plato", tag: "WISDOM" },
    { text: "The beginning is the most important part of the work.", author: "Plato", tag: "WISDOM" },
    { text: "Books are the mirrors of the soul.", author: "Virginia Woolf", tag: "EXISTENCE" },
    { text: "You cannot find peace by avoiding life.", author: "Virginia Woolf", tag: "EXISTENCE" },
    { text: "I thought how unpleasant it is to be locked out; and I thought how it is worse to be locked in.", author: "Virginia Woolf", tag: "EXISTENCE" },
    { text: "Arrange whatever pieces come your way.", author: "Virginia Woolf", tag: "EXISTENCE" },
    { text: "No need to hurry. No need to sparkle. No need to be anybody but oneself.", author: "Virginia Woolf", tag: "EXISTENCE" },
    { text: "For nothing was simply one thing.", author: "Virginia Woolf", tag: "EXISTENCE" },
    { text: "You cannot find peace by avoiding life.", author: "Virginia Woolf", tag: "EXISTENCE" },
    { text: "I thought how unpleasant it is to be locked out and how it is even worse to be locked in.", author: "Virginia Woolf", tag: "EXISTENCE" },
    { text: "If you do not tell the truth about yourself, you cannot tell it about other people.", author: "Virginia Woolf", tag: "WISDOM" },
    { text: "One cannot think well, love well, sleep well, if one has not dined well.", author: "Virginia Woolf", tag: "WISDOM" },
    { text: "Humor is reason gone mad.", author: "Groucho Marx", tag: "WISDOM" },
    { text: "I, not events, have the power to make me happy or unhappy today.", author: "Groucho Marx", tag: "WISDOM" },
    { text: "Outside of a dog, a book is man's best friend.", author: "Groucho Marx", tag: "WISDOM" },
    { text: "The secret of life is honesty and fair dealing. If you can fake that, you've got it made.", author: "Groucho Marx", tag: "WISDOM" },
    { text: "I find television very educating. Every time somebody turns on the set, I go into the other room and read a book.", author: "Groucho Marx", tag: "WISDOM" },
    { text: "No man goes before his time — unless the boss leaves early.", author: "Groucho Marx", tag: "WISDOM" },
    { text: "If you're not part of the solution, you're part of the problem.", author: "Eldridge Cleaver", tag: "WISDOM" },
    { text: "Sanity is a cozy lie.", author: "Susan Sontag", tag: "WISDOM" },
    { text: "The only interesting answers are those which destroy the questions.", author: "Susan Sontag", tag: "WISDOM" },
    { text: "The camera makes everyone a tourist in other people's reality.", author: "Susan Sontag", tag: "WISDOM" },
    { text: "Intelligence is really a kind of taste: taste in ideas.", author: "Susan Sontag", tag: "WISDOM" },
    { text: "Compassion is an unstable emotion. It needs to be translated into action, or it withers.", author: "Susan Sontag", tag: "WISDOM" },
    { text: "What is most beautiful in virile men is something feminine; what is most beautiful in feminine women is something masculine.", author: "Susan Sontag", tag: "EXISTENCE" },
    { text: "The past is never dead. It's not even past.", author: "William Faulkner", tag: "EXISTENCE" },
    { text: "Read, read, read. Read everything.", author: "William Faulkner", tag: "WISDOM" },
    { text: "Don't be a writer, be writing.", author: "William Faulkner", tag: "WISDOM" },
    { text: "I never know what I think about something until I read what I've written on it.", author: "William Faulkner", tag: "WISDOM" },
    { text: "Always dream and shoot higher than you know you can do.", author: "William Faulkner", tag: "EXISTENCE" },
    { text: "A writer needs three things, experience, observation, and imagination, any two of which, at times any one of which, can supply the lack of the others.", author: "William Faulkner", tag: "WISDOM" },
    { text: "The aim of every artist is to arrest motion, which is life.", author: "William Faulkner", tag: "EXISTENCE" },
    { text: "We must be free not because we claim freedom, but because we practice it.", author: "William Faulkner", tag: "FREEDOM" },
    { text: "I decline to accept the end of man.", author: "William Faulkner", tag: "EXISTENCE" },
    { text: "The human heart has hidden treasures, in secret kept, in silence sealed.", author: "Charlotte Brontë", tag: "EXISTENCE" },
    { text: "I try to avoid looking forward or backward, and try to keep looking upward.", author: "Charlotte Brontë", tag: "EXISTENCE" },
    { text: "The soul, fortunately, has an interpreter — often an unconscious but still a faithful interpreter — in the eye.", author: "Charlotte Brontë", tag: "EXISTENCE" },
    { text: "I am no bird; and no net ensnares me: I am a free human being, with an independent will.", author: "Charlotte Brontë", tag: "FREEDOM" },
    { text: "Life appears to me too short to be spent in nursing animosity or registering wrongs.", author: "Charlotte Brontë", tag: "WISDOM" },
    { text: "I would always rather be happy than dignified.", author: "Charlotte Brontë", tag: "EXISTENCE" },
    { text: "Crying does not indicate that you are weak. Since birth, it has always been a sign that you are alive.", author: "Charlotte Brontë", tag: "PAIN" },
    { text: "The question is not how to get cured, but how to live.", author: "Joseph Conrad", tag: "EXISTENCE" },
    { text: "A man that is born falls into a dream like a man who falls into the sea.", author: "Joseph Conrad", tag: "EXISTENCE" },
    { text: "I have wrestled with death. It is the most unexciting contest you can imagine.", author: "Joseph Conrad", tag: "TRAGEDY" },
    { text: "Who knows what true loneliness is — not the conventional word but the naked terror? To the lonely themselves it wears a mask.", author: "Joseph Conrad", tag: "SOLITUDE" },
    { text: "The mind of man is capable of anything — because everything is in it, all the past as well as all the future.", author: "Joseph Conrad", tag: "EXISTENCE" },
    { text: "In the destructive element immerse.", author: "Joseph Conrad", tag: "EXISTENCE" },
    { text: "No, I don't like work. I had rather laze about and think of all the fine things that can be done. I don't like work — no man does — but I like what is in the work — the chance to find yourself.", author: "Joseph Conrad", tag: "EXISTENCE" },
    { text: "It's only when you look at an ant through a magnifying glass on a sunny day that you realize how often they burst into flames.", author: "Harry Hill", tag: "WISDOM" },
    { text: "The two enemies of human happiness are pain and boredom.", author: "Arthur Schopenhauer", tag: "TRAGEDY" },
    { text: "Compassion is the basis of all morality.", author: "Arthur Schopenhauer", tag: "WISDOM" },
    { text: "All truth passes through three stages. First, it is ridiculed. Second, it is violently opposed. Third, it is accepted as being self-evident.", author: "Arthur Schopenhauer", tag: "WISDOM" },
    { text: "Talent hits a target no one else can hit; Genius hits a target no one else can see.", author: "Arthur Schopenhauer", tag: "WISDOM" },
    { text: "The more unintelligent a man is, the less mysterious existence seems to him.", author: "Arthur Schopenhauer", tag: "WISDOM" },
    { text: "Each day is a little life: every waking and rising a little birth, every fresh morning a little youth.", author: "Arthur Schopenhauer", tag: "EXISTENCE" },
    { text: "A man can do what he wants, but not want what he wants.", author: "Arthur Schopenhauer", tag: "EXISTENCE" },
    { text: "Change alone is eternal, perpetual, immortal.", author: "Arthur Schopenhauer", tag: "EXISTENCE" },
    { text: "After your death you will be what you were before your birth.", author: "Arthur Schopenhauer", tag: "EXISTENCE" },
    { text: "We forfeit three-quarters of ourselves in order to be like other people.", author: "Arthur Schopenhauer", tag: "EXISTENCE" },
    { text: "The most common form of stupidity is forgetting what one is trying to do.", author: "Arthur Schopenhauer", tag: "WISDOM" },
    { text: "Happiness is not something ready-made. It comes from your own actions.", author: "Dalai Lama", tag: "WISDOM" },
    { text: "My religion is very simple. My religion is kindness.", author: "Dalai Lama", tag: "WISDOM" },
    { text: "A disciplined mind brings happiness.", author: "Dalai Lama", tag: "WISDOM" },
    { text: "Share your knowledge. It is a way to achieve immortality.", author: "Dalai Lama", tag: "WISDOM" },
    { text: "Love and compassion are necessities, not luxuries. Without them, humanity cannot survive.", author: "Dalai Lama", tag: "EXISTENCE" },
    { text: "If you want others to be happy, practice compassion. If you want to be happy, practice compassion.", author: "Dalai Lama", tag: "WISDOM" },
    { text: "Old friends pass away, new friends appear. It is just like the days. An old day passes, a new day arrives.", author: "Dalai Lama", tag: "EXISTENCE" },
    { text: "The purpose of our lives is to be happy.", author: "Dalai Lama", tag: "EXISTENCE" },
    { text: "We need to learn to want what we have, not to have what we want.", author: "Dalai Lama", tag: "WISDOM" },
    { text: "There is a saying in Tibetan: tragedy should be utilized as a source of strength.", author: "Dalai Lama", tag: "PAIN" },
    { text: "Be kind whenever possible. It is always possible.", author: "Dalai Lama", tag: "WISDOM" },
    { text: "If you think you are too small to make a difference, try sleeping with a mosquito.", author: "Dalai Lama", tag: "WISDOM" },
    { text: "In the practice of tolerance, one's enemy is the best teacher.", author: "Dalai Lama", tag: "WISDOM" },
    { text: "Remember that sometimes not getting what you want is a wonderful stroke of luck.", author: "Dalai Lama", tag: "WISDOM" },
    { text: "World peace must develop from inner peace.", author: "Dalai Lama", tag: "WISDOM" },
    { text: "We can never obtain peace in the outer world until we make peace with ourselves.", author: "Dalai Lama", tag: "WISDOM" },
    { text: "Take into account that great love and great achievements involve great risk.", author: "Dalai Lama", tag: "WISDOM" },
    { text: "Judge your success by what you had to give up in order to get it.", author: "Dalai Lama", tag: "WISDOM" },
    { text: "When you talk, you are only repeating what you already know. But if you listen, you may learn something new.", author: "Dalai Lama", tag: "WISDOM" },
    { text: "An eye for an eye only ends up making the whole world blind.", author: "Mahatma Gandhi", tag: "WISDOM" },
    { text: "The weak can never forgive. Forgiveness is the attribute of the strong.", author: "Mahatma Gandhi", tag: "WISDOM" },
    { text: "In a gentle way, you can shake the world.", author: "Mahatma Gandhi", tag: "WISDOM" },
    { text: "The best way to find yourself is to lose yourself in the service of others.", author: "Mahatma Gandhi", tag: "WISDOM" },
    { text: "Live as if you were to die tomorrow. Learn as if you were to live forever.", author: "Mahatma Gandhi", tag: "EXISTENCE" },
    { text: "The future depends on what you do today.", author: "Mahatma Gandhi", tag: "WISDOM" },
    { text: "Strength does not come from physical capacity. It comes from an indomitable will.", author: "Mahatma Gandhi", tag: "EXISTENCE" },
    { text: "You must be the change you wish to see in the world.", author: "Mahatma Gandhi", tag: "EXISTENCE" },
    { text: "The greatness of humanity is not in being human, but in being humane.", author: "Mahatma Gandhi", tag: "WISDOM" },
    { text: "Earth provides enough to satisfy every man's needs, but not every man's greed.", author: "Mahatma Gandhi", tag: "WISDOM" },
    { text: "A man is but a product of his thoughts. What he thinks he becomes.", author: "Mahatma Gandhi", tag: "WISDOM" },
    { text: "Where there is love there is life.", author: "Mahatma Gandhi", tag: "EXISTENCE" },
    { text: "It is health that is real wealth and not pieces of gold and silver.", author: "Mahatma Gandhi", tag: "WISDOM" },
    { text: "The good man is the friend of all living things.", author: "Mahatma Gandhi", tag: "WISDOM" },
    { text: "Hate the sin, love the sinner.", author: "Mahatma Gandhi", tag: "WISDOM" },
    { text: "Honest disagreement is often a good sign of progress.", author: "Mahatma Gandhi", tag: "WISDOM" },
    { text: "Truth never damages a cause that is just.", author: "Mahatma Gandhi", tag: "WISDOM" },
    { text: "A small body of determined spirits fired by an unquenchable faith in their mission can alter the course of history.", author: "Mahatma Gandhi", tag: "EXISTENCE" },
    { text: "You can chain me, you can torture me, you can even destroy this body, but you will never imprison my mind.", author: "Mahatma Gandhi", tag: "FREEDOM" },
    { text: "The real voyage of discovery consists not in seeking new landscapes, but in having new eyes.", author: "Marcel Proust", tag: "WISDOM" },
    { text: "Let us be grateful to the people who make us happy; they are the charming gardeners who make our souls blossom.", author: "Marcel Proust", tag: "EXISTENCE" },
    { text: "Happiness is beneficial for the body, but it is grief that develops the powers of the mind.", author: "Marcel Proust", tag: "PAIN" },
    { text: "Time, which changes people, does not alter the image we have retained of them.", author: "Marcel Proust", tag: "EXISTENCE" },
    { text: "We are not provided with wisdom, we must discover it for ourselves.", author: "Marcel Proust", tag: "WISDOM" },
    { text: "Everything great in the world comes from neurotics.", author: "Marcel Proust", tag: "EXISTENCE" },
    { text: "Always try to keep a patch of sky above your life.", author: "Marcel Proust", tag: "WISDOM" },
    { text: "It is our imagination that is responsible for love, not the other person.", author: "Marcel Proust", tag: "EXISTENCE" },
    { text: "In theory one is aware that the earth revolves, but in practice one does not perceive it.", author: "Marcel Proust", tag: "EXISTENCE" },
    { text: "Remembrance of things past is not necessarily the remembrance of things as they were.", author: "Marcel Proust", tag: "EXISTENCE" },
    { text: "The heart changes, and that is our worst misfortune.", author: "Marcel Proust", tag: "TRAGEDY" },
    { text: "Everything we think of as great has come to us from neurotics.", author: "Marcel Proust", tag: "EXISTENCE" },
    { text: "If a little dreaming is dangerous, the cure for it is not to dream less but to dream more, to dream all the time.", author: "Marcel Proust", tag: "EXISTENCE" },
    { text: "Man is not a creature of circumstance; circumstances are the creatures of men.", author: "Benjamin Disraeli", tag: "EXISTENCE" },
    { text: "The greatest good you can do for another is not just to share your riches but to reveal to him his own.", author: "Benjamin Disraeli", tag: "WISDOM" },
    { text: "Action may not always bring happiness; but there is no happiness without action.", author: "Benjamin Disraeli", tag: "WISDOM" },
    { text: "To be conscious that you are ignorant is a great step to knowledge.", author: "Benjamin Disraeli", tag: "WISDOM" },
    { text: "The secret of success in life is for a man to be ready for his opportunity when it comes.", author: "Benjamin Disraeli", tag: "WISDOM" },
    { text: "Real courage is knowing what faces you and doing it anyway.", author: "Cyndi Lauper", tag: "EXISTENCE" },
    { text: "I have lived a thousand lives and I've loved a thousand loves.", author: "George R.R. Martin", tag: "EXISTENCE" },
    { text: "A reader lives a thousand lives before he dies. The man who never reads lives only one.", author: "George R.R. Martin", tag: "EXISTENCE" },
    { text: "There is only one thing we say to death: Not today.", author: "George R.R. Martin", tag: "EXISTENCE" },
    { text: "A lion doesn't concern himself with the opinion of sheep.", author: "George R.R. Martin", tag: "WISDOM" },
    { text: "Winter is coming.", author: "George R.R. Martin", tag: "TRAGEDY" },
    { text: "Different roads sometimes lead to the same castle.", author: "George R.R. Martin", tag: "WISDOM" },
    { text: "No matter what a man's past may have been, his future is spotless.", author: "John R. Rice", tag: "HOPE" },
    { text: "In the middle of every difficulty lies opportunity.", author: "Albert Einstein", tag: "PAIN" },
    { text: "Education is what remains after one has forgotten what one has learned in school.", author: "Albert Einstein", tag: "WISDOM" },
    { text: "Life is like riding a bicycle. To keep your balance, you must keep moving.", author: "Albert Einstein", tag: "EXISTENCE" },
    { text: "The important thing is to not stop questioning. Curiosity has its own reason for existing.", author: "Albert Einstein", tag: "WISDOM" },
    { text: "Look deep into nature, and then you will understand everything better.", author: "Albert Einstein", tag: "WISDOM" },
    { text: "Only a life lived for others is a life worthwhile.", author: "Albert Einstein", tag: "EXISTENCE" },
    { text: "Imagination is everything. It is the preview of life's coming attractions.", author: "Albert Einstein", tag: "EXISTENCE" },
    { text: "Few are those who see with their own eyes and feel with their own hearts.", author: "Albert Einstein", tag: "WISDOM" },
    { text: "Great spirits have always encountered violent opposition from mediocre minds.", author: "Albert Einstein", tag: "WISDOM" },
    { text: "The world is a dangerous place to live; not because of the people who are evil, but because of the people who don't do anything about it.", author: "Albert Einstein", tag: "WISDOM" },
    { text: "Insanity is doing the same thing over and over again and expecting different results.", author: "Albert Einstein", tag: "WISDOM" },
    { text: "Not everything that counts can be counted, and not everything that can be counted counts.", author: "Albert Einstein", tag: "WISDOM" },
    { text: "The value of a man should be seen in what he gives and not in what he is able to receive.", author: "Albert Einstein", tag: "WISDOM" },
    { text: "Gravitation is not responsible for people falling in love.", author: "Albert Einstein", tag: "EXISTENCE" },
    { text: "A person who never made a mistake never tried anything new.", author: "Albert Einstein", tag: "EXISTENCE" },
    { text: "Common sense is the collection of prejudices acquired by age eighteen.", author: "Albert Einstein", tag: "WISDOM" },
    { text: "The hardest thing in the world to understand is income tax.", author: "Albert Einstein", tag: "WISDOM" },
    { text: "Any fool can know. The point is to understand.", author: "Albert Einstein", tag: "WISDOM" },
    { text: "I speak to everyone in the same way, whether he is the garbage man or the president of the university.", author: "Albert Einstein", tag: "WISDOM" },
    { text: "When you are courting a nice girl an hour seems like a second. When you sit on a red-hot cinder a second seems like an hour.", author: "Albert Einstein", tag: "EXISTENCE" },
    { text: "If you can't explain it to a six year old, you don't understand it yourself.", author: "Albert Einstein", tag: "WISDOM" },
    { text: "With great power comes great responsibility.", author: "Voltaire", tag: "WISDOM" },
    { text: "Judge a man by his questions rather than his answers.", author: "Voltaire", tag: "WISDOM" },
    { text: "It is dangerous to be right in matters on which the established authorities are wrong.", author: "Voltaire", tag: "WISDOM" },
    { text: "The secret of being boring is to say everything.", author: "Voltaire", tag: "WISDOM" },
    { text: "God is a comedian playing to an audience that is too afraid to laugh.", author: "Voltaire", tag: "EXISTENCE" },
    { text: "No problem can withstand the assault of sustained thinking.", author: "Voltaire", tag: "WISDOM" },
    { text: "Every man is guilty of all the good he did not do.", author: "Voltaire", tag: "WISDOM" },
    { text: "Each player must accept the cards life deals him or her: but once they are in hand, he or she alone must decide how to play the cards in order to win the game.", author: "Voltaire", tag: "EXISTENCE" },
    { text: "Appreciation is a wonderful thing. It makes what is excellent in others belong to us as well.", author: "Voltaire", tag: "WISDOM" },
    { text: "Think for yourself and let others enjoy the privilege of doing so too.", author: "Voltaire", tag: "WISDOM" },
    { text: "In this world, it is not what we take up, but what we give up, that makes us rich.", author: "Henry Ward Beecher", tag: "WISDOM" },
    { text: "One's dignity may be assaulted, vandalized and cruelly mocked, but it can never be taken away unless it is surrendered.", author: "Michael J. Fox", tag: "WISDOM" },
    { text: "I am not afraid of storms, for I am learning how to sail my ship.", author: "Louisa May Alcott", tag: "PAIN" },
    { text: "She is too fond of books, and it has turned her brain.", author: "Louisa May Alcott", tag: "WISDOM" },
    { text: "It takes two to speak the truth — one to speak and another to hear.", author: "Henry David Thoreau", tag: "WISDOM" },
    { text: "Not until we are lost do we begin to understand ourselves.", author: "Henry David Thoreau", tag: "EXISTENCE" },
    { text: "Disobedience is the true foundation of liberty.", author: "Henry David Thoreau", tag: "FREEDOM" },
    { text: "Wealth is the ability to fully experience life.", author: "Henry David Thoreau", tag: "EXISTENCE" },
    { text: "Any fool can make a rule, and any fool will mind it.", author: "Henry David Thoreau", tag: "WISDOM" },
    { text: "That man is richest whose pleasures are cheapest.", author: "Henry David Thoreau", tag: "WISDOM" },
    { text: "If you have built castles in the air, your work need not be lost; that is where they should be. Now put the foundations under them.", author: "Henry David Thoreau", tag: "HOPE" },
    { text: "There is no value in life except what you choose to place upon it.", author: "Henry David Thoreau", tag: "EXISTENCE" },
    { text: "Dreams are the touchstones of our character.", author: "Henry David Thoreau", tag: "EXISTENCE" },
    { text: "If one advances confidently in the direction of his dreams, and endeavors to live the life which he has imagined, he will meet with a success unexpected in common hours.", author: "Henry David Thoreau", tag: "EXISTENCE" },
    { text: "What is the use of a house if you haven't got a tolerable planet to put it on.", author: "Henry David Thoreau", tag: "WISDOM" },
    { text: "The universe is wider than our views of it.", author: "Henry David Thoreau", tag: "EXISTENCE" },
    { text: "I would rather sit on a pumpkin and have it all to myself than be crowded on a velvet cushion.", author: "Henry David Thoreau", tag: "WISDOM" },
    { text: "You must live in the present, launch yourself on every wave, find your eternity in each moment.", author: "Henry David Thoreau", tag: "EXISTENCE" },
    { text: "Every generation laughs at the old fashions but follows religiously the new.", author: "Henry David Thoreau", tag: "WISDOM" },
    { text: "I have learned that if one advances confidently in the direction of his dreams, and endeavors to live the life he has imagined, he will meet with unexpected success.", author: "Henry David Thoreau", tag: "EXISTENCE" },
    { text: "Pursue some path, however narrow and crooked, in which you can walk with love and reverence.", author: "Henry David Thoreau", tag: "EXISTENCE" },
    { text: "A man is rich in proportion to the number of things he can afford to let alone.", author: "Henry David Thoreau", tag: "WISDOM" },
    { text: "The language of friendship is not words but meanings.", author: "Henry David Thoreau", tag: "EXISTENCE" },
    { text: "It's not what you look at that matters, it's what you see.", author: "Henry David Thoreau", tag: "WISDOM" },
    { text: "Be not simply good; be good for something.", author: "Henry David Thoreau", tag: "WISDOM" },
    { text: "I went to the woods because I wished to live deliberately, to front only the essential facts of life.", author: "Henry David Thoreau", tag: "EXISTENCE" },
    { text: "However mean your life is, meet it and live it; do not shun it and call it hard names.", author: "Henry David Thoreau", tag: "EXISTENCE" },
    { text: "Books are the treasured wealth of the world and the fit inheritance of generations and nations.", author: "Henry David Thoreau", tag: "WISDOM" },
    { text: "Success usually comes to those who are too busy to be looking for it.", author: "Henry David Thoreau", tag: "WISDOM" },
    { text: "You will never do anything in this world without courage.", author: "Aristotle", tag: "WISDOM" },
    { text: "Wit is educated insolence.", author: "Aristotle", tag: "WISDOM" },
    { text: "The secret to humor is surprise.", author: "Aristotle", tag: "WISDOM" },
    { text: "He who has overcome his fears will truly be free.", author: "Aristotle", tag: "FREEDOM" },
    { text: "Men acquire a particular quality by constantly acting in a particular way.", author: "Aristotle", tag: "WISDOM" },
    { text: "Good habits formed at youth make all the difference.", author: "Aristotle", tag: "WISDOM" },
    { text: "Excellence is an art won by training and habituation.", author: "Aristotle", tag: "WISDOM" },
    { text: "The energy of the mind is the essence of life.", author: "Aristotle", tag: "EXISTENCE" },
    { text: "Young people are in a condition like permanent intoxication, because youth is sweet and they are growing.", author: "Aristotle", tag: "WISDOM" },
    { text: "Without friends, no one would want to live, even if he had all other goods.", author: "Aristotle", tag: "EXISTENCE" },
    { text: "Friendship is a single soul dwelling in two bodies.", author: "Aristotle", tag: "EXISTENCE" },
    { text: "To be happy is to live according to reason.", author: "Aristotle", tag: "WISDOM" },
    { text: "A friend to all is a friend to none.", author: "Aristotle", tag: "WISDOM" },
    { text: "Misfortune shows those who are not really friends.", author: "Aristotle", tag: "WISDOM" },
    { text: "For the things we have to learn before we can do them, we learn by doing them.", author: "Aristotle", tag: "WISDOM" },
    { text: "I count him braver who overcomes his desires than him who conquers his enemies.", author: "Aristotle", tag: "WISDOM" },
    { text: "The more you know, the more you realize you know nothing.", author: "Aristotle", tag: "WISDOM" },
    { text: "It is the mark of an educated mind to be able to entertain a thought without accepting it.", author: "Aristotle", tag: "WISDOM" },
    { text: "My best friend is a person who will give me a book I have not read.", author: "Abraham Lincoln", tag: "WISDOM" },
    { text: "Give me six hours to chop down a tree and I will spend the first four sharpening the axe.", author: "Abraham Lincoln", tag: "WISDOM" },
    { text: "No man has a good enough memory to be a successful liar.", author: "Abraham Lincoln", tag: "WISDOM" },
    { text: "Better to remain silent and be thought a fool than to speak out and remove all doubt.", author: "Abraham Lincoln", tag: "WISDOM" },
    { text: "You can fool all the people some of the time, and some of the people all the time, but you cannot fool all the people all the time.", author: "Abraham Lincoln", tag: "WISDOM" },
    { text: "Those who look only to the past or present are certain to miss the future.", author: "John F. Kennedy", tag: "WISDOM" },
    { text: "Forgive your enemies, but never forget their names.", author: "John F. Kennedy", tag: "WISDOM" },
    { text: "Ask not what your country can do for you; ask what you can do for your country.", author: "John F. Kennedy", tag: "EXISTENCE" },
    { text: "The time to repair the roof is when the sun is shining.", author: "John F. Kennedy", tag: "WISDOM" },
    { text: "Change is the law of life. And those who look only to the past or present are certain to miss the future.", author: "John F. Kennedy", tag: "WISDOM" },
    { text: "Efforts and courage are not enough without purpose and direction.", author: "John F. Kennedy", tag: "WISDOM" },
    { text: "Do not pray for easy lives. Pray to be stronger men.", author: "John F. Kennedy", tag: "PAIN" },
    { text: "A man may die, nations may rise and fall, but an idea lives on.", author: "John F. Kennedy", tag: "EXISTENCE" },
  ],
  tr: [
    { text: "Engel, yoldur.", author: "Marcus Aurelius", tag: "STOİZM" },
    { text: "Yaşamak için bir nedeni olan neredeyse her şeye katlanabilir.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Hayal gücümüzde gerçekten daha çok acı çekeriz.", author: "Seneca", tag: "TRAJEDY" },
    { text: "Yaşamak acı çekmektir; hayatta kalmak bu acıda anlam bulmaktır.", author: "Friedrich Nietzsche", tag: "ACI" },
    { text: "Ölüm bizim için hiçbir şeydir; var olduğumuzda ölüm yoktur; ölüm olduğunda biz artık yokuz.", author: "Epicurus", tag: "VAROLUŞ" },
    { text: "Özgür olmayan bir dünyayla başa çıkmanın tek yolu, varlığının bir isyan eylemi olacağı kadar özgür olmaktır.", author: "Albert Camus", tag: "ÖZGÜRLÜK" },
    { text: "Kışın derinliğinde nihayet içimde yenilmez bir yaz olduğunu öğrendim.", author: "Albert Camus", tag: "ACI" },
    { text: "İnsan özgür olmaya mahkûmdur.", author: "Jean-Paul Sartre", tag: "VAROLUŞ" },
    { text: "Müzik olmadan yaşam bir hata olurdu.", author: "Friedrich Nietzsche", tag: "YAŞAM" },
    { text: "Hepimiz yalnız doğduk, yalnız ölüyoruz.", author: "Hunter S. Thompson", tag: "YALNIZLIK" },
    { text: "En cesur eylem hâlâ kendi başına düşünmektir.", author: "Coco Chanel", tag: "VAROLUŞ" },
    { text: "Gölgeyi kavrarken özü kaybetmemeye dikkat et.", author: "Aesop", tag: "BİLGELİK" },
    { text: "Olmak eylemektir.", author: "Sokrates", tag: "VAROLUŞ" },
    { text: "Düşünüyorum, öyleyse varım.", author: "René Descartes", tag: "VAROLUŞ" },
    { text: "Cehennem, başkalarıdır.", author: "Jean-Paul Sartre", tag: "TRAJEDY" },
    { text: "Tanrı öldü. Tanrı ölü kalmaya devam ediyor. Ve onu biz öldürdük.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Sorgulanmayan bir hayat yaşanmaya değmez.", author: "Sokrates", tag: "VAROLUŞ" },
    { text: "Sisyphos'u mutlu hayal etmek gerekir.", author: "Albert Camus", tag: "TRAJEDY" },
    { text: "Her şey kazanıldığı anda kaybolur.", author: "Arthur Schopenhauer", tag: "TRAJEDY" },
    { text: "Hayat, hiç gerçekleşmeyen bir şeyin uzun bir hazırlığıdır.", author: "W.B. Yeats", tag: "TRAJEDY" },
    { text: "Yara, ışığın içine girdiği yerdir.", author: "Rumi", tag: "ACI" },
    { text: "Acı kaçınılmazdır. Acı çekmek isteğe bağlıdır.", author: "Haruki Murakami", tag: "ACI" },
    { text: "Hiçbir büyük zihin bir parça delilik olmadan var olmamıştır.", author: "Aristoteles", tag: "VAROLUŞ" },
    { text: "Ne kadar çok öğrenirsem, ne kadar az bildiğimi o kadar çok fark ediyorum.", author: "Albert Einstein", tag: "BİLGELİK" },
    { text: "Kendini bil.", author: "Sokrates", tag: "BİLGELİK" },
    { text: "Beni yok etmeyen şey beni güçlendirir.", author: "Friedrich Nietzsche", tag: "ACI" },
    { text: "Ölüm korkusu hayat korkusundan gelir.", author: "Mark Twain", tag: "TRAJEDY" },
    { text: "Sevmek, savunmasız olmaktır.", author: "C.S. Lewis", tag: "ACI" },
    { text: "Yalnızlık benliğin yoksulluğudur; yalnız olmak benliğin zenginliğidir.", author: "May Sarton", tag: "YALNIZLIK" },
    { text: "Hayat acıdır.", author: "Gautama Buddha", tag: "ACI" },
    { text: "Amor fati — kaderini sev.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Tamamen yaşamak acı içinde olmaktır.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "İnsan, yaşamaya cesaretlendirilmesi gereken tek hayvandır.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "İnsanın korkması gereken ölüm değil, hiç yaşamamaktır.", author: "Marcus Aurelius", tag: "VAROLUŞ" },
    { text: "Hayatın trajedisi çok çabuk bitmesi değil, başlamak için çok uzun beklememizdir.", author: "W.M. Lewis", tag: "TRAJEDY" },
    { text: "Işık vermek için yanmayı göze almak gerekir.", author: "Viktor Frankl", tag: "ACI" },
    { text: "En karanlık gece bile sona erecek ve güneş doğacak.", author: "Victor Hugo", tag: "UMUT" },
    { text: "Gerçekten ciddi olan tek felsefi sorun intihar meselesidir.", author: "Albert Camus", tag: "TRAJEDY" },
    { text: "Saçma olan, insanın ihtiyacı ile dünyanın mantıksız sessizliği arasındaki çatışmadan doğar.", author: "Albert Camus", tag: "VAROLUŞ" },
    { text: "Hayat geriye doğru anlaşılmalı ama ileriye doğru yaşanmalıdır.", author: "Søren Kierkegaard", tag: "VAROLUŞ" },
    { text: "Kaygı, özgürlüğün baş dönmesidir.", author: "Søren Kierkegaard", tag: "VAROLUŞ" },
    { text: "En yaygın yoksulluk biçimi yalnızlıktır.", author: "Teresa Ana", tag: "YALNIZLIK" },
    { text: "Hayat nerede varsa, acı da oradadır.", author: "Arthur Schopenhauer", tag: "ACI" },
    { text: "Her şey boşluk ve ruhun sıkıntısıdır.", author: "Kral Süleyman", tag: "TRAJEDY" },
    { text: "Yapmadığınız şeyden de siz sorumlusunuz.", author: "Jean-Paul Sartre", tag: "VAROLUŞ" },
    { text: "Gerçeklik bir yanılsamadır; ama çok ısrarcı bir yanılsamadır.", author: "Albert Einstein", tag: "VAROLUŞ" },
    { text: "Her insan iki kez ölür; nefes almayı bıraktığında ve biri adını son kez söylediğinde.", author: "Banksy", tag: "TRAJEDY" },
    { text: "Hayatın amacı mutlu olmak değildir. Faydalı, onurlu ve şefkatli olmaktır.", author: "Ralph Waldo Emerson", tag: "VAROLUŞ" },
    { text: "Hayat yakın çekimde bir trajedi, uzak çekimde bir komedidir.", author: "Charlie Chaplin", tag: "TRAJEDY" },
    { text: "Yıldızlar karanlık olmadan parıldayamaz.", author: "D.H. Sidebottom", tag: "ACI" },
    { text: "Şimdiki an her zaman var olmuş olacak.", author: "Epiktetos", tag: "VAROLUŞ" },
    { text: "Memento mori — öleceğini unutma.", author: "Stoacı Gelenek", tag: "VAROLUŞ" },
    { text: "Biz ruhsal bir deneyim yaşayan insanlar değil, insan deneyimi yaşayan ruhsal varlıklarız.", author: "Pierre Teilhard de Chardin", tag: "VAROLUŞ" },
    { text: "Diz çökerek yaşamaktansa ayakta ölmeyi tercih ederim.", author: "Emiliano Zapata", tag: "VAROLUŞ" },
    { text: "Zirvelere doğru süren mücadelenin kendisi bir insanın kalbini doldurmaya yeter.", author: "Albert Camus", tag: "VAROLUŞ" },
    { text: "Varoluş özden önce gelir.", author: "Jean-Paul Sartre", tag: "VAROLUŞ" },
    { text: "En ağır yük, yaşanmamış bir hayattır.", author: "C.G. Jung", tag: "TRAJEDY" },
    { text: "Dolaşanların hepsi kaybolmuş değildir.", author: "J.R.R. Tolkien", tag: "VAROLUŞ" },
    { text: "Gölge olmadan güneş olmaz; geceyi bilmek zorunludur.", author: "Albert Camus", tag: "TRAJEDY" },
    { text: "Güçlü olmak tek seçeneğin olana kadar ne kadar güçlü olduğunu bilemezsin.", author: "Bob Marley", tag: "ACI" },
    { text: "Zorluğun ortasında fırsat yatar.", author: "Albert Einstein", tag: "ACI" },
    { text: "Yaşamak dünyanın en nadir şeyidir. Çoğu insan yalnızca var olur, o kadar.", author: "Oscar Wilde", tag: "VAROLUŞ" },
    { text: "Hepimiz kırıkız. Işık böyle içeri girer.", author: "Ernest Hemingway", tag: "ACI" },
    { text: "Ben başıma gelenlerin değil, olmayı seçtiklerimin ürünüyüm.", author: "C.G. Jung", tag: "VAROLUŞ" },
    { text: "En güçlü ruhlar acıdan doğar; en büyük karakterler yaralarla işlenmiştir.", author: "Khalil Gibran", tag: "ACI" },
    { text: "Önemli olan hayatınızdaki yıllar değil, yıllarınızdaki hayattır.", author: "Abraham Lincoln", tag: "VAROLUŞ" },
    { text: "Evren kendini deneyimliyor; biz o deneyimiz.", author: "Alan Watts", tag: "VAROLUŞ" },
    { text: "Acı çekmek bir ceza değil, bir arınmadır.", author: "Paramahansa Yogananda", tag: "ACI" },
    { text: "Bilinçdışını bilinçli hâle getirmezsen, hayatına yön verir ve buna kader dersin.", author: "C.G. Jung", tag: "BİLGELİK" },
    { text: "Varlığın merkezinde cevabı bulursun.", author: "Lao Tzu", tag: "BİLGELİK" },
    { text: "Bilgelik hayranlıkla başlar.", author: "Sokrates", tag: "BİLGELİK" },
    { text: "Gerçek nadiren saf ve hiçbir zaman basit değildir.", author: "Oscar Wilde", tag: "BİLGELİK" },
    { text: "Yalnızca ölüler savaşın sonunu gördü.", author: "Platon", tag: "TRAJEDY" },
    { text: "İnsan en çok korktuğu ama hiç gelmeyecek acıdan acı çeker.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "İyi ol; karşılaştığın herkes zor bir savaş veriyor.", author: "Platon", tag: "ACI" },
    { text: "Bilinç bir hastalıktır.", author: "Miguel de Unamuno", tag: "TRAJEDY" },
    { text: "Umitsizliğin en yaygın biçimi kim olduğunu bilmemektir.", author: "Søren Kierkegaard", tag: "VAROLUŞ" },
    { text: "Büyüyüm, içimde çokluklar barındırıyorum.", author: "Walt Whitman", tag: "VAROLUŞ" },
    { text: "Gerçeklik, ona inanmayı bıraktığında bile ortadan kalkmayan şeydir.", author: "Philip K. Dick", tag: "VAROLUŞ" },
    { text: "Canavarlarla savaşan, canavar olmamaya dikkat etmelidir.", author: "Friedrich Nietzsche", tag: "BİLGELİK" },
    { text: "Tanrı'nın dili sessizliktir; geri kalan her şey kötü bir tercümedir.", author: "Rumi", tag: "VAROLUŞ" },
    { text: "Hayatın fiyatı, onun için verdiğin yaşam miktarıdır.", author: "Henry David Thoreau", tag: "VAROLUŞ" },
    { text: "Kitleler sessiz bir çaresizlik içinde yaşar.", author: "Henry David Thoreau", tag: "TRAJEDY" },
    { text: "Ormana gittim; çünkü kasıtlı yaşamayı istiyordum.", author: "Henry David Thoreau", tag: "VAROLUŞ" },
    { text: "Derin bir nefes aldım ve kalbimin eski övüncüne kulak verdim: Varım, varım, varım.", author: "Sylvia Plath", tag: "VAROLUŞ" },
    { text: "Ölmek bir sanattır. Her şey gibi, bunu da olağanüstü yaparım.", author: "Sylvia Plath", tag: "TRAJEDY" },
    { text: "Fırtınalardan korkmuyorum; çünkü gemimi nasıl kullanacağımı öğreniyorum.", author: "Louisa May Alcott", tag: "ACI" },
    { text: "Mutluluğun tek bir yolu var: kontrolümüz dışındaki şeyler için endişelenmeyi bırakmak.", author: "Epiktetos", tag: "BİLGELİK" },
    { text: "Felsefeni açıklama. Yaşa onu.", author: "Epiktetos", tag: "BİLGELİK" },
    { text: "Zenginlik büyük mülklere sahip olmak değil, çok az istekte bulunmaktır.", author: "Epiktetos", tag: "BİLGELİK" },
    { text: "Elindeki en iyi şekilde kullan; gerisini olduğu gibi kabul et.", author: "Epiktetos", tag: "BİLGELİK" },
    { text: "Önce kendine ne olmak istediğini söyle; sonra gerekeni yap.", author: "Epiktetos", tag: "BİLGELİK" },
    { text: "Sahip olmadığı şeyler için üzülen değil, sahip olduklarından sevinç duyan bilge insandır.", author: "Epiktetos", tag: "BİLGELİK" },
    { text: "İyi ya da kötü diye bir şey yoktur; düşünce onu öyle yapar.", author: "William Shakespeare", tag: "BİLGELİK" },
    { text: "Ne olduğumuzu biliyoruz ama ne olabileceğimizi bilmiyoruz.", author: "William Shakespeare", tag: "VAROLUŞ" },
    { text: "Korkaklar gerçek ölümden önce defalarca ölür; yiğitler ölümü yalnızca bir kez tadar.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Tüm dünya bir sahnedir; erkekler ve kadınlar sadece oyunculardır.", author: "William Shakespeare", tag: "VAROLUŞ" },
    { text: "Suç, sevgili Brutus, yıldızlarımızda değil, bizde yatar.", author: "William Shakespeare", tag: "VAROLUŞ" },
    { text: "Hayat yürüyen bir gölgeden ibarettir; sahnede saatini geçirir ve sonra duyulmaz olur.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Cehennem boş; tüm şeytanlar burada.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Olmak ya da olmamak — işte bütün mesele bu.", author: "William Shakespeare", tag: "VAROLUŞ" },
    { text: "Yarın, ve yarın, ve yarın; küçük adımlarla günden güne sürünüp gider.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Herkesi sev, birkaç kişiye güven, kimseye kötülük etme.", author: "William Shakespeare", tag: "BİLGELİK" },
    { text: "Değişmeyen tek şey değişimin kendisidir.", author: "Heraklitos", tag: "VAROLUŞ" },
    { text: "Aynı nehre iki kez giremezsin.", author: "Heraklitos", tag: "VAROLUŞ" },
    { text: "Karakter kaderdir.", author: "Heraklitos", tag: "VAROLUŞ" },
    { text: "Savaş her şeyin babasıdır.", author: "Heraklitos", tag: "TRAJEDY" },
    { text: "Yukarı çıkış ve aşağı iniş aynı yoldur.", author: "Heraklitos", tag: "VAROLUŞ" },
    { text: "Eğitim bir kap doldurmak değil, ateş yakmaktır.", author: "Sokrates", tag: "BİLGELİK" },
    { text: "Tek bildiğim hiçbir şey bilmediğimdir.", author: "Sokrates", tag: "BİLGELİK" },
    { text: "Değişimin sırrı, eskiyle savaşmak değil, yeni inşa etmek için tüm enerjini kullanmaktır.", author: "Sokrates", tag: "BİLGELİK" },
    { text: "Kendini bulmak için kendi başına düşün.", author: "Sokrates", tag: "BİLGELİK" },
    { text: "Güçlü zihinler fikirleri tartışır; ortalama zihinler olayları; zayıf zihinler insanları.", author: "Sokrates", tag: "BİLGELİK" },
    { text: "Kendi kendini fetheden, bin kez bin kişiyi fetheden birisinden daha büyüktür.", author: "Gautama Buddha", tag: "BİLGELİK" },
    { text: "Öfkeyi tutmak, başkasına fırlatmak niyetiyle sıcak kömür tutmaktır; yanan sensin.", author: "Gautama Buddha", tag: "BİLGELİK" },
    { text: "Geçmişte yaşama, geleceği hayal etme; zihni şimdiki ana yoğunlaştır.", author: "Gautama Buddha", tag: "BİLGELİK" },
    { text: "Hayal gücü bilgiden daha önemlidir.", author: "Albert Einstein", tag: "BİLGELİK" },
    { text: "İki şey sonsuzdur: evren ve insan aptallığı. Evren konusunda emin değilim.", author: "Albert Einstein", tag: "TRAJEDY" },
    { text: "Zekânın ölçüsü değişebilme kapasitesidir.", author: "Albert Einstein", tag: "BİLGELİK" },
    { text: "Tehlikeli olmayan bir fikir, fikir olarak anılmaya değmez.", author: "Oscar Wilde", tag: "BİLGELİK" },
    { text: "Her şeye karşı koyabilirim, ayartma dışında.", author: "Oscar Wilde", tag: "BİLGELİK" },
    { text: "Hepimiz çukurdayız ama bazılarımız yıldızlara bakıyor.", author: "Oscar Wilde", tag: "TRAJEDY" },
    { text: "Düşmanlarını her zaman affet; hiçbir şey onları bu kadar sinir etmez.", author: "Oscar Wilde", tag: "BİLGELİK" },
    { text: "Kendin ol; diğer herkes zaten alınmış.", author: "Oscar Wilde", tag: "VAROLUŞ" },
    { text: "Hayatta yalnızca iki trajedi vardır: biri istediğini elde edememek, diğeri onu elde etmek.", author: "Oscar Wilde", tag: "TRAJEDY" },
    { text: "Deneyim, hatalarımıza verdiğimiz isimden ibarettir.", author: "Oscar Wilde", tag: "BİLGELİK" },
    { text: "Her azizin bir geçmişi, her günahkârın bir geleceği vardır.", author: "Oscar Wilde", tag: "VAROLUŞ" },
    { text: "Acı çekmek çok uzun bir andır. Onu mevsimlere bölemeyiz.", author: "Oscar Wilde", tag: "ACI" },
    { text: "İnsanlara gerçeği söylemek istiyorsan, onları güldür; yoksa seni öldürürler.", author: "Oscar Wilde", tag: "BİLGELİK" },
    { text: "Karanlık karanlığı kovamaz; bunu yalnızca ışık yapabilir.", author: "Martin Luther King Jr.", tag: "ACI" },
    { text: "Önemli şeyler hakkında sessiz kaldığımız gün hayatımız sona ermek başlar.", author: "Martin Luther King Jr.", tag: "TRAJEDY" },
    { text: "Uçamıyorsan koş, koşamıyorsan yürü, yürüyemiyorsan sürün ama ilerlemeye devam et.", author: "Martin Luther King Jr.", tag: "ACI" },
    { text: "Sınırlı hayal kırıklığını kabul etmeliyiz ama sonsuz umudu asla yitirmemeliyiz.", author: "Martin Luther King Jr.", tag: "UMUT" },
    { text: "Düşmanlarımızın sözlerini değil, dostlarımızın sessizliğini hatırlayacağız.", author: "Martin Luther King Jr.", tag: "TRAJEDY" },
    { text: "Göze göz dünyayı kör eder.", author: "Mahatma Gandhi", tag: "BİLGELİK" },
    { text: "Dünyada görmek istediğin değişim ol.", author: "Mahatma Gandhi", tag: "VAROLUŞ" },
    { text: "Önce seni görmezden gelirler, sonra gülerler, sonra seninle savaşırlar — sonra sen kazanırsın.", author: "Mahatma Gandhi", tag: "VAROLUŞ" },
    { text: "Zayıf hiçbir zaman affetmez. Affetmek güçlünün özelliğidir.", author: "Mahatma Gandhi", tag: "BİLGELİK" },
    { text: "Yarın ölecekmiş gibi yaşa. Sonsuza kadar yaşayacakmış gibi öğren.", author: "Mahatma Gandhi", tag: "VAROLUŞ" },
    { text: "İnsan düşüncelerinin ürünüdür. Ne düşünürse o olur.", author: "Mahatma Gandhi", tag: "VAROLUŞ" },
    { text: "Kendinizi bulmanın en iyi yolu başkalarına hizmette kaybolmaktır.", author: "Mahatma Gandhi", tag: "BİLGELİK" },
    { text: "Geleceğe ait, rüyalarının güzelliğine inananlarındır.", author: "Eleanor Roosevelt", tag: "VAROLUŞ" },
    { text: "Rızanız olmadan kimse sizi aşağı hissettiremez.", author: "Eleanor Roosevelt", tag: "BİLGELİK" },
    { text: "Her gün seni korkutan bir şey yap.", author: "Eleanor Roosevelt", tag: "VAROLUŞ" },
    { text: "Her şeyde güzellik var ama herkes onu göremez.", author: "Konfüçyüs", tag: "BİLGELİK" },
    { text: "Durmadığın sürece ne kadar yavaş gittiğin önemli değildir.", author: "Konfüçyüs", tag: "BİLGELİK" },
    { text: "En büyük zaferimiz hiç düşmemekte değil, her düştüğümüzde ayağa kalkmaktadır.", author: "Konfüçyüs", tag: "ACI" },
    { text: "Gerçek bilgi, bilginin sınırlarını bilmektir.", author: "Konfüçyüs", tag: "BİLGELİK" },
    { text: "Öğrenen ama düşünmeyen kaybolur. Düşünen ama öğrenmeyen büyük tehlikededir.", author: "Konfüçyüs", tag: "BİLGELİK" },
    { text: "İntikam yolculuğuna çıkmadan önce iki mezar kaz.", author: "Konfüçyüs", tag: "BİLGELİK" },
    { text: "Hayat aslında basittir; ama biz onu karmaşık yapmakta ısrarcıyız.", author: "Konfüçyüs", tag: "BİLGELİK" },
    { text: "Sevdiğin bir iş seç; hayatında tek bir gün bile çalışmak zorunda kalmazsın.", author: "Konfüçyüs", tag: "VAROLUŞ" },
    { text: "Öfke yükseldiğinde, sonuçlarını düşün.", author: "Konfüçyüs", tag: "BİLGELİK" },
    { text: "Kader diye bir şey yoktur; yalnızca varlık ve var olmanın içinden geçmek için verilen mücadele vardır.", author: "Albert Camus", tag: "VAROLUŞ" },
    { text: "İnsanın tüm mutsuzluğu odada sessizce oturamamasından kaynaklanır.", author: "Blaise Pascal", tag: "TRAJEDY" },
    { text: "Kalbin kendi aklı vardır; akıl bilmez.", author: "Blaise Pascal", tag: "VAROLUŞ" },
    { text: "Sessizlik bazen en iyi cevaptır.", author: "XIV. Dalai Lama", tag: "BİLGELİK" },
    { text: "Hayatımızın amacı mutlu olmaktır.", author: "XIV. Dalai Lama", tag: "VAROLUŞ" },
    { text: "Benim dinim çok basit. Benim dinim nezakettir.", author: "XIV. Dalai Lama", tag: "BİLGELİK" },
    { text: "Mümkün olduğunda nazik ol. Her zaman mümkündür.", author: "XIV. Dalai Lama", tag: "BİLGELİK" },
    { text: "Hayat, istek ile hayal kırıklığı arasında süregelen bir sarkaçtır.", author: "Arthur Schopenhauer", tag: "TRAJEDY" },
    { text: "İnsanın en büyük hatası, mutsuzluğun nedenini dışarıda aramasıdır.", author: "Arthur Schopenhauer", tag: "BİLGELİK" },
    { text: "Acı, ruhun keşfedilmemiş bölgelerine açılan bir kapıdır.", author: "Kahil Gibran", tag: "ACI" },
    { text: "Sevinç ve hüzün aynı kaynaktan akar; biri diğeri olmadan mümkün değildir.", author: "Kahil Gibran", tag: "ACI" },
    { text: "Çalışmak sevginin görünür kılınmasıdır.", author: "Kahil Gibran", tag: "VAROLUŞ" },
    { text: "İnsanlığı sevmek kolaydır; insanları sevmek zordur.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Güzellik dünyayı kurtaracak.", author: "Fyodor Dostoyevski", tag: "UMUT" },
    { text: "Eğer Tanrı yoksa, her şey mubah.", author: "Fyodor Dostoyevski", tag: "VAROLUŞ" },
    { text: "Acıyı seven ve acıyla büyüyen biri; sonunda mutlu olur.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Evren sana cevap vermiyorsa, sen henüz doğru soruyu sormamışsındır.", author: "Alan Watts", tag: "BİLGELİK" },
    { text: "Sen evrenin ta kendisisin; kendinin farkındaki bir varlık.", author: "Alan Watts", tag: "VAROLUŞ" },
    { text: "Gerçeği aramak bir amaç olabilir; onu bulmak ise tehlikeli.", author: "Friedrich Nietzsche", tag: "BİLGELİK" },
    { text: "Tanrısız bir dünyada anlam bulmak, işte asıl kahramanlık budur.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Kendi içindeki kaosu taşıyabilirsen, dans eden bir yıldız doğurabilirsin.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Bize yıkım gibi görünen şey, aslında yenilenmenin ta kendisidir.", author: "Rumi", tag: "ACI" },
    { text: "Aradığın şey sende zaten var. Susup dinle.", author: "Rumi", tag: "BİLGELİK" },
    { text: "Bir ağacın kökü ne kadar derinse, fırtınalara o kadar dayanır.", author: "Rumi", tag: "ACI" },
    { text: "Başkalarını bilmek bilgeliktir; kendini bilmek aydınlanmadır.", author: "Lao Tzu", tag: "BİLGELİK" },
    { text: "Başkalarını fethetmek güçtür; kendini fethetmek gerçek güçtür.", author: "Lao Tzu", tag: "BİLGELİK" },
    { text: "Su gibi ol: yumuşak ama taşı bile delen.", author: "Lao Tzu", tag: "BİLGELİK" },
    { text: "En uzun yolculuk, içe doğru olandır.", author: "Dag Hammarskjöld", tag: "VAROLUŞ" },
    { text: "Kaderimizin çerçevesini seçme hakkımız yoktur. Ama içine ne koyacağımız bizim elimizdedir.", author: "Dag Hammarskjöld", tag: "VAROLUŞ" },
    { text: "Ölüm ışığı söndürmek değildir; şafak sökerken lambayı kapatmaktır.", author: "Rabindranath Tagore", tag: "TRAJEDY" },
    { text: "Yalnızca suya bakıp durarak denizi geçemezsin.", author: "Rabindranath Tagore", tag: "VAROLUŞ" },
    { text: "Kelebek ayları değil anları sayar; ve zamanı yeterlidir.", author: "Rabindranath Tagore", tag: "VAROLUŞ" },
    { text: "Uyudum ve rüyamda hayatın sevinç olduğunu gördüm. Uyandım ve hayatın hizmet olduğunu gördüm. Harekete geçtim ve işte, hizmet sevinçmiş.", author: "Rabindranath Tagore", tag: "VAROLUŞ" },
    { text: "Güneş hayatından çekildiyse ağlama; gözyaşların yıldızları görmeni engeller.", author: "Rabindranath Tagore", tag: "ACI" },
    { text: "İnanç, şafak henüz karanlıkken ışığı hisseden kuştur.", author: "Rabindranath Tagore", tag: "UMUT" },
    { text: "Asla geç değildir — olmak istediğin kişi olmak için.", author: "George Eliot", tag: "VAROLUŞ" },
    { text: "Varoluş özden önce gelir.", author: "Jean-Paul Sartre", tag: "VAROLUŞ" },
    { text: "Beni yok etmeyen şey beni güçlendirir.", author: "Friedrich Nietzsche", tag: "ACI" },
    { text: "Bilinç bir hastalıktır.", author: "Miguel de Unamuno", tag: "TRAJEDY" },
    { text: "Büyüyüm, içimde çokluklar barındırıyorum.", author: "Walt Whitman", tag: "VAROLUŞ" },
    { text: "Canavarlarla savaşan, canavar olmamaya dikkat etmelidir.", author: "Friedrich Nietzsche", tag: "BİLGELİK" },
    { text: "Uyarı olmadan stimulus ile tepki arasında bir boşluk vardır. O boşlukta seçme gücümüz yatar.", author: "Viktor Frankl", tag: "VAROLUŞ" },
    { text: "Hareket etmeyenler zincirlerini fark etmez.", author: "Rosa Luxemburg", tag: "VAROLUŞ" },
    { text: "Ne kadar sessiz olursanız, o kadar çok duyabilirsiniz.", author: "Rumi", tag: "BİLGELİK" },
    { text: "Dün zekiydim, dünyayı değiştirmek istedim. Bugün bilgeyim, kendimi değiştiriyorum.", author: "Rumi", tag: "BİLGELİK" },
    { text: "Hata ve doğru fikrinin ötesinde bir alan var. Orada buluşacağız.", author: "Rumi", tag: "VAROLUŞ" },
    { text: "Bilmenin sanatı neyi görmezden geleceğini bilmektir.", author: "Rumi", tag: "BİLGELİK" },
    { text: "Her şey evrenin içinde; her şeyi kendinden iste.", author: "Rumi", tag: "VAROLUŞ" },
    { text: "Harabenin olduğu yerde bir hazine umudu vardır.", author: "Rumi", tag: "ACI" },
    { text: "Güzelliği gören ruh bazen yalnız yürür.", author: "Johann Wolfgang von Goethe", tag: "YALNIZLIK" },
    { text: "Bilmek yeterli değildir; uygulamalıyız. İstemek yeterli değildir; yapmalıyız.", author: "Johann Wolfgang von Goethe", tag: "VAROLUŞ" },
    { text: "Hiç kimse özgür olduğunu yanlışlıkla düşünenler kadar ümitsiz bir kölelik içinde değildir.", author: "Johann Wolfgang von Goethe", tag: "TRAJEDY" },
    { text: "En zor görülen şey gözünüzün önündekidir.", author: "Johann Wolfgang von Goethe", tag: "BİLGELİK" },
    { text: "Bir insana olduğu gibi davranırsanız, o da öyle kalır. Olması gerektiği gibi davranırsanız, olması gereken olur.", author: "Johann Wolfgang von Goethe", tag: "VAROLUŞ" },
    { text: "İnsan kalbinde taşıdığını dünyada görür.", author: "Johann Wolfgang von Goethe", tag: "VAROLUŞ" },
    { text: "Düşüncelerimizle şekilleniriz; ne düşünürsek o oluruz.", author: "Gautama Buddha", tag: "VAROLUŞ" },
    { text: "Üç şey uzun süre gizli kalamaz: Güneş, ay ve gerçek.", author: "Gautama Buddha", tag: "BİLGELİK" },
    { text: "Zihin her şeydir. Ne düşünürsek o oluruz.", author: "Gautama Buddha", tag: "VAROLUŞ" },
    { text: "Geçmişte yaşama, geleceği hayal etme; zihni şimdiki ana odakla.", author: "Gautama Buddha", tag: "VAROLUŞ" },
    { text: "Öfkeyi tutmak, zehir içip karşı tarafın ölmesini beklemek gibidir.", author: "Gautama Buddha", tag: "BİLGELİK" },
    { text: "Mutluluğa giden bir yol yoktur; mutluluk yolun kendisidir.", author: "Gautama Buddha", tag: "VAROLUŞ" },
    { text: "İyi varmaktan iyi yolculuk etmek daha iyidir.", author: "Gautama Buddha", tag: "VAROLUŞ" },
    { text: "Barış içeridedir. Onu dışarıda arama.", author: "Gautama Buddha", tag: "BİLGELİK" },
    { text: "Sevgiyle durmaya karar verdim. Nefret, taşınacak çok ağır bir yüktür.", author: "Martin Luther King Jr.", tag: "VAROLUŞ" },
    { text: "Karanlık karanlığı kovamaz; bunu sadece ışık yapabilir.", author: "Martin Luther King Jr.", tag: "ACI" },
    { text: "İman, tüm merdiveni göremeden ilk adımı atmaktır.", author: "Martin Luther King Jr.", tag: "VAROLUŞ" },
    { text: "Önemli şeyler hakkında sessiz kaldığımız gün hayatlarımız sona ermeye başlar.", author: "Martin Luther King Jr.", tag: "TRAJEDY" },
    { text: "Doğruyu yapmak için her zaman doğru zaman vardır.", author: "Martin Luther King Jr.", tag: "BİLGELİK" },
    { text: "Uçamıyorsan koş, koşamıyorsan yürü, yürüyemiyorsan sür, ama ne yaparsan yap ilerlemeye devam et.", author: "Martin Luther King Jr.", tag: "ACI" },
    { text: "Sonlu hayal kırıklıklarını kabul etmeliyiz ama sonsuz umudu asla kaybetmemeliyiz.", author: "Martin Luther King Jr.", tag: "UMUT" },
    { text: "Hayatın en kalıcı ve acil sorusu: Başkaları için ne yapıyorsunuz?", author: "Martin Luther King Jr.", tag: "VAROLUŞ" },
    { text: "Hayatta önemli olan uzunluğu değil, kalitesidir.", author: "Martin Luther King Jr.", tag: "VAROLUŞ" },
    { text: "Kardeş olarak birlikte yaşamayı öğrenmeli ya da aptal olarak birlikte yok olmayız.", author: "Martin Luther King Jr.", tag: "TRAJEDY" },
    { text: "İnsanı en çok korkutan cahilliğin eyleme dönüşmesidir.", author: "Johann Wolfgang von Goethe", tag: "BİLGELİK" },
    { text: "Yoksul olan az sahip olan değil; daha fazlasını arzulayandır.", author: "Seneca", tag: "BİLGELİK" },
    { text: "Şans, hazırlığın fırsatla buluştuğunda olanıdır.", author: "Seneca", tag: "BİLGELİK" },
    { text: "Hemen yaşamaya başla ve her günü ayrı bir hayat olarak say.", author: "Seneca", tag: "VAROLUŞ" },
    { text: "Hiç kimse tesadüfen bilge olmadı.", author: "Seneca", tag: "BİLGELİK" },
    { text: "Bu kadar zeki değilim. Sadece sorularla çok daha uzun süre kalıyorum.", author: "Albert Einstein", tag: "BİLGELİK" },
    { text: "Hayal gücü bilgiden daha önemlidir.", author: "Albert Einstein", tag: "VAROLUŞ" },
    { text: "Mantık sizi A'dan B'ye götürür. Hayal gücü ise her yere.", author: "Albert Einstein", tag: "VAROLUŞ" },
    { text: "Hiç hata yapmayan, hiç yeni bir şey denemeyen kişidir.", author: "Albert Einstein", tag: "VAROLUŞ" },
    { text: "Zekanın ölçüsü değişebilme yeteneğidir.", author: "Albert Einstein", tag: "BİLGELİK" },
    { text: "Başarılı bir insan olmaya değil, değerli bir insan olmaya çalış.", author: "Albert Einstein", tag: "VAROLUŞ" },
    { text: "İki şey sonsuzdur: evren ve insan aptallığı; ve evren konusunda emin değilim.", author: "Albert Einstein", tag: "TRAJEDY" },
    { text: "Sorunları onları yaratan düşünce biçimiyle çözemeyiz.", author: "Albert Einstein", tag: "BİLGELİK" },
    { text: "Mutlu bir hayat istiyorsan onu bir hedefe bağla, insanlara ya da eşyalara değil.", author: "Albert Einstein", tag: "VAROLUŞ" },
    { text: "İnsan, hayvan ile Üstün İnsan arasına gerilmiş bir ip; uçurum üzerinde bir iptir.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Ne kadar yükseğe uçarsak, uçamayanların gözünde o kadar küçük görünürüz.", author: "Friedrich Nietzsche", tag: "YALNIZLIK" },
    { text: "Bireylerde delilik nadirdir; ama gruplarda, partilerde, uluslarda ve dönemlerde kuraldır.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "Gerçekler yoktur, yalnızca yorumlar vardır.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Derini değiştiremeyip kalmak zorunda olan yılan ölmek zorundadır.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "İnançlar gerçeğin yalanlardan daha tehlikeli düşmanlarıdır.", author: "Friedrich Nietzsche", tag: "BİLGELİK" },
    { text: "Amacını unutmak en yaygın aptallık biçimidir.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "Tehlikeli yaşa; varoluştan en fazla meyveyi bu şekilde alırsın.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Sevgiden yapılan her şey her zaman iyinin ve kötünün ötesinde gerçekleşir.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Her derin düşünür anlaşılmaktan, anlaşılamamaktan daha çok korkar.", author: "Friedrich Nietzsche", tag: "YALNIZLIK" },
    { text: "Tüm gerçekten büyük düşünceler yürürken tasarlanır.", author: "Friedrich Nietzsche", tag: "BİLGELİK" },
    { text: "En az bir kez dans etmediğimiz her günü kaybolmuş saymalıyız.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Umut gerçekte tüm kötülüklerin en kötüsüdür; çünkü insanın acısını uzatır.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "İçinde kaos taşımalısın ki dans eden bir yıldız doğurabilsin.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "İnsanın güce karşı mücadelesi, hafızanın unutmaya karşı mücadelesidir.", author: "Milan Kundera", tag: "TRAJEDY" },
    { text: "Utancın temeli kişisel bir başarısızlık değil, ezilmenin utanç verici yenilgisidir.", author: "Milan Kundera", tag: "ACI" },
    { text: "İnsan zamanı daire çizmez; düz bir çizgide ilerler.", author: "Milan Kundera", tag: "VAROLUŞ" },
    { text: "Mutluluk tekrarın özlemidir.", author: "Milan Kundera", tag: "VAROLUŞ" },
    { text: "İyimserlik halkın afyonudur.", author: "Milan Kundera", tag: "TRAJEDY" },
    { text: "Üzüntü, tutkuyla sevenler için bir mutluluk biçimidir.", author: "Milan Kundera", tag: "ACI" },
    { text: "Işığın derecesi karanlığın derecesiyle ters orantılıdır.", author: "Hermann Hesse", tag: "ACI" },
    { text: "Bazılarımız tutunmanın bizi güçlü kıldığını düşünür; oysa bazen bırakmak gerekir.", author: "Hermann Hesse", tag: "ACI" },
    { text: "İçinde bir sessizlik ve sığınak var; istediğin zaman oraya çekilebilirsin.", author: "Hermann Hesse", tag: "YALNIZLIK" },
    { text: "Başka gerçeklik yok; içimizdeki gerçeklik var. Bu yüzden pek çok kişi gerçek dışı bir hayat sürer.", author: "Hermann Hesse", tag: "VAROLUŞ" },
    { text: "Ciddi alınması gerekeni öğren ve gerisine gül.", author: "Hermann Hesse", tag: "BİLGELİK" },
    { text: "Kuş yumurtadan savaşarak çıkar. Yumurta dünyadır. Doğmak için bir dünyayı yok etmek gerekir.", author: "Hermann Hesse", tag: "VAROLUŞ" },
    { text: "Gerçek benimden gelen dürtülerle yaşamak istedim. Neden bu kadar zordu?", author: "Hermann Hesse", tag: "TRAJEDY" },
    { text: "Gerçeğin milyon yüzü var ama yalnızca tek bir gerçek vardır.", author: "Hermann Hesse", tag: "BİLGELİK" },
    { text: "Birini nefret ediyorsan, onda kendinin bir parçasını nefret ediyorsun demektir.", author: "Hermann Hesse", tag: "BİLGELİK" },
    { text: "İnsan yeni okyanuslar keşfedemez; kıyıyı gözden kaybetme cesareti taşımadıkça.", author: "André Gide", tag: "VAROLUŞ" },
    { text: "Asıl görüş kalple olur; göz için önemli olan görünmezdir.", author: "Antoine de Saint-Exupéry", tag: "BİLGELİK" },
    { text: "Evcilleştirdiğin şeyden sonsuza dek sorumlu olursun.", author: "Antoine de Saint-Exupéry", tag: "VAROLUŞ" },
    { text: "Kendimi başka her şeyden daha çok incelerim; bu benim metafiziğim, bu benim fizikimdir.", author: "Michel de Montaigne", tag: "VAROLUŞ" },
    { text: "Kendini başkalarına ödünç ver; ama kendine kendini ver.", author: "Michel de Montaigne", tag: "BİLGELİK" },
    { text: "Olayları yönetemediğim için kendimi yönetiyorum.", author: "Michel de Montaigne", tag: "BİLGELİK" },
    { text: "Bir şeyi hafızadan silmek istediğimizde, o şey hafızaya en derin şekilde kazınır.", author: "Michel de Montaigne", tag: "ACI" },
    { text: "Dünyanın en büyük şeyi kendine ait olmayı bilmektir.", author: "Michel de Montaigne", tag: "VAROLUŞ" },
    { text: "Dün inanç olarak tuttuğumuz ne çok şeyi bugün masal olarak anlatıyoruz.", author: "Michel de Montaigne", tag: "BİLGELİK" },
    { text: "Bilgeliğin en kesin işareti neşedir.", author: "Michel de Montaigne", tag: "BİLGELİK" },
    { text: "Bir sarayda bile iyi yaşanabilir.", author: "Marcus Aurelius", tag: "STOİZM" },
    { text: "Kaderin sana bağladığı şeyleri kabul et; kaderin yanına getirdiği insanları sev.", author: "Marcus Aurelius", tag: "VAROLUŞ" },
    { text: "Eylemin önündeki engel eylemi ileri iter. Yolun önünde duran şey yol haline gelir.", author: "Marcus Aurelius", tag: "STOİZM" },
    { text: "Karakter mükemmelliği şudur: her günü son günmüş gibi, çılgınlık, ilgisizlik ve yapmacıklık olmadan yaşamak.", author: "Marcus Aurelius", tag: "VAROLUŞ" },
    { text: "En iyi intikam, haksızlık yapana benzememektir.", author: "Marcus Aurelius", tag: "BİLGELİK" },
    { text: "Kayıp, değişimden başka bir şey değildir; değişim ise doğanın zevkidir.", author: "Marcus Aurelius", tag: "TRAJEDY" },
    { text: "Sözünü bozacak ya da özsaygını kaybettirecek hiçbir şeyi avantaj olarak görme.", author: "Marcus Aurelius", tag: "BİLGELİK" },
    { text: "Kendini şimdiki ana hapset.", author: "Marcus Aurelius", tag: "VAROLUŞ" },
    { text: "İlk kural: Ruhunu huzurlu tut. İkincisi: Şeylere yüzleş ve oldukları gibi tanı.", author: "Marcus Aurelius", tag: "STOİZM" },
    { text: "Bir insan, kendisi olmaya çalışmadığında en büyük yalnızlığı yaşar.", author: "C.G. Jung", tag: "YALNIZLIK" },
    { text: "Hayal ettiğimiz şeyin gerçekleşmemesi, hayal edemediğimiz şeyin gerçekleşmesine zemin hazırlar.", author: "C.S. Lewis", tag: "UMUT" },
    { text: "Korkularından kaçma; onlarla yüzleş ve onları tanı.", author: "Carl Jung", tag: "BİLGELİK" },
    { text: "Bir insan ancak kaybettiğinde gerçekten sahip olduğunu anlar.", author: "Paulo Coelho", tag: "ACI" },
    { text: "Mutluluk yolda bulunan bir şeydir; varış noktası değil.", author: "Osho", tag: "BİLGELİK" },
    { text: "Söyleyemediğin şeyi yaşamak zorunda kalırsın.", author: "C.G. Jung", tag: "VAROLUŞ" },
    { text: "Hayat gerçek bir öğretmendir; ders kitabı sadece bir yardımcıdır.", author: "Khalil Gibran", tag: "BİLGELİK" },
    { text: "Zaman, iyileşmeyen yaraları sararken iyileşen yaraları da yeniden açar.", author: "Friedrich Nietzsche", tag: "ACI" },
    { text: "Bir insan ne kadar çok sevebiliyorsa, o kadar çok acı çekebiliyordur.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Gerçek bilgelik, bilginin sınırlarını görmekten geçer.", author: "Immanuel Kant", tag: "BİLGELİK" },
    { text: "Özgürlük, sorumluluğun başka adıdır.", author: "Jean-Paul Sartre", tag: "ÖZGÜRLÜK" },
    { text: "Her şeyin bir bedeli vardır; bedelsiz güzellik yoktur.", author: "Rainer Maria Rilke", tag: "ACI" },
    { text: "İnsanlar bildiklerini sandıkları şeyleri öğrenmek istemezler.", author: "Epiktetos", tag: "BİLGELİK" },
    { text: "Ağlamak zayıflık değil; o kadar uzun süre güçlü olmak zorunda kaldığının kanıtıdır.", author: "Anonim", tag: "ACI" },
    { text: "Sessizlik, bazen en güçlü çığlıktır.", author: "Anonim", tag: "ACI" },
    { text: "Bir fikrin doğru olduğunu kanıtlamanın en iyi yolu, onu hayata geçirmektir.", author: "Albert Camus", tag: "VAROLUŞ" },
    { text: "Geçmiş değiştirilemez; ama ona verdiğimiz anlam değiştirilebilir.", author: "Viktor Frankl", tag: "BİLGELİK" },
    { text: "Kendine dair en büyük keşif, kendi sınırlarını aşmaktır.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Düşünceler eylemsiz kaldıkça yalnızca rüyadır.", author: "Paulo Coelho", tag: "VAROLUŞ" },
    { text: "Gerçek sevgi, karşılıklı bağımlılık değil, karşılıklı özgürlüktür.", author: "Erich Fromm", tag: "VAROLUŞ" },
    { text: "Sevmek öğrenilebilir bir sanattır; öğrenmek isteyip istemediğin sorusudur.", author: "Erich Fromm", tag: "VAROLUŞ" },
    { text: "Bilinçsiz bir yaşam, incelemeye değmez.", author: "Sokrates", tag: "BİLGELİK" },
    { text: "İnsan, anlam arayışında olan tek canlıdır.", author: "Viktor Frankl", tag: "VAROLUŞ" },
    { text: "Acı çekmek anlam taşıyorsa, dayanılır hale gelir.", author: "Viktor Frankl", tag: "ACI" },
    { text: "Her zaman seçme özgürlüğün vardır; koşulların seni kısıtlaması bile bir seçimdir.", author: "Viktor Frankl", tag: "ÖZGÜRLÜK" },
    { text: "Tutku olmadan hiçbir büyük şey başarılamamıştır.", author: "Georg Wilhelm Friedrich Hegel", tag: "VAROLUŞ" },
    { text: "Gerçek, bütünün ta kendisidir.", author: "Georg Wilhelm Friedrich Hegel", tag: "BİLGELİK" },
    { text: "Tarih, özgürlüğün bilincine varma sürecidir.", author: "Georg Wilhelm Friedrich Hegel", tag: "ÖZGÜRLÜK" },
    { text: "Dünya, acı çekmekten ibaret değildir; onu aşmaktan da ibarettir.", author: "Viktor Frankl", tag: "ACI" },
    { text: "İnsan, olmaya mahkûm olduğu şeyden sorumludur.", author: "Jean-Paul Sartre", tag: "VAROLUŞ" },
    { text: "Başkalarının gözünde var olmak için kendi gözlerinden kaybolma.", author: "Osho", tag: "BİLGELİK" },
    { text: "Hayatın anlamı, onu yaşarken bulunur.", author: "Albert Camus", tag: "VAROLUŞ" },
    { text: "Güzellik, gözün değil; ruhun gördüğüdür.", author: "Platon", tag: "BİLGELİK" },
    { text: "Bilgelik, doğru soruları sormayı bilmektir.", author: "Sokrates", tag: "BİLGELİK" },
    { text: "Eğer iyilik yapacaksan, bugün yap; yarın çok geç olabilir.", author: "Mahatma Gandhi", tag: "BİLGELİK" },
    { text: "Gerçek bir lider, insanları değiştirmeye değil; ilham vermeye çalışır.", author: "Lao Tzu", tag: "BİLGELİK" },
    { text: "Sözcükler dünyanın en tükenmez büyü kaynağıdır.", author: "Albus Dumbledore", tag: "BİLGELİK" },
    { text: "Hayallerini gerçekleştirmenin tek yolu uyanmaktır.", author: "Paulo Coelho", tag: "VAROLUŞ" },
    { text: "Bir insan neden yaşadığını bilirse, nasıl yaşayacağını da bulur.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Kader diye bir şey yoktur; onu biz yaratırız.", author: "Simone de Beauvoir", tag: "VAROLUŞ" },
    { text: "Kadın doğulmaz, kadın olunur.", author: "Simone de Beauvoir", tag: "VAROLUŞ" },
    { text: "Özgür olmak, özgürlüğü seçmektir.", author: "Jean-Paul Sartre", tag: "ÖZGÜRLÜK" },
    { text: "Başkalarını anlamak için önce kendini anlamalısın.", author: "Lao Tzu", tag: "BİLGELİK" },
    { text: "Gerçek yiğitlik, korku duymamak değil; korkuya rağmen hareket etmektir.", author: "Nelson Mandela", tag: "VAROLUŞ" },
    { text: "Yıkılmamak için değil, yıkıldıktan sonra yeniden kalkmak için güçlü ol.", author: "Anonim", tag: "ACI" },
    { text: "Her insan kendi kaderinin mimarıdır.", author: "Appius Claudius Caecus", tag: "VAROLUŞ" },
    { text: "Bilmek, yalnızca bir başlangıçtır.", author: "Konfüçyüs", tag: "BİLGELİK" },
    { text: "Kötü bir çoban sürüyü değil, kendini kaybeder.", author: "Rumi", tag: "BİLGELİK" },
    { text: "Gönlün aynasını parlatırsan, şekillerin ötesini görürsün.", author: "Rumi", tag: "BİLGELİK" },
    { text: "İnsan, içindeki karanlığı kabul etmeden aydınlığa ulaşamaz.", author: "C.G. Jung", tag: "BİLGELİK" },
    { text: "Hiçbir şey tesadüf değildir; her şey bir anlam taşır.", author: "C.G. Jung", tag: "VAROLUŞ" },
    { text: "Bilinçdışı, gerçek yaşamın ta kendisidir.", author: "C.G. Jung", tag: "VAROLUŞ" },
    { text: "Kendini tanımak, tüm bilgeliğin başlangıcıdır.", author: "Aristoteles", tag: "BİLGELİK" },
    { text: "Mutluluk, bir varış noktası değil; bir yolculuk tarzıdır.", author: "Aristoteles", tag: "BİLGELİK" },
    { text: "Erdem, alışkanlığın ürünüdür.", author: "Aristoteles", tag: "BİLGELİK" },
    { text: "İyi insan olmak, iyi eylemler yapmaktan geçer.", author: "Aristoteles", tag: "BİLGELİK" },
    { text: "Gerçek arkadaşlık, iki bedenin tek ruh olmasıdır.", author: "Aristoteles", tag: "VAROLUŞ" },
    { text: "Aşırılıktan kaçın; erdemi ortada ara.", author: "Aristoteles", tag: "BİLGELİK" },
    { text: "Eğitim zihnin değil; ruhun gelişimidir.", author: "Aristoteles", tag: "BİLGELİK" },
    { text: "İnsanlar doğası gereği bilmek ister.", author: "Aristoteles", tag: "BİLGELİK" },
    { text: "Ölüm, tüm şeylerin en korkulanıdır; çünkü son gibi görünür.", author: "Aristoteles", tag: "TRAJEDY" },
    { text: "Yalnızlığı seven ya tanrı ya da hayvandır; insan değildir.", author: "Aristoteles", tag: "YALNIZLIK" },
    { text: "Bir şeyi tam olarak anlamadan önce onu öğretemezsin.", author: "Aristoteles", tag: "BİLGELİK" },
