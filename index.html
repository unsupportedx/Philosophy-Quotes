    { text: "Bize yıkım gibi görünen şey, aslında yenilenmenin ta kendisidir.", author: "Rumi", tag: "ACI" },
    { text: "Bir ağacın kökü ne kadar derinse, fırtınalara o kadar dayanır.", author: "Rumi", tag: "ACI" },
    { text: "Ölüm ışığı söndürmek değildir; şafak sökerken lambayı kapatmaktır.", author: "Rabindranath Tagore", tag: "TRAJEDY" },
    { text: "Güneş hayatından çekildiyse ağlama; gözyaşların yıldızları görmeni engeller.", author: "Rabindranath Tagore", tag: "ACI" },
    { text: "Varoluş özden önce gelir.", author: "Jean-Paul Sartre", tag: "VAROLUŞ" },
    { text: "Beni yok etmeyen şey beni güçlendirir.", author: "Friedrich Nietzsche", tag: "ACI" },
    { text: "Bilinç bir hastalıktır.", author: "Miguel de Unamuno", tag: "TRAJEDY" },
    { text: "Harabenin olduğu yerde bir hazine umudu vardır.", author: "Rumi", tag: "ACI" },
    { text: "Güzelliği gören ruh bazen yalnız yürür.", author: "Johann Wolfgang von Goethe", tag: "YALNIZLIK" },
    { text: "Hiç kimse özgür olduğunu yanlışlıkla düşünenler kadar ümitsiz bir kölelik içinde değildir.", author: "Johann Wolfgang von Goethe", tag: "TRAJEDY" },
    { text: "Karanlık karanlığı kovamaz; bunu sadece ışık yapabilir.", author: "Martin Luther King Jr.", tag: "ACI" },
    { text: "Önemli şeyler hakkında sessiz kaldığımız gün hayatlarımız sona ermeye başlar.", author: "Martin Luther King Jr.", tag: "TRAJEDY" },
    { text: "Uçamıyorsan koş, koşamıyorsan yürü, yürüyemiyorsan sür, ama ne yaparsan yap ilerlemeye devam et.", author: "Martin Luther King Jr.", tag: "ACI" },
    { text: "Kardeş olarak birlikte yaşamayı öğrenmeli ya da aptal olarak birlikte yok olmayız.", author: "Martin Luther King Jr.", tag: "TRAJEDY" },
    { text: "İki şey sonsuzdur: evren ve insan aptallığı; ve evren konusunda emin değilim.", author: "Albert Einstein", tag: "TRAJEDY" },
    { text: "İnsan, hayvan ile Üstün İnsan arasına gerilmiş bir ip; uçurum üzerinde bir iptir.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Ne kadar yükseğe uçarsak, uçamayanların gözünde o kadar küçük görünürüz.", author: "Friedrich Nietzsche", tag: "YALNIZLIK" },
    { text: "Bireylerde delilik nadirdir; ama gruplarda, partilerde, uluslarda ve dönemlerde kuraldır.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "Derini değiştiremeyip kalmak zorunda olan yılan ölmek zorundadır.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Amacını unutmak en yaygın aptallık biçimidir.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "Her derin düşünür anlaşılmaktan, anlaşılamamaktan daha çok korkar.", author: "Friedrich Nietzsche", tag: "YALNIZLIK" },
    { text: "Umut gerçekte tüm kötülüklerin en kötüsüdür; çünkü insanın acısını uzatır.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "İnsanın güce karşı mücadelesi, hafızanın unutmaya karşı mücadelesidir.", author: "Milan Kundera", tag: "TRAJEDY" },
    { text: "Utancın temeli kişisel bir başarısızlık değil, ezilmenin utanç verici yenilgisidir.", author: "Milan Kundera", tag: "ACI" },
    { text: "İnsan zamanı daire çizmez; düz bir çizgide ilerler.", author: "Milan Kundera", tag: "VAROLUŞ" },
    { text: "İyimserlik halkın afyonudur.", author: "Milan Kundera", tag: "TRAJEDY" },
    { text: "Üzüntü, tutkuyla sevenler için bir mutluluk biçimidir.", author: "Milan Kundera", tag: "ACI" },
    { text: "Işığın derecesi karanlığın derecesiyle ters orantılıdır.", author: "Hermann Hesse", tag: "ACI" },
    { text: "Bazılarımız tutunmanın bizi güçlü kıldığını düşünür; oysa bazen bırakmak gerekir.", author: "Hermann Hesse", tag: "ACI" },
    { text: "İçinde bir sessizlik ve sığınak var; istediğin zaman oraya çekilebilirsin.", author: "Hermann Hesse", tag: "YALNIZLIK" },
    { text: "Gerçek benimden gelen dürtülerle yaşamak istedim. Neden bu kadar zordu?", author: "Hermann Hesse", tag: "TRAJEDY" },
    { text: "Bir şeyi hafızadan silmek istediğimizde, o şey hafızaya en derin şekilde kazınır.", author: "Michel de Montaigne", tag: "ACI" },
    { text: "Kayıp, değişimden başka bir şey değildir; değişim ise doğanın zevkidir.", author: "Marcus Aurelius", tag: "TRAJEDY" },
    { text: "Bir insan, kendisi olmaya çalışmadığında en büyük yalnızlığı yaşar.", author: "C.G. Jung", tag: "YALNIZLIK" },
    { text: "Bir insan ancak kaybettiğinde gerçekten sahip olduğunu anlar.", author: "Paulo Coelho", tag: "ACI" },
    { text: "Zaman, iyileşmeyen yaraları sararken iyileşen yaraları da yeniden açar.", author: "Friedrich Nietzsche", tag: "ACI" },
    { text: "Bir insan ne kadar çok sevebiliyorsa, o kadar çok acı çekebiliyordur.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Her şeyin bir bedeli vardır; bedelsiz güzellik yoktur.", author: "Rainer Maria Rilke", tag: "ACI" },
    { text: "Ağlamak zayıflık değil; o kadar uzun süre güçlü olmak zorunda kaldığının kanıtıdır.", author: "Anonim", tag: "ACI" },
    { text: "Sessizlik, bazen en güçlü çığlıktır.", author: "Anonim", tag: "ACI" },
    { text: "Acı çekmek anlam taşıyorsa, dayanılır hale gelir.", author: "Viktor Frankl", tag: "ACI" },
    { text: "Dünya, acı çekmekten ibaret değildir; onu aşmaktan da ibarettir.", author: "Viktor Frankl", tag: "ACI" },
    { text: "Yıkılmamak için değil, yıkıldıktan sonra yeniden kalkmak için güçlü ol.", author: "Anonim", tag: "ACI" },
    { text: "Ölüm, tüm şeylerin en korkulanıdır; çünkü son gibi görünür.", author: "Aristoteles", tag: "TRAJEDY" },
    { text: "Yalnızlığı seven ya tanrı ya da hayvandır; insan değildir.", author: "Aristoteles", tag: "YALNIZLIK" },
    { text: "Yaşlılık, doğanın son eseri değil; ilk tasarımıdır.", author: "Platon", tag: "TRAJEDY" },
    { text: "Sevgi, ölümsüzlüğe duyulan özlemdir.", author: "Platon", tag: "VAROLUŞ" },
    { text: "Modern insan, sahip olduğu şeylerin kölesidir.", author: "Erich Fromm", tag: "TRAJEDY" },
    { text: "Acı çekmek, büyümenin kaçınılmaz bedelidir.", author: "Erich Fromm", tag: "ACI" },
    { text: "Bir insan yalnız kaldığında kendini bulur.", author: "Henry David Thoreau", tag: "YALNIZLIK" },
    { text: "Güç, hiç düşmemekte değil; her düşüşte kalkmaktadır.", author: "Nelson Mandela", tag: "ACI" },
    { text: "Bir çiçek açmak için önce toprağın altında beklemek gerekir.", author: "Rumi", tag: "ACI" },
    { text: "Ölüm, sadece bir kapıdır; ötesi bilinmezdir.", author: "Sokrates", tag: "TRAJEDY" },
    { text: "Kayıp anları, hafızanın en güçlü kalesidir.", author: "Marcel Proust", tag: "ACI" },
    { text: "İnsanın içindeki şeytan, tanıdıklardan daha tehlikelidir.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Sıkıntı, insanı ya kırar ya da olgunlaştırır.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Herkes kendi cehennemi içinde taşır.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Dünya, anlamını acı çekenden alır.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Ölümle yüzleşmeden hayatı tam anlayamazsın.", author: "Leo Tolstoy", tag: "TRAJEDY" },
    { text: "İnsanlık tarihi, acı ve umudun dansıdır.", author: "Victor Hugo", tag: "TRAJEDY" },
    { text: "Başarısızlık, başarının ilk adımıdır.", author: "Oprah Winfrey", tag: "ACI" },
    { text: "Yıldızlar sadece karanlıkta görünür.", author: "Anonim", tag: "ACI" },
    { text: "İnsanın en büyük gücü, kırıldığı yerde yeniden bütünleşmesidir.", author: "Anonim", tag: "ACI" },
    { text: "Zaman, en iyi öğretmendir; ne var ki öğrencilerini öldürür.", author: "Hector Berlioz", tag: "TRAJEDY" },
    { text: "Tüm insanlık trajedisi, bir odada sessizce oturamamaktan kaynaklanır.", author: "Blaise Pascal", tag: "TRAJEDY" },
    { text: "Anlamsızlıkla yüzleşmek, en derin cesaret eylemidir.", author: "Albert Camus", tag: "VAROLUŞ" },
    { text: "Sonsuz bir ışık için geçici bir karanlığa katlan.", author: "C.S. Lewis", tag: "ACI" },
    { text: "Acı, insanı dönüştürür; yok etmez.", author: "C.S. Lewis", tag: "ACI" },
    { text: "Her kahraman yolculuğu, bir ölüm ve yeniden doğuştur.", author: "Joseph Campbell", tag: "VAROLUŞ" },
    { text: "Ölümü düşünmek, yaşamı derinleştirir.", author: "Seneca", tag: "TRAJEDY" },
    { text: "Gerçek acı, korkudan beslenir.", author: "Seneca", tag: "ACI" },
{ text: "Sadece ölüler savaşın sonunu görmüştür.", author: "Platon", tag: "TRAJEDY" },
    { text: "Savaş her şeyin babasıdır.", author: "Heraklitos", tag: "TRAJEDY" },
    { text: "Savaşta gerçek ilk kayıptır.", author: "Aiskhylos", tag: "TRAJEDY" },
    { text: "Savaş, siyasetin başka araçlarla sürdürülmesidir.", author: "Carl von Clausewitz", tag: "TRAJEDY" },
    { text: "Bir savaşı kazanamazsınız tıpkı bir depremi kazanamayacağınız gibi.", author: "Jeannette Rankin", tag: "TRAJEDY" },
    { text: "Savaşta yarasız asker yoktur.", author: "José Narosky", tag: "ACI" },
    { text: "Savaş kimin haklı olduğunu değil, kimin hayatta kaldığını belirler.", author: "Bertrand Russell", tag: "TRAJEDY" },
    { text: "Yaşlılar savaş ilan eder. Ama savaşmak ve ölmek zorunda kalan gençlerdir.", author: "Herbert Hoover", tag: "TRAJEDY" },
    { text: "Savaş ne kadar gerekli ya da haklı görünürse görünsün bir suçtur.", author: "Ernest Hemingway", tag: "TRAJEDY" },
    { text: "Savaş, dilin başarısız olduğu yerdir.", author: "Margaret Atwood", tag: "TRAJEDY" },
    { text: "Bir savaş başlatmadan önce, savaş alanında can çekişen bir askerin donuk gözlerine bakan herkes çok düşünür.", author: "Otto von Bismarck", tag: "TRAJEDY" },
    { text: "Bir insanın ölümü trajedidir. Milyonların ölümü ise istatistik.", author: "Joseph Stalin", tag: "TRAJEDY" },
    { text: "Barışta oğullar babalarını gömer. Savaşta babalar oğullarını.", author: "Herodotos", tag: "TRAJEDY" },
    { text: "Ben Ölüm oldum, dünyanın yıkıcısı.", author: "J. Robert Oppenheimer", tag: "TRAJEDY" },
    { text: "Tüm savaş sanatı aldatmaya dayanır.", author: "Sun Tzu", tag: "TRAJEDY" },
    { text: "Savaşın en yüce sanatı, düşmanı savaşmadan yenmektir.", author: "Sun Tzu", tag: "TRAJEDY" },
    { text: "Savaş örgütlenmiş cinayetten başka bir şey değildir.", author: "Harry Patch", tag: "TRAJEDY" },
    { text: "Onlar, terk ettiklerimiz gibi yaşlanmayacak.", author: "Laurence Binyon", tag: "TRAJEDY" },
    { text: "Savaş bir macera değildir. Bir hastalıktır. Tifüs gibi.", author: "Antoine de Saint-Exupéry", tag: "TRAJEDY" },
    { text: "İnsanlık savaşa son vermek zorundadır; yoksa savaş insanlığa son verecektir.", author: "John F. Kennedy", tag: "TRAJEDY" },
    { text: "Savaşlar barışçıl yarınlar oymak için kötü aletlerdir.", author: "Martin Luther King Jr.", tag: "TRAJEDY" },
{ text: "Başkalarını sevmek için, önce kendimizi sevmeyi öğrenmeliyiz.", author: "Sabahattin Ali", tag: "ACI" },
    { text: "İnsan yaşadıkça, sevdikçe, acı çektikçe ve düşündükçe insan olur.", author: "Sabahattin Ali", tag: "VAROLUŞ" },
    { text: "Ben seni seviyorum, bu benim en büyük günahım.", author: "Sabahattin Ali", tag: "ACI" },
    { text: "Yalnızlık insanı büyütür, olgunlaştırır; ama bazen de eritir.", author: "Sabahattin Ali", tag: "YALNIZLIK" },
    { text: "İnsanlar birbirini en çok, birbirinden bekledikleri zamanlarda incitirler.", author: "Sabahattin Ali", tag: "ACI" },
    { text: "Sevmek, sevilmeyeceğini bile bile sevmektir.", author: "Sabahattin Ali", tag: "ACI" },
    { text: "Bir insan başka bir insanı tamamen anlayabilir mi? Anlayabilir mi ki... Kendi kendini bile anlayamıyor.", author: "Sabahattin Ali", tag: "YALNIZLIK" },
    { text: "En büyük yalnızlık, kalabalıklar içindeki yalnızlıktır.", author: "Sabahattin Ali", tag: "YALNIZLIK" },
    { text: "Kalbim çok şey gördü, çok şey bildi; ama bunu kimseye anlatamadım.", author: "Sabahattin Ali", tag: "YALNIZLIK" },
    { text: "Sevilmek istiyorsanız, sevin; ve sevildikçe sevildiğinizi göstermeyin.", author: "Sabahattin Ali", tag: "ACI" },
    { text: "Hayatta en çok acı çekenler, en çok sevenlerdir.", author: "Sabahattin Ali", tag: "ACI" },
    { text: "Gerçek aşk, karşılıksız aşktır; çünkü karşılık beklemek, bir tür alışveriştir.", author: "Sabahattin Ali", tag: "ACI" },
    { text: "İnsan, kendi kendisiyle baş başa kalınca, içinin derinliklerinde ne kadar yabancılar sakladığını görür.", author: "Sabahattin Ali", tag: "YALNIZLIK" },
    { text: "Yaşamak için sevmek değil, sevmek için yaşamak lazım.", author: "Sabahattin Ali", tag: "VAROLUŞ" },
    { text: "En büyük yalnızlık, sevilmemek değil; anlaşılamamaktır.", author: "Sabahattin Ali", tag: "YALNIZLIK" },
    { text: "Ruhun gıdası acıdır; çünkü sevinç uyuşturur, acı ise uyandırır.", author: "Peyami Safa", tag: "ACI" },
    { text: "Aşk, insana hem en büyük mutluluğu hem de en büyük acıyı tattıran tek şeydir.", author: "Peyami Safa", tag: "ACI" },
    { text: "İnsan, kendi ruhunu tanımadan başkalarını anlayamaz.", author: "Peyami Safa", tag: "VAROLUŞ" },
    { text: "Acı çekmeden olgunlaşmak mümkün değildir.", author: "Peyami Safa", tag: "ACI" },
    { text: "Her şeyi kaybetmek, insanı ya mahveder ya da inşa eder.", author: "Peyami Safa", tag: "TRAJEDY" },
    { text: "Kalp, mantığın anlamadığı şeyleri anlar.", author: "Peyami Safa", tag: "VAROLUŞ" },
    { text: "Bir insan ne zaman olgunlaşır? Hayatın acısını tattığında.", author: "Peyami Safa", tag: "ACI" },
    { text: "Sevmek acı verirse de, hiç sevmemiş olmak daha büyük acıdır.", author: "Peyami Safa", tag: "ACI" },
    { text: "Ruh, maddenin zincirleri içinde çırpınan bir kuştur.", author: "Peyami Safa", tag: "VAROLUŞ" },
    { text: "Anlamamak insanları birbirinden uzaklaştırır; ama bazen anlamak da aynı şeyi yapar.", author: "Peyami Safa", tag: "YALNIZLIK" },
    { text: "Her şeyin bir bedeli vardır; aşkın bedeli ise acıdır.", author: "Peyami Safa", tag: "ACI" },
    { text: "Hayatın anlamını kaybetmek, hayatı kaybetmekten daha korkunçtur.", author: "Peyami Safa", tag: "TRAJEDY" },
    { text: "İnsan, kendi karanlığıyla yüzleşmeden ışığa ulaşamaz.", author: "Peyami Safa", tag: "TRAJEDY" },
    { text: "Sevgi, paylaşılınca bitmez; acı ise paylaşılınca azalır.", author: "Peyami Safa", tag: "ACI" },
    { text: "Sessizlik bazen en güçlü çığlıktır.", author: "Orhan Pamuk", tag: "YALNIZLIK" },
    { text: "Hayatın anlamını kaybettiğimde, kitaplara sığınırım.", author: "Orhan Pamuk", tag: "YALNIZLIK" },
    { text: "Hepimiz, bir gün gelmeyecek olan birini bekliyoruz.", author: "Orhan Pamuk", tag: "YALNIZLIK" },
    { text: "Keder, insanı daha derin bir yere götürür; ama bazen o derinlikte kaybolur.", author: "Orhan Pamuk", tag: "ACI" },
    { text: "Hatırlamak, bir tür yas tutmaktır.", author: "Orhan Pamuk", tag: "ACI" },
    { text: "İstanbul'un hüznü, şehrin kendisinde değil, onu seyreden insanların içindedir.", author: "Orhan Pamuk", tag: "YALNIZLIK" },
    { text: "Mutluluk, peşinden koştukça kaçar.", author: "Orhan Pamuk", tag: "TRAJEDY" },
    { text: "İnsan, unutmak için hatırlar.", author: "Orhan Pamuk", tag: "ACI" },
    { text: "Bazı şeyleri ancak kaybettikten sonra anlarsınız.", author: "Orhan Pamuk", tag: "ACI" },
    { text: "Bir şehri sevmek, onun hüznünü de sevmektir.", author: "Orhan Pamuk", tag: "YALNIZLIK" },
    { text: "Var olmak, anlaşılmayı beklemektir.", author: "Orhan Pamuk", tag: "VAROLUŞ" },
    { text: "Geçmiş, asla geçmez; sadece birikir.", author: "Orhan Pamuk", tag: "TRAJEDY" },
    { text: "Her şeyin bir sonu vardır; ama bazı sonlar asla bitmez.", author: "Orhan Pamuk", tag: "TRAJEDY" },
    { text: "Kimi zaman en büyük yabancı, kendinizsinizdir.", author: "Orhan Pamuk", tag: "YALNIZLIK" },
    { text: "Bir insan ne zaman yalnızdır? Kendi sesini duyamadığında.", author: "Orhan Pamuk", tag: "YALNIZLIK" },
    { text: "Aşk, bir tür delilik; ama en güzel deliliktir.", author: "Orhan Pamuk", tag: "ACI" },
    { text: "Savaş, yalnızca kahramanları değil; masumları da yok eder.", author: "Orhan Pamuk", tag: "TRAJEDY" },
    { text: "İnsan, kendi gölgesinden kaçamaz.", author: "Orhan Pamuk", tag: "VAROLUŞ" },
    { text: "Hafıza, insanı hem kurtarır hem de mahveder.", author: "Orhan Pamuk", tag: "TRAJEDY" },
    { text: "Batı Cephesi'nde yeni bir şey yoktu; sadece ölüm.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "On sekiz yaşındaydık ve hayatı ve dünyayı sevmeye başlamıştık; onu parça parça etmek zorunda kaldık.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Savaş, yalnızca bedenleri değil; ruhları da öldürür.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Bu kitap ne bir suçlama ne de bir itiraftır; en az bir macera değil; çünkü ölüm, onunla yüz yüze gelenlere bir macera değildir.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Genç görünüyoruz. Ama büyümedik. Büyüyemeyeceğiz de.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "İnsanlar birbirini neden öldürür? Çünkü öyle emredilmiş.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Hayatta kalmak, bazen en ağır yük olabilir.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Savaşın yarattığı boşluğu hiçbir şey dolduramamıştır.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Kafkamız dönüştü ama ruhlarımız hâlâ geride kaldı.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Bilge olmak acı çekmektir.", author: "Franz Kafka", tag: "ACI" },
    { text: "Sonsuz umut var, ama bizim için değil.", author: "Franz Kafka", tag: "TRAJEDY" },
    { text: "Ben bir kafesim, bir kuş arıyorum.", author: "Franz Kafka", tag: "YALNIZLIK" },
    { text: "Özgürsün ve bu yüzden kaybolmuşsun.", author: "Franz Kafka", tag: "TRAJEDY" },
    { text: "Anlayışı olmayan biri için her şey bir yük olur.", author: "Franz Kafka", tag: "TRAJEDY" },
    { text: "İçimdeki şeyleri kimseye anlatamazdım; anlasalar bile ne değişecekti ki?", author: "Franz Kafka", tag: "YALNIZLIK" },
    { text: "Kitap, içimizdeki donmuş denizi kıracak balta olmalı.", author: "Franz Kafka", tag: "VAROLUŞ" },
    { text: "Yazmak ıssız bir inişti, kendinin soğuk derinliklerine.", author: "Franz Kafka", tag: "YALNIZLIK" },
    { text: "Suçluluk asla şüphe götürmez.", author: "Franz Kafka", tag: "TRAJEDY" },
    { text: "Hayatın anlamı durmaktır.", author: "Franz Kafka", tag: "TRAJEDY" },
    { text: "Dürüst olmak ve vicdanlı olmak acı çektiriri.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Acı çekmek, derin bir zeka ve derin bir kalbin kaçınılmaz sonucudur.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Sevmek acı çekmektir ve başka türlü sevgi olamaz.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "En karanlık gece, en parlak yıldızları barındırır.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Kendi kendine yalan söyleyen insan, gerçeği göremez.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Hasta bir adamım... Hırçın bir adamım.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Her insanın, yalnızca kendine anlatabileceği şeyler vardır.", author: "Fyodor Dostoyevski", tag: "YALNIZLIK" },
    { text: "İnsan, yaşamak için neden olmasına gerek duyar; neden olmadan her şeye katlanabilir.", author: "Fyodor Dostoyevski", tag: "VAROLUŞ" },
    { text: "Varoluşun sırrı yalnızca yaşamakta değil; ne için yaşadığını bulmaktadır.", author: "Fyodor Dostoyevski", tag: "VAROLUŞ" },
    { text: "Tanrı yoksa, her şey mubahtır.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "İnsanlar acıları hesaplayıp mutluluklarını unutur.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Acı, büyük ruhları pişirir.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Gülüşü öğrenmek için ağlamayı bilmek gerekir.", author: "Fyodor Dostoyevski", tag: "ACI" },
  ],
  es: [
    { text: "Sufrimos más en la imaginación que en la realidad.", author: "Séneca", tag: "TRAGEDIA" },
    { text: "Vivir es sufrir; sobrevivir es encontrar sentido en el sufrimiento.", author: "Friedrich Nietzsche", tag: "DOLOR" },
    { text: "La muerte no es nada para nosotros; cuando existimos, la muerte no está presente.", author: "Epicuro", tag: "EXISTENCIA" },
    { text: "En lo más profundo del invierno, aprendí finalmente que había en mí un verano invencible.", author: "Albert Camus", tag: "DOLOR" },
    { text: "Todos estamos solos, nacemos solos, morimos solos.", author: "Hunter S. Thompson", tag: "SOLEDAD" },
    { text: "El infierno son los otros.", author: "Jean-Paul Sartre", tag: "TRAGEDIA" },
    { text: "Hay que imaginarse a Sísifo feliz.", author: "Albert Camus", tag: "TRAGEDIA" },
    { text: "Todo se pierde en el momento en que se gana.", author: "Arthur Schopenhauer", tag: "TRAGEDIA" },
    { text: "La vida es una larga preparación para algo que nunca sucede.", author: "W.B. Yeats", tag: "TRAGEDIA" },
    { text: "La herida es el lugar por donde entra la luz.", author: "Rumi", tag: "DOLOR" },
    { text: "El dolor es inevitable. El sufrimiento es opcional.", author: "Haruki Murakami", tag: "DOLOR" },
    { text: "Lo que no me destruye me hace más fuerte.", author: "Friedrich Nietzsche", tag: "DOLOR" },
    { text: "El miedo a la muerte viene del miedo a la vida.", author: "Mark Twain", tag: "TRAGEDIA" },
    { text: "Amar es ser vulnerable.", author: "C.S. Lewis", tag: "DOLOR" },
    { text: "La vida es sufrimiento.", author: "Gautama Buda", tag: "DOLOR" },
    { text: "Estar completamente vivo es estar en dolor.", author: "Fyodor Dostoevsky", tag: "DOLOR" },
    { text: "El hombre es el único animal que debe ser alentado a vivir.", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "No es la muerte lo que un hombre debe temer, sino nunca comenzar a vivir.", author: "Marco Aurelio", tag: "EXISTENCIA" },
    { text: "La tragedia de la vida no es que termine tan pronto, sino que esperamos tanto para comenzarla.", author: "W.M. Lewis", tag: "TRAGEDIA" },
    { text: "El que da luz debe soportar el ardor.", author: "Viktor Frankl", tag: "DOLOR" },
    { text: "Solo hay un problema filosófico verdaderamente serio, y ese es el suicidio.", author: "Albert Camus", tag: "TRAGEDIA" },
    { text: "Lo absurdo nace del enfrentamiento entre la necesidad humana y el silencio irracional del mundo.", author: "Albert Camus", tag: "EXISTENCIA" },
    { text: "La pobreza más terrible es la soledad.", author: "Madre Teresa", tag: "SOLEDAD" },
    { text: "Donde hay vida, hay dolor.", author: "Arthur Schopenhauer", tag: "DOLOR" },
    { text: "Todo es vanidad y aflicción de espíritu.", author: "Rey Salomón", tag: "TRAGEDIA" },
    { text: "Morimos dos veces: cuando dejamos de respirar y cuando alguien dice nuestro nombre por última vez.", author: "Banksy", tag: "TRAGEDIA" },
    { text: "La vida es una tragedia vista de cerca, pero una comedia vista desde lejos.", author: "Charlie Chaplin", tag: "TRAGEDIA" },
    { text: "Las estrellas no pueden brillar sin oscuridad.", author: "D.H. Sidebottom", tag: "DOLOR" },
    { text: "Memento mori — recuerda que morirás.", author: "Tradición Estoica", tag: "EXISTENCIA" },
    { text: "La carga más pesada es una vida no vivida.", author: "C.G. Jung", tag: "TRAGEDIA" },
    { text: "No hay sol sin sombra, y es imprescindible conocer la noche.", author: "Albert Camus", tag: "TRAGEDIA" },
    { text: "Nunca sabes lo fuerte que eres hasta que ser fuerte es tu única opción.", author: "Bob Marley", tag: "DOLOR" },
    { text: "En medio de la dificultad yace la oportunidad.", author: "Albert Einstein", tag: "DOLOR" },
    { text: "Todos estamos rotos. Así es como entra la luz.", author: "Ernest Hemingway", tag: "DOLOR" },
    { text: "De las almas más fuertes emergieron del sufrimiento; los caracteres más grandes están marcados por cicatrices.", author: "Khalil Gibran", tag: "DOLOR" },
    { text: "El sufrimiento no es un castigo, es una purificación.", author: "Paramahansa Yogananda", tag: "DOLOR" },
    { text: "Solo los muertos han visto el fin de la guerra.", author: "Platón", tag: "TRAGEDIA" },
    { text: "El hombre sufre más por el sufrimiento que teme pero que nunca llega.", author: "Fyodor Dostoevsky", tag: "DOLOR" },
    { text: "Sé amable, porque cada persona que conoces está librando una dura batalla.", author: "Platón", tag: "DOLOR" },
    { text: "La conciencia es una enfermedad.", author: "Miguel de Unamuno", tag: "TRAGEDIA" },
    { text: "La mayoría de los hombres llevan vidas de tranquila desesperación.", author: "Henry David Thoreau", tag: "TRAGEDIA" },
    { text: "Morir es un arte. Como todo lo demás, lo hago excepcionalmente bien.", author: "Sylvia Plath", tag: "TRAGEDIA" },
    { text: "No tengo miedo de las tormentas, porque estoy aprendiendo a navegar mi barco.", author: "Louisa May Alcott", tag: "DOLOR" },
    { text: "Los cobardes mueren muchas veces antes de su muerte; los valientes nunca prueban la muerte sino una vez.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "La vida no es más que una sombra ambulante, un pobre actor que se pavonea durante su hora en el escenario.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "El infierno está vacío y todos los demonios están aquí.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "Mañana, y mañana, y mañana, se arrastra a este paso mezquino de día en día.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "Apaga, apaga, breve vela. La vida no es más que una sombra ambulante.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "La guerra es el padre de todas las cosas.", author: "Heráclito", tag: "TRAGEDIA" },
    { text: "No quiero ir al cielo. Ninguno de mis amigos está allí.", author: "Oscar Wilde", tag: "TRAGEDIA" },
    { text: "El sufrimiento es un momento muy largo. No podemos dividirlo por estaciones.", author: "Oscar Wilde", tag: "DOLOR" },
    { text: "Los corazones están hechos para romperse.", author: "Oscar Wilde", tag: "DOLOR" },
    { text: "Un cínico es un hombre que conoce el precio de todo y el valor de nada.", author: "Oscar Wilde", tag: "TRAGEDIA" },
    { text: "Hay solo dos tragedias en la vida: una es no conseguir lo que uno quiere, y la otra es conseguirlo.", author: "Oscar Wilde", tag: "TRAGEDIA" },
    { text: "La oscuridad no puede alejar a la oscuridad; solo la luz puede hacerlo.", author: "Martin Luther King Jr.", tag: "DOLOR" },
    { text: "Nuestras vidas comienzan a terminar el día que nos volvemos silenciosos sobre las cosas que importan.", author: "Martin Luther King Jr.", tag: "TRAGEDIA" },

let currentLang = 'en';
let quotes = [];
let currentIndex = 0;
let autoTimer = null;
let controlsTimer = null;
let controlsVisible = true;
let frozen = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startApp(lang) {
  currentLang = lang;
  quotes = shuffle(quotesData[lang]);
  currentIndex = 0;

  const langScreen = document.getElementById('lang-screen');
  const app = document.getElementById('app');

  langScreen.style.transition = 'opacity 0.8s';
  langScreen.style.opacity = '0';
  setTimeout(() => {
    langScreen.style.display = 'none';
    app.style.display = 'flex';
    showQuote(true);
    applyPrefs();
    startControlsTimer();
  }, 800);
}

function calcDuration(text) {
  const words = text.split(' ').length;
  const base = Math.max(5000, words * 600);
  return Math.min(base, 15000);
}

function showQuote(initial = false) {
  const q = quotes[currentIndex];
  const container = document.getElementById('quote-container');
  const curtain = document.getElementById('curtain');

  curtain.style.transition = 'none';
  curtain.style.opacity = initial ? '1' : '1';

  setTimeout(() => {
    document.getElementById('quote-line').style.opacity = '0';
    document.getElementById('quote-text').innerHTML = `"${q.text}"`;
    document.getElementById('quote-text').style.opacity = '0';
    document.getElementById('quote-author').textContent = `— ${q.author}`;
    document.getElementById('quote-author').style.opacity = '0';
    document.getElementById('quote-tag').textContent = `[ ${q.tag} ]`;
    document.getElementById('quote-tag').style.opacity = '0';

    container.classList.remove('quote-animate');
    void container.offsetWidth;
    container.classList.add('quote-animate');

    curtain.style.transition = 'opacity 1.4s ease';
    curtain.style.opacity = '0';

    document.getElementById('counter').textContent =
      `${String(currentIndex + 1).padStart(2,'0')} / ${String(quotes.length).padStart(2,'0')}`;

    const duration = calcDuration(q.text);
    const bar = document.getElementById('progress-bar');
    bar.style.transition = 'none';
    bar.style.width = '0%';
    void bar.offsetWidth;
    bar.style.transition = `width ${duration}ms linear`;
    bar.style.width = '100%';

    if (autoTimer) clearTimeout(autoTimer);
    autoTimer = setTimeout(() => nextQuote(), duration);

  }, initial ? 700 : 200);
}

function toggleFreeze() {
  frozen = !frozen;
  const btn = document.getElementById('freeze-btn');
  const bar = document.getElementById('progress-bar');
  if (frozen) {
    if (autoTimer) clearTimeout(autoTimer);
    bar.style.transition = 'none';
    btn.classList.add('active');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>RESUME`;
    showToast('❄ Donduruldu');
  } else {
    btn.classList.remove('active');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/><line x1="19.07" y1="4.93" x2="4.93" y2="19.07"/></svg>FREEZE`;
    // Restart auto-advance
    const q = quotes[currentIndex];
    const duration = calcDuration(q.text);
    bar.style.transition = 'none';
    bar.style.width = '0%';
    void bar.offsetWidth;
    bar.style.transition = `width ${duration}ms linear`;
    bar.style.width = '100%';
    autoTimer = setTimeout(() => nextQuote(), duration);
    showToast('▶ Devam ediyor');
  }
}

function nextQuote() {
  if (frozen) return;
  currentIndex = (currentIndex + 1) % quotes.length;
  if (currentIndex === 0) quotes = shuffle(quotes);
  triggerTransition();
}

function prevQuote() {
  if (frozen) return;
  currentIndex = (currentIndex - 1 + quotes.length) % quotes.length;
  triggerTransition();
}

function triggerTransition() {
  const curtain = document.getElementById('curtain');
  curtain.style.transition = 'opacity 0.8s ease';
  curtain.style.opacity = '1';
  if (autoTimer) clearTimeout(autoTimer);
  setTimeout(() => showQuote(), 850);
}

// Click anywhere to freeze/unfreeze
document.getElementById('app').addEventListener('click', function(e) {
  const ctrl = document.getElementById('controls');
  if (ctrl.contains(e.target)) return;
  toggleFreeze();
  resetControlsTimer();
});

document.getElementById('app').addEventListener('dblclick', function(e) {
  const ctrl = document.getElementById('controls');
  if (ctrl.contains(e.target)) return;
  const q = quotes[currentIndex];
  const txt = `"${q.text}" — ${q.author}`;
  navigator.clipboard.writeText(txt).then(() => {
    showToast('📋 Panoya kopyalandı');
  }).catch(() => {
    showToast('⚠ Kopyalanamadı');
  });
});

// Controls hide/show
function startControlsTimer() {
  if (controlsTimer) clearTimeout(controlsTimer);
  controlsTimer = setTimeout(() => {
    document.getElementById('controls').style.opacity = '0';
    document.getElementById('counter').style.opacity = '0';
    controlsVisible = false;
  }, 10000);
}

function resetControlsTimer() {
  document.getElementById('controls').style.opacity = '1';
  document.getElementById('counter').style.opacity = '1';
  controlsVisible = true;
  startControlsTimer();
}

document.addEventListener('mousemove', resetControlsTimer);
document.addEventListener('touchstart', resetControlsTimer);

// Screenshot - Manuel Canvas
function takeScreenshot() {
  const q = quotes[currentIndex];
  const canvas = document.createElement('canvas');
  const scale = 2;
  canvas.width  = window.innerWidth  * scale;
  canvas.height = window.innerHeight * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);
  const W = window.innerWidth;
  const H = window.innerHeight;

  // Siyah arka plan
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  // Vignette
  const vignette = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.85);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.8)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  // Altın yatay çizgi
  const lineY = H/2 - 80;
  const lineGrad = ctx.createLinearGradient(W/2-60, 0, W/2+60, 0);
  lineGrad.addColorStop(0, 'rgba(200,169,110,0)');
  lineGrad.addColorStop(0.5, 'rgba(200,169,110,0.8)');
  lineGrad.addColorStop(1, 'rgba(200,169,110,0)');
  ctx.strokeStyle = lineGrad;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W/2 - 60, lineY);
  ctx.lineTo(W/2 + 60, lineY);
  ctx.stroke();

  // Font boyutunu mevcut element'ten al
  const quotEl = document.getElementById('quote-text');
  const currentFontSize = parseInt(window.getComputedStyle(quotEl).fontSize) || 28;

  // Söz metni - word wrap
  const maxW = W * 0.75;
  const quoteStr = `"${q.text}"`;
  ctx.font = `300 italic ${currentFontSize}px "Crimson Pro", Georgia, serif`;
  ctx.fillStyle = '#e8e0d0';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const words = quoteStr.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);

  const lineHeight = currentFontSize * 1.7;
  const totalH = lines.length * lineHeight;
  let startY = H/2 - totalH/2 + lineHeight/2 - 10;

  for (const l of lines) {
    ctx.fillText(l, W/2, startY);
    startY += lineHeight;
  }

  // Yazar
  ctx.font = `400 13px "Share Tech Mono", monospace`;
  ctx.fillStyle = '#c8a96e';
  ctx.letterSpacing = '0.3em';
  ctx.fillText(`— ${q.author}`.toUpperCase(), W/2, startY + 20);

  // Tag
  ctx.font = `400 10px "Share Tech Mono", monospace`;
  ctx.fillStyle = '#8b1a1a';
  ctx.fillText(`[ ${q.tag} ]`, W/2, startY + 44);

  // İndir
  const a = document.createElement('a');
  a.download = 'philosophy-quote.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
  showToast('📸 Kaydedildi');
}

function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = `
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      background:rgba(0,0,0,0.92); border:1px solid rgba(200,169,110,0.4);
      color:#c8a96e; font-family:'Share Tech Mono',monospace;
      font-size:14px; letter-spacing:0.2em; padding:18px 32px;
      z-index:9999; pointer-events:none; text-align:center;
      transition:opacity 0.4s ease; white-space:nowrap;
    `;
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { toast.style.opacity = '0'; }, 2800);
}

// Font size
// Tercihleri yükle
const savedPrefs = (() => { try { return JSON.parse(localStorage.getItem('phil_prefs')) || {}; } catch { return {}; } })();
let fontSize = savedPrefs.fontSize || 32;
const minFont = 16, maxFont = 56;
function changeFontSize(dir) {
  fontSize = Math.min(maxFont, Math.max(minFont, fontSize + dir * 2));
  document.getElementById('quote-text').style.fontSize = fontSize + 'px';
  savePrefs();
  showToast('Aa  ' + fontSize + 'px');
}

// Font picker
const fonts = [
  { name: 'Crimson Pro',       label: 'Crimson Pro',        weight: '300', style: 'italic' },
  { name: 'Crimson Pro',       label: 'Crimson Pro Bold',   weight: '700', style: 'italic' },
  { name: 'Lora',              label: 'Lora',               weight: '400', style: 'italic' },
  { name: 'Lora',              label: 'Lora Bold',          weight: '700', style: 'italic' },
  { name: 'Merriweather',      label: 'Merriweather',       weight: '300', style: 'italic' },
  { name: 'Merriweather',      label: 'Merriweather Bold',  weight: '700', style: 'italic' },
  { name: 'Playfair Display',  label: 'Playfair Display',   weight: '400', style: 'italic' },
  { name: 'Playfair Display',  label: 'Playfair Bold',      weight: '700', style: 'italic' },
  { name: 'Cormorant Garamond',label: 'Cormorant Light',    weight: '300', style: 'italic' },
  { name: 'Cormorant Garamond',label: 'Cormorant Bold',     weight: '600', style: 'italic' },
  { name: 'EB Garamond',       label: 'EB Garamond',        weight: '400', style: 'italic' },
  { name: 'PT Serif',          label: 'PT Serif',           weight: '400', style: 'italic' },
  { name: 'PT Serif',          label: 'PT Serif Bold',      weight: '700', style: 'normal' },
  { name: 'Source Serif 4',    label: 'Source Serif Light', weight: '300', style: 'italic' },
  { name: 'Source Serif 4',    label: 'Source Serif Bold',  weight: '600', style: 'italic' },
  { name: 'Josefin Sans',      label: 'Josefin Sans Light', weight: '300', style: 'normal' },
  { name: 'Josefin Sans',      label: 'Josefin Sans Bold',  weight: '700', style: 'normal' },
  { name: 'Raleway',           label: 'Raleway Light',      weight: '300', style: 'italic' },
  { name: 'Raleway',           label: 'Raleway Bold',       weight: '700', style: 'normal' },
  { name: 'Libre Baskerville', label: 'Libre Baskerville',  weight: '400', style: 'italic' },
];
let currentFont = fonts.find(f => f.label === savedPrefs.fontLabel) || fonts[0];
let fontPickerOpen = false;

function savePrefs() {
  try {
    localStorage.setItem('phil_prefs', JSON.stringify({
      fontSize,
      fontLabel: currentFont.label
    }));
  } catch {}
}

function buildFontPicker() {
  const panel = document.getElementById('font-picker');
  panel.innerHTML = '';
  fonts.forEach(f => {
    const isActive = f.name === currentFont.name && f.label === currentFont.label;
    const btn = document.createElement('button');
    btn.style.cssText = `
      background: ${isActive ? 'rgba(200,169,110,0.15)' : 'transparent'};
      border: 1px solid ${isActive ? 'rgba(200,169,110,0.5)' : 'rgba(255,255,255,0.07)'};
      color: #e8e0d0; border-radius:8px; padding:10px 16px; cursor:pointer;
      font-family:'${f.name}', serif; font-style:${f.style}; font-weight:${f.weight}; font-size:17px;
      text-align:left; width:100%; transition:background 0.2s;
    `;
    btn.textContent = f.label;
    btn.onmouseover = () => btn.style.background = 'rgba(200,169,110,0.1)';
    btn.onmouseout  = () => btn.style.background = isActive ? 'rgba(200,169,110,0.15)' : 'transparent';
    btn.onclick = () => {
      currentFont = f;
      applyFont();
      savePrefs();
      buildFontPicker();
      toggleFontPicker();
    };
    panel.appendChild(btn);
  });
}

function applyFont() {
  const el = document.getElementById('quote-text');
  el.style.fontFamily  = `'${currentFont.name}', serif`;
  el.style.fontStyle   = currentFont.style;
  el.style.fontWeight  = currentFont.weight;
  showToast(currentFont.label);
}

function applyPrefs() {
  const el = document.getElementById('quote-text');
  el.style.fontSize    = fontSize + 'px';
  el.style.fontFamily  = `'${currentFont.name}', serif`;
  el.style.fontStyle   = currentFont.style;
  el.style.fontWeight  = currentFont.weight;
}

function toggleFontPicker() {
  const panel = document.getElementById('font-picker');
  fontPickerOpen = !fontPickerOpen;
  if (fontPickerOpen) {
    buildFontPicker();
    panel.style.display = 'flex';
  } else {
    panel.style.display = 'none';
  }
}

// Fullscreen
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); if (!frozen) { nextQuote(); resetControlsTimer(); } }
  if (e.key === 'ArrowLeft') { e.preventDefault(); if (!frozen) { prevQuote(); resetControlsTimer(); } }
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === ' ' && frozen) { e.preventDefault(); toggleFreeze(); }
  if (e.key === 'p' || e.key === 'P') toggleFreeze();
  if (e.key === 's' || e.key === 'S') takeScreenshot();
});
