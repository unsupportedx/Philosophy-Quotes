    { text: "He knew the dreadful significance of that word 'captivity', not through books but through experience — the experience of pain, humiliation, and degradation.", author: "Leo Tolstoy — War and Peace", tag: "PAIN" },
    { text: "Everything I know, I know because I love.", author: "Leo Tolstoy — War and Peace", tag: "EXISTENCE" },
    { text: "To love life is to love God. Harder and more blessed than all else is to love this life in one's sufferings, in undeserved sufferings.", author: "Leo Tolstoy — War and Peace", tag: "PAIN" },
    { text: "The wolf cannot be accused of bloodthirstiness: he only follows his nature. But the man who destroys other men — he is guilty.", author: "Leo Tolstoy — War and Peace", tag: "TRAGEDY" },
    { text: "Fear of death is like fear of life. A man who lives fully is prepared to die at any time.", author: "Leo Tolstoy — War and Peace", tag: "TRAGEDY" },
    { text: "Sorrow is the lot of man, but not an unmitigated evil.", author: "Leo Tolstoy — War and Peace", tag: "PAIN" },
    { text: "The cannon ball flew, as it always does, with a whistle, and landed in a little crowd of men and killed two and seriously wounded one.", author: "Leo Tolstoy — War and Peace", tag: "TRAGEDY" },
{ text: "If God did not exist, it would be necessary to invent him.", author: "Voltaire", tag: "EXISTENCE" },
    { text: "To know that we know what we know, and to know that we do not know what we do not know — that is true knowledge.", author: "Nicolaus Copernicus", tag: "EXISTENCE" },
    { text: "The most beautiful thing we can experience is the mysterious. It is the source of all true art and science.", author: "Albert Einstein", tag: "EXISTENCE" },
    { text: "Two things fill the mind with ever new and increasing admiration and awe: the starry sky above me and the moral law within me.", author: "Immanuel Kant", tag: "EXISTENCE" },
    { text: "Act only according to that maxim whereby you can at the same time will that it should become a universal law.", author: "Immanuel Kant", tag: "EXISTENCE" },
    { text: "We are not human beings having a spiritual experience. We are spiritual beings having a human experience.", author: "Pierre Teilhard de Chardin", tag: "EXISTENCE" },
    { text: "God is dead, and we have killed him. How shall we comfort ourselves, the murderers of all murderers?", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "Perhaps God is not dead; perhaps God is himself mad.", author: "Elie Wiesel", tag: "EXISTENCE" },
    { text: "The cradle rocks above an abyss, and common sense tells us that our existence is but a brief crack of light between two eternities of darkness.", author: "Vladimir Nabokov", tag: "EXISTENCE" },
    { text: "Man is the only creature who refuses to be what he is.", author: "Albert Camus", tag: "EXISTENCE" },
    { text: "I think therefore I am — but what am I? A thing that thinks.", author: "René Descartes", tag: "EXISTENCE" },
    { text: "To be or not to be, that is the question.", author: "William Shakespeare", tag: "EXISTENCE" },
    { text: "The universe is under no obligation to make sense to you.", author: "Neil deGrasse Tyson", tag: "EXISTENCE" },
    { text: "We are all just walking each other home.", author: "Ram Dass", tag: "EXISTENCE" },
    { text: "Out of suffering have emerged the strongest souls; the most massive characters are seared with scars.", author: "Khalil Gibran", tag: "PAIN" },
    { text: "Man is born free, and everywhere he is in chains.", author: "Jean-Jacques Rousseau", tag: "EXISTENCE" },
    { text: "Hell is oneself, hell is alone, the other figures in it merely projections.", author: "T.S. Eliot", tag: "TRAGEDY" },
    { text: "The eternal silence of these infinite spaces frightens me.", author: "Blaise Pascal", tag: "EXISTENCE" },
    { text: "What is man in nature? Nothing in relation to the infinite, everything in relation to nothing, a mean between nothing and everything.", author: "Blaise Pascal", tag: "EXISTENCE" },
    { text: "The heart has its reasons which reason does not know.", author: "Blaise Pascal", tag: "EXISTENCE" },
    { text: "Man is but a reed, the most feeble thing in nature; but he is a thinking reed.", author: "Blaise Pascal", tag: "EXISTENCE" },
    { text: "We know the truth not only by the reason but by the heart.", author: "Blaise Pascal", tag: "EXISTENCE" },
    { text: "All of humanity's problems stem from man's inability to sit quietly in a room alone.", author: "Blaise Pascal", tag: "TRAGEDY" },
    { text: "God is not willing to do everything, and thus take away our free will and the share of glory which belongs to us.", author: "Niccolò Machiavelli", tag: "EXISTENCE" },
    { text: "The life of man is solitary, poor, nasty, brutish, and short.", author: "Thomas Hobbes", tag: "TRAGEDY" },
    { text: "I am that which must always overcome itself.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "To live is to suffer; to survive is to find some meaning in the suffering.", author: "Friedrich Nietzsche", tag: "PAIN" },
    { text: "What is done out of love always takes place beyond good and evil.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "The secret for harvesting from existence the greatest fruitfulness and the greatest enjoyment is — to live dangerously.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "We have art in order not to die of the truth.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "The higher the type, the more rarely does it succeed.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "It is not a lack of love, but a lack of friendship that makes unhappy marriages.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "Whoever fights monsters should see to it that in the process he does not become a monster. For when you look long into the abyss, the abyss looks into you.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "God is a thought who makes crooked all that is straight.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "The world itself is the will to power — and nothing else.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "What if a demon crept after you one night in your loneliest loneliness and said: this life, as you now live it and have lived it, you will have to live once more and countless times more.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "The will to power is the fundamental drive of all living things — not the will to survive, but the will to grow, to expand, to overcome.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "The world is will and representation; beyond that, nothing.", author: "Arthur Schopenhauer", tag: "EXISTENCE" },
    { text: "Man can do what he wills but he cannot will what he wills.", author: "Arthur Schopenhauer", tag: "EXISTENCE" },
    { text: "Compassion is the basis of morality.", author: "Arthur Schopenhauer", tag: "EXISTENCE" },
    { text: "The two enemies of human happiness are pain and boredom.", author: "Arthur Schopenhauer", tag: "TRAGEDY" },
    { text: "After your death you will be what you were before your birth.", author: "Arthur Schopenhauer", tag: "EXISTENCE" },
    { text: "The safest way of not being miserable is not to want to be very happy.", author: "Arthur Schopenhauer", tag: "TRAGEDY" },
    { text: "The deep pain that is felt at the death of every friendly soul arises from the feeling that there is in every individual something which is inexpressible, peculiar to him alone, and is, therefore, absolutely and irretrievably lost.", author: "Arthur Schopenhauer", tag: "PAIN" },
    { text: "To live alone is the fate of all great souls.", author: "Arthur Schopenhauer", tag: "SOLITUDE" },
    { text: "In the consciousness of the truth he has perceived, man now sees everywhere only the awfulness or the absurdity of existence.", author: "Arthur Schopenhauer", tag: "EXISTENCE" },
    { text: "The greatest achievements of the human mind are generally received with distrust.", author: "Arthur Schopenhauer", tag: "TRAGEDY" },
    { text: "Existence is the hell of the beautiful.", author: "Arthur Schopenhauer", tag: "TRAGEDY" },
    { text: "Faith: not wanting to know what is true.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "God does not play dice with the universe.", author: "Albert Einstein", tag: "EXISTENCE" },
    { text: "The most incomprehensible thing about the universe is that it is comprehensible.", author: "Albert Einstein", tag: "EXISTENCE" },
    { text: "Reality is merely an illusion, albeit a very persistent one.", author: "Albert Einstein", tag: "EXISTENCE" },
    { text: "Time is an illusion.", author: "Albert Einstein", tag: "EXISTENCE" },
    { text: "The distinction between the past, present and future is only a stubbornly persistent illusion.", author: "Albert Einstein", tag: "EXISTENCE" },
    { text: "Everything existing in the universe is the fruit of chance and necessity.", author: "Democritus", tag: "EXISTENCE" },
    { text: "The atoms move in the void.", author: "Democritus", tag: "EXISTENCE" },
    { text: "Nothing exists except atoms and empty space; everything else is opinion.", author: "Democritus", tag: "EXISTENCE" },
    { text: "God is the infinite sphere whose center is everywhere and circumference nowhere.", author: "Hermes Trismegistus", tag: "EXISTENCE" },
    { text: "We are made of star stuff.", author: "Carl Sagan", tag: "EXISTENCE" },
    { text: "The cosmos is within us. We are made of star-stuff. We are a way for the universe to know itself.", author: "Carl Sagan", tag: "EXISTENCE" },
    { text: "In the beginning was the Word, and the Word was with God, and the Word was God.", author: "The Bible — John 1:1", tag: "EXISTENCE" },
    { text: "The fear of the Lord is the beginning of wisdom.", author: "The Bible — Proverbs 9:10", tag: "EXISTENCE" },
    { text: "For what is a man profited, if he shall gain the whole world, and lose his own soul?", author: "The Bible — Matthew 16:26", tag: "EXISTENCE" },
    { text: "The Lord is my shepherd; I shall not want.", author: "The Bible — Psalm 23:1", tag: "EXISTENCE" },
    { text: "God does not exist. He is silence.", author: "Ingmar Bergman", tag: "EXISTENCE" },
    { text: "If God exists, everything is permitted — for him.", author: "Albert Camus", tag: "EXISTENCE" },
    { text: "Does God exist? I don't know — and neither do you.", author: "Bertrand Russell", tag: "EXISTENCE" },
    { text: "The idea of God is the sole wrong for which I cannot forgive mankind.", author: "Marquis de Sade", tag: "EXISTENCE" },
    { text: "Man created God in his own image.", author: "Ludwig Feuerbach", tag: "EXISTENCE" },
    { text: "Religion is the sigh of the oppressed creature, the heart of a heartless world, and the soul of soulless conditions. It is the opium of the people.", author: "Karl Marx", tag: "TRAGEDY" },
    { text: "God is not what you imagine or what you think you understand. If you understand, you have failed.", author: "Saint Augustine", tag: "EXISTENCE" },
    { text: "You have made us for yourself, O Lord, and our heart is restless until it rests in you.", author: "Saint Augustine", tag: "EXISTENCE" },
    { text: "Our heart is restless until it rests in Thee.", author: "Saint Augustine", tag: "EXISTENCE" },
    { text: "To fall in love with God is the greatest romance; to seek him the greatest adventure; to find him, the greatest human achievement.", author: "Saint Augustine", tag: "EXISTENCE" },
    { text: "God is that, the greater than which nothing can be conceived.", author: "Anselm of Canterbury", tag: "EXISTENCE" },
    { text: "I am an atheist, out and out. It took me a long time to say it. I've been an atheist for years and years, but somehow I felt it was intellectually unrespectable to say one was an atheist.", author: "Isaac Asimov", tag: "EXISTENCE" },
    { text: "The most beautiful emotion we can experience is the mystical. It is the power of all true art and science.", author: "Albert Einstein", tag: "EXISTENCE" },
    { text: "Not only is the universe stranger than we think, it is stranger than we can think.", author: "Werner Heisenberg", tag: "EXISTENCE" },
    { text: "The observer is the observed.", author: "Jiddu Krishnamurti", tag: "EXISTENCE" },
    { text: "The thing that hath been, it is that which shall be; and that which is done is that which shall be done: and there is no new thing under the sun.", author: "King Solomon", tag: "TRAGEDY" },
    { text: "One generation passeth away, and another generation cometh: but the earth abideth for ever.", author: "King Solomon", tag: "TRAGEDY" },
    { text: "I have seen all the works that are done under the sun; and, behold, all is vanity and vexation of spirit.", author: "King Solomon", tag: "TRAGEDY" },
    { text: "For in much wisdom is much grief: and he that increaseth knowledge increaseth sorrow.", author: "King Solomon", tag: "PAIN" },
    { text: "There is no remembrance of former things; neither shall there be any remembrance of things that are to come.", author: "King Solomon", tag: "TRAGEDY" },
    { text: "Dasein is the entity for which Being is a question.", author: "Martin Heidegger", tag: "EXISTENCE" },
    { text: "The most thought-provoking thing in our thought-provoking time is that we are still not thinking.", author: "Martin Heidegger", tag: "TRAGEDY" },
    { text: "Anxiety is the mood that discloses the nullity of human existence.", author: "Martin Heidegger", tag: "EXISTENCE" },
    { text: "Death is the possibility of the absolute impossibility of Dasein.", author: "Martin Heidegger", tag: "EXISTENCE" },
    { text: "Language is the house of Being.", author: "Martin Heidegger", tag: "EXISTENCE" },
    { text: "Thrownness: we find ourselves already thrown into a world we did not choose.", author: "Martin Heidegger", tag: "EXISTENCE" },
    { text: "Being-toward-death is the most proper possibility of existence.", author: "Martin Heidegger", tag: "EXISTENCE" },
    { text: "Why is there something rather than nothing?", author: "Gottfried Wilhelm Leibniz", tag: "EXISTENCE" },
    { text: "God has chosen to create this world because it is the best of all possible worlds.", author: "Gottfried Wilhelm Leibniz", tag: "EXISTENCE" },
    { text: "I think God, in creating man, somewhat overestimated his ability.", author: "Oscar Wilde", tag: "TRAGEDY" },
    { text: "Nature is written in the language of mathematics.", author: "Galileo Galilei", tag: "EXISTENCE" },
    { text: "Eppur si muove — and yet it moves.", author: "Galileo Galilei", tag: "EXISTENCE" },
    { text: "God is a geometer.", author: "Plato", tag: "EXISTENCE" },
    { text: "The soul is immortal, and the truest life is yet to come.", author: "Plato", tag: "EXISTENCE" },
    { text: "The measure of a man is what he does with power.", author: "Plato", tag: "EXISTENCE" },
    { text: "We are twice armed if we fight with faith.", author: "Plato", tag: "EXISTENCE" },
    { text: "Good people do not need laws to tell them to act responsibly, while bad people will find a way around the laws.", author: "Plato", tag: "TRAGEDY" },
    { text: "God is Truth and Light his shadow.", author: "Plato", tag: "EXISTENCE" },
    { text: "The essence of God is existence, and he defines himself as: I Am that I Am.", author: "Paul Tillich", tag: "EXISTENCE" },
    { text: "God is the ground of being.", author: "Paul Tillich", tag: "EXISTENCE" },
    { text: "The courage to be is rooted in the God who appears when God has disappeared in the anxiety of doubt.", author: "Paul Tillich", tag: "EXISTENCE" },
    { text: "Deus sive Natura — God or Nature.", author: "Baruch Spinoza", tag: "EXISTENCE" },
    { text: "God is not the creator of the world; God is the world.", author: "Baruch Spinoza", tag: "EXISTENCE" },
    { text: "Anything finite, existing in time, is a mode of the infinite substance we call God or Nature.", author: "Baruch Spinoza", tag: "EXISTENCE" },
    { text: "The more clearly you understand yourself and your emotions, the more you become a lover of what is.", author: "Baruch Spinoza", tag: "EXISTENCE" },
    { text: "Blessedness is not the reward of virtue, but virtue itself.", author: "Baruch Spinoza", tag: "EXISTENCE" },
    { text: "Freedom is the recognition of necessity.", author: "Baruch Spinoza", tag: "EXISTENCE" },
    { text: "The highest activity a human being can attain is learning for understanding, because to understand is to be free.", author: "Baruch Spinoza", tag: "EXISTENCE" },
    { text: "I would rather have questions that can't be answered than answers that can't be questioned.", author: "Richard Feynman", tag: "EXISTENCE" },
    { text: "The first gulp from the glass of natural sciences will turn you into an atheist, but at the bottom of the glass God is waiting for you.", author: "Werner Heisenberg", tag: "EXISTENCE" },
  ],
  tr: [
    { text: "Gerçekte acı çektiğimizden çok hayalimizde acı çekeriz.", author: "Seneca", tag: "TRAJEDY" },
    { text: "Yaşamak acı çekmektir; hayatta kalmak ise bu acıda anlam aramaktır.", author: "Friedrich Nietzsche", tag: "ACI" },
    { text: "Ölüm bizim için hiçbir şeydir; biz varken ölüm yoktur, ölüm geldiğinde ise biz artık yokuz.", author: "Epicurus", tag: "VAROLUŞ" },
    { text: "Kışın en derin noktasında, sonunda içimde yenilmez bir yaz taşıdığımı öğrendim.", author: "Albert Camus", tag: "ACI" },
    { text: "Hepimiz yalnız doğduk, yalnız yaşadık ve yalnız öleceğiz.", author: "Hunter S. Thompson", tag: "YALNIZLIK" },
    { text: "Cehennem başkalarıdır.", author: "Jean-Paul Sartre", tag: "TRAJEDY" },
    { text: "Sisifos'u mutlu tasavvur etmek gerekir.", author: "Albert Camus", tag: "TRAJEDY" },
    { text: "Her şey kazanıldığı an yitirilir.", author: "Arthur Schopenhauer", tag: "TRAJEDY" },
    { text: "Hayat, hiçbir zaman gerçekleşmeyecek bir şeye yapılan uzun bir hazırlıktır.", author: "W.B. Yeats", tag: "TRAJEDY" },
    { text: "Yara, ışığın içeri girdiği yerdir.", author: "Rumi", tag: "ACI" },
    { text: "Acı kaçınılmazdır; ıstırap ise bir seçimdir.", author: "Haruki Murakami", tag: "ACI" },
    { text: "Beni öldürmeyen şey beni güçlendirir.", author: "Friedrich Nietzsche", tag: "ACI" },
    { text: "Ölüm korkusu, yaşam korkusundan kaynaklanır.", author: "Mark Twain", tag: "TRAJEDY" },
    { text: "Sevmek, savunmasız kalmayı göze almaktır.", author: "C.S. Lewis", tag: "ACI" },
    { text: "Yalnızlık benliğin yoksulluğudur; yalnız başınalık ise benliğin zenginliği.", author: "May Sarton", tag: "YALNIZLIK" },
    { text: "Hayat acıdır.", author: "Gautama Buddha", tag: "ACI" },
    { text: "Bütünüyle yaşamak, acıyla var olmaktır.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "İnsan, yaşamak için cesaretlendirilmesi gereken tek hayvandır.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "İnsanın korkması gereken ölüm değil; hiç yaşamamış olmaktır.", author: "Marcus Aurelius", tag: "VAROLUŞ" },
    { text: "Hayatın trajedisi çok erken bitmesi değil; ona başlamak için çok uzun beklememizdedir.", author: "W.M. Lewis", tag: "TRAJEDY" },
    { text: "Işık vermek isteyen önce yanmayı göze almalıdır.", author: "Viktor Frankl", tag: "ACI" },
    { text: "Gerçekten ciddi olan tek felsefi sorun intihardır.", author: "Albert Camus", tag: "TRAJEDY" },
    { text: "En ağır yoksulluk yalnızlıktır.", author: "Teresa Ana", tag: "YALNIZLIK" },
    { text: "Hayatın olduğu her yerde acı da vardır.", author: "Arthur Schopenhauer", tag: "ACI" },
    { text: "Her şey boştur ve ruhun bir sıkıntısıdır.", author: "Kral Süleyman", tag: "TRAJEDY" },
    { text: "Her insan iki kez ölür: nefes almayı bıraktığında ve biri adını son kez andığında.", author: "Banksy", tag: "TRAJEDY" },
    { text: "Hayat yakından bakıldığında bir trajedi, uzaktan bakıldığında bir komedydir.", author: "Charlie Chaplin", tag: "TRAJEDY" },
    { text: "Karanlık olmadan yıldızlar parıldayamaz.", author: "D.H. Sidebottom", tag: "ACI" },
    { text: "Varoluş özden önce gelir.", author: "Jean-Paul Sartre", tag: "VAROLUŞ" },
    { text: "En ağır yük yaşanmamış bir hayattır.", author: "C.G. Jung", tag: "TRAJEDY" },
    { text: "Gölgesiz güneş olmaz; geceyi tanımak zorunludur.", author: "Albert Camus", tag: "TRAJEDY" },
    { text: "Güçlü olmak tek seçenek haline gelene dek, ne denli güçlü olduğunu bilemezsin.", author: "Bob Marley", tag: "ACI" },
    { text: "Her güçlüğün içinde bir fırsat saklıdır.", author: "Albert Einstein", tag: "ACI" },
    { text: "Hepimiz kırığız. Işık içeri oradan girer.", author: "Ernest Hemingway", tag: "ACI" },
    { text: "En güçlü ruhlar acının içinden çıkar; en derin karakterler izler ve yaralar taşır.", author: "Khalil Gibran", tag: "ACI" },
    { text: "Acı bir ceza değil, bir arınmadır.", author: "Paramahansa Yogananda", tag: "ACI" },
    { text: "Savaşın sonunu yalnızca ölüler görmüştür.", author: "Platon", tag: "TRAJEDY" },
    { text: "İnsan en çok, korktuğu ama hiç gelmeyecek olan acıdan acı çeker.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Nazik ol; karşılaştığın herkes zorlu bir savaş veriyor.", author: "Platon", tag: "ACI" },
    { text: "Bilinç bir hastalıktır.", author: "Miguel de Unamuno", tag: "TRAJEDY" },
    { text: "Çoğu insan sessiz bir umutsuzluk içinde yaşar.", author: "Henry David Thoreau", tag: "TRAJEDY" },
    { text: "Ölmek bir sanattır. Her şey gibi, bunu da son derece iyi yaparım.", author: "Sylvia Plath", tag: "TRAJEDY" },
    { text: "Fırtınalardan korkmuyorum; gemimi kullanmayı öğreniyorum çünkü.", author: "Louisa May Alcott", tag: "ACI" },
    { text: "Korkaklar ölmeden önce defalarca ölür; cesurlar ölümü yalnızca bir kez tadar.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Hayat yürüyen bir gölgedir; sahnede saatini dolduran yoksul bir oyuncu gibi çırpınır, sonra bir daha duyulmaz.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Cehennem boştur; tüm şeytanlar burada.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Yarın, ve yarın, ve yarın; bu sıradan tempoda günden güne sürünür.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Savaş her şeyin babasıdır.", author: "Heraklitos", tag: "TRAJEDY" },
    { text: "İki şey sonsuzdur: evren ve insan aptallığı. Evren konusunda emin değilim.", author: "Albert Einstein", tag: "TRAJEDY" },
    { text: "Hepimiz bataklığın içindeyiz, ama bazılarımız yıldızlara bakıyor.", author: "Oscar Wilde", tag: "TRAJEDY" },
    { text: "Hayatta yalnızca iki trajedi vardır: istediğini elde edememek ve onu elde etmek.", author: "Oscar Wilde", tag: "TRAJEDY" },
    { text: "Acı çekmek tek bir uzun andır; onu mevsimlere bölmek mümkün değildir.", author: "Oscar Wilde", tag: "ACI" },
    { text: "Karanlık karanlığı yenemez; bunu yalnızca ışık yapabilir.", author: "Martin Luther King Jr.", tag: "ACI" },
    { text: "Önemli olan şeyler hakkında sustuğumuz gün, hayatımız sona ermeye başlar.", author: "Martin Luther King Jr.", tag: "TRAJEDY" },
    { text: "Uçamıyorsan koş, koşamıyorsan yürü, yürüyemiyorsan sürün; ama her halükarda ilerlemeye devam et.", author: "Martin Luther King Jr.", tag: "ACI" },
    { text: "Sonunda hatırlayacağımız, düşmanlarımızın sözleri değil; dostlarımızın sessizliği olacak.", author: "Martin Luther King Jr.", tag: "TRAJEDY" },
    { text: "En büyük zafer hiç düşmemekte değil, her seferinde yeniden ayağa kalkmaktadır.", author: "Konfüçyüs", tag: "ACI" },
    { text: "İnsanlığın tüm mutsuzluğu, bir odada sessizce oturamamasından kaynaklanır.", author: "Blaise Pascal", tag: "TRAJEDY" },
    { text: "Hayat, arzu ile hayal kırıklığı arasında durmaksızın salınan bir sarkaçtır.", author: "Arthur Schopenhauer", tag: "TRAJEDY" },
    { text: "Acı, ruhun henüz keşfedilmemiş derinliklerine açılan bir kapıdır.", author: "Kahil Gibran", tag: "ACI" },
    { text: "Sevinç ve hüzün aynı kuyudan çekilir; ne kadar derin acı içersen o kadar çok sevinç sığar içine.", author: "Kahil Gibran", tag: "ACI" },
    { text: "İnsanlığı sevmek kolaydır; tek tek insanları sevmek ise güçtür.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Acıdan kaçmayan ve onunla büyüyen ruh, en derin olgunluğa ulaşır.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Bize yıkım gibi görünen şey, aslında yenilenmenin ta kendisidir.", author: "Rumi", tag: "ACI" },
    { text: "Bir ağacın kökü ne kadar derinse, fırtınalara o kadar dayanır.", author: "Rumi", tag: "ACI" },
    { text: "Ölüm lambayı söndürmek değildir; şafak sökerken onu kapatmaktır.", author: "Rabindranath Tagore", tag: "TRAJEDY" },
    { text: "Güneş hayatından çekildi diye ağlama; gözyaşların yıldızları görmeni engeller.", author: "Rabindranath Tagore", tag: "ACI" },
    { text: "Varoluş özden önce gelir.", author: "Jean-Paul Sartre", tag: "VAROLUŞ" },
    { text: "Beni yok etmeyen şey beni güçlendirir.", author: "Friedrich Nietzsche", tag: "ACI" },
    { text: "Bilinç bir hastalıktır.", author: "Miguel de Unamuno", tag: "TRAJEDY" },
    { text: "Harabenin içinde gizlenmiş bir hazine vardır.", author: "Rumi", tag: "ACI" },
    { text: "Güzelliği görebilen ruh zaman zaman yalnız yürümek zorundadır.", author: "Johann Wolfgang von Goethe", tag: "YALNIZLIK" },
    { text: "Hiç kimse özgür olduğunu sanarak köleleşenler kadar umutsuz bir esaret içinde değildir.", author: "Johann Wolfgang von Goethe", tag: "TRAJEDY" },
    { text: "Karanlık karanlığı yenemez; bunu yalnızca ışık yapabilir.", author: "Martin Luther King Jr.", tag: "ACI" },
    { text: "Önemli olan şeyler hakkında sustuğumuz gün, hayatlarımız sona ermeye başlar.", author: "Martin Luther King Jr.", tag: "TRAJEDY" },
    { text: "Uçamıyorsan koş, koşamıyorsan yürü, yürüyemiyorsan sürün; ama ne olursa olsun ilerlemeyi bırakma.", author: "Martin Luther King Jr.", tag: "ACI" },
    { text: "Ya kardeşler gibi birlikte yaşamayı öğreniriz ya da ahmaklar gibi birlikte yok oluruz.", author: "Martin Luther King Jr.", tag: "TRAJEDY" },
    { text: "İki şey sonsuzdur: evren ve insan aptallığı. Evren konusunda emin değilim.", author: "Albert Einstein", tag: "TRAJEDY" },
    { text: "İnsan, hayvan ile Üstün İnsan arasında gerilmiş bir iptir — bir uçurumun üzerinde.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Ne kadar yüksek uçarsak, uçamayanların gözünde o kadar küçük görünürüz.", author: "Friedrich Nietzsche", tag: "YALNIZLIK" },
    { text: "Bireyde delilik nadirdir; ama gruplar, partiler, uluslar ve çağlar söz konusu olduğunda kural haline gelir.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "Derisini değiştiremeyerek kalmak zorunda olan yılan ölmek zorundadır.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Amacını unutmak aptallığın en yaygın biçimidir.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "Her derin düşünür, anlaşılamamaktan değil; anlaşılmaktan korkar.", author: "Friedrich Nietzsche", tag: "YALNIZLIK" },
    { text: "Gerçekte umut, tüm kötülüklerin en kötüsüdür; çünkü insanın acısını uzatır.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "İnsanın iktidara karşı mücadelesi, hafızanın unutmaya karşı mücadelesidir.", author: "Milan Kundera", tag: "TRAJEDY" },
    { text: "Utancın kaynağı kişisel bir başarısızlık değil, ezilmenin aşağılayıcı yenilgisidir.", author: "Milan Kundera", tag: "ACI" },
    { text: "İnsan zamanı daireler çizmez; düz bir çizgide ilerler.", author: "Milan Kundera", tag: "VAROLUŞ" },
    { text: "İyimserlik halkın afyonudur.", author: "Milan Kundera", tag: "TRAJEDY" },
    { text: "Hüzün, tutkuyla sevenler için bir mutluluk biçimidir.", author: "Milan Kundera", tag: "ACI" },
    { text: "Işığın yoğunluğu, karanlığın derinliğiyle doğru orantılıdır.", author: "Hermann Hesse", tag: "ACI" },
    { text: "Bazılarımız tutunmanın bizi güçlü kıldığını düşünür; oysa asıl güç zaman zaman bırakmaktır.", author: "Hermann Hesse", tag: "ACI" },
    { text: "İçinde bir sessizlik ve sığınak vardır; istediğinde oraya çekilebilirsin.", author: "Hermann Hesse", tag: "YALNIZLIK" },
    { text: "Yalnızca gerçek benliğimin sesine göre yaşamak istedim. Neden bu kadar zordu ki?", author: "Hermann Hesse", tag: "TRAJEDY" },
    { text: "Bir şeyi unutmak istediğimizde, o şey belleğe en derin biçimde kazınır.", author: "Michel de Montaigne", tag: "ACI" },
    { text: "Kayıp değişimden başka bir şey değildir; değişim ise evrenin özüdür.", author: "Marcus Aurelius", tag: "TRAJEDY" },
    { text: "Kişi kendisi olmaktan vazgeçtiğinde en derin yalnızlığa düşer.", author: "C.G. Jung", tag: "YALNIZLIK" },
    { text: "İnsan ancak yitirdiğinde neye gerçekten sahip olduğunu anlar.", author: "Paulo Coelho", tag: "ACI" },
    { text: "Zaman iyileşmeyen yaraları sarar; ama iyileşmiş olanları da yeniden açar.", author: "Friedrich Nietzsche", tag: "ACI" },
    { text: "Ne kadar çok sevebiliyorsa insan, o kadar derin acı çekebilir.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Her şeyin bir bedeli vardır; bedelsiz güzellik diye bir şey yoktur.", author: "Rainer Maria Rilke", tag: "ACI" },
    { text: "Ağlamak zayıflık değildir; çok uzun süre güçlü kalmak zorunda kaldığının kanıtıdır.", author: "Anonim", tag: "ACI" },
    { text: "Sessizlik zaman zaman en yüksek çığlıktır.", author: "Anonim", tag: "ACI" },
    { text: "Acı bir anlam taşıdığında katlanılabilir hale gelir.", author: "Viktor Frankl", tag: "ACI" },
    { text: "Dünya yalnızca acı çekmekle geçmez; onu aşmakla da.", author: "Viktor Frankl", tag: "ACI" },
    { text: "Asıl güç yıkılmamakta değil, yıkıldıktan sonra yeniden ayağa kalkmaktadır.", author: "Anonim", tag: "ACI" },
    { text: "Ölüm, korkulanların en büyüğüdür; zira bir son gibi görünür.", author: "Aristoteles", tag: "TRAJEDY" },
    { text: "Yalnızlığı seven ya tanrıdır ya hayvandır; insan değil.", author: "Aristoteles", tag: "YALNIZLIK" },
    { text: "Yaşlılık doğanın son eseri değil, ilk tasarımıdır.", author: "Platon", tag: "TRAJEDY" },
    { text: "Aşk, ölümsüzlüğe duyulan özlemdir.", author: "Platon", tag: "VAROLUŞ" },
    { text: "Modern insan sahip olduğu şeylerin kölesi haline gelmiştir.", author: "Erich Fromm", tag: "TRAJEDY" },
    { text: "Acı, büyümenin kaçınılmaz bedelidir.", author: "Erich Fromm", tag: "ACI" },
    { text: "İnsan yalnız kaldığında kendini bulur.", author: "Henry David Thoreau", tag: "YALNIZLIK" },
    { text: "Büyük zafer hiç düşmemekte değil, her düşüşte yeniden kalkmaktadır.", author: "Nelson Mandela", tag: "ACI" },
    { text: "Çiçek açmak için önce toprağın altında beklemek gerekir.", author: "Rumi", tag: "ACI" },
    { text: "Ölüm yalnızca bir kapıdır; öte yanı bilinmezdir.", author: "Sokrates", tag: "TRAJEDY" },
    { text: "Yitirilen anlar, belleğin en güçlü kalesidir.", author: "Marcel Proust", tag: "ACI" },
    { text: "İnsanın içindeki şeytanlar yabancılardan daha tehlikelidir.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Çile insanı ya kırar ya da olgunlaştırır.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Her insan kendi cehennemini içinde taşır.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Dünya anlamını acı çekenden alır.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Ölümle yüzleşmeden hayatı tam olarak anlayamazsın.", author: "Leo Tolstoy", tag: "TRAJEDY" },
    { text: "İnsanlık tarihi, acı ile umudun dansıdır.", author: "Victor Hugo", tag: "TRAJEDY" },
    { text: "Başarısızlık başarının ilk adımıdır.", author: "Oprah Winfrey", tag: "ACI" },
    { text: "Yıldızlar yalnızca karanlıkta görünür.", author: "Anonim", tag: "ACI" },
    { text: "İnsanın en büyük gücü, kırıldığı yerden yeniden bütünleşmesidir.", author: "Anonim", tag: "ACI" },
    { text: "Zaman en iyi öğretmendir; ne var ki öğrencilerini öldürür.", author: "Hector Berlioz", tag: "TRAJEDY" },
    { text: "Tüm insanlık trajedisi, insanın bir odada sessizce oturamamasından kaynaklanır.", author: "Blaise Pascal", tag: "TRAJEDY" },
    { text: "Anlamsızlıkla yüzleşmek, en derin cesaret eylemidir.", author: "Albert Camus", tag: "VAROLUŞ" },
    { text: "Geçici bir karanlığa katlanmak, sonsuz bir ışığa açılır.", author: "C.S. Lewis", tag: "ACI" },
    { text: "Acı insanı dönüştürür; yok etmez.", author: "C.S. Lewis", tag: "ACI" },
    { text: "Her kahraman yolculuğu bir ölüm ve yeniden doğuştur.", author: "Joseph Campbell", tag: "VAROLUŞ" },
    { text: "Ölümü düşünmek hayatı derinleştirir.", author: "Seneca", tag: "TRAJEDY" },
    { text: "Gerçek acı korkudan beslenir.", author: "Seneca", tag: "ACI" },
{ text: "Savaşın sonunu yalnızca ölüler görmüştür.", author: "Platon", tag: "TRAJEDY" },
    { text: "Savaş her şeyin babasıdır.", author: "Heraklitos", tag: "TRAJEDY" },
    { text: "Savaşta gerçek, ilk kayıptır.", author: "Aiskhylos", tag: "TRAJEDY" },
    { text: "Savaş, siyasetin başka araçlarla sürdürülmesidir.", author: "Carl von Clausewitz", tag: "TRAJEDY" },
    { text: "Bir savaşı kazanamazsın; tıpkı bir depremi kazanamayacağın gibi.", author: "Jeannette Rankin", tag: "TRAJEDY" },
    { text: "Savaşta yarasız asker yoktur.", author: "José Narosky", tag: "ACI" },
    { text: "Savaş kimin haklı olduğunu değil, kimin hayatta kaldığını belirler.", author: "Bertrand Russell", tag: "TRAJEDY" },
    { text: "Savaşı yaşlılar ilan eder; ama savaşmak ve ölmek zorunda kalanlar gençlerdir.", author: "Herbert Hoover", tag: "TRAJEDY" },
    { text: "Savaş ne denli zorunlu ya da haklı görünürse görünsün, bir suçtur.", author: "Ernest Hemingway", tag: "TRAJEDY" },
    { text: "Savaş, dilin tükendiği yerdir.", author: "Margaret Atwood", tag: "TRAJEDY" },
    { text: "Savaş açmadan önce, cephede can çekişen bir askerin donuk gözlerine bakan herkes çok daha iyi düşünürdü.", author: "Otto von Bismarck", tag: "TRAJEDY" },
    { text: "Bir insanın ölümü trajedidir; milyonların ölümü ise istatistik.", author: "Joseph Stalin", tag: "TRAJEDY" },
    { text: "Barışta oğullar babalarını gömer; savaşta ise babalar oğullarını.", author: "Herodotos", tag: "TRAJEDY" },
    { text: "Ben Ölüm oldum, dünyanın yıkıcısı.", author: "J. Robert Oppenheimer", tag: "TRAJEDY" },
    { text: "Savaş sanatının tamamı aldatmaya dayanır.", author: "Sun Tzu", tag: "TRAJEDY" },
    { text: "Savaşın en yüce biçimi düşmanı savaşmadan yenmektir.", author: "Sun Tzu", tag: "TRAJEDY" },
    { text: "Savaş örgütlü cinayetten başka bir şey değildir.", author: "Harry Patch", tag: "TRAJEDY" },
    { text: "Onlar bizim gibi yaşlanmayacak.", author: "Laurence Binyon", tag: "TRAJEDY" },
    { text: "Savaş bir macera değildir; bir hastalıktır, tifüs gibi.", author: "Antoine de Saint-Exupéry", tag: "TRAJEDY" },
    { text: "İnsanlık savaşa son vermek zorundadır; aksi halde savaş insanlığa son verecektir.", author: "John F. Kennedy", tag: "TRAJEDY" },
    { text: "Savaşlar, barışçıl bir gelecek inşa etmek için berbat aletlerdir.", author: "Martin Luther King Jr.", tag: "TRAJEDY" },
{ text: "Başkalarını sevebilmek için önce kendimizi sevmeyi öğrenmemiz gerekir.", author: "Sabahattin Ali", tag: "ACI" },
    { text: "İnsan yaşadıkça, sevdikçe, acı çektikçe ve düşündükçe gerçek anlamda insan olur.", author: "Sabahattin Ali", tag: "VAROLUŞ" },
    { text: "Seni seviyorum; bu benim en büyük günahım.", author: "Sabahattin Ali", tag: "ACI" },
    { text: "Yalnızlık insanı büyütür, olgunlaştırır; ama zaman zaman eritir de.", author: "Sabahattin Ali", tag: "YALNIZLIK" },
    { text: "İnsanlar birbirini en çok birbirinden bir şey beklerken incitirler.", author: "Sabahattin Ali", tag: "ACI" },
    { text: "Sevmek, karşılıksız kalacağını bile bile sevmektir.", author: "Sabahattin Ali", tag: "ACI" },
    { text: "Bir insan başkasını tümüyle anlayabilir mi? Anlayabilir mi ki — kendi kendini bile anlayamıyor.", author: "Sabahattin Ali", tag: "YALNIZLIK" },
    { text: "En derin yalnızlık, kalabalığın ortasında duyulan yalnızlıktır.", author: "Sabahattin Ali", tag: "YALNIZLIK" },
    { text: "Kalbim çok şey gördü, çok şey bildi; ama hiçbirini kimseye anlatamadım.", author: "Sabahattin Ali", tag: "YALNIZLIK" },
    { text: "Sevilmek istiyorsan sev; ama sevildiğinde bunu belli etme.", author: "Sabahattin Ali", tag: "ACI" },
    { text: "Hayatta en çok acı çekenler, en çok sevenlerdir.", author: "Sabahattin Ali", tag: "ACI" },
    { text: "Gerçek aşk karşılıksız olandır; karşılık beklemek bir tür alışverişe dönüşür.", author: "Sabahattin Ali", tag: "ACI" },
    { text: "İnsan kendisiyle baş başa kalınca, içinin derinliklerinde ne denli yabancılar sakladığını fark eder.", author: "Sabahattin Ali", tag: "YALNIZLIK" },
    { text: "Yaşamak için değil, sevmek için yaşamak gerekir.", author: "Sabahattin Ali", tag: "VAROLUŞ" },
    { text: "En derin yalnızlık sevilmemek değil; anlaşılamamaktır.", author: "Sabahattin Ali", tag: "YALNIZLIK" },
    { text: "Ruhun gıdası acıdır; sevinç uyuşturur, acı ise uyandırır.", author: "Peyami Safa", tag: "ACI" },
    { text: "Aşk, insana hem en büyük mutluluğu hem en derin acıyı yaşatan tek şeydir.", author: "Peyami Safa", tag: "ACI" },
    { text: "Kendi ruhunu tanımayan insan başkalarını anlayamaz.", author: "Peyami Safa", tag: "VAROLUŞ" },
    { text: "Acı çekmeden olgunlaşmak mümkün değildir.", author: "Peyami Safa", tag: "ACI" },
    { text: "Her şeyi kaybetmek insanı ya mahveder ya da yeniden inşa eder.", author: "Peyami Safa", tag: "TRAJEDY" },
    { text: "Yürek, mantığın kavrayamadığı şeyleri anlar.", author: "Peyami Safa", tag: "VAROLUŞ" },
    { text: "Bir insan ne zaman olgunlaşır? Hayatın acısını tattığında.", author: "Peyami Safa", tag: "ACI" },
    { text: "Sevmek acı verse de, hiç sevmemiş olmak çok daha büyük bir acıdır.", author: "Peyami Safa", tag: "ACI" },
    { text: "Ruh, maddenin zincirleri arasında çırpınan bir kuştur.", author: "Peyami Safa", tag: "VAROLUŞ" },
    { text: "Anlamamak insanları birbirinden uzaklaştırır; ama bazen anlamak da aynı şeyi yapar.", author: "Peyami Safa", tag: "YALNIZLIK" },
    { text: "Her şeyin bir bedeli vardır; aşkın bedeli acıdır.", author: "Peyami Safa", tag: "ACI" },
    { text: "Hayatın anlamını yitirmek, hayatın kendisini yitirmekten daha korkunçtur.", author: "Peyami Safa", tag: "TRAJEDY" },
    { text: "İnsan kendi karanlığıyla yüzleşmeden ışığa ulaşamaz.", author: "Peyami Safa", tag: "TRAJEDY" },
    { text: "Sevgi paylaşıldıkça bitmez; acı ise paylaşıldıkça hafifler.", author: "Peyami Safa", tag: "ACI" },
    { text: "Sessizlik zaman zaman en yüksek çığlıktır.", author: "Orhan Pamuk", tag: "YALNIZLIK" },
    { text: "Hayatın anlamını yitirdiğimde kitaplara sığınırım.", author: "Orhan Pamuk", tag: "YALNIZLIK" },
    { text: "Hepimiz gelmeyecek birini bekliyoruz.", author: "Orhan Pamuk", tag: "YALNIZLIK" },
    { text: "Keder insanı daha derin bir yere taşır; ama bazen o derinlikte yolunu kaybeder.", author: "Orhan Pamuk", tag: "ACI" },
    { text: "Hatırlamak bir tür yas tutmaktır.", author: "Orhan Pamuk", tag: "ACI" },
    { text: "İstanbul'un hüznü şehrin kendisinde değil, onu seyreden insanların içindedir.", author: "Orhan Pamuk", tag: "YALNIZLIK" },
    { text: "Mutluluk peşinden koştukça uzaklaşır.", author: "Orhan Pamuk", tag: "TRAJEDY" },
    { text: "İnsan unutabilmek için hatırlar.", author: "Orhan Pamuk", tag: "ACI" },
    { text: "Bazı şeyleri ancak kaybettikten sonra anlarsınız.", author: "Orhan Pamuk", tag: "ACI" },
    { text: "Bir şehri sevmek, onun hüznünü de kucaklamaktır.", author: "Orhan Pamuk", tag: "YALNIZLIK" },
    { text: "Var olmak, anlaşılmayı beklemektir.", author: "Orhan Pamuk", tag: "VAROLUŞ" },
    { text: "Geçmiş hiçbir zaman geçmez; sadece birikir.", author: "Orhan Pamuk", tag: "TRAJEDY" },
    { text: "Her şeyin bir sonu vardır; ama bazı sonlar hiç bitmez.", author: "Orhan Pamuk", tag: "TRAJEDY" },
    { text: "Kimi zaman kendinize en büyük yabancısınızdır.", author: "Orhan Pamuk", tag: "YALNIZLIK" },
    { text: "Bir insan ne zaman gerçekten yalnızdır? Kendi sesini duyamadığında.", author: "Orhan Pamuk", tag: "YALNIZLIK" },
    { text: "Aşk bir tür deliliktir; ama en güzel deliliktir.", author: "Orhan Pamuk", tag: "ACI" },
    { text: "Savaş yalnızca kahramanları değil, masumları da yok eder.", author: "Orhan Pamuk", tag: "TRAJEDY" },
    { text: "İnsan kendi gölgesinden kaçamaz.", author: "Orhan Pamuk", tag: "VAROLUŞ" },
    { text: "Hafıza insanı hem kurtarır hem de mahveder.", author: "Orhan Pamuk", tag: "TRAJEDY" },
    { text: "Batı Cephesi'nde yeni bir şey yoktu; yalnızca ölüm.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "On sekiz yaşındaydık; hayatı ve dünyayı sevmeye yeni başlamıştık — ve onu paramparça etmek zorunda kaldık.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Savaş yalnızca bedenleri değil, ruhları da öldürür.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Bu kitap ne bir suçlama ne bir itiraftır; en az da bir macera — çünkü ölüm, onunla yüz yüze gelenlere macera değildir.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Genç görünüyoruz. Ama büyümedik. Büyüyemeyeceğiz de.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "İnsanlar birbirini neden öldürür? Çünkü emredilmiş.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Hayatta kalmak, kimi zaman en ağır yük olabilir.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Savaşın bıraktığı boşluğu hiçbir şey dolduramaz.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Kafamız değişti; ama ruhlarımız hâlâ geride kaldı.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Bilge olmak acı çekmektir.", author: "Franz Kafka", tag: "ACI" },
    { text: "Sonsuz umut vardır; ama bizim için değil.", author: "Franz Kafka", tag: "TRAJEDY" },
    { text: "Ben bir kafesim, içime girecek bir kuş arıyorum.", author: "Franz Kafka", tag: "YALNIZLIK" },
    { text: "Özgürsün; ve bu yüzden kaybolmuşsun.", author: "Franz Kafka", tag: "TRAJEDY" },
    { text: "Kavrayışı olmayan biri için her şey bir yük haline gelir.", author: "Franz Kafka", tag: "TRAJEDY" },
    { text: "İçimdeki şeyleri kimseye anlatamıyordum; anlasalardı bile ne değişecekti ki?", author: "Franz Kafka", tag: "YALNIZLIK" },
    { text: "Bir kitap, içimizdeki donmuş denizi kırmaya yarayan balta olmalıdır.", author: "Franz Kafka", tag: "VAROLUŞ" },
    { text: "Yazmak; ıssız bir iniş, kendi soğuk derinliklerine açılan bir yol.", author: "Franz Kafka", tag: "YALNIZLIK" },
    { text: "Suçluluk hiçbir zaman sorgulanmamalıdır.", author: "Franz Kafka", tag: "TRAJEDY" },
    { text: "Hayatın anlamı durmakta yatar.", author: "Franz Kafka", tag: "TRAJEDY" },
    { text: "Dürüst ve vicdanlı olmak acı çektirir.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Acı çekmek; derin bir zekanın ve derin bir yüreğin kaçınılmaz sonucudur.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Sevmek acı çekmektir; başka türlü sevgi olamaz.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "En karanlık gece, en parlak yıldızları barındırır.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Kendine yalan söyleyen insan gerçeği bir türlü göremez.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Hasta bir adamım. Huysuz bir adamım.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Her insanın yalnızca kendine anlatabileceği şeyler vardır.", author: "Fyodor Dostoyevski", tag: "YALNIZLIK" },
    { text: "İnsanın yaşamak için bir nedene ihtiyacı vardır; o neden varsa neredeyse her şeye katlanabilir.", author: "Fyodor Dostoyevski", tag: "VAROLUŞ" },
    { text: "Varoluşun sırrı yalnızca yaşamakta değil; ne için yaşadığını bulmaktadır.", author: "Fyodor Dostoyevski", tag: "VAROLUŞ" },
    { text: "Eğer Tanrı yoksa, her şey mubahtır.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "İnsanlar acılarını sayar durur; mutluluklarını ise unutur.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Acı büyük ruhları olgunlaştırır.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Gülmeyi öğrenmek için önce ağlamayı bilmek gerekir.", author: "Fyodor Dostoyevski", tag: "ACI" },
{ text: "Sorgulanmamış bir hayat yaşamaya değmez.", author: "Sokrates", tag: "VAROLUŞ" },
    { text: "Bildiğim tek şey, hiçbir şey bilmediğimdir.", author: "Sokrates", tag: "TRAJEDY" },
    { text: "İnsan özgür olmaya mahkûmdur.", author: "Jean-Paul Sartre", tag: "VAROLUŞ" },
    { text: "Bizi öldürmeyen şey bizi güçlendirir.", author: "Friedrich Nietzsche", tag: "ACI" },
    { text: "Umut, en son ölen şeydir.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "Düşünüyorum, öyleyse varım.", author: "René Descartes", tag: "VAROLUŞ" },
    { text: "Hayat ileriye doğru yaşanır; ama ancak geriye bakıldığında anlaşılır.", author: "Søren Kierkegaard", tag: "VAROLUŞ" },
    { text: "İnsan istediğini yapabilir; ama isteyeceğini seçemez.", author: "Arthur Schopenhauer", tag: "TRAJEDY" },
    { text: "Derin olan her şey bir maske takmayı sever.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "İnsan ancak yalnız kaldığında gerçekten kendisi olabilir.", author: "Arthur Schopenhauer", tag: "YALNIZLIK" },
    { text: "Kaygı, özgürlüğün verdiği baş dönmesidir.", author: "Søren Kierkegaard", tag: "VAROLUŞ" },
{ text: "Aşka düşene dek uyku halindeyizdir.", author: "Lev Tolstoy — Savaş ve Barış", tag: "VAROLUŞ" },
    { text: "Tüm savaşçıların en güçlü ikisi: Zaman ve Sabır.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "Herkes kendi inançları için savaşsaydı, hiç savaş olmazdı.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "Yalınlık, iyilik ve gerçek olmayan yerde büyüklük de yoktur.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "İçi sızlarken insan nasıl iyi olabilir ki?", author: "Lev Tolstoy — Savaş ve Barış", tag: "ACI" },
    { text: "Savaş, kibar bir eğlence değil, hayatın en iğrenç şeyidir; ve bunu anlayıp savaşı oynamamak gerekir.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "Hayatın hiçbir koşulunda insan hem mutlu hem de acıdan tamamen özgür olamaz.", author: "Lev Tolstoy — Savaş ve Barış", tag: "ACI" },
    { text: "Dünya benim için ikiye ayrılmıştır: birinde o var ve orada mutluluk, umut, ışık vardır; öbüründe o yoktur ve orada her şey karanlık ve kasvet.", author: "Lev Tolstoy — Savaş ve Barış", tag: "ACI" },
    { text: "Gökyüzü! Burada değil, şimdi değil — orada, sonsuzluğun içinde.", author: "Lev Tolstoy — Savaş ve Barış", tag: "VAROLUŞ" },
    { text: "Ölümden korkan insanın hiçbir şeye gerçekten sahip olamaz. Ama ölümden korkmayan kişiye her şey aittir.", author: "Lev Tolstoy — Savaş ve Barış", tag: "VAROLUŞ" },
    { text: "Bilebileceğimiz tek şey, hiçbir şey bilmediğimizdir. Ve bu insan bilgeliğinin zirvesidir.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "Muharebe meydanındaki asker şan ya da vatan düşünmez. Yalnızca nasıl öldürülmeyeceğini düşünür.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "Savaş, bir nezaket oyunu değil; hayatın en bayağı şeyidir.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "Tarihsel olaylarda sözde büyük adamlar, olaylara ad veren etiketlerdir; ve etiketler gibi olayla en küçük bağlantıya sahiptirler.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "Ölüm korkunç bir şeydir. Her şeyin sonu. Ölümden sonra hiçbir şey yoktur.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "Her şeyi biliyorum çünkü seviyorum.", author: "Lev Tolstoy — Savaş ve Barış", tag: "VAROLUŞ" },
    { text: "Hayatı sevmek Tanrı'yı sevmektir. Her şeyden daha zor ve daha kutsal olan, acı içinde bile bu hayatı sevmektir.", author: "Lev Tolstoy — Savaş ve Barış", tag: "ACI" },
    { text: "Kurt, kana susamışlıkla suçlanamaz; yalnızca doğasına uyar. Ama insanları yok eden adam — o suçludur.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "Ölüm korkusu, yaşam korkusu gibidir. Hayatını eksiksiz yaşayan insan, her an ölmeye hazırdır.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "Top mermisi, her zaman olduğu gibi ıslık çalarak uçtu ve küçük bir adam kalabalığının içine düştü; ikisini öldürdü, birini ağır yaraladı.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "Esaret sözcüğünün korkunç anlamını kitaplardan değil; acı, aşağılanma ve yıkım deneyiminden öğrendi.", author: "Lev Tolstoy — Savaş ve Barış", tag: "ACI" },
    { text: "Alışılmış yollarımızdan sürüldüğümüzde her şeyin bittiğini sanırız; oysa ancak o zaman yeni ve iyi olan başlar.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "En zor ama en zorunlu şey — hayatı sevmek. Acı içinde bile, haksız acılar içinde bile onu sevmek. Çünkü hayat her şeydir. Hayat Tanrı'dır.", author: "Lev Tolstoy — Savaş ve Barış", tag: "ACI" },
    { text: "Keder insanın kaderidir; ama mutlak bir kötülük değildir.", author: "Lev Tolstoy — Savaş ve Barış", tag: "ACI" },
    { text: "Tanrı öldü. Tanrı ölü kalmaya devam ediyor. Ve onu biz öldürdük.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Saçma, insanın ihtiyacı ile dünyanın mantıksız sessizliği arasındaki çatışmadan doğar.", author: "Albert Camus", tag: "VAROLUŞ" },
    { text: "Hayatın sefaletinden kaçışın tek yolu sanat ve aşktır.", author: "Arthur Schopenhauer", tag: "TRAJEDY" },
    { text: "Beşik bir uçurumun üzerinde sallanır; sağduyu bize, varoluşumuzun iki sonsuz karanlık arasındaki kısa bir ışık yarığından ibaret olduğunu söyler.", author: "Vladimir Nabokov", tag: "VAROLUŞ" },
    { text: "O güzel geceye usulca girme.", author: "Dylan Thomas", tag: "TRAJEDY" },
    { text: "Memento mori — öleceğini unutma.", author: "Stoacı Gelenek", tag: "VAROLUŞ" },
    { text: "Diz çökerek yaşamaktansa ayakta ölmeyi tercih ederim.", author: "Emiliano Zapata", tag: "VAROLUŞ" },
    { text: "Bazen yaşamak bile bir cesaret eylemidir.", author: "Seneca", tag: "TRAJEDY" },
    { text: "Umutsuzluğun en yaygın biçimi, olduğun kişi olamamaktır.", author: "Søren Kierkegaard", tag: "VAROLUŞ" },
    { text: "Her şey geçer, her şey yok olur ve her şey sıkar.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "Görmek eylemi, bir tür ölümdür.", author: "Paul Virilio", tag: "TRAJEDY" },
    { text: "Karanlık olmadan hiçbir şey doğmaz; ışık olmadan hiçbir şey çiçek açmaz.", author: "May Sarton", tag: "ACI" },
    { text: "Derin bir nefes aldım ve kalbimin eski övüncünü dinledim: Varım, varım, varım.", author: "Sylvia Plath", tag: "VAROLUŞ" },
    { text: "Ölmek inanılmaz büyük bir macera olacak.", author: "J.M. Barrie", tag: "TRAJEDY" },
    { text: "Bana özgürlük ver, ya da ölümü.", author: "Patrick Henry", tag: "VAROLUŞ" },
    { text: "Çoğu insan sessiz bir umutsuzluk içinde yaşar ve içlerindeki şarkıyla mezara gider.", author: "Henry David Thoreau", tag: "TRAJEDY" },
    { text: "Hayat nedir? Gecede bir ateşböceğinin kısa parıltısıdır.", author: "Crowfoot", tag: "TRAJEDY" },
    { text: "Sıkıntı tüm kötülüklerin köküdür — kendisi olmayı umutsuzca reddetmek.", author: "Søren Kierkegaard", tag: "TRAJEDY" },
    { text: "Her aptal mutlu olabilir. Bizi ağlatan şeyden güzellik çıkarmak gerçek yürekliliği gerektirir.", author: "Clive Barker", tag: "ACI" },
    { text: "Cennete gitmek istemiyorum. Dostlarımın hiçbiri orada değil.", author: "Oscar Wilde", tag: "TRAJEDY" },
    { text: "Ölüm ne kadar güzel olmalı. Yumuşak kahverengi toprağın içinde yatmak, tepende dalgalanan çimenlerle.", author: "Oscar Wilde", tag: "TRAJEDY" },
    { text: "Sinik, her şeyin fiyatını bilen ama hiçbir şeyin değerini bilmeyen insandır.", author: "Oscar Wilde", tag: "TRAJEDY" },
    { text: "Günümüzde insanlar her şeyin fiyatını bilir ama hiçbir şeyin değerini bilmez.", author: "Oscar Wilde", tag: "TRAJEDY" },
    { text: "Küçük Nell'in ölümünü gülmeden okumak için taş yürekli olmak gerekir.", author: "Oscar Wilde", tag: "TRAJEDY" },
    { text: "İyimserliğin temeli saf terördür.", author: "Oscar Wilde", tag: "TRAJEDY" },
    { text: "Aşkın gizemi ölümün gizeminden büyüktür.", author: "Oscar Wilde", tag: "VAROLUŞ" },
    { text: "Yürekler kırılmak için yaratılmıştır.", author: "Oscar Wilde", tag: "ACI" },
    { text: "Korkuyla gerçekten yüzleştiğin her deneyimden güç, cesaret ve özgüven kazanırsın.", author: "Eleanor Roosevelt", tag: "ACI" },
    { text: "Mizah anlayışım olmasaydı, çok önce intihar etmiş olurdum.", author: "Mahatma Gandhi", tag: "TRAJEDY" },
    { text: "Hayat ne kadar kısa olursa olsun, zamanı dikkatsizce harcayarak onu daha da kısaltırız.", author: "Victor Hugo", tag: "TRAJEDY" },
    { text: "Alt sınıflarda her zaman üst sınıfların insanlığından daha fazla sefalet vardır.", author: "Victor Hugo", tag: "TRAJEDY" },
    { text: "Bana sağlıklı bir adam göster, onu senin için tedavi edeyim.", author: "C.G. Jung", tag: "TRAJEDY" },
    { text: "Acı çekmeden bilinç kazanılamaz.", author: "C.G. Jung", tag: "ACI" },
    { text: "Yalnızlık etrafında insan olmamasından değil; kendine önemli görünen şeyleri aktaramamaktan kaynaklanır.", author: "C.G. Jung", tag: "YALNIZLIK" },
    { text: "Bir insan başkalarından daha fazlasını bilirse yalnızlaşır.", author: "C.G. Jung", tag: "YALNIZLIK" },
    { text: "Zor zamanlar kararlılık ve iç güç inşa eder. Onlar aracılığıyla öfkenin işe yaramazlığını da kavrayabiliriz.", author: "Dalay Lama XIV", tag: "ACI" },
    { text: "En büyük iyiyi yapma potansiyeli, en büyük zorluk altında mevcuttur.", author: "Dalay Lama XIV", tag: "ACI" },
    { text: "Gerçekten sevdiğim çok az insan var; hakkında iyi düşündüğüm daha da az.", author: "Jane Austen", tag: "YALNIZLIK" },
    { text: "İnsan sevinç ve keder için yaratıldı; bunu doğru anladığımızda dünyadan güvenle geçeriz.", author: "William Blake", tag: "ACI" },
    { text: "Uyaran ile tepki arasında bir boşluk vardır. O boşlukta tepkimizi seçme gücümüz yatar.", author: "Viktor Frankl", tag: "VAROLUŞ" },
    { text: "Hayat nedir? Bir yanılsama, bir gölge, bir hikâye.", author: "Pedro Calderón de la Barca", tag: "TRAJEDY" },
    { text: "Bir okuyucu ölmeden önce bin kez yaşar. Hiç okumayan insan yalnızca bir kez.", author: "George R.R. Martin", tag: "VAROLUŞ" },
    { text: "Dostluk, iki bedende barınan tek bir ruhtur.", author: "Aristoteles", tag: "VAROLUŞ" },
    { text: "Gerçek asker, karşısındakinden nefret ettiği için değil, gerisindekini sevdiği için savaşır.", author: "G.K. Chesterton", tag: "TRAJEDY" },
    { text: "Üretilen her silah, denize indirilen her savaş gemisi, fırlatılan her roket, sonuç olarak aç olanlardan ve doyurulmayanlardan yapılan bir hırsızlığı simgeler.", author: "Dwight D. Eisenhower", tag: "TRAJEDY" },
    { text: "Savaş başladığında ilk kayıp gerçektir.", author: "Hiram Johnson", tag: "TRAJEDY" },
    { text: "Savaşın ne denli zorunlu ya da haklı görünürse görünsün bir suç olmadığını asla düşünme.", author: "Ernest Hemingway", tag: "TRAJEDY" },
    { text: "Her şeyden çok asker barış için dua eder; zira savaşın en derin yaralarını ve izlerini taşımak zorunda olan odur.", author: "Douglas MacArthur", tag: "ACI" },
    { text: "Dünya güzel bir yer ve uğruna savaşmaya değer; onu terk etmek zorunda kalmaktan çok nefret ediyorum.", author: "Ernest Hemingway", tag: "TRAJEDY" },
    { text: "Tartışmalı bir barikat önünde Ölüm'le randevum var.", author: "Alan Seeger", tag: "TRAJEDY" },
    { text: "Dulce et decorum est pro patria mori — vatanı için ölmek tatlı ve onurludur.", author: "Horatius", tag: "TRAJEDY" },
    { text: "Sahillerde savaşacağız, çıkarma yerlerinde savaşacağız, tarlalarda savaşacağız — asla teslim olmayacağız.", author: "Winston Churchill", tag: "TRAJEDY" },
    { text: "Konuşmak her zaman savaşmaktan iyidir.", author: "Winston Churchill", tag: "TRAJEDY" },
    { text: "Savaşın amacı vatanın için ölmek değil; karşı taraftaki herifi kendi vatanı için öldürmektir.", author: "George S. Patton", tag: "TRAJEDY" },
    { text: "Hiçbir adam vatanı için ölmekle savaş kazanmadı. Kazandı; çünkü karşı taraftaki zavallı adamı kendi vatanı için öldürttü.", author: "George S. Patton", tag: "TRAJEDY" },
    { text: "Savaştan yalnızca onu yaşamış bir asker gibi nefret ediyorum; vahşetini, boşluğunu, aptallığını görmüş biri gibi.", author: "Dwight D. Eisenhower", tag: "TRAJEDY" },
    { text: "Kaosun ortasında fırsat da vardır — ama kaos her zaman önce gelir.", author: "Sun Tzu", tag: "TRAJEDY" },
    { text: "Sığır gibi ölenler için hangi geçit çanları?", author: "Wilfred Owen", tag: "TRAJEDY" },
    { text: "Konum Savaş ve Savaşın acımasıdır. Şiir acımada gizlidir.", author: "Wilfred Owen", tag: "TRAJEDY" },
    { text: "Bir barışçı bile hangi tarafın zaferinin daha az zararlı olacağını düşünmelidir.", author: "George Orwell", tag: "TRAJEDY" },
    { text: "Bizden on kişi öldürürsünüz, biz sizden bir kişi öldürürüz; ama sonunda önce siz bıkarsınız.", author: "Ho Chi Minh", tag: "TRAJEDY" },
    { text: "Hiçbir insan tek başına bir ada değildir; her insan kıtanın bir parçasıdır. Herhangi bir insanın ölümü beni küçültür.", author: "John Donne", tag: "TRAJEDY" },
    { text: "Tüm hayvanlar eşittir, ama bazı hayvanlar diğerlerinden daha eşittir.", author: "George Orwell", tag: "TRAJEDY" },
    { text: "Savaş barıştır. Özgürlük köleliktir. Cehalet güçtür.", author: "George Orwell", tag: "TRAJEDY" },
    { text: "Geleceğin resmini görmek istiyorsan, insan yüzüne sonsuza dek basan bir çizme hayal et.", author: "George Orwell", tag: "TRAJEDY" },
    { text: "Hepimiz benliğin zindanında ömür boyu hapis yatıyoruz.", author: "Cyril Connolly", tag: "YALNIZLIK" },
    { text: "En acı verici şey, birini fazla severken kendini kaybetmektir.", author: "Ernest Hemingway", tag: "ACI" },
    { text: "Yazmak için özel bir şey gerekmez. Tek yapman gereken bir daktilonun başına oturmak ve kanamaktır.", author: "Ernest Hemingway", tag: "ACI" },
    { text: "Zeki insanlarda mutluluk, bildiğim en nadir şeydir.", author: "Ernest Hemingway", tag: "TRAJEDY" },
    { text: "Dünya herkesi kırar; ve ardından pek çoğu kırık yerlerde güçlenir. Ama kırılmak istemeyenleri öldürür.", author: "Ernest Hemingway", tag: "TRAJEDY" },
    { text: "Hayatım boyunca bir şey aradım; döndüğüm her yerde biri bana onun ne olduğunu söylemeye çalıştı.", author: "Ralph Ellison", tag: "YALNIZLIK" },
    { text: "Zihnin dışına çıkmanın yolu yok mu?", author: "Sylvia Plath", tag: "TRAJEDY" },
    { text: "Yaşlanmaktan korkuyorum. Evlenmekten korkuyorum. Günde üç öğün yemek pişirmekten kurtar beni — rutinin amansız kafesinden kurtar.", author: "Sylvia Plath", tag: "TRAJEDY" },
    { text: "Bedeninin her zerresi benim için kendi bedenimki kadar değerlidir: acı ve hastalık içinde bile değerli olurdu.", author: "Charlotte Brontë", tag: "ACI" },
    { text: "Ruhlarımız neden yapılmış olursa olsun, onunki ile benimki aynıdır.", author: "Emily Brontë", tag: "ACI" },
    { text: "Ben senin kalbini kırmadım — sen kırdın; onu kırarken benimkini de kırdın.", author: "Emily Brontë", tag: "ACI" },
    { text: "Kitaplara ve içlerindeki şeylere her zaman dikkat etmeli; çünkü sözcüklerin bizi değiştirme gücü vardır.", author: "Cassandra Clare", tag: "VAROLUŞ" },
    { text: "Olduğum gibi varım, bu yeterli.", author: "Walt Whitman", tag: "VAROLUŞ" },
    { text: "Evreni rahatsız etmeye cesaret edebilir miyim?", author: "T.S. Eliot", tag: "VAROLUŞ" },
    { text: "Dünya böyle son bulur. Bir patlama değil; bir inlemeyle.", author: "T.S. Eliot", tag: "TRAJEDY" },
    { text: "Nisan en zalim aydır.", author: "T.S. Eliot", tag: "TRAJEDY" },
    { text: "Kedere kelimeler ver; konuşmayan keder, yüklü kalbe fısıldar ve onu kırmak ister.", author: "William Shakespeare", tag: "ACI" },
    { text: "İnsan ne müthiş bir yapıttır! Yine de benim için bu toz özü nedir ki?", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Uçuruma uzun süre bakarsan, uçurum da sana bakmaya başlar.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "Bana yalan söylediğin için değil, artık sana inanamayacağım için üzgünüm.", author: "Friedrich Nietzsche", tag: "ACI" },
    { text: "Her şey yoruma açıktır. Belirli bir zamanda hangi yorum egemen olursa, bu hakikatin değil gücün işlevidir.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "Gece ne kadar karanlıksa yıldızlar o kadar parlar. Keder ne kadar derinse Tanrı o kadar yakındır.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Kurtuluşun tek yolu şudur: Kendin üstlenip tüm insanların günahlarından sorumlu olursun.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Dünya cehenneme gitsin; ama çayımı mutlaka içmeliyim.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Bu dünyada doğruyu söylemekten daha zor, yaltaklanmaktan daha kolay hiçbir şey yoktur.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Her şeyden önce, kendine yalan söyleme. Kendine yalan söyleyen ve kendi yalanını dinleyen insan, eninde sonunda içindeki ya da çevresindeki gerçeği ayırt edemez hale gelir ve hem kendine hem başkalarına saygısını yitirir.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "İnsanların en çok korktuğu şey yeni bir adım atmak, yeni bir söz söylemektir.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Umutsuz yaşamak, yaşamayı bırakmaktır.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Hayatı, anlamından çok sevmek gerekir.", author: "Fyodor Dostoyevski", tag: "VAROLUŞ" },
    { text: "Bir toplumun uygarlık düzeyi, hapishanelerine girilerek ölçülebilir.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Eski kederin zamanla sessiz, tatlı bir sevince dönüşmesi, insan yaşamının büyük gizemlerinden biridir.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Şefkat, insan varoluşunun temel yasasıdır.", author: "Fyodor Dostoyevski", tag: "VAROLUŞ" },
    { text: "Kendin ile dünya arasındaki mücadelede, dünyayı tut.", author: "Franz Kafka", tag: "TRAJEDY" },
    { text: "Çoğu hayatta, o anda fark edilmeyen, geri dönüşün olmadığı bir nokta vardır.", author: "Graham Greene", tag: "TRAJEDY" },
    { text: "Kendimi ancak dayanılmaz derecede mutsuz olduğumda gerçekten hissediyorum.", author: "Franz Kafka", tag: "ACI" },
    { text: "Eğilme; sulandırma; mantıklı kılmaya çalışma; ruhunu moda uğruna düzenleme.", author: "Franz Kafka", tag: "VAROLUŞ" },
    { text: "Bu kadar kendinden emin olabilmeleri yalnızca aptallıkları sayesindedir.", author: "Franz Kafka", tag: "TRAJEDY" },
    { text: "Yazmayan bir yazar, deliliği davet eden bir canavardır.", author: "Franz Kafka", tag: "TRAJEDY" },
    { text: "Her devrim buharlaşır ve geriye yalnızca yeni bir bürokrasinin çamurunu bırakır.", author: "Franz Kafka", tag: "TRAJEDY" },
    { text: "Ormanda kaybolmuş çocuklar gibi kimsesiziz.", author: "Franz Kafka", tag: "YALNIZLIK" },
    { text: "Mantık gerçekten sarsılmaz olabilir; ama yaşamaya devam etmek isteyen bir insana direnemez.", author: "Franz Kafka", tag: "VAROLUŞ" },
    { text: "Zincirlerle bağlıyım. Zincirlerime dokunma.", author: "Franz Kafka", tag: "TRAJEDY" },
    { text: "Bazı şeyler ancak tam tersi yönde kasıtlı bir sıçrayışla elde edilebilir.", author: "Franz Kafka", tag: "VAROLUŞ" },
    { text: "Günahkârız; yalnızca Bilgi Ağacı'ndan yediğimiz için değil, henüz Yaşam Ağacı'ndan yemediğimiz için de.", author: "Franz Kafka", tag: "TRAJEDY" },
    { text: "Bildiğim her şeyi otuzumdan sonra öğrendim.", author: "Georges Clemenceau", tag: "VAROLUŞ" },
    { text: "En karanlık gece bile sona erecek ve güneş doğacak.", author: "Victor Hugo", tag: "TRAJEDY" },
    { text: "Melankoli, üzgün olmanın mutluluğudur.", author: "Victor Hugo", tag: "ACI" },
    { text: "Hayatın büyük kederleri için cesaret, küçükleri için sabır.", author: "Victor Hugo", tag: "ACI" },
    { text: "Duyulmamak susmak için bir neden değildir.", author: "Victor Hugo", tag: "TRAJEDY" },
    { text: "Ben bir ormanım ve karanlık ağaçlarla dolu bir gecem; ama karanlığımdan korkmayan, selvi ağaçlarımın altında gül dolu kıyılar bulacak.", author: "Friedrich Nietzsche", tag: "YALNIZLIK" },
    { text: "İntihar düşüncesi büyük bir teselliye sahiptir; bu sayede pek çok karanlık gece atlatılır.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "Yalnızlıkta, yalnız olan kendini yer; kalabalıkta ise kalabalık onu yer.", author: "Friedrich Nietzsche", tag: "YALNIZLIK" },
    { text: "Müzik olmasa, hayat bir yanılgı olurdu.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "Dans eden bir yıldız doğurabilmek için içinde hâlâ kaos taşıman gerekir.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Gerçekler yoktur, yalnızca yorumlar vardır.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Kendi alevinde yanmaya hazır olmalısın; önce kül olmadan nasıl yeniden doğabilirsin ki?", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "İnsan yalnızca Tanrı'nın bir hatası mıdır? Yoksa Tanrı yalnızca insanın bir hatası mı?", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "İnançlar, gerçeğin yalanlardan daha tehlikeli düşmanlarıdır.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "En az bir kez dans etmediğimiz her günü kayıp saymalıyız.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Yalnızlığım insanların varlığına ya da yokluğuna bağlı değildir; bilakis, karşılığında gerçek bir arkadaşlık sunmadan yalnızlığımı çalanlardan nefret ederim.", author: "Friedrich Nietzsche", tag: "YALNIZLIK" },
    { text: "Dikkat et; şeytanını kovalarken içindeki en iyi şeyi de kovmamalısın.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "İnsan çabaladığı sürece yanılır.", author: "Johann Wolfgang von Goethe", tag: "TRAJEDY" },
    { text: "Karın evrende usulca yağdığını ve tüm yaşayanların ve ölülerin üzerine, son sonlarının inişi gibi, usulca düştüğünü duyarken ruhu yavaşça bayıldı.", author: "James Joyce", tag: "TRAJEDY" },
    { text: "Hayatından bıkmıştı. Gördüğü tek neden buydu.", author: "James Joyce", tag: "TRAJEDY" },
    { text: "Hiçbir insan gecenin acısını çekene dek sabahın kalbine ve gözüne ne kadar tatlı ve değerli olabileceğini bilemez.", author: "Bram Stoker", tag: "ACI" },
    { text: "Yalnız olmak istiyorum.", author: "Greta Garbo", tag: "YALNIZLIK" },
    { text: "Hayat büyük bir sürprizdir. Ölümün neden daha büyük bir sürpriz olmasın ki?", author: "Vladimir Nabokov", tag: "TRAJEDY" },
    { text: "Lolita, hayatımın ışığı, bellerimin ateşi. Günahım, ruhum.", author: "Vladimir Nabokov", tag: "TRAJEDY" },
    { text: "İngilizcede 'toska'nın tüm gölgelerini karşılayan tek bir sözcük yoktur. En derin ve en acı verici halinde, büyük bir ruhsal ıstırap hissidir.", author: "Vladimir Nabokov", tag: "ACI" },
    { text: "Her zamanki gibi. Başka türlü değil. Hep denendi. Hep başarısız olundu. Önemi yok. Yeniden dene. Yeniden başarısız ol. Daha iyi başarısız ol.", author: "Samuel Beckett", tag: "TRAJEDY" },
    { text: "Hepimiz deli doğarız. Bazılarımız öyle kalır.", author: "Samuel Beckett", tag: "TRAJEDY" },
    { text: "Hep bir şeyler buluruz, değil mi Didi, var olduğumuzu hissettirecek bir şeyler?", author: "Samuel Beckett", tag: "VAROLUŞ" },
    { text: "Yapılacak hiçbir şey yok.", author: "Samuel Beckett", tag: "TRAJEDY" },
    { text: "Devam edemiyorum. Devam edeceğim.", author: "Samuel Beckett", tag: "TRAJEDY" },
    { text: "Hep denendi. Hep başarısız olundu. Önemi yok. Yeniden dene. Yeniden başarısız ol. Daha iyi başarısız ol.", author: "Samuel Beckett", tag: "TRAJEDY" },
    { text: "Dünyanın gözyaşları sabit bir miktardır. Bir yerde ağlamaya başlayan her biri için başka bir yerde biri durur.", author: "Samuel Beckett", tag: "TRAJEDY" },
    { text: "Doğumu, onun ölümüydü.", author: "Samuel Beckett", tag: "TRAJEDY" },
    { text: "Karmaşayı barındıracak bir form bulmak — işte sanatçının şimdiki görevi bu.", author: "Samuel Beckett", tag: "VAROLUŞ" },
    { text: "Güneş, başka seçeneği olmadığından, yeni olmayan hiçbir şeyin üzerine parladı.", author: "Samuel Beckett", tag: "TRAJEDY" },
    { text: "Hatalarım benim hayatımdır.", author: "Samuel Beckett", tag: "TRAJEDY" },
    { text: "Estragon: Böyle devam edemem. Vladimir: Öyle düşündüğünü sanıyorsun.", author: "Samuel Beckett", tag: "TRAJEDY" },
    { text: "Artık genç değiliz. Dünyayı fethetmek istemiyoruz. Kaçıyoruz. Kendimizden kaçıyoruz. Hayatımızdan. On sekiz yaşındaydık; hayatı ve dünyayı sevmeye başlamıştık — ve onu paramparça etmek zorunda kaldık.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Gencim, yirmi yaşındayım; yine de hayattan yalnızca umutsuzluğu, ölümü, korkuyu ve bir keder uçurumunun üzerine örtülmüş anlamsız yüzeyselliği biliyorum.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Ekim 1918'de, tüm cephede o kadar sessiz ve durgun bir günde düştü ki, ordu raporu yalnızca tek bir cümleyle yetindi: Batı Cephesi'nde her şey sakin.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Halkların birbirine karşı nasıl kışkırtıldığını görüyorum; ve sessizce, bilmeden, aptalca, itaatle, masumca birbirlerini öldürüyorlar.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Asker, hükümetiyle değil; ölümle daha samimi bir ilişki içindedir.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Korkuyorum. Daha ileri düşünmeye cesaret edemiyorum.", author: "Erich Maria Remarque", tag: "TRAJEDY" },
    { text: "Hedefsiz bir insan dümensiz bir gemi gibidir.", author: "Thomas Carlyle", tag: "TRAJEDY" },
    { text: "Taç takan başlar huzursuz yatar.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Nankör bir çocuğa sahip olmak, yılan dişinden daha keskindir!", author: "William Shakespeare", tag: "ACI" },
    { text: "İnsanlar zaman zaman kendi kaderlerinin efendisidir.", author: "William Shakespeare", tag: "VAROLUŞ" },
    { text: "Şüphelerimiz haindir; denemekten korkarak kazanabileceğimiz iyilikleri kaybettirir.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Yemin ederim, umurumda değil; bir insan yalnız bir kez ölür; Tanrı'ya bir ölüm borçluyuz.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Yıldızlar, ateşlerinizi saklayın; ışık siyah ve derin arzularımı görmesin.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Kaderimizi yıldızlar değil, biz tutarız.", author: "William Shakespeare", tag: "VAROLUŞ" },
    { text: "Bizi delerseniz kanımız akmaz mı? Gıdıklarsanız gülmez miyiz? Zehirlerseniz ölmez miyiz?", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Ölüm uykusunda, bu ölümlü bedeni üstümüzden attığımızda ne rüyalar gelebilir — işte bu bizi düşündürmeli.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Dönen dünyanın durgun noktasında. Ne et ne etsiz; ne nereden ne nereye.", author: "T.S. Eliot", tag: "VAROLUŞ" },
    { text: "Fikir ile gerçeklik arasında, hareket ile eylem arasında Gölge düşer.", author: "T.S. Eliot", tag: "TRAJEDY" },
    { text: "İnsan türü çok fazla gerçekliğe dayanamaz.", author: "T.S. Eliot", tag: "TRAJEDY" },
    { text: "Keşfetmekten vazgeçmeyeceğiz; tüm keşiflerimizin sonu başladığımız yere varmak ve oraya ilk kez gelmiş gibi tanımak olacak.", author: "T.S. Eliot", tag: "VAROLUŞ" },
    { text: "Patlama değil; inleme ile.", author: "T.S. Eliot", tag: "TRAJEDY" },
    { text: "Şimdiki zaman ve geçmiş zaman, belki de ikisi birden gelecek zamanda vardır.", author: "T.S. Eliot", tag: "VAROLUŞ" },
    { text: "Hayatımı kahve kaşıklarıyla ölçtüm.", author: "T.S. Eliot", tag: "TRAJEDY" },
    { text: "Bir anlık teslimiyetin korkunç cüreti.", author: "T.S. Eliot", tag: "TRAJEDY" },
    { text: "Muharebe, kesin olarak kazanmaya kararlı tarafça kazanılır.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "Kahramanların işini tamamladıktan sonra yaptığını yaptı — öldü.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "Şimdiki an her zaman olmuş olacak. Şimdi ne yaparsam, onu iyi yaparsam, yapmaya değmiş olacak.", author: "Lev Tolstoy — Savaş ve Barış", tag: "VAROLUŞ" },
    { text: "İyi bir söz yalnızca zararsız değil, hiçbir şeye de engel değildir; yine de pek çok şey başarabilir.", author: "Lev Tolstoy — Savaş ve Barış", tag: "VAROLUŞ" },
    { text: "Mutluluğun ne olduğunu bilmeyen biri için mutluluk yoktur.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "Her insan ölür. Ama her insan gerçekten yaşamaz.", author: "William Wallace", tag: "VAROLUŞ" },
    { text: "İpin sonuna geldiğinde, bir düğüm at ve tutun.", author: "Franklin D. Roosevelt", tag: "ACI" },
    { text: "Antrenmanın her dakikasından nefret ettim, ama kendime dedim ki: bırakma. Şimdi çek, hayatının geri kalanını şampiyon olarak yaşa.", author: "Muhammed Ali", tag: "ACI" },
    { text: "En büyük zafer hiç düşmemekte değil; her düştüğümüzde yeniden kalkmaktadır.", author: "Konfüçyüs", tag: "ACI" },
    { text: "Tek bir sevinç yüz kederi paramparça eder.", author: "Konfüçyüs", tag: "ACI" },
    { text: "Değerli taş, sürtünme olmadan cilalanmaz; insan da sınavlar olmadan olgunlaşmaz.", author: "Konfüçyüs", tag: "ACI" },
    { text: "En karanlık anlarımızda ışığı görmek için odaklanmak zorundayızdır.", author: "Aristoteles", tag: "ACI" },
    { text: "Algılamak acı çekmektir.", author: "Aristoteles", tag: "ACI" },
    { text: "Yoksulluk, devrimin ve suçun anasıdır.", author: "Aristoteles", tag: "TRAJEDY" },
    { text: "Acı çekmeden öğrenemeyiz.", author: "Aristoteles", tag: "ACI" },
    { text: "Aşk, iki bedende barınan tek bir ruhtan oluşur.", author: "Aristoteles", tag: "VAROLUŞ" },
    { text: "Dost nedir? İki bedende barınan tek bir ruh.", author: "Aristoteles", tag: "VAROLUŞ" },
    { text: "Ölüm, insana verilmiş nimetlerin en büyüğü olabilir.", author: "Sokrates", tag: "TRAJEDY" },
    { text: "En derin arzulardan çoğu zaman en ölümcül nefret doğar.", author: "Sokrates", tag: "TRAJEDY" },
    { text: "Geçmiş asla ölmez. Geçmiş bile değildir.", author: "William Faulkner", tag: "VAROLUŞ" },
    { text: "Ölümle güreştim. Hayal edebileceğiniz en heyecansız müsabakadır.", author: "Joseph Conrad", tag: "TRAJEDY" },
    { text: "Gerçek yalnızlığın ne olduğunu kim bilir — alışılmış sözcüğü değil, çıplak dehşeti? Yalnızların kendisine bile bir maske takar.", author: "Joseph Conrad", tag: "YALNIZLIK" },
    { text: "Tibetçe bir söz vardır: trajedi, güç kaynağı olarak kullanılmalıdır.", author: "Dalay Lama", tag: "ACI" },
    { text: "Tanrı, gülmekten fazla korkan bir seyirciye oynayan bir komedyendir.", author: "Voltaire", tag: "TRAJEDY" },
    { text: "Sizin inanmayacağınız şeyler gördüm. Tüm o anlar, yağmurdaki gözyaşları gibi, zamanda kaybolup gidecek.", author: "Roy Batty", tag: "TRAJEDY" },
    { text: "Sonunda özgürlükten çok güvenlik istediler. Rahat bir hayat istediler ve hepsini kaybettiler — güvenliği, konforu ve özgürlüğü.", author: "William Golding", tag: "TRAJEDY" },
    { text: "Bir gün bu ulusun ayağa kalkacağına dair bir hayalim var... ama bombaların yağdığını izleyerek o günün hiç gelip gelmeyeceğini merak ediyorum.", author: "Anonim Asker", tag: "TRAJEDY" },
    { text: "Ölümden korkmuyorum; yalnızca o an orada olmak istemiyorum.", author: "Woody Allen", tag: "TRAJEDY" },
    { text: "Ruh, çocuklarla birlikte iyileşir.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Dürüst ve vicdanlı biri acı çekecektir.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Her şeyden önce kendine yalan söyleme. Kendine yalan söyleyip kendi yalanını dinleyen insan, eninde sonunda içindeki ya da çevresindeki gerçeği ayırt edemez hale gelir; hem kendine hem başkalarına saygısını yitirir.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Bir insanı gülüşünden tanıyabilirsin; onu hiç tanımadan gülüşünü seviyorsan, güvenle iyi bir insan olduğunu söyleyebilirsin.", author: "Fyodor Dostoyevski", tag: "VAROLUŞ" },
    { text: "Dünya der ki: İhtiyaçların var, gider onları. Zenginler ve güçlüler kadar hakkın var. İhtiyaçlarını gidermekten çekinme; hatta ihtiyaçlarını genişlet ve daha fazlasını iste.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Hakkında yeni bir şey söylenemeyecek kadar eski olan hiçbir konu yoktur.", author: "Fyodor Dostoyevski", tag: "VAROLUŞ" },
    { text: "Onu öldürmedim. Düşünce aklımdan geçiverdi.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Zaman zaman, ilk bakışta ilgimizi çekmeye başlayan insanlarla, hatta tam yabancılarla karşılaşırız.", author: "Fyodor Dostoyevski", tag: "VAROLUŞ" },
    { text: "Büyükler bilmez: bir çocuk, en zor durumda bile mükemmel tavsiye verebilir.", author: "Fyodor Dostoyevski", tag: "VAROLUŞ" },
    { text: "Her insanın herkese değil, yalnızca dostlarına anlatabileceği anıları vardır. Bir de yalnızca kendine açabileceği, dostlarından bile sakladığı şeyler.", author: "Fyodor Dostoyevski", tag: "YALNIZLIK" },
    { text: "Üzerine her türlü dünyevi nimeti yağdır, onu bir mutluluk denizinde boğ... Yine de her insan, onlardan her biri, içinin en derininde bir şey saklayacaktır.", author: "Fyodor Dostoyevski", tag: "YALNIZLIK" },
    { text: "İnsan varoluşunun sırrı yalnızca yaşamakta değil; ne için yaşadığını bulmaktadır.", author: "Fyodor Dostoyevski", tag: "VAROLUŞ" },
    { text: "İnsan yalnızca sıkıntılarını saymayı sever; mutluluklarını ise hesaba katmaz.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Bilebileceğimiz tek şey hiçbir şey bilmediğimizdir. Ve bu insan bilgeliğinin zirvesidir.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "En zor ama en zorunlu şey şudur: Hayatı sevmek. Acı içinde bile onu sevmek. Çünkü hayat her şeydir. Hayat Tanrı'dır.", author: "Lev Tolstoy — Savaş ve Barış", tag: "ACI" },
    { text: "Muharebe meydanındaki asker şan ya da vatanın iyiliğini düşünmez. Yalnızca nasıl öldürülmeyeceğini düşünür.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "Savaş, kibar bir eğlence değil; hayatın en iğrenç şeyidir. Bunu anlayıp savaşı oynamamak gerekir.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "Genç bir adam için akıllı kadınların sohbetinden daha gerekli bir şey yoktur.", author: "Lev Tolstoy — Savaş ve Barış", tag: "VAROLUŞ" },
    { text: "Yalnızca anladığımızın bilincindeyiz. Ve yalnızca dile getirebildiğimizi anlıyoruz.", author: "Lev Tolstoy — Savaş ve Barış", tag: "VAROLUŞ" },
    { text: "'Esaret' sözcüğünün korkunç anlamını kitaplardan değil; acı, aşağılanma ve yıkım deneyiminden öğrendi.", author: "Lev Tolstoy — Savaş ve Barış", tag: "ACI" },
    { text: "Hayatı sevmek Tanrı'yı sevmektir. Her şeyden daha zor ve daha kutsal olan, haksız acılar içinde bile bu hayatı sevmektir.", author: "Lev Tolstoy — Savaş ve Barış", tag: "ACI" },
    { text: "Top mermisi, her zaman olduğu gibi ıslık çalarak uçtu ve küçük bir adam kalabalığına düştü; ikisini öldürdü, birini ağır yaraladı.", author: "Lev Tolstoy — Savaş ve Barış", tag: "TRAJEDY" },
    { text: "İpin sonuna geldiğinde, bir düğüm at ve tutunmaya devam et.", author: "Franklin D. Roosevelt", tag: "ACI" },
    { text: "Antrenmanın her dakikasından nefret ettim, ama kendime dedim: bırakma. Şimdi çek acını, hayatının geri kalanını şampiyon olarak yaşa.", author: "Muhammed Ali", tag: "ACI" },
    { text: "Tibetçe bir söz vardır: trajedi güç kaynağı olarak kullanılmalıdır.", author: "Dalay Lama", tag: "ACI" },
    { text: "Acı çekmek, derin bir zekanın ve derin bir yüreğin kaçınılmaz sonucudur.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Her şeyden önce kendine yalan söyleme. Kendine yalan söyleyip kendi yalanını dinleyen insan eninde sonunda içindeki ya da çevresindeki gerçeği ayırt edemez hale gelir; hem kendine hem başkalarına saygısını yitirir.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
