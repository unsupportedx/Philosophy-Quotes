<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Philosophy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Share+Tech+Mono&family=Lora:ital,wght@0,400;0,700;1,400;1,700&family=EB+Garamond:ital,wght@0,400;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Source+Serif+4:ital,wght@0,300;0,600;1,300;1,600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Merriweather:ital,wght@0,300;0,700;1,300;1,700&family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Josefin+Sans:wght@300;400;700&family=Raleway:ital,wght@0,300;0,700;1,300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000000;
    --text: #e8e0d0;
    --dim: #666;
    --accent: #c8a96e;
    --red: #8b1a1a;
    --ui: rgba(255,255,255,0.07);
    --ui-hover: rgba(255,255,255,0.13);
  }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    overflow: hidden;
    cursor: none;
  }

  /* Custom cursor */
  #cursor {
    position: fixed; width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, opacity 0.5s;
    mix-blend-mode: difference;
  }

  /* ── LANGUAGE SELECTOR ── */
  #lang-screen {
    position: fixed; inset: 0;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    gap: 48px;
    animation: fadeIn 1s ease;
  }

  .lang-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(18px, 4vw, 36px);
    letter-spacing: 0.25em;
    color: var(--accent);
    text-align: center;
    opacity: 0.9;
  }

  .lang-subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: -36px;
  }

  .lang-options {
    display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
  }

  .lang-btn {
    background: none;
    border: 1px solid rgba(200,169,110,0.3);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.2em;
    padding: 14px 36px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .lang-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.3s;
    z-index: -1;
    opacity: 0.15;
  }

  .lang-btn:hover::before { transform: translateX(0); }
  .lang-btn:hover { border-color: var(--accent); color: var(--accent); }

  .lang-divider {
    width: 1px; height: 60px;
    background: linear-gradient(to bottom, transparent, var(--accent), transparent);
    opacity: 0.4;
  }

  /* ── MAIN APP ── */
  #app {
    position: fixed; inset: 0;
    background: #000;
    display: none;
    align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* Subtle vignette */
  #app::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* Blood splatter effect on transition */
  #splatter {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
  }

  /* Quote container */
  #quote-container {
    position: relative;
    z-index: 2;
    max-width: min(800px, 85vw);
    text-align: center;
    padding: 40px;
  }

  #quote-line {
    width: 60px; height: 1px;
    background: linear-gradient(to right, transparent, var(--accent), transparent);
    margin: 0 auto 32px;
    opacity: 0;
  }

  #quote-text {
    font-size: clamp(18px, 3.5vw, 32px);
    font-weight: 300;
    font-style: italic;
    line-height: 1.7;
    letter-spacing: 0.02em;
    color: var(--text);
    opacity: 0;
    text-shadow: 0 0 40px rgba(200,169,110,0.08);
  }

  #quote-author {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(10px, 1.5vw, 13px);
    letter-spacing: 0.35em;
    color: var(--accent);
    margin-top: 28px;
    opacity: 0;
    text-transform: uppercase;
  }

  #quote-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--red);
    margin-top: 8px;
    opacity: 0;
    text-transform: uppercase;
  }

  /* Progress bar */
  #progress-bar {
    position: fixed; bottom: 0; left: 0;
    height: 1px;
    background: linear-gradient(to right, var(--red), var(--accent));
    width: 0%;
    transition: width linear;
    z-index: 10;
    opacity: 0.6;
  }

  /* Counter */
  #counter {
    position: fixed; top: 24px; right: 70px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--dim);
    z-index: 10;
    transition: opacity 0.5s;
  }

  /* ── UI CONTROLS ── */
  #controls {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 6px;
    z-index: 10;
    transition: opacity 0.6s;
    background: rgba(0,0,0,0.75);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 100px;
    padding: 6px 8px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 8px 32px rgba(0,0,0,0.8);
  }

  .ctrl-btn {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.35);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
    border-radius: 100px;
    display: flex; align-items: center; gap: 5px;
    position: relative;
  }

  .ctrl-btn:hover {
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.85);
  }

  .ctrl-btn:active {
    background: rgba(255,255,255,0.12);
    transform: scale(0.95);
  }

  .ctrl-btn svg {
    width: 12px; height: 12px;
    flex-shrink: 0;
  }

  .ctrl-divider {
    width: 1px; height: 18px;
    background: rgba(255,255,255,0.08);
    flex-shrink: 0;
  }

  #freeze-btn.active {
    background: rgba(200,169,110,0.12);
    color: #c8a96e;
  }

  /* screenshot flash */
  #flash {
    position: fixed; inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 1000;
  }

  /* transition overlay */
  #curtain {
    position: fixed; inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    z-index: 50;
  }

  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes textReveal {
    0%   { opacity: 0; }
    100% { opacity: 1; }
  }
  .quote-animate .reveal-0 { animation: textReveal 0.6s ease 0.1s both; }
  .quote-animate .reveal-1 { animation: textReveal 0.8s ease 0.4s both; }
  .quote-animate .reveal-2 { animation: textReveal 0.6s ease 0.9s both; }
  .quote-animate .reveal-3 { animation: textReveal 0.5s ease 1.1s both; }

  #quote-line   { transition: opacity 0.5s ease; }
  #quote-text   { transition: opacity 0.9s ease; }
  #quote-author { transition: opacity 0.6s ease; }
  #quote-tag    { transition: opacity 0.5s ease; }

  /* Quote container smooth fade */
  #quote-container {
    transition: opacity 0.7s ease;
  }

  #quote-line {
    transition: opacity 0.6s ease 0.3s;
  }
  #quote-text {
    transition: opacity 0.8s ease 0.5s;
  }
  #quote-author {
    transition: opacity 0.6s ease 0.9s;
  }
  #quote-tag {
    transition: opacity 0.5s ease 1.1s;
  }

  /* Scanline subtle effect */
  #scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.03) 3px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 3;
    opacity: 0.4;
  }

  #hidden-msg {
    position: fixed; top: 24px; left: 28px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--red);
    z-index: 10;
    opacity: 0;
    animation: none;
  }

  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="flash"></div>
<div id="curtain"></div>
<div id="scanlines"></div>

<!-- LANGUAGE SCREEN -->
<div id="lang-screen">
  <div>
    <div class="lang-title">MEMENTO MORI</div>
    <div style="margin-top:10px;" class="lang-subtitle">Select your language // Dil Seçin // Elige tu idioma</div>
  </div>
  <div class="lang-options">
    <button class="lang-btn" onclick="startApp('en')">ENGLISH</button>
    <div class="lang-divider"></div>
    <button class="lang-btn" onclick="startApp('tr')">TÜRKÇE</button>
    <div class="lang-divider"></div>
    <button class="lang-btn" onclick="startApp('es')">ESPAÑOL</button>
  </div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.3em;color:#333;margin-top:20px;">
    TAP ANYWHERE TO CONTINUE AFTER SELECTION
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="progress-bar"></div>
  <div id="counter"></div>
  <div id="hidden-msg">● RECORDING</div>

  <div id="quote-container">
    <div id="quote-line" class="reveal-0"></div>
    <div id="quote-text" class="reveal-1"></div>
    <div id="quote-author" class="reveal-2"></div>
    <div id="quote-tag" class="reveal-3"></div>
  </div>

  <div id="controls">
    <button class="ctrl-btn" onclick="prevQuote()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>PREV
    </button>
    <button class="ctrl-btn" onclick="toggleFreeze()" id="freeze-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/><line x1="19.07" y1="4.93" x2="4.93" y2="19.07"/></svg>FREEZE
    </button>
    <button class="ctrl-btn" onclick="nextQuote()">
      NEXT<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div class="ctrl-divider"></div>
    <button class="ctrl-btn" onclick="takeScreenshot()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M9 3H5a2 2 0 0 0-2 2v4m18 0V5a2 2 0 0 0-2-2h-4M3 16v3a2 2 0 0 0 2 2h4m8 0h3a2 2 0 0 0 2-2v-3"/></svg>CAPTURE
    </button>
    <div class="ctrl-divider"></div>
    <button class="ctrl-btn" onclick="changeFontSize(-1)" title="Küçült">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><text x="4" y="17" font-size="14" fill="currentColor" stroke="none" font-family="monospace">A</text><line x1="14" y1="19" x2="22" y2="19"/></svg>A−
    </button>
    <button class="ctrl-btn" onclick="changeFontSize(1)" title="Büyüt">
      A+<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- Font Picker Panel -->
  <div id="font-picker" style="
    display:none; position:fixed; top:60px; left:20px;
    background:rgba(0,0,0,0.95); border:1px solid rgba(200,169,110,0.25);
    border-radius:12px; padding:12px 8px; z-index:1000;
    backdrop-filter:blur(12px); flex-direction:column; gap:4px; min-width:240px;
    max-height:60vh; overflow-y:auto;
  ">
  </div>

  <!-- Font button — top left -->
  <button id="font-corner-btn" onclick="toggleFontPicker()" title="Font seç" style="
    position:fixed; top:20px; left:20px; z-index:20;
    background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.08);
    color:rgba(255,255,255,0.4); font-family:'Share Tech Mono',monospace;
    font-size:9px; letter-spacing:0.18em; padding:8px 14px;
    border-radius:100px; cursor:pointer; display:flex; align-items:center; gap:5px;
    transition:all 0.2s ease; backdrop-filter:blur(10px);
  "
  onmouseover="this.style.color='rgba(255,255,255,0.85)';this.style.background='rgba(255,255,255,0.07)'"
  onmouseout="this.style.color='rgba(255,255,255,0.4)';this.style.background='rgba(0,0,0,0.6)'">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>FONT
  </button>

  <!-- Fullscreen button — top right -->
  <button id="fs-corner-btn" onclick="toggleFullscreen()" title="Tam ekran" style="
    position:fixed; top:20px; right:20px; z-index:20;
    background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.08);
    color:rgba(255,255,255,0.4); font-family:'Share Tech Mono',monospace;
    font-size:9px; letter-spacing:0.18em; padding:8px 12px;
    border-radius:100px; cursor:pointer; display:flex; align-items:center;

  "
  onmouseover="this.style.color='rgba(255,255,255,0.85)';this.style.background='rgba(255,255,255,0.07)'"
  onmouseout="this.style.color='rgba(255,255,255,0.4)';this.style.background='rgba(0,0,0,0.6)'">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
  </button>
</div>

// ── CURSOR ──
const cursor = document.getElementById('cursor');
let cursorTimer;
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
  cursor.style.opacity = '1';
  clearTimeout(cursorTimer);
  cursorTimer = setTimeout(() => {
    cursor.style.opacity = '0';
  }, 2000);
});

    { text: "I am not afraid of storms, for I am learning how to sail my ship.", author: "Louisa May Alcott", tag: "PAIN" },
    { text: "The world breaks everyone, and afterward, some are strong at the broken places.", author: "Ernest Hemingway", tag: "PAIN" },
    { text: "To die will be an awfully big adventure.", author: "J.M. Barrie", tag: "TRAGEDY" },
    { text: "In individuals, insanity is rare; but in groups, parties, nations, it is the rule.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "Give me liberty, or give me death.", author: "Patrick Henry", tag: "EXISTENCE" },
    { text: "The mass of men lead lives of quiet desperation.", author: "Henry David Thoreau", tag: "TRAGEDY" },
    { text: "Most men lead lives of quiet desperation and go to the grave with the song still in them.", author: "Henry David Thoreau", tag: "TRAGEDY" },
    { text: "Not all who wander are lost, but some are just searching for something they'll never find.", author: "Henry David Thoreau", tag: "SOLITUDE" },
    { text: "What is life? It is the flash of a firefly in the night.", author: "Crowfoot", tag: "TRAGEDY" },
    { text: "When you reach the end of your rope, tie a knot in it and hang on.", author: "Franklin D. Roosevelt", tag: "PAIN" },
    { text: "Two things are infinite: the universe and human stupidity; and I'm not sure about the universe.", author: "Albert Einstein", tag: "TRAGEDY" },
    { text: "I hated every minute of training, but I said: don't quit. Suffer now and live the rest of your life as a champion.", author: "Muhammad Ali", tag: "PAIN" },
    { text: "Boredom is the root of all evil — the despairing refusal to be oneself.", author: "Søren Kierkegaard", tag: "TRAGEDY" },
    { text: "Any fool can be happy. It takes a man with real heart to make beauty out of the stuff that makes us weep.", author: "Clive Barker", tag: "PAIN" },
    { text: "Cowards die many times before their deaths; the valiant never taste of death but once.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Life's but a walking shadow, a poor player that struts and frets his hour upon the stage, and then is heard no more.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Hell is empty and all the devils are here.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Good night, good night! Parting is such sweet sorrow.", author: "William Shakespeare", tag: "PAIN" },
    { text: "The evil that men do lives after them; the good is oft interred with their bones.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Something is rotten in the state of Denmark.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "A man can die but once.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Tomorrow, and tomorrow, and tomorrow, creeps in this petty pace from day to day.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Out, out, brief candle! Life's but a walking shadow.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Nothing will come of nothing.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "The wheel is come full circle.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "War is the father of all things.", author: "Heraclitus", tag: "TRAGEDY" },
    { text: "We are all in the gutter, but some of us are looking at the stars.", author: "Oscar Wilde", tag: "TRAGEDY" },
    { text: "There are only two tragedies in life: one is not getting what one wants, and the other is getting it.", author: "Oscar Wilde", tag: "TRAGEDY" },
    { text: "The only difference between a caprice and a lifelong passion is that the caprice lasts a little longer.", author: "Oscar Wilde", tag: "TRAGEDY" },
    { text: "I don't want to go to heaven. None of my friends are there.", author: "Oscar Wilde", tag: "TRAGEDY" },
    { text: "Death must be so beautiful. To lie in the soft brown earth, with the grasses waving above one's head.", author: "Oscar Wilde", tag: "TRAGEDY" },
    { text: "A cynic is a man who knows the price of everything and the value of nothing.", author: "Oscar Wilde", tag: "TRAGEDY" },
    { text: "Nowadays people know the price of everything and the value of nothing.", author: "Oscar Wilde", tag: "TRAGEDY" },
    { text: "One must have a heart of stone to read the death of Little Nell without laughing.", author: "Oscar Wilde", tag: "TRAGEDY" },
    { text: "The basis of optimism is sheer terror.", author: "Oscar Wilde", tag: "TRAGEDY" },
    { text: "The mystery of love is greater than the mystery of death.", author: "Oscar Wilde", tag: "EXISTENCE" },
    { text: "Suffering is one very long moment. We cannot divide it by seasons.", author: "Oscar Wilde", tag: "PAIN" },
    { text: "Hearts are made to be broken.", author: "Oscar Wilde", tag: "PAIN" },
    { text: "Do not pray for easy lives. Pray to be stronger men.", author: "John F. Kennedy", tag: "PAIN" },
    { text: "You gain strength, courage, and confidence by every experience in which you really stop to look fear in the face.", author: "Eleanor Roosevelt", tag: "PAIN" },
    { text: "Darkness cannot drive out darkness; only light can do that.", author: "Martin Luther King Jr.", tag: "PAIN" },
    { text: "Our lives begin to end the day we become silent about things that matter.", author: "Martin Luther King Jr.", tag: "TRAGEDY" },
    { text: "If you can't fly then run, if you can't run then walk, if you can't walk then crawl.", author: "Martin Luther King Jr.", tag: "PAIN" },
    { text: "In the end, we will remember not the words of our enemies, but the silence of our friends.", author: "Martin Luther King Jr.", tag: "TRAGEDY" },
    { text: "Live as if you were to die tomorrow. Learn as if you were to live forever.", author: "Mahatma Gandhi", tag: "EXISTENCE" },
    { text: "If I had no sense of humor, I would long ago have committed suicide.", author: "Mahatma Gandhi", tag: "TRAGEDY" },
    { text: "It's not the size of the dog in the fight, it's the size of the fight in the dog.", author: "Mark Twain", tag: "PAIN" },
    { text: "Sanity and happiness are an impossible combination.", author: "Mark Twain", tag: "TRAGEDY" },
    { text: "All happy families are alike; each unhappy family is unhappy in its own way.", author: "Leo Tolstoy", tag: "TRAGEDY" },
    { text: "Short as life is, we make it still shorter by the careless waste of time.", author: "Victor Hugo", tag: "TRAGEDY" },
    { text: "There is always more misery among the lower classes than there is humanity in the higher.", author: "Victor Hugo", tag: "TRAGEDY" },
    { text: "Show me a sane man and I will cure him for you.", author: "C.G. Jung", tag: "TRAGEDY" },
    { text: "There is no coming to consciousness without pain.", author: "C.G. Jung", tag: "PAIN" },
    { text: "Loneliness does not come from having no people around, but from being unable to communicate the things that seem important to oneself.", author: "C.G. Jung", tag: "SOLITUDE" },
    { text: "If a man knows more than others, he becomes lonely.", author: "C.G. Jung", tag: "SOLITUDE" },
    { text: "Hard times build determination and inner strength. Through them we can also come to appreciate the uselessness of anger.", author: "Dalai Lama XIV", tag: "PAIN" },
    { text: "It is under the greatest adversity that there exists the greatest potential for doing good.", author: "Dalai Lama XIV", tag: "PAIN" },
    { text: "It is a truth universally acknowledged, that a single man in possession of a good fortune, must be in want of a wife.", author: "Jane Austen", tag: "TRAGEDY" },
    { text: "There are few people whom I really love, and still fewer of whom I think well.", author: "Jane Austen", tag: "SOLITUDE" },
    { text: "It is easier to forgive an enemy than to forgive a friend.", author: "William Blake", tag: "TRAGEDY" },
    { text: "Man was made for joy and woe; and when this we rightly know, through the world we safely go.", author: "William Blake", tag: "PAIN" },
    { text: "Death is not extinguishing the light; it is putting out the lamp because dawn has come.", author: "Rabindranath Tagore", tag: "TRAGEDY" },
    { text: "Clouds come floating into my life from other days no longer to shed rain or usher storm but to give colour to my sunset sky.", author: "Rabindranath Tagore", tag: "TRAGEDY" },
    { text: "Man goes into the noisy crowd to drown his own clamour of silence.", author: "Rabindranath Tagore", tag: "SOLITUDE" },
    { text: "If you cry because the sun has gone out of your life, your tears will prevent you from seeing the stars.", author: "Rabindranath Tagore", tag: "PAIN" },
    { text: "Our greatest glory is not in never falling, but in rising every time we fall.", author: "Confucius", tag: "PAIN" },
    { text: "One joy shatters a hundred griefs.", author: "Confucius", tag: "PAIN" },
    { text: "The gem cannot be polished without friction, nor man perfected without trials.", author: "Confucius", tag: "PAIN" },
    { text: "Between stimulus and response there is a space. In that space is our power to choose our response.", author: "Viktor Frankl", tag: "EXISTENCE" },
    { text: "Where there is ruin, there is hope for a treasure.", author: "Rumi", tag: "PAIN" },
    { text: "The soul that sees beauty may sometimes walk alone.", author: "Johann Wolfgang von Goethe", tag: "SOLITUDE" },
    { text: "None are more hopelessly enslaved than those who falsely believe they are free.", author: "Johann Wolfgang von Goethe", tag: "TRAGEDY" },
    { text: "The only real failure in life is not to be true to the best one knows.", author: "Gautama Buddha", tag: "TRAGEDY" },
    { text: "To be idle is a short road to death and to be diligent is a way of life.", author: "Gautama Buddha", tag: "EXISTENCE" },
    { text: "Darkness cannot drive out darkness; only light can do that.", author: "Martin Luther King Jr.", tag: "PAIN" },
    { text: "Our lives begin to end the day we become silent about things that matter.", author: "Martin Luther King Jr.", tag: "TRAGEDY" },
    { text: "If you can't fly then run, if you can't run then walk, if you can't walk then crawl, but whatever you do you have to keep moving forward.", author: "Martin Luther King Jr.", tag: "PAIN" },
    { text: "We must learn to live together as brothers or perish together as fools.", author: "Martin Luther King Jr.", tag: "TRAGEDY" },
    { text: "Two things are infinite: the universe and human stupidity; and I'm not sure about the universe.", author: "Albert Einstein", tag: "TRAGEDY" },
    { text: "What is life? An illusion, a shadow, a story.", author: "Pedro Calderón de la Barca", tag: "TRAGEDY" },
    { text: "Man is a rope stretched between the animal and the Superman — a rope over an abyss.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "The higher we soar, the smaller we appear to those who cannot fly.", author: "Friedrich Nietzsche", tag: "SOLITUDE" },
    { text: "In individuals, insanity is rare; but in groups, parties, nations and epochs, it is the rule.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "The snake which cannot cast its skin has to die. As well the minds which are prevented from changing their opinions; they cease to be mind.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "To forget one's purpose is the commonest form of stupidity.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "Every deep thinker is more afraid of being understood than of being misunderstood.", author: "Friedrich Nietzsche", tag: "SOLITUDE" },
    { text: "Not necessity, not desire — no, the love of power is the demon of men.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "Hope in reality is the worst of all evils because it prolongs the torments of man.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "The struggle of man against power is the struggle of memory against forgetting.", author: "Milan Kundera", tag: "TRAGEDY" },
    { text: "The basis of shame is not some personal failure but the ignominious defeat of being crushed.", author: "Milan Kundera", tag: "PAIN" },
    { text: "We live everything as it comes, without warning, like an actor going on cold.", author: "Milan Kundera", tag: "TRAGEDY" },
    { text: "Optimism is the opium of the people.", author: "Milan Kundera", tag: "TRAGEDY" },
    { text: "Sadness is a form of happiness, for those who love passionately.", author: "Milan Kundera", tag: "PAIN" },
    { text: "The degree of the light is inverse to the degree of the darkness.", author: "Hermann Hesse", tag: "PAIN" },
    { text: "Some of us think holding on makes us strong, but sometimes it is letting go.", author: "Hermann Hesse", tag: "PAIN" },
    { text: "Within you there is a stillness and a sanctuary to which you can retreat at any time.", author: "Hermann Hesse", tag: "SOLITUDE" },
    { text: "I wanted only to live in accord with the promptings which came from my true self. Why was that so very difficult?", author: "Hermann Hesse", tag: "TRAGEDY" },
    { text: "One never reaches home, but wherever friendly paths intersect the whole world looks like home for a time.", author: "Hermann Hesse", tag: "SOLITUDE" },
    { text: "Each person must look to himself to teach him how to live and how to die. And if all our philosophers need only to look inside themselves to find natural law, it must be there.", author: "Michel de Montaigne", tag: "EXISTENCE" },
    { text: "Nothing fixes a thing so intensely in the memory as the wish to forget it.", author: "Michel de Montaigne", tag: "PAIN" },
    { text: "Loss is nothing else but change, and change is nature's delight.", author: "Marcus Aurelius", tag: "TRAGEDY" },
    { text: "Think of yourself as dead. You have lived your life. Now take what's left and live it properly.", author: "Marcus Aurelius", tag: "EXISTENCE" },
    { text: "A man's life is a mere moment, his existence a flux, his perception clouded, his body's composition corruptible.", author: "Marcus Aurelius", tag: "TRAGEDY" },
    { text: "Difficulties strengthen the mind, as labor does the body.", author: "Seneca", tag: "PAIN" },
    { text: "Revenge is an admission of pain.", author: "Seneca", tag: "PAIN" },
    { text: "We are more often frightened than hurt; and we suffer more from imagination than from reality.", author: "Seneca", tag: "PAIN" },
    { text: "He suffers more than necessary, who suffers before it is necessary.", author: "Seneca", tag: "PAIN" },
    { text: "Non est ad astra mollis e terris via.", author: "Seneca", tag: "PAIN" },
    { text: "It is during our darkest moments that we must focus to see the light.", author: "Aristotle", tag: "PAIN" },
    { text: "To perceive is to suffer.", author: "Aristotle", tag: "PAIN" },
    { text: "Poverty is the parent of revolution and crime.", author: "Aristotle", tag: "TRAGEDY" },
    { text: "We cannot learn without pain.", author: "Aristotle", tag: "PAIN" },
    { text: "Love is composed of a single soul inhabiting two bodies.", author: "Aristotle", tag: "EXISTENCE" },
    { text: "What is a friend? A single soul dwelling in two bodies.", author: "Aristotle", tag: "EXISTENCE" },
    { text: "Our greatest glory is not in never falling, but in rising every time we fall.", author: "Confucius", tag: "PAIN" },
    { text: "The gem cannot be polished without friction, nor man perfected without trials.", author: "Confucius", tag: "PAIN" },
    { text: "An unexamined life is not worth living.", author: "Socrates", tag: "EXISTENCE" },
    { text: "Death may be the greatest of all human blessings.", author: "Socrates", tag: "TRAGEDY" },
    { text: "From the deepest desires often come the deadliest hate.", author: "Socrates", tag: "TRAGEDY" },
    { text: "The past is never dead. It's not even past.", author: "William Faulkner", tag: "EXISTENCE" },
    { text: "Crying does not indicate that you are weak. Since birth, it has always been a sign that you are alive.", author: "Charlotte Brontë", tag: "PAIN" },
    { text: "I have wrestled with death. It is the most unexciting contest you can imagine.", author: "Joseph Conrad", tag: "TRAGEDY" },
    { text: "Who knows what true loneliness is — not the conventional word but the naked terror? To the lonely themselves it wears a mask.", author: "Joseph Conrad", tag: "SOLITUDE" },
    { text: "The two enemies of human happiness are pain and boredom.", author: "Arthur Schopenhauer", tag: "TRAGEDY" },
    { text: "After your death you will be what you were before your birth.", author: "Arthur Schopenhauer", tag: "EXISTENCE" },
    { text: "There is a saying in Tibetan: tragedy should be utilized as a source of strength.", author: "Dalai Lama", tag: "PAIN" },
    { text: "Live as if you were to die tomorrow. Learn as if you were to live forever.", author: "Mahatma Gandhi", tag: "EXISTENCE" },
    { text: "Happiness is beneficial for the body, but it is grief that develops the powers of the mind.", author: "Marcel Proust", tag: "PAIN" },
    { text: "The heart changes, and that is our worst misfortune.", author: "Marcel Proust", tag: "TRAGEDY" },
    { text: "A reader lives a thousand lives before he dies. The man who never reads lives only one.", author: "George R.R. Martin", tag: "EXISTENCE" },
    { text: "There is only one thing we say to death: Not today.", author: "George R.R. Martin", tag: "EXISTENCE" },
    { text: "Winter is coming.", author: "George R.R. Martin", tag: "TRAGEDY" },
    { text: "In the middle of every difficulty lies opportunity.", author: "Albert Einstein", tag: "PAIN" },
    { text: "God is a comedian playing to an audience that is too afraid to laugh.", author: "Voltaire", tag: "EXISTENCE" },
    { text: "I am not afraid of storms, for I am learning how to sail my ship.", author: "Louisa May Alcott", tag: "PAIN" },
    { text: "Friendship is a single soul dwelling in two bodies.", author: "Aristotle", tag: "EXISTENCE" },
    { text: "Do not pray for easy lives. Pray to be stronger men.", author: "John F. Kennedy", tag: "PAIN" },
    { text: "A man may die, nations may rise and fall, but an idea lives on.", author: "John F. Kennedy", tag: "EXISTENCE" },
{ text: "Only the dead have seen the end of war.", author: "Plato", tag: "TRAGEDY" },
    { text: "War is the father of all things.", author: "Heraclitus", tag: "TRAGEDY" },
    { text: "In war, truth is the first casualty.", author: "Aeschylus", tag: "TRAGEDY" },
    { text: "The true soldier fights not because he hates what is in front of him, but because he loves what is behind him.", author: "G.K. Chesterton", tag: "TRAGEDY" },
    { text: "War is the continuation of politics by other means.", author: "Carl von Clausewitz", tag: "TRAGEDY" },
    { text: "I have seen things you people wouldn't believe. All those moments will be lost in time, like tears in rain.", author: "Roy Batty", tag: "TRAGEDY" },
    { text: "You can no more win a war than you can win an earthquake.", author: "Jeannette Rankin", tag: "TRAGEDY" },
    { text: "In war, there are no unwounded soldiers.", author: "José Narosky", tag: "PAIN" },
    { text: "War does not determine who is right — only who is left.", author: "Bertrand Russell", tag: "TRAGEDY" },
    { text: "Every gun that is made, every warship launched, every rocket fired signifies in the final sense a theft from those who hunger and are not fed.", author: "Dwight D. Eisenhower", tag: "TRAGEDY" },
    { text: "The first casualty when war comes is truth.", author: "Hiram Johnson", tag: "TRAGEDY" },
    { text: "I know not with what weapons World War III will be fought, but World War IV will be fought with sticks and stones.", author: "Albert Einstein", tag: "TRAGEDY" },
    { text: "Older men declare war. But it is the youth that must fight and die.", author: "Herbert Hoover", tag: "TRAGEDY" },
    { text: "In the end, more than freedom, they wanted security. They wanted a comfortable life, and they lost it all — security, comfort, and freedom.", author: "William Golding", tag: "TRAGEDY" },
    { text: "Never think that war, no matter how necessary, nor how justified, is not a crime.", author: "Ernest Hemingway", tag: "TRAGEDY" },
    { text: "The soldier above all other people prays for peace, for he must suffer and bear the deepest wounds and scars of war.", author: "Douglas MacArthur", tag: "PAIN" },
    { text: "War is what happens when language fails.", author: "Margaret Atwood", tag: "TRAGEDY" },
    { text: "Anyone who has ever looked into the glazed eyes of a soldier dying on the battlefield will think hard before starting a war.", author: "Otto von Bismarck", tag: "TRAGEDY" },
    { text: "The world is a fine place and worth fighting for and I hate very much to leave it.", author: "Ernest Hemingway", tag: "TRAGEDY" },
    { text: "I have a rendezvous with Death at some disputed barricade.", author: "Alan Seeger", tag: "TRAGEDY" },
    { text: "Dulce et decorum est pro patria mori — it is sweet and proper to die for one's country.", author: "Horace", tag: "TRAGEDY" },
    { text: "Wars are poor chisels for carving out peaceful tomorrows.", author: "Martin Luther King Jr.", tag: "TRAGEDY" },
    { text: "The death of one man is a tragedy. The death of millions is a statistic.", author: "Joseph Stalin", tag: "TRAGEDY" },
    { text: "In peace, sons bury their fathers. In war, fathers bury their sons.", author: "Herodotus", tag: "TRAGEDY" },
    { text: "We shall fight on the beaches, we shall fight on the landing grounds, we shall fight in the fields — we shall never surrender.", author: "Winston Churchill", tag: "TRAGEDY" },
    { text: "To jaw-jaw is always better than to war-war.", author: "Winston Churchill", tag: "TRAGEDY" },
    { text: "I am become Death, the destroyer of worlds.", author: "J. Robert Oppenheimer", tag: "TRAGEDY" },
    { text: "The object of war is not to die for your country but to make the other bastard die for his.", author: "George S. Patton", tag: "TRAGEDY" },
    { text: "No bastard ever won a war by dying for his country. He won it by making the other poor dumb bastard die for his.", author: "George S. Patton", tag: "TRAGEDY" },
    { text: "I hate war as only a soldier who has lived it can, only as one who has seen its brutality, its futility, its stupidity.", author: "Dwight D. Eisenhower", tag: "TRAGEDY" },
    { text: "All warfare is based on deception.", author: "Sun Tzu", tag: "TRAGEDY" },
    { text: "Supreme excellence consists in breaking the enemy's resistance without fighting.", author: "Sun Tzu", tag: "TRAGEDY" },
    { text: "The supreme art of war is to subdue the enemy without fighting.", author: "Sun Tzu", tag: "TRAGEDY" },
    { text: "In the midst of chaos, there is also opportunity — but the chaos always comes first.", author: "Sun Tzu", tag: "TRAGEDY" },
    { text: "War is organized murder and nothing else.", author: "Harry Patch", tag: "TRAGEDY" },
    { text: "They shall grow not old, as we that are left grow old.", author: "Laurence Binyon", tag: "TRAGEDY" },
    { text: "What passing bells for these who die as cattle?", author: "Wilfred Owen", tag: "TRAGEDY" },
    { text: "My subject is War, and the pity of War. The Poetry is in the pity.", author: "Wilfred Owen", tag: "TRAGEDY" },
    { text: "I have a dream that one day this nation will rise up... but I watch the bombs fall and wonder if that day will ever come.", author: "Unnamed Soldier", tag: "TRAGEDY" },
    { text: "Even a pacifist ought to consider which side's victory would be less harmful.", author: "George Orwell", tag: "TRAGEDY" },
    { text: "War is not an adventure. It is a disease. It is like typhus.", author: "Antoine de Saint-Exupéry", tag: "TRAGEDY" },
    { text: "You will kill ten of us, we will kill one of you, but in the end you will tire of it first.", author: "Ho Chi Minh", tag: "TRAGEDY" },
    { text: "Mankind must put an end to war before war puts an end to mankind.", author: "John F. Kennedy", tag: "TRAGEDY" },
{ text: "I am not afraid of death, I just don't want to be there when it happens.", author: "Woody Allen", tag: "TRAGEDY" },
    { text: "No man is an island, entire of itself; every man is a piece of the continent, a part of the main. Any man's death diminishes me.", author: "John Donne", tag: "TRAGEDY" },
    { text: "All animals are equal, but some animals are more equal than others.", author: "George Orwell", tag: "TRAGEDY" },
    { text: "War is peace. Freedom is slavery. Ignorance is strength.", author: "George Orwell", tag: "TRAGEDY" },
    { text: "If you want a picture of the future, imagine a boot stamping on a human face — forever.", author: "George Orwell", tag: "TRAGEDY" },
    { text: "We are all serving a life sentence in the dungeon of self.", author: "Cyril Connolly", tag: "SOLITUDE" },
    { text: "The most painful thing is losing yourself in the process of loving someone too much.", author: "Ernest Hemingway", tag: "PAIN" },
    { text: "There is nothing to writing. All you do is sit down at a typewriter and bleed.", author: "Ernest Hemingway", tag: "PAIN" },
    { text: "Happiness in intelligent people is the rarest thing I know.", author: "Ernest Hemingway", tag: "TRAGEDY" },
    { text: "The world breaks everyone and afterward many are strong at the broken places. But those that will not break it kills.", author: "Ernest Hemingway", tag: "TRAGEDY" },
    { text: "All my life I had been looking for something, and everywhere I turned someone tried to tell me what it was.", author: "Ralph Ellison", tag: "SOLITUDE" },
    { text: "I took a deep breath and listened to the old brag of my heart: I am, I am, I am.", author: "Sylvia Plath", tag: "EXISTENCE" },
    { text: "Dying is an art, like everything else. I do it exceptionally well.", author: "Sylvia Plath", tag: "TRAGEDY" },
    { text: "Is there no way out of the mind?", author: "Sylvia Plath", tag: "TRAGEDY" },
    { text: "I am afraid of getting older. I am afraid of getting married. Spare me from cooking three meals a day — spare me from the relentless cage of routine.", author: "Sylvia Plath", tag: "TRAGEDY" },
    { text: "Someone once said that the definition of insanity is doing the same thing over and over and expecting different results.", author: "Sylvia Plath", tag: "TRAGEDY" },
    { text: "Every atom of your flesh is as dear to me as my own: in pain and sickness it would still be dear.", author: "Charlotte Brontë", tag: "PAIN" },
    { text: "Whatever our souls are made of, his and mine are the same.", author: "Emily Brontë", tag: "PAIN" },
    { text: "I have not broken your heart — you have broken it; and in breaking it, you have broken mine.", author: "Emily Brontë", tag: "PAIN" },
    { text: "He's more myself than I am. Whatever our souls are made of, his and mine are the same.", author: "Emily Brontë", tag: "PAIN" },
    { text: "One must always be careful of books, and what is inside them, for words have the power to change us.", author: "Cassandra Clare", tag: "EXISTENCE" },
    { text: "I exist as I am, that is enough.", author: "Walt Whitman", tag: "EXISTENCE" },
    { text: "Do I dare disturb the universe?", author: "T.S. Eliot", tag: "EXISTENCE" },
    { text: "This is the way the world ends. Not with a bang but a whimper.", author: "T.S. Eliot", tag: "TRAGEDY" },
    { text: "April is the cruellest month.", author: "T.S. Eliot", tag: "TRAGEDY" },
    { text: "Hell is empty and all the devils are here.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "The fault, dear Brutus, is not in our stars, but in ourselves.", author: "William Shakespeare", tag: "EXISTENCE" },
    { text: "We are such stuff as dreams are made on, and our little life is rounded with a sleep.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Give sorrow words; the grief that does not speak whispers the o'er-fraught heart and bids it break.", author: "William Shakespeare", tag: "PAIN" },
    { text: "What a piece of work is a man! And yet to me, what is this quintessence of dust?", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Whoever fights monsters should see to it that in the process he does not become a monster.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "When you gaze long into an abyss the abyss also gazes into you.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "I'm not upset that you lied to me, I'm upset that from now on I can't believe you.", author: "Friedrich Nietzsche", tag: "PAIN" },
    { text: "The higher we soar, the smaller we appear to those who cannot fly.", author: "Friedrich Nietzsche", tag: "SOLITUDE" },
    { text: "All things are subject to interpretation. Whichever interpretation prevails at a given time is a function of power and not truth.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "In individuals, insanity is rare; but in groups, parties, nations and epochs, it is the rule.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "A thought, even a possibility, can shatter and transform us.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "Man suffers most from the suffering he fears, but which never appears.", author: "Fyodor Dostoevsky", tag: "PAIN" },
    { text: "To love is to suffer and there can be no love otherwise.", author: "Fyodor Dostoevsky", tag: "PAIN" },
    { text: "Pain and suffering are always inevitable for a large intelligence and a deep heart.", author: "Fyodor Dostoevsky", tag: "PAIN" },
    { text: "The darker the night, the brighter the stars. The deeper the grief, the closer is God.", author: "Fyodor Dostoevsky", tag: "PAIN" },
    { text: "There is only one means of salvation, then you take yourself and make yourself responsible for all men's sins.", author: "Fyodor Dostoevsky", tag: "TRAGEDY" },
    { text: "I say let the world go to hell, but I should always have my tea.", author: "Fyodor Dostoevsky", tag: "TRAGEDY" },
    { text: "Nothing in this world is harder than speaking the truth, nothing easier than flattery.", author: "Fyodor Dostoevsky", tag: "TRAGEDY" },
    { text: "The soul is healed by being with children.", author: "Fyodor Dostoevsky", tag: "PAIN" },
    { text: "If he's honest and a man of conscience, he'll suffer.", author: "Fyodor Dostoevsky", tag: "PAIN" },
    { text: "Above all, don't lie to yourself. The man who lies to himself and listens to his own lie comes to a point that he cannot distinguish the truth within him, or around him, and so loses all respect for himself and for others.", author: "Fyodor Dostoevsky", tag: "TRAGEDY" },
    { text: "Taking a new step, uttering a new word, is what people fear most.", author: "Fyodor Dostoevsky", tag: "TRAGEDY" },
    { text: "One can know a man from his laugh, and if you like a man's laugh before you know anything of him, you may confidently say that he is a good man.", author: "Fyodor Dostoevsky", tag: "EXISTENCE" },
    { text: "The world says: You have needs — satisfy them. You have as much right as the rich and the mighty. Don't hesitate to satisfy your needs; indeed, expand your needs and demand more.", author: "Fyodor Dostoevsky", tag: "TRAGEDY" },
    { text: "To live without Hope is to Cease to live.", author: "Fyodor Dostoevsky", tag: "TRAGEDY" },
    { text: "There is no subject so old that something new cannot be said about it.", author: "Fyodor Dostoevsky", tag: "EXISTENCE" },
    { text: "One must love life more than the meaning of it.", author: "Fyodor Dostoevsky", tag: "EXISTENCE" },
    { text: "The degree of civilization in a society can be judged by entering its prisons.", author: "Fyodor Dostoevsky", tag: "TRAGEDY" },
    { text: "I did not kill her. The thought flashed through my mind.", author: "Fyodor Dostoevsky", tag: "TRAGEDY" },
    { text: "We sometimes encounter people, even perfect strangers, who begin to interest us at first sight.", author: "Fyodor Dostoevsky", tag: "EXISTENCE" },
    { text: "Grown-up people do not know that a child can give excellent advice even in the most difficult case.", author: "Fyodor Dostoevsky", tag: "EXISTENCE" },
    { text: "It's the great mystery of human life that old grief passes gradually into quiet tender joy.", author: "Fyodor Dostoevsky", tag: "PAIN" },
    { text: "Compassion is the chief law of human existence.", author: "Fyodor Dostoevsky", tag: "EXISTENCE" },
    { text: "Every man has reminiscences which he would not tell to everyone, but only to his friends. He has other matters in his mind which he would not reveal even to his friends, but only to himself.", author: "Fyodor Dostoevsky", tag: "SOLITUDE" },
    { text: "All is permitted if God does not exist.", author: "Fyodor Dostoevsky", tag: "TRAGEDY" },
    { text: "I am a sick man... I am a spiteful man.", author: "Fyodor Dostoevsky", tag: "TRAGEDY" },
    { text: "Shower upon him every earthly blessing, drown him in a sea of happiness... and even then every man, every one of them, will hide something in his innermost of innermost.", author: "Fyodor Dostoevsky", tag: "SOLITUDE" },
    { text: "The mystery of human existence lies not in just staying alive, but in finding something to live for.", author: "Fyodor Dostoevsky", tag: "EXISTENCE" },
    { text: "Man only likes to count his troubles; he doesn't calculate his happiness.", author: "Fyodor Dostoevsky", tag: "TRAGEDY" },
    { text: "He who has a why to live for can bear almost any how.", author: "Viktor Frankl", tag: "EXISTENCE" },
    { text: "When we are no longer able to change a situation, we are challenged to change ourselves.", author: "Viktor Frankl", tag: "PAIN" },
    { text: "Everything can be taken from a man but one thing: the last of the human freedoms — to choose one's attitude in any given set of circumstances.", author: "Viktor Frankl", tag: "TRAGEDY" },
    { text: "An abnormal reaction to an abnormal situation is normal behavior.", author: "Viktor Frankl", tag: "TRAGEDY" },
    { text: "Ultimately, man should not ask what the meaning of his life is, but rather must recognize that it is he who is asked.", author: "Viktor Frankl", tag: "EXISTENCE" },
    { text: "Those who have a 'why' to live, can bear with almost any 'how'.", author: "Viktor Frankl", tag: "EXISTENCE" },
    { text: "In some ways suffering ceases to be suffering at the moment it finds a meaning.", author: "Viktor Frankl", tag: "PAIN" },
    { text: "I am not what happened to me. I am what I choose to become.", author: "Viktor Frankl", tag: "EXISTENCE" },
    { text: "Live as if you were living a second time, and as though you had acted wrongly the first time.", author: "Viktor Frankl", tag: "EXISTENCE" },
    { text: "The last of human freedoms is the ability to choose one's attitude in a given set of circumstances.", author: "Viktor Frankl", tag: "TRAGEDY" },
    { text: "I wear the universe as my suit: I inhabit the world.", author: "Franz Kafka", tag: "EXISTENCE" },
    { text: "There is infinite hope, but not for us.", author: "Franz Kafka", tag: "TRAGEDY" },
    { text: "I am a cage, in search of a bird.", author: "Franz Kafka", tag: "SOLITUDE" },
    { text: "In the struggle between yourself and the world, second the world.", author: "Franz Kafka", tag: "TRAGEDY" },
    { text: "Start with what is right rather than what is acceptable.", author: "Franz Kafka", tag: "EXISTENCE" },
    { text: "There is a point of no return, unremarked at the time, in most lives.", author: "Graham Greene", tag: "TRAGEDY" },
    { text: "I have the true feeling of myself only when I am unbearably unhappy.", author: "Franz Kafka", tag: "PAIN" },
    { text: "Don't bend; don't water it down; don't try to make it logical; don't edit your own soul according to the fashion.", author: "Franz Kafka", tag: "EXISTENCE" },
    { text: "It's only because of their stupidity that they're able to be so sure of themselves.", author: "Franz Kafka", tag: "TRAGEDY" },
    { text: "A non-writing writer is a monster courting insanity.", author: "Franz Kafka", tag: "TRAGEDY" },
    { text: "There is something comforting about solitude, but there is something terrifying about it too.", author: "Franz Kafka", tag: "SOLITUDE" },
    { text: "My guiding principle is this: Guilt is never to be doubted.", author: "Franz Kafka", tag: "TRAGEDY" },
    { text: "He was a tool of the boss, without brains or backbone.", author: "Franz Kafka", tag: "TRAGEDY" },
    { text: "The meaning of life is that it stops.", author: "Franz Kafka", tag: "TRAGEDY" },
    { text: "Every revolution evaporates and leaves behind only the slime of a new bureaucracy.", author: "Franz Kafka", tag: "TRAGEDY" },
    { text: "From a certain point onward there is no longer any turning back. That is the point that must be reached.", author: "Franz Kafka", tag: "EXISTENCE" },
    { text: "Youth is happy because it has the capacity to see beauty. Anyone who keeps the ability to see beauty never grows old.", author: "Franz Kafka", tag: "EXISTENCE" },
    { text: "God gives the nuts, but he does not crack them.", author: "Franz Kafka", tag: "TRAGEDY" },
    { text: "We are as forlorn as children lost in the wood.", author: "Franz Kafka", tag: "SOLITUDE" },
    { text: "Logic may indeed be unshakeable, but it cannot withstand a man who wants to go on living.", author: "Franz Kafka", tag: "EXISTENCE" },
    { text: "Paths are made by walking.", author: "Franz Kafka", tag: "EXISTENCE" },
    { text: "You do not need to leave your room. Remain sitting at your table and listen. Do not even listen, simply wait, be quiet, still and solitary. The world will freely offer itself to you to be unmasked, it has no choice, it will roll in ecstasy at your feet.", author: "Franz Kafka", tag: "SOLITUDE" },
    { text: "I am in chains. Don't touch my chains.", author: "Franz Kafka", tag: "TRAGEDY" },
    { text: "My memory and my powers of insight are not smaller than other people's, but they are less reliable.", author: "Franz Kafka", tag: "TRAGEDY" },
    { text: "There are some things one can only achieve by a deliberate leap in the opposite direction.", author: "Franz Kafka", tag: "EXISTENCE" },
    { text: "We are sinful not only because we have eaten of the Tree of Knowledge, but also because we have not yet eaten of the Tree of Life.", author: "Franz Kafka", tag: "TRAGEDY" },
    { text: "A book must be the axe for the frozen sea within us.", author: "Franz Kafka", tag: "EXISTENCE" },
    { text: "Writing is utter solitude, the descent into the cold abyss of oneself.", author: "Franz Kafka", tag: "SOLITUDE" },
    { text: "I cannot make you understand. I cannot make anyone understand what is happening inside me.", author: "Franz Kafka", tag: "SOLITUDE" },
    { text: "There are countless seductions the world employs against us. It is impossible to resist them all.", author: "Franz Kafka", tag: "TRAGEDY" },
    { text: "You are free and that is why you are lost.", author: "Franz Kafka", tag: "TRAGEDY" },
    { text: "There is an infinite amount of hope in the universe — but not for us.", author: "Franz Kafka", tag: "TRAGEDY" },
    { text: "The snow geese and the wild ducks had already flown south; only the old, sick ones stayed.", author: "Leo Tolstoy", tag: "TRAGEDY" },
    { text: "The two most powerful warriors are patience and time.", author: "Leo Tolstoy", tag: "TRAGEDY" },
    { text: "Everyone thinks of changing the world, but no one thinks of changing himself.", author: "Leo Tolstoy", tag: "TRAGEDY" },
    { text: "All great literature is one of two stories; a man goes on a journey or a stranger comes to town.", author: "Leo Tolstoy", tag: "EXISTENCE" },
    { text: "All happy families are alike; each unhappy family is unhappy in its own way.", author: "Leo Tolstoy", tag: "TRAGEDY" },
    { text: "I know that most men, including those at ease with problems of the greatest complexity, can seldom accept even the simplest and most obvious truth if it be such as would oblige them to admit the falsity of conclusions which they have delighted in explaining to colleagues.", author: "Leo Tolstoy", tag: "TRAGEDY" },
    { text: "There is no greatness where there is no simplicity, goodness and truth.", author: "Leo Tolstoy", tag: "TRAGEDY" },
    { text: "War is so unjust and ugly that all who wage it must try to stifle the voice of conscience within themselves.", author: "Leo Tolstoy", tag: "TRAGEDY" },
    { text: "The most difficult subjects can be explained to the most slow-witted man if he has not formed any idea of them already; but the simplest thing cannot be made clear to the most intelligent man if he is firmly persuaded that he knows already.", author: "Leo Tolstoy", tag: "TRAGEDY" },
    { text: "A man can live and be healthy without killing animals for food; therefore, if he eats meat, he participates in taking animal life merely for the sake of his appetite.", author: "Leo Tolstoy", tag: "TRAGEDY" },
    { text: "Everything I know I learned after I was thirty.", author: "Georges Clemenceau", tag: "EXISTENCE" },
    { text: "I wanted movement and not a calm course of existence. I wanted excitement and danger and the chance to sacrifice myself for my love.", author: "Leo Tolstoy", tag: "EXISTENCE" },
    { text: "If there is no love, what then is there?", author: "Leo Tolstoy", tag: "PAIN" },
    { text: "He never chooses an opinion; he just wears whatever happens to be in style.", author: "Leo Tolstoy", tag: "TRAGEDY" },
    { text: "All violence consists in some people forcing others, under threat of suffering or death, to do what they do not want to do.", author: "Leo Tolstoy", tag: "TRAGEDY" },
    { text: "It is amazing how complete is the delusion that beauty is goodness.", author: "Leo Tolstoy", tag: "TRAGEDY" },
    { text: "I sit on a man's back, choking him and making him carry me, and yet assure myself and others that I am very sorry for him and wish to ease his lot by all possible means.", author: "Leo Tolstoy", tag: "TRAGEDY" },
    { text: "The changes in our life must come from the impossibility to live otherwise than according to the demands of our conscience not from our mental resolution to try a new form of life.", author: "Leo Tolstoy", tag: "EXISTENCE" },
    { text: "There is no other solution to man's problems but the day's honest work, the day's honest decisions, the day's generous utterances, and the day's good deed.", author: "Leo Tolstoy", tag: "EXISTENCE" },
    { text: "He looked at her as a man might look at a faded flower he had plucked, in which it was difficult to trace the beauty that had made him pluck and so destroy it.", author: "Leo Tolstoy", tag: "PAIN" },
    { text: "Seize the moments of happiness, love and be loved! That is the only reality in the world, all else is folly.", author: "Leo Tolstoy", tag: "EXISTENCE" },
    { text: "If everyone fought for their own convictions there would be no war.", author: "Leo Tolstoy", tag: "TRAGEDY" },
    { text: "In the name of God, stop a moment, cease your work, look around you.", author: "Leo Tolstoy", tag: "EXISTENCE" },
    { text: "All, everything that I understand, I understand only because I love.", author: "Leo Tolstoy", tag: "EXISTENCE" },
    { text: "He stepped down, trying not to look long at her, as if she were the sun, yet he saw her, like the sun, even without looking.", author: "Leo Tolstoy", tag: "PAIN" },
    { text: "It is not beauty that endears, it's love that makes us see beauty.", author: "Leo Tolstoy", tag: "PAIN" },
    { text: "We are asleep until we fall in Love!", author: "Leo Tolstoy", tag: "EXISTENCE" },
    { text: "Love is life. All, everything that I understand, I understand only because I love.", author: "Leo Tolstoy", tag: "EXISTENCE" },
    { text: "The sole meaning of life is to serve humanity.", author: "Leo Tolstoy", tag: "EXISTENCE" },
    { text: "Short as life is, we make it still shorter by the careless waste of time.", author: "Victor Hugo", tag: "TRAGEDY" },
    { text: "There is always more misery among the lower classes than there is humanity in the higher.", author: "Victor Hugo", tag: "TRAGEDY" },
    { text: "Even the darkest night will end and the sun will rise.", author: "Victor Hugo", tag: "TRAGEDY" },
    { text: "Melancholy is the happiness of being sad.", author: "Victor Hugo", tag: "PAIN" },
    { text: "He who opens a school door, closes a prison.", author: "Victor Hugo", tag: "TRAGEDY" },
    { text: "You ask me if God exists. I do not know what God is. I know he does not let me know him.", author: "Victor Hugo", tag: "EXISTENCE" },
    { text: "Have courage for the great sorrows of life and patience for the small ones.", author: "Victor Hugo", tag: "PAIN" },
    { text: "Not being heard is no reason for silence.", author: "Victor Hugo", tag: "TRAGEDY" },
    { text: "Nothing is more powerful than an idea whose time has come.", author: "Victor Hugo", tag: "EXISTENCE" },
    { text: "Life is a flower of which love is the honey.", author: "Victor Hugo", tag: "EXISTENCE" },
    { text: "Laughter is the sun that drives winter from the human face.", author: "Victor Hugo", tag: "TRAGEDY" },
    { text: "The greatest happiness of life is the conviction that we are loved — loved for ourselves, or rather, loved in spite of ourselves.", author: "Victor Hugo", tag: "EXISTENCE" },
    { text: "To love another person is to see the face of God.", author: "Victor Hugo", tag: "EXISTENCE" },
    { text: "I am a forest, and a night of dark trees: but he who is not afraid of my darkness, will find banks full of roses under my cypresses.", author: "Friedrich Nietzsche", tag: "SOLITUDE" },
    { text: "The thought of suicide is a great consolation: by means of it one gets through many a dark night.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "I know my fate. One day my name will be associated with the memory of something tremendous.", author: "Friedrich Nietzsche", tag: "SOLITUDE" },
    { text: "In loneliness, the lonely one eats himself; in a crowd, the many eat him.", author: "Friedrich Nietzsche", tag: "SOLITUDE" },
    { text: "That which does not kill me makes me stronger.", author: "Friedrich Nietzsche", tag: "PAIN" },
    { text: "The higher we soar the smaller we appear to those who cannot fly.", author: "Friedrich Nietzsche", tag: "SOLITUDE" },
    { text: "Without music, life would be a mistake.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "We love life, not because we are used to living but because we are used to loving.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "The secret for harvesting from existence the greatest fruitfulness and the greatest enjoyment is — to live dangerously!", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "I'm not upset that you lied to me, I'm upset that from now on I can't believe you.", author: "Friedrich Nietzsche", tag: "PAIN" },
    { text: "One must still have chaos in oneself to be able to give birth to a dancing star.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "There are no facts, only interpretations.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "A thought comes when it will, not when I will.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "Invisible threads are the strongest ties.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "The surest way to corrupt a youth is to instruct him to hold in higher esteem those who think alike than those who think differently.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "One repays a teacher badly if one always remains nothing but a pupil.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "You must be ready to burn yourself in your own flame; how could you rise anew if you have not first become ashes?", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "We hear only those questions for which we are in a position to find answers.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "Is man merely a mistake of God's? Or God merely a mistake of man?", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "He who has a reason to live can endure any how.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "A good writer possesses not only his own spirit but also the spirit of his friends.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "The most dangerous follower is he whose defection would destroy the whole party: that is to say, the best follower.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "Convictions are more dangerous foes of truth than lies.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "Sometimes people don't want to hear the truth because they don't want their illusions destroyed.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "Amor fati: love your fate, which is in fact your life.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "The man of knowledge must be able not only to love his enemies but also to hate his friends.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "We should consider every day lost on which we have not danced at least once.", author: "Friedrich Nietzsche", tag: "EXISTENCE" },
    { text: "Whoever despises himself still respects himself as one who despises.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "Hope in reality is the worst of all evils because it prolongs the torments of man.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "He who climbs upon the highest mountains laughs at all tragedies, real or imaginary.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "My solitude doesn't depend on the presence or absence of people; on the contrary, I hate who steals my solitude without, in exchange, offering me true company.", author: "Friedrich Nietzsche", tag: "SOLITUDE" },
    { text: "Out of life's school of war — what doesn't kill me makes me stronger.", author: "Friedrich Nietzsche", tag: "PAIN" },
    { text: "Be careful, lest in casting out your demon you exorcise the best thing in you.", author: "Friedrich Nietzsche", tag: "TRAGEDY" },
    { text: "Plunge boldly into the thick of life, and seize it where you will, it is always interesting.", author: "Johann Wolfgang von Goethe", tag: "EXISTENCE" },
    { text: "Nothing is worth more than this day.", author: "Johann Wolfgang von Goethe", tag: "EXISTENCE" },
    { text: "Man errs, as long as he strives.", author: "Johann Wolfgang von Goethe", tag: "TRAGEDY" },
    { text: "None are more hopelessly enslaved than those who falsely believe they are free.", author: "Johann Wolfgang von Goethe", tag: "TRAGEDY" },
    { text: "A man's errors are his portals of discovery.", author: "James Joyce", tag: "EXISTENCE" },
    { text: "The supreme question about a work of art is out of how deep a life does it spring.", author: "James Joyce", tag: "EXISTENCE" },
    { text: "In the particular is contained the universal.", author: "James Joyce", tag: "EXISTENCE" },
    { text: "His soul swooned slowly as he heard the snow falling faintly through the universe and faintly falling, like the descent of their last end, upon all the living and the dead.", author: "James Joyce", tag: "TRAGEDY" },
    { text: "Mistakes are the portals of discovery.", author: "James Joyce", tag: "EXISTENCE" },
    { text: "I am tomorrow, or some future day, what I establish today. I am today what I established yesterday or some previous day.", author: "James Joyce", tag: "EXISTENCE" },
    { text: "He was tired of his life. It was the only reason he could see.", author: "James Joyce", tag: "TRAGEDY" },
    { text: "God made food; the devil the cooks.", author: "James Joyce", tag: "TRAGEDY" },
    { text: "No man knows till he has suffered from the night how sweet and dear to his heart and eye the morning can be.", author: "Bram Stoker", tag: "PAIN" },
    { text: "We learn from failure, not from success!", author: "Bram Stoker", tag: "PAIN" },
    { text: "I want to be alone.", author: "Greta Garbo", tag: "SOLITUDE" },
    { text: "The cradle rocks above an abyss, and common sense tells us that our existence is but a brief crack of light between two eternities of darkness.", author: "Vladimir Nabokov", tag: "EXISTENCE" },
    { text: "Life is a great surprise. I do not see why death should not be an even greater one.", author: "Vladimir Nabokov", tag: "TRAGEDY" },
    { text: "I think like a genius, I write like a distinguished author, and I speak like a child.", author: "Vladimir Nabokov", tag: "EXISTENCE" },
    { text: "Literature and butterflies are the two sweetest passions known to man.", author: "Vladimir Nabokov", tag: "EXISTENCE" },
    { text: "Lolita, light of my life, fire of my loins. My sin, my soul.", author: "Vladimir Nabokov", tag: "TRAGEDY" },
    { text: "The pages are still blank, but there is a miraculous feeling of the words being there, written in invisible ink and clamoring to become visible.", author: "Vladimir Nabokov", tag: "EXISTENCE" },
    { text: "No single word in English renders all the shades of toska. At its deepest and most painful, it is a sensation of great spiritual anguish.", author: "Vladimir Nabokov", tag: "PAIN" },
    { text: "Genius is finding the invisible link between things.", author: "Vladimir Nabokov", tag: "EXISTENCE" },
    { text: "All of old. Nothing else ever. Ever tried. Ever failed. No matter. Try again. Fail again. Fail better.", author: "Samuel Beckett", tag: "TRAGEDY" },
    { text: "We are all born mad. Some remain so.", author: "Samuel Beckett", tag: "TRAGEDY" },
    { text: "We always find something, eh Didi, to give us the impression we exist?", author: "Samuel Beckett", tag: "EXISTENCE" },
    { text: "Nothing to be done.", author: "Samuel Beckett", tag: "TRAGEDY" },
    { text: "I can't go on. I'll go on.", author: "Samuel Beckett", tag: "TRAGEDY" },
    { text: "Ever tried. Ever failed. No matter. Try again. Fail again. Fail better.", author: "Samuel Beckett", tag: "TRAGEDY" },
    { text: "Let us not speak ill of our generation, it is not any unhappier than its predecessors.", author: "Samuel Beckett", tag: "TRAGEDY" },
    { text: "The tears of the world are a constant quantity. For each one who begins to weep somewhere else another stops.", author: "Samuel Beckett", tag: "TRAGEDY" },
    { text: "Birth was the death of him.", author: "Samuel Beckett", tag: "TRAGEDY" },
    { text: "To find a form that accommodates the mess, that is the task of the artist now.", author: "Samuel Beckett", tag: "EXISTENCE" },
    { text: "The sun shone, having no alternative, on the nothing new.", author: "Samuel Beckett", tag: "TRAGEDY" },
    { text: "My mistakes are my life.", author: "Samuel Beckett", tag: "TRAGEDY" },
    { text: "Estragon: I can't go on like this. Vladimir: That's what you think.", author: "Samuel Beckett", tag: "TRAGEDY" },
    { text: "The war is over and I'm glad it's over. I'm sick of it.", author: "Erich Maria Remarque", tag: "TRAGEDY" },
    { text: "We are not youth any longer. We don't want to take the world by storm. We are fleeing. We fly from ourselves. From our life. We were eighteen and had begun to love life and the world; and we had to shoot it to pieces.", author: "Erich Maria Remarque", tag: "TRAGEDY" },
    { text: "This book is to be neither an accusation nor a confession, and least of all an adventure, for death is not an adventure to those who stand face to face with it.", author: "Erich Maria Remarque", tag: "TRAGEDY" },
    { text: "I am young, I am twenty years old; yet I know nothing of life but despair, death, fear, and fatuous superficiality cast over an abyss of sorrow.", author: "Erich Maria Remarque", tag: "TRAGEDY" },
    { text: "We are not old men. We are not old men. We are getting away from ourselves. We want to live at any price; so we cannot burden ourselves with wishes which are impossible to fulfill.", author: "Erich Maria Remarque", tag: "TRAGEDY" },
    { text: "How senseless is everything that can ever be written, done, or thought, when such things are possible. It must be all lies and of no account when the culture of a thousand years could not prevent this stream of blood being poured out.", author: "Erich Maria Remarque", tag: "TRAGEDY" },
    { text: "He fell in October 1918, on a day that was so quiet and still on the whole front, that the army report confined itself to the single sentence: All quiet on the Western Front.", author: "Erich Maria Remarque", tag: "TRAGEDY" },
    { text: "We were eighteen and had begun to love life and the world; and we had to shoot it to pieces.", author: "Erich Maria Remarque", tag: "TRAGEDY" },
    { text: "I see how peoples are set against one another, and in silence, unknowingly, foolishly, obediently, innocently slay one another.", author: "Erich Maria Remarque", tag: "TRAGEDY" },
    { text: "The soldier is on friendlier terms with death than with his government.", author: "Erich Maria Remarque", tag: "TRAGEDY" },
    { text: "I am frightened. I dare not think any further.", author: "Erich Maria Remarque", tag: "TRAGEDY" },
    { text: "Every day that is born into the world comes like a burst of music and rings the whole day through.", author: "Thomas Carlyle", tag: "EXISTENCE" },
    { text: "A man without a goal is like a ship without a rudder.", author: "Thomas Carlyle", tag: "TRAGEDY" },
    { text: "There is nothing either good or bad but thinking makes it so.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "The robbed that smiles, steals something from the thief.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Let me not to the marriage of true minds admit impediments.", author: "William Shakespeare", tag: "PAIN" },
    { text: "Love is not love which alters when it alteration finds.", author: "William Shakespeare", tag: "PAIN" },
    { text: "The quality of mercy is not strained.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Uneasy lies the head that wears a crown.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "How sharper than a serpent's tooth it is to have a thankless child!", author: "William Shakespeare", tag: "PAIN" },
    { text: "Men at some time are masters of their fates.", author: "William Shakespeare", tag: "EXISTENCE" },
    { text: "Our doubts are traitors, and make us lose the good we oft might win, by fearing to attempt.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "By my troth, I care not; a man can die but once; we owe God a death.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Go wisely and slowly. Those who rush stumble and fall.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "What light is light, if Silvia be not seen? What joy is joy, if Silvia be not by?", author: "William Shakespeare", tag: "PAIN" },
    { text: "The lady doth protest too much, methinks.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Nothing will come of nothing.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Stars, hide your fires; let not light see my black and deep desires.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Cowards die many times before their deaths; the valiant never taste of death but once.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "The robbed that smiles, steals something from the thief.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Out, out, brief candle! Life's but a walking shadow, a poor player that struts and frets his hour upon the stage, and then is heard no more. It is a tale told by an idiot, full of sound and fury, signifying nothing.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Who would fardels bear, to grunt and sweat under a weary life, but that the dread of something after death, the undiscovered country from whose bourn no traveller returns, puzzles the will.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "It is not in the stars to hold our destiny but in ourselves.", author: "William Shakespeare", tag: "EXISTENCE" },
    { text: "There is nothing either good or bad, but thinking makes it so.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "If you prick us do we not bleed? If you tickle us do we not laugh? If you poison us do we not die?", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Wisely and slow; they stumble that run fast.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "Good night, good night! Parting is such sweet sorrow, that I shall say good night till it be morrow.", author: "William Shakespeare", tag: "PAIN" },
    { text: "For in that sleep of death what dreams may come when we have shuffled off this mortal coil must give us pause.", author: "William Shakespeare", tag: "TRAGEDY" },
    { text: "At the still point of the turning world. Neither flesh nor fleshless; neither from nor towards.", author: "T.S. Eliot", tag: "EXISTENCE" },
    { text: "Between the idea and the reality, between the motion and the act, falls the Shadow.", author: "T.S. Eliot", tag: "TRAGEDY" },
    { text: "Human kind cannot bear very much reality.", author: "T.S. Eliot", tag: "TRAGEDY" },
    { text: "We shall not cease from exploration, and the end of all our exploring will be to arrive where we started and know the place for the first time.", author: "T.S. Eliot", tag: "EXISTENCE" },
    { text: "Not with a bang but a whimper.", author: "T.S. Eliot", tag: "TRAGEDY" },
    { text: "Time present and time past are both perhaps present in time future.", author: "T.S. Eliot", tag: "EXISTENCE" },
    { text: "I have measured out my life with coffee spoons.", author: "T.S. Eliot", tag: "TRAGEDY" },
    { text: "The awful daring of a moment's surrender.", author: "T.S. Eliot", tag: "TRAGEDY" },
{ text: "We are asleep until we fall in love.", author: "Leo Tolstoy — War and Peace", tag: "EXISTENCE" },
    { text: "The strongest of all warriors are these two — Time and Patience.", author: "Leo Tolstoy — War and Peace", tag: "TRAGEDY" },
    { text: "If everyone fought for their own convictions there would be no war.", author: "Leo Tolstoy — War and Peace", tag: "TRAGEDY" },
    { text: "There is no greatness where there is no simplicity, goodness, and truth.", author: "Leo Tolstoy — War and Peace", tag: "TRAGEDY" },
    { text: "How can one be well when one suffers morally?", author: "Leo Tolstoy — War and Peace", tag: "PAIN" },
    { text: "A battle is won by the side that is absolutely determined to win.", author: "Leo Tolstoy — War and Peace", tag: "TRAGEDY" },
    { text: "There is no condition of life in which man can be happy and entirely free from suffering.", author: "Leo Tolstoy — War and Peace", tag: "PAIN" },
    { text: "The whole world is divided for me into two parts: one is she, and there is all happiness, hope, light; the other is where she is not, and there all is gloom and darkness.", author: "Leo Tolstoy — War and Peace", tag: "PAIN" },
    { text: "The sky! Not here, not now, but up there, in eternity.", author: "Leo Tolstoy — War and Peace", tag: "EXISTENCE" },
    { text: "Man cannot possess anything as long as he fears death. But to him who does not fear it, everything belongs.", author: "Leo Tolstoy — War and Peace", tag: "EXISTENCE" },
    { text: "All we can know is that we know nothing. And that's the height of human wisdom.", author: "Leo Tolstoy — War and Peace", tag: "TRAGEDY" },
    { text: "We imagine that when we are thrown out of our usual ruts all is lost, but it is only then that what is new and good begins.", author: "Leo Tolstoy — War and Peace", tag: "TRAGEDY" },
    { text: "The most difficult thing — but an essential one — is to love Life, to love it even while one suffers, because Life is all. Life is God.", author: "Leo Tolstoy — War and Peace", tag: "EXISTENCE" },
    { text: "A man on the battlefield does not think of glory or of the country's welfare. He thinks of how not to be killed.", author: "Leo Tolstoy — War and Peace", tag: "TRAGEDY" },
    { text: "In historical events, the so-called great men are labels giving names to events, and like labels they have but the smallest connection with the event itself.", author: "Leo Tolstoy — War and Peace", tag: "TRAGEDY" },
    { text: "War is not a polite recreation but the vilest thing in life, and we ought to understand that and not play at war.", author: "Leo Tolstoy — War and Peace", tag: "TRAGEDY" },
    { text: "Nothing is so necessary for a young man as the company of intelligent women.", author: "Leo Tolstoy — War and Peace", tag: "EXISTENCE" },
    { text: "We are only conscious of what we understand. And we only understand what we are able to formulate.", author: "Leo Tolstoy — War and Peace", tag: "EXISTENCE" },
    { text: "He did what heroes do after their work is accomplished — he died.", author: "Leo Tolstoy — War and Peace", tag: "TRAGEDY" },
    { text: "The present moment always will have been. Whatever I do now, if I do it well, it will have been worth doing.", author: "Leo Tolstoy — War and Peace", tag: "EXISTENCE" },
    { text: "A kind word is not only not harmful, but no obstacle to anything; yet it may accomplish much.", author: "Leo Tolstoy — War and Peace", tag: "EXISTENCE" },
    { text: "There is no happiness for one who does not know what happiness is.", author: "Leo Tolstoy — War and Peace", tag: "TRAGEDY" },
    { text: "Death is a terrible thing. It is the end of everything. There is nothing after death.", author: "Leo Tolstoy — War and Peace", tag: "TRAGEDY" },
